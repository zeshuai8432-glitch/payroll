<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點工薪資與案場人事成本管理</title>
<style>
  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --ink: #1a1d2e;
    --muted: #7a7f9a;
    --line: #e2e6f0;
    --line2: #c8cedf;
    --accent: #4f46e5;
    --accent2: #e5466b;
    --warn-bg: #fff8e6;
    --warn-ink: #92600a;
    --danger: #d63f3f;
    --info: #0e7db0;
    --radius: 16px;
    --shadow-sm: 0 1px 4px rgba(79,70,229,.07), 0 4px 16px rgba(79,70,229,.06);
    --shadow-md: 0 4px 24px rgba(79,70,229,.13), 0 1px 4px rgba(0,0,0,.06);
    --grad-top: linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #a855f7 100%);
    --grad-sidebar: linear-gradient(180deg, #f8f7ff 0%, #f0f2f8 100%);
    --metric-1: linear-gradient(135deg, #4f46e5, #7c3aed);
    --metric-2: linear-gradient(135deg, #0e7db0, #06b6d4);
    --metric-3: linear-gradient(135deg, #059669, #10b981);
    --metric-4: linear-gradient(135deg, #d97706, #f59e0b);
    --metric-5: linear-gradient(135deg, #e5466b, #f43f5e);
    --metric-6: linear-gradient(135deg, #7c3aed, #a855f7);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.6; }

  /* ── 頂部漸層列 ── */
  .top {
    background: var(--grad-top);
    color: #fff;
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 20px rgba(79,70,229,.35);
  }
  .top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .top h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .3px;
    text-shadow: 0 1px 6px rgba(0,0,0,.18);
  }
  .top .burger { display: none; background: rgba(255,255,255,.2); border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; border-radius: 8px; }
  .top .burger:hover { background: rgba(255,255,255,.3); }

  /* ── 側邊欄 ── */
  .layout { display: flex; min-height: calc(100vh - 58px); }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--grad-sidebar);
    border-right: 1px solid var(--line);
    padding: 18px 0 14px;
    overflow-y: auto;
  }
  .nav-group { margin-bottom: 8px; }
  .nav-group-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    padding: 10px 20px 5px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    opacity: .7;
  }
  .nav-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 9px 20px 9px 22px;
    font-size: 13.5px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--ink);
    border-left: 3px solid transparent;
    transition: all .18s;
    border-radius: 0 10px 10px 0;
    margin-right: 10px;
  }
  .nav-item:hover { background: rgba(79,70,229,.07); color: var(--accent); }
  .nav-item.active {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(79,70,229,.12), rgba(79,70,229,.04));
    color: var(--accent);
    font-weight: 700;
  }
  .main { flex: 1; min-width: 0; padding: 24px 28px 60px; max-width: 1080px; }
  .scrim { display: none; }
  @media (max-width: 760px) {
    /* ── 側邊欄抽屜 ── */
    .top .burger { display: block; }
    .sidebar { position: fixed; top: 52px; left: 0; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .22s cubic-bezier(.4,0,.2,1); box-shadow: 4px 0 24px rgba(79,70,229,.18); }
    .sidebar.open { transform: translateX(0); }
    .scrim.show { display: block; position: fixed; inset: 52px 0 0 0; background: rgba(30,27,75,.35); z-index: 55; backdrop-filter: blur(2px); }

    /* ── 頂列精簡 ── */
    .top { padding: 0 12px; height: 52px; gap: 10px; }
    .top h1 { font-size: 15px; }
    #cloud-status { display: none; }
    #cloud-refresh { font-size: 12px; padding: 4px 10px; }

    /* ── 主內容 ── */
    .layout { min-height: calc(100vh - 52px); }
    .main { padding: 12px 12px 60px; }

    /* ── 卡片 ── */
    .card { padding: 14px 14px; margin-bottom: 12px; border-radius: 12px; }

    /* ── 指標卡片 ── */
    .metrics { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .metric { padding: 13px 14px; border-radius: 12px; }
    .metric .v { font-size: 21px; }
    .metric .l { font-size: 10.5px; }

    /* ── 表單：欄位全寬堆疊 ── */
    .row { gap: 10px; }
    .field { width: 100%; }
    .field input, .field select { width: 100% !important; min-width: 0 !important; box-sizing: border-box; }
    /* 主要提交按鈕全寬 */
    .row > .btn { width: 100%; }

    /* ── 按鈕：加大觸控面積 ── */
    .act { padding: 7px 10px; font-size: 13.5px; }
    .btn { font-size: 15px; }

    /* ── 表格 ── */
    th { padding: 8px 7px; font-size: 10.5px; }
    td { padding: 9px 7px; font-size: 13px; }

    /* ── 側邊欄項目加高（觸控友善） ── */
    .nav-item { padding: 12px 20px 12px 22px; font-size: 14px; }
    /* ── 頂列按鈕文字切換 ── */
    .mob-hide { display: none; }
    .mob-show { display: inline !important; }
    /* ── 照片列縮圖自動填滿 ── */
    .photo-thumb { width: calc(33vw - 24px) !important; height: calc(25vw - 18px) !important; }
  }

  /* ── 卡片入場動畫 ── */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 卡片 ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 32px 72px; }
  .card {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.75);
    border-radius: 20px;
    padding: 26px 30px;
    margin-bottom: 22px;
    box-shadow: 0 2px 8px rgba(79,70,229,.06), 0 8px 28px rgba(79,70,229,.08);
    transition: box-shadow .28s cubic-bezier(.4,0,.2,1), transform .28s cubic-bezier(.34,1.4,.64,1);
    will-change: transform;
    animation: cardIn .28s cubic-bezier(.4,0,.2,1) both;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(79,70,229,.11), 0 18px 48px rgba(79,70,229,.14);
    transform: translateY(-3px);
  }
  .card:active { transform: translateY(-1px); transition-duration: .08s; }

  /* ── 主內容留白 ── */
  .main { flex: 1; min-width: 0; padding: 28px 32px 72px; max-width: 1100px; }

  /* ── 表單 ── */
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11.5px; font-weight: 700; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; }
  input, select {
    height: 40px;
    padding: 0 14px;
    border: 1.5px solid var(--line2);
    border-radius: 12px;
    font-size: 14px;
    background: rgba(255,255,255,.9);
    font-family: inherit;
    color: var(--ink);
    transition: border-color .18s, box-shadow .18s, background .18s;
  }
  input:hover, select:hover { border-color: rgba(79,70,229,.4); background: #fff; }
  input:focus, select:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(79,70,229,.13); }
  input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }

  /* ── 統計數字卡片（彩色漸層） ── */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .metric {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.7);
    border-radius: 18px;
    padding: 20px 22px;
    box-shadow: 0 2px 8px rgba(79,70,229,.07), 0 6px 20px rgba(79,70,229,.07);
    position: relative;
    overflow: hidden;
    transition: transform .22s cubic-bezier(.34,1.4,.64,1), box-shadow .22s;
    animation: cardIn .3s cubic-bezier(.4,0,.2,1) both;
  }
  .metric:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 8px 24px rgba(79,70,229,.14), 0 2px 6px rgba(79,70,229,.08); }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--metric-1);
    transition: height .22s;
  }
  .metric:hover::before { height: 5px; }
  .metric:nth-child(6n+2)::before { background: var(--metric-2); }
  .metric:nth-child(6n+3)::before { background: var(--metric-3); }
  .metric:nth-child(6n+4)::before { background: var(--metric-4); }
  .metric:nth-child(6n+5)::before { background: var(--metric-5); }
  .metric:nth-child(6n+6)::before { background: var(--metric-6); }
  .metric .l { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
  .metric .v {
    font-size: 27px;
    font-weight: 800;
    margin-top: 8px;
    background: var(--metric-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .metric:nth-child(6n+2) .v { background: var(--metric-2); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+3) .v { background: var(--metric-3); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+4) .v { background: var(--metric-4); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+5) .v { background: var(--metric-5); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+6) .v { background: var(--metric-6); -webkit-background-clip: text; background-clip: text; }

  /* ── 表格 ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .6px;
    text-transform: uppercase;
    padding: 11px 12px;
    border-bottom: 2px solid var(--line);
    white-space: nowrap;
    background: rgba(248,249,255,.9);
  }
  td { padding: 12px 12px; border-bottom: 1px solid var(--line); transition: background .15s, border-color .15s; }
  tr:hover td { background: rgba(79,70,229,.04); }
  tr:hover td:first-child { border-left: 3px solid rgba(79,70,229,.3); padding-left: 9px; }
  td:first-child { border-left: 3px solid transparent; transition: border-color .15s, padding .15s, background .15s; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* ── 按鈕 ── */
  .btn {
    height: 40px;
    background: var(--grad-top);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 0 22px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    box-shadow: 0 2px 12px rgba(79,70,229,.3);
    transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, opacity .15s;
    will-change: transform;
  }
  .btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 6px 24px rgba(79,70,229,.42); opacity: .94; }
  .btn:active { transform: translateY(0) scale(.98); transition-duration: .07s; box-shadow: 0 2px 8px rgba(79,70,229,.25); }
  .btn:disabled { opacity: .45; transform: none; cursor: not-allowed; }
  .act {
    cursor: pointer;
    background: none;
    border: none;
    font-size: 13px;
    padding: 4px 9px;
    color: var(--accent);
    font-family: inherit;
    border-radius: 8px;
    transition: background .15s, transform .15s cubic-bezier(.34,1.4,.64,1), color .15s;
  }
  .act:hover { background: rgba(79,70,229,.09); transform: translateY(-1px); }
  .act:active { transform: translateY(0); transition-duration: .06s; }
  .act.danger { color: var(--danger); }
  .act.danger:hover { background: rgba(214,63,63,.09); }
  .act.muted { color: var(--muted); cursor: default; }
  .act.muted:hover { background: none; transform: none; }

  /* ── 標籤、訊息 ── */
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #fff8e6, #fef3c7);
    color: var(--warn-ink);
    border: 1px solid #fde68a;
    margin-left: 6px;
    transition: transform .15s cubic-bezier(.34,1.4,.64,1), box-shadow .15s;
  }
  .tag:hover { transform: scale(1.06); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .empty { color: var(--muted); font-size: 14px; padding: 44px 0; text-align: center; letter-spacing: .2px; }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 16px; line-height: 1.7; }
  details summary { cursor: pointer; font-size: 13px; color: var(--accent); font-weight: 600; transition: color .15s; }
  details summary:hover { color: var(--accent2); }
  .moon { color: var(--info); }
  .scroll { overflow-x: auto; border-radius: 12px; }
  .inline { display: flex; gap: 6px; align-items: center; }
  .inline input { height: 32px; width: 100px; }

  /* ── 列印用浮層（不動） ── */
  #print-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; overflow: auto; padding: 24px; }
  #print-overlay .pbar { position: sticky; top: 0; background: #fff; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line2); display: flex; gap: 10px; justify-content: flex-end; }
  #print-overlay .pdoc { max-width: 800px; margin: 0 auto; color: #1f2421; }
  #print-overlay h1 { font-size: 18px; margin: 0 0 2px; }
  #print-overlay .meta { font-size: 12px; color: #555; margin-bottom: 16px; }
  #print-overlay table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #print-overlay th, #print-overlay td { border: 1px solid #cfd2cd; padding: 6px 8px; }
  #print-overlay th { background: #eef1ee; text-align: left; font-size: 12px; text-transform: none; letter-spacing: 0; }
  #print-overlay td.num, #print-overlay th.num { text-align: right; font-variant-numeric: tabular-nums; }
  #print-overlay .total-row td { font-weight: 700; background: #f6f7f5; }
  #print-overlay .sign { margin-top: 32px; font-size: 13px; display: flex; gap: 48px; }
  #print-overlay .sign div { border-top: 1px solid #1f2421; padding-top: 6px; min-width: 160px; }
  #print-overlay .sub { font-size: 11px; color: #777; margin-top: 8px; }
  #print-overlay .sec { font-size: 13px; font-weight: 700; margin: 16px 0 6px; }
  #print-overlay h2.sec { font-size: 14px; margin: 18px 0 6px; padding-top: 10px; border-top: 1px solid #cfd2cd; }
  @media print {
    body > .top, body > .layout { display: none !important; }
    #print-overlay { position: static; padding: 0; }
    #print-overlay .pbar { display: none !important; }
    @page { size: A4; margin: 16mm; }
  }
</style>
</head>
<body>
<div class="top">
  <button class="burger" id="burger" aria-label="選單">☰</button>
  <h1>點工薪資管理系統</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span id="cloud-status" style="font-size:12px;opacity:.85;letter-spacing:.2px">連線中…</span>
    <button id="cloud-refresh" style="background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:600;backdrop-filter:blur(4px);transition:background .15s"><span class="mob-hide">↻ 重新整理</span><span class="mob-show" style="display:none">↻</span></button>
  </div>
</div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="scrim" id="scrim"></div>
  <main class="main" id="body"></main>
</div>

<script>
const LS = 'pm_data_v2';
const LS_PHOTOS = 'pm_billing_photos_v1';
const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyMPs38UNzAwX3bcD2n9nQBz0HofUW9qFweSOnmoySs8VW2bJYHn47RdyZLQ8bD8SNWTg/exec';
let state = { employees:[], sites:[], attendance:[], adjustments:[], loans:[], tools:[], locations:[], assets:[], advances:[], accounts:[], ledger:[], deals:[], billings:[], measurements:[], contracts:{}, costs:[], parkAccId:'', oweBonus:{}, minFund:'', tab:'entry' };
let cloudStatus='連線中…';
let entryDate='', entrySite='', entryEmp=''; // 登記出工：記住上次選的日期、案場、員工
let entryOpenDates={}, entryEditId=null; // 出工紀錄分組收合狀態與正在編輯的紀錄
let entryKind='work'; // 'work' | 'leave' | 'off'
let entryNight=false;

const round = n => Math.round(n);
const money = n => '$' + round(n).toLocaleString();
const billingAmount = b => {
  const qty=Number(b&&b.qty), up=Number(b&&b.unitPrice);
  if(b&&b.qty!==undefined&&b.unitPrice!==undefined&&!isNaN(qty)&&qty>0&&!isNaN(up)&&up>=0) return qty*up;
  return Number(b&&b.amount)||0;
};
const billingLineMeta = b => {
  if(!b||b.qty===undefined||b.unitPrice===undefined) return '';
  return `${esc(b.unit||'式')} × ${Number(b.qty)||0} × ${money(Number(b.unitPrice)||0)}`;
};
function readBillingLine(prefix){
  const unit=(document.getElementById(prefix+'-unit')||{}).value||'式';
  const qty=parseFloat((document.getElementById(prefix+'-qty')||{}).value);
  const unitPrice=parseFloat((document.getElementById(prefix+'-unit-price')||{}).value);
  const amount=qty*unitPrice;
  return {unit:unit.trim()||'式', qty, unitPrice, amount};
}
function bindBillingSubtotal(prefix){
  const qty=document.getElementById(prefix+'-qty'), price=document.getElementById(prefix+'-unit-price'), out=document.getElementById(prefix+'-subtotal');
  if(!qty||!price||!out) return;
  const calc=()=>{ const q=parseFloat(qty.value),p=parseFloat(price.value); out.textContent=(!isNaN(q)&&!isNaN(p))?money(q*p):money(0); };
  qty.oninput=calc; price.oninput=calc; calc();
}
function bindMeasSubtotal(){
  const qty=document.getElementById('meas-qty'), price=document.getElementById('meas-price'), out=document.getElementById('meas-subtotal');
  if(!qty||!price||!out) return;
  const calc=()=>{ const q=parseFloat(qty.value),p=parseFloat(price.value); out.textContent=(!isNaN(q)&&!isNaN(p))?money(q*p):money(0); };
  qty.oninput=calc; price.oninput=calc; calc();
}
// 工數顯示：工數 = 工時÷8，用分數符號。例：9h → 1⅛ 工
const FRAC8={1:'⅛',2:'¼',3:'⅜',4:'½',5:'⅝',6:'¾',7:'⅞'};
function gongStr(hours){
  const h=Number(hours)||0;
  if(h===0) return '0 工';
  const whole=Math.floor(h/8);
  const rem=h-whole*8;
  let frac='';
  if(rem>0){
    if(Number.isInteger(rem)&&FRAC8[rem]) frac=FRAC8[rem];
    else frac=(rem/8).toString().replace(/^0/,'');
  }
  let s;
  if(whole>0&&frac) s=`${whole}${frac}`;
  else if(whole>0) s=`${whole}`;
  else s=frac||'0';
  return `${s} 工`;
}
function gongH(hours){ const h=Number(hours)||0; return `${gongStr(h)}<span style="color:var(--muted);font-size:11px">(${Math.round(h*10)/10}h)</span>`; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const empName = id => { const e=state.employees.find(x=>x.id===id); return e?e.name:'（已移除）'; };
const siteName = id => { const s=state.sites.find(x=>x.id===id); return s?s.name:'（已移除）'; };

function applyData(d){
  if(!d) return;
  state.employees=d.employees||[]; state.sites=d.sites||[]; state.attendance=d.attendance||[]; state.adjustments=d.adjustments||[]; state.loans=d.loans||[]; state.tools=d.tools||[]; state.locations=d.locations||[]; state.assets=d.assets||[]; state.advances=d.advances||[]; state.accounts=d.accounts||[]; state.ledger=d.ledger||[]; state.deals=d.deals||[]; state.billings=d.billings||[]; state.measurements=d.measurements||[]; state.contracts=d.contracts||{}; state.costs=d.costs||[]; state.parkAccId=d.parkAccId||''; state.oweBonus=d.oweBonus||{}; state.minFund=(d.minFund!==undefined?d.minFund:'');
  state.employees.forEach(e=>{ if(e.active===undefined) e.active=true; });
}
function packData(){
  return {employees:state.employees,sites:state.sites,attendance:state.attendance,adjustments:state.adjustments,loans:state.loans,tools:state.tools,locations:state.locations,assets:state.assets,advances:state.advances,accounts:state.accounts,ledger:state.ledger,deals:state.deals,billings:state.billings,measurements:state.measurements,contracts:state.contracts,costs:state.costs,parkAccId:state.parkAccId,oweBonus:state.oweBonus,minFund:state.minFund};
}

// 先讀本機快取（讓畫面秒開），再從雲端拉最新
function loadLocal(){
  try { const raw=localStorage.getItem(LS); if(raw) applyData(JSON.parse(raw)); } catch(e){}
}
async function loadCloud(){
  setCloud('讀取雲端中…');
  try {
    const res=await fetch(CLOUD_URL, {method:'GET'});
    const j=await res.json();
    if(j&&j.ok&&j.data){ applyData(JSON.parse(j.data)); try{localStorage.setItem(LS,j.data);}catch(e){} setCloud('已同步'); }
    else { setCloud('雲端尚無資料'); }
  } catch(e){ setCloud('雲端讀取失敗（顯示本機資料）'); }
  render();
}

let saveTimer=null, saving=false, pendingSave=false;
function saveData(){
  // 本機立即存（不怕當掉）
  try{ localStorage.setItem(LS, JSON.stringify(packData())); }catch(e){}
  // 雲端防抖動：1秒內多次變更只送一次
  if(saveTimer) clearTimeout(saveTimer);
  setCloud('儲存中…');
  saveTimer=setTimeout(pushCloud, 800);
}
async function pushCloud(){
  if(saving){ pendingSave=true; return; }
  saving=true;
  try {
    await fetch(CLOUD_URL, {method:'POST', body: JSON.stringify(packData())});
    setCloud('已同步');
  } catch(e){ setCloud('雲端儲存失敗（已存本機）'); }
  saving=false;
  if(pendingSave){ pendingSave=false; pushCloud(); }
}
function setCloud(s){ cloudStatus=s; const el=document.getElementById('cloud-status'); if(el) el.textContent=s; }

function computeRecords(records){
  const byKey={};
  records.forEach(r=>{ if(r.kind&&r.kind!=='work') return; const k=r.empId+'|'+r.date; (byKey[k]=byKey[k]||[]).push(r); });
  const out={};
  Object.values(byKey).forEach(group=>{
    const attended=group.filter(r=>(Number(r.hours)||0)>0);
    const totalAllowance=group.filter(r=>r.night).length*400;
    group.forEach(r=>{
      const daily=Number(r.dailyRate)||0, hourly=daily/8, h=Number(r.hours)||0;
      const ot=Number(r.overtime)||0;
      const wage=hourly*h + hourly*1.33*ot;  // 加班以1.33倍時薪計
      const allow=(attended.length>0&&h>0)?totalAllowance/attended.length:0;
      out[r.id]={wage,allow,total:wage+allow};
    });
  });
  return out;
}

// 計薪週期以每月 11 號起算：一個週期 = 某月11號 ～ 次月10號
// 「本月週期」：找出包含今天的那個週期
function cycleContaining(d){
  const day=d.getDate();
  let startY=d.getFullYear(), startM=d.getMonth();
  if(day>11){
    // 12號之後，屬於本月11號起算的新週期
  } else {
    // 今天在 1~11 號，仍屬於上個月11號起算的週期
    startM-=1; if(startM<0){ startM=11; startY-=1; }
  }
  const from=new Date(startY,startM,11);
  const to=new Date(startY,startM+1,10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(from),to:fmt(to)};
}
function defaultPayRange(){ return cycleContaining(new Date()); }
function periodOf(dateStr){ return cycleContaining(new Date((dateStr||new Date().toISOString().slice(0,10))+'T00:00:00')); }
function prevPayRange(){
  const cur=cycleContaining(new Date());
  const f=new Date(cur.from+'T00:00:00');
  const pf=new Date(f.getFullYear(),f.getMonth()-1,11);
  const pt=new Date(f.getFullYear(),f.getMonth(),10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(pf),to:fmt(pt)};
}
// 預設調整項類型
const ADD_TYPES=['獎金','全勤獎金','其他加給'];
const DED_TYPES=['借支扣還','勞保自負額','健保自負額','工具遺失賠償','其他扣款'];

// 建立某計薪區間的完整發薪資料（出工薪資 + 加扣項 = 實發）
function buildPayroll(from,to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const comp=computeRecords(state.attendance);
  const byEmp={};
  state.attendance.filter(r=>inRange(r.date)).forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const e=byEmp[r.empId]=byEmp[r.empId]||{empId:r.empId,hours:0,wage:0,allow:0,gross:0,days:new Set(),adds:[],deds:[]};
    e.hours+=Number(r.hours)||0; e.wage+=c.wage; e.allow+=c.allow; e.gross+=c.total; e.days.add(r.date);
  });
  // 套用區間內的調整項
  state.adjustments.filter(a=>inRange(a.date)).forEach(a=>{
    const e=byEmp[a.empId]=byEmp[a.empId]||{empId:a.empId,hours:0,wage:0,allow:0,gross:0,days:new Set(),adds:[],deds:[]};
    (a.kind==='add'?e.adds:e.deds).push(a);
  });
  Object.values(byEmp).forEach(e=>{
    e.addTotal=e.adds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.dedTotal=e.deds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.net=e.gross+e.addTotal-e.dedTotal;
  });
  return byEmp;
}

      <div class="field"><label>訖</label><input type="date" id="pay-to" value="${state.payTo}"></div>
      <button class="act" id="pay-thismonth" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">本期</button>
      <button class="act" id="pay-lastmonth" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">上期</button>
      <button class="act" id="pay-all" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">全部</button>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="l">區間</div><div class="v" style="font-size:15px">${state.payFrom||'—'} ～ ${state.payTo||'—'}</div></div>
    <div class="metric"><div class="l">員工數</div><div class="v">${empIds.length}${partnerIds.length?`<span style="font-size:12px;color:var(--muted)"> +${partnerIds.length}股東</span>`:''}</div></div>
    <div class="metric"><div class="l">出工薪資</div><div class="v" style="font-size:20px">${money(grossSum)}</div></div>
    <div class="metric"><div class="l">實發總額</div><div class="v">${money(netSum)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">
      <div style="font-size:14px;font-weight:600">本期薪資</div>
      <div style="display:flex;gap:8px">
        ${partnerIds.length?`<button class="act" id="toggle-partners" style="border:1px solid var(--line2);border-radius:8px;padding:0 12px;height:36px">${state.showPartners?'隱藏股東':'顯示股東'}</button>`:''}
        <button class="btn" id="export-summary" ${rows===''?'disabled style="opacity:.5"':''}>匯出總表 PDF</button>
      </div>
    </div>
    ${rows===''?'<div class="empty">此區間內尚無可計算的薪資。</div>':`
    <div class="scroll"><table>
      <thead><tr><th>員工</th><th class="num">出勤天</th><th class="num">總工數</th><th class="num">出工薪資</th><th class="num">加項</th><th class="num">扣項</th><th class="num">實發金額</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <p class="sub" style="margin:10px 0 0">實發總額與員工數只計一般員工。股東工資計入案場成本，但從「代墊款」分頁發放，不在此重複發。出工薪資＝工資＋津貼。實發＝出工薪資＋加項−扣項。</p>`}
  </div>
  ${loanReminders===''?'':`<div class="card" style="border-color:var(--accent)">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">💡 本期借支扣款提示</div>
    <p class="sub">以下員工有未還清借支、且本期尚未扣款。點「扣這期」即把該筆金額加入本期扣項（可在下方加扣項清單微調或刪除）。</p>
    <div class="scroll"><table>
      <thead><tr><th>員工</th><th class="num">尚欠</th><th class="num">本期建議扣</th><th></th></tr></thead>
      <tbody>${loanReminders}</tbody></table></div>
  </div>`}
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">本期加項／扣項</div>
    <p class="sub">獎金、全勤為加項；借支扣還、勞健保自負額、工具遺失賠償等為扣項。日期請填在本計薪區間內，才會算進本期。</p>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>日期</label><input type="date" id="adj-date" value="${state.payTo||''}"></div>
      <div class="field"><label>員工</label><select id="adj-emp">${empOpts}</select></div>
      <div class="field"><label>性質</label><select id="adj-kind"><option value="add">加項（+）</option><option value="ded">扣項（−）</option></select></div>
      <div class="field"><label>項目</label><select id="adj-label">${addOpts}</select></div>
      <div class="field"><label>金額</label><input type="number" id="adj-amount" min="0" step="100" style="width:120px"></div>
      <div class="field" style="flex:1;min-width:140px"><label>備註（選填）</label><input id="adj-note" placeholder="例：6月借支"></div>
      <button class="btn" id="adj-add">＋ 新增</button>
    </div>
    ${adjRows===''?'<div class="empty">本期尚無加扣項。</div>':`<div class="scroll"><table>
      <thead><tr><th>日期</th><th>員工</th><th>項目</th><th class="num">金額</th><th>備註</th><th></th></tr></thead>
      <tbody>${adjRows}</tbody></table></div>`}
  </div>`;
}

function viewSites(){
  const comp=computeRecords(state.attendance);
  const bySite={};
  state.sites.forEach(s=>{ bySite[s.id]={hours:0,wage:0,allow:0,total:0,emp:{},opening:Number(s.opening)||0,manual:0}; });
  state.attendance.forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const s=bySite[r.siteId]=bySite[r.siteId]||{hours:0,wage:0,allow:0,total:0,emp:{},opening:0,manual:0};
    s.hours+=Number(r.hours)||0; s.wage+=c.wage; s.allow+=c.allow; s.total+=c.total;
    s.emp[r.empId]=(s.emp[r.empId]||0)+c.total;
  });
  state.costs.forEach(co=>{ const s=bySite[co.siteId]; if(s) s.manual+=Number(co.amount)||0; });
  Object.values(bySite).forEach(s=>{ s.grandTotal=s.total+(s.opening||0)+(s.manual||0); });
  const grand=Object.values(bySite).reduce((s,x)=>s+x.grandTotal,0);
  const ids=Object.keys(bySite).sort((a,b)=>bySite[b].grandTotal-bySite[a].grandTotal);
  const payerName=who=>({dz:'東澤',gx:'廣昕',py:'品佑'}[who]||who||'—');
  const cardFor=(sid)=>{ const s=bySite[sid]; const site=state.sites.find(x=>x.id===sid); const isCoop=site&&site.coop;
    const empBreak=Object.entries(s.emp).sort((a,b)=>b[1]-a[1]).map(([eid,v])=>`<tr><td>${esc(empName(eid))}</td><td class="num">${money(v)}</td></tr>`).join('');
    const pct=grand>0?Math.round(s.grandTotal/grand*100):0;
    const myCosts=state.costs.filter(c=>c.siteId===sid).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const costRows=myCosts.map(c=>{
      if(costEditId===c.id){
        return `<tr><td colspan="5" style="background:var(--bg)">
          <div class="row" style="margin:6px 0">
            <div class="field"><label>日期</label><input type="date" id="ce-date" value="${c.date||''}"></div>
            <div class="field" style="flex:1;min-width:120px"><label>項目</label><input id="ce-item" value="${esc(c.item||'')}"></div>
            <div class="field"><label>金額</label><input type="number" id="ce-amount" value="${c.amount||0}" min="0" step="1000" style="width:120px"></div>
            <div class="field"><label>誰支付</label><select id="ce-payer"><option value="dz" ${c.payer==='dz'?'selected':''}>東澤</option><option value="gx" ${c.payer==='gx'?'selected':''}>廣昕</option><option value="py" ${c.payer==='py'?'selected':''}>品佑</option></select></div>
            <button class="btn" data-costeditok="${c.id}">儲存</button>
            <button class="act muted" data-costeditcancel="1" style="cursor:pointer;height:36px">取消</button>
          </div>
        </td></tr>`;
      }
      const canReimb=(c.payer==='dz'||c.payer==='gx');
      const reimbCell=canReimb
        ? (c.reimbursed
            ? `<span class="tag" style="background:#e3efe9;color:var(--accent)">已報銷${c.reimbDate?' '+esc(c.reimbDate):''}</span><button class="act" data-unreimb="${c.id}">取消</button>`
            : `<button class="act" data-reimb="${c.id}" style="border:1px solid var(--danger);border-radius:6px;padding:0 10px;color:#fff;background:var(--danger)">待報銷·按此報銷</button>`)
        : '';
      const payerTag=c.payer==='dz'||c.payer==='gx'
        ? (c.reimbursed?'<span class="tag" style="background:#e3efe9;color:var(--accent)">已報銷</span>':'<span class="tag" style="background:var(--warn-bg);color:var(--warn-ink)">待報銷</span>')
        : '';
      return `<tr${(canReimb&&!c.reimbursed)?' style="background:#fff8f0"':''}><td>${esc(c.date||'')}</td><td>${esc(c.item||'')}</td><td class="num">${money(c.amount)}</td><td>${esc(payerName(c.payer))}${payerTag}</td><td>${reimbCell} <button class="act" data-costedit="${c.id}">改</button> <button class="act danger" data-delcost="${c.id}">刪</button></td></tr>`;
    }).join('');
    const byPayer={}; myCosts.forEach(c=>{ byPayer[c.payer||'—']=(byPayer[c.payer||'—']||0)+(Number(c.amount)||0); });
    const payerSummary=Object.keys(byPayer).length?`<div class="sub" style="margin:4px 0">各人墊付：${Object.entries(byPayer).map(([k,v])=>`${esc(payerName(k))} ${money(v)}`).join('、')}</div>`:'';
    return `<div class="card" ${isCoop?'style="border-left:3px solid #d98430"':''}>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <div style="font-size:15px;font-weight:600">${esc(siteName(sid))}${isCoop?'<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案場</span>':''}</div>
        <div style="font-size:18px;font-weight:600">${money(s.grandTotal)}</div>
      </div>
      <p class="sub">${isCoop?'手動成本明細加總':`總工數 ${gongStr(s.hours)}・系統工資 ${money(s.wage)}・津貼 ${money(s.allow)}`}${s.opening>0?`・期初 ${money(s.opening)}`:''}${s.manual>0?`・手動成本 ${money(s.manual)}`:''}・占總成本 ${pct}%</p>
      ${isCoop?'':`<div class="row" style="margin-bottom:6px">
        <div class="field"><label>期初人事成本（從Excel抄入，選填）</label><input type="number" data-opening="${sid}" value="${s.opening||''}" placeholder="未設定" min="0" step="1000" style="width:170px"></div>
      </div>`}
      ${payerSummary}
      <details ${isCoop?'open':''}><summary>手動成本明細（${myCosts.length} 筆）</summary>
        <div class="row" style="margin:8px 0">
          <div class="field"><label>日期</label><input type="date" data-costdate="${sid}" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="field" style="flex:1;min-width:120px"><label>項目</label><input data-costitem="${sid}" placeholder="材料、工資、機具…"></div>
          <div class="field"><label>金額</label><input type="number" data-costamount="${sid}" min="0" step="1000" style="width:120px"></div>
          <div class="field"><label>誰支付</label><select data-costpayer="${sid}"><option value="dz">東澤</option><option value="gx">廣昕</option><option value="py">品佑</option></select></div>
          <button class="act" data-costadd="${sid}" style="border:1px solid var(--accent);border-radius:6px;padding:0 12px;color:var(--accent);height:36px">＋ 加成本</button>
        </div>
        ${costRows?`<table><thead><tr><th>日期</th><th>項目</th><th class="num">金額</th><th>誰付</th><th></th></tr></thead><tbody>${costRows}</tbody></table>`:'<div class="sub">尚無手動成本。</div>'}
      </details>
      ${empBreak&&!isCoop?`<details><summary>系統內各員工金額明細</summary>
        <table style="margin-top:8px"><thead><tr><th>員工</th><th class="num">金額</th></tr></thead><tbody>${empBreak}</tbody></table>
      </details>`:''}
    </div>`;
  };
  const isPaused=sid=>{ const st=state.sites.find(x=>x.id===sid); return st&&st.active===false; };
  const activeIds=ids.filter(sid=>!isPaused(sid));
  const pausedIds=ids.filter(sid=>isPaused(sid));
  const cards=activeIds.map(cardFor).join('');
  const pausedCards=pausedIds.length?`<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedIds.length}）</summary>${pausedIds.map(cardFor).join('')}</details>`:'';
  // 東澤/廣昕 墊付報銷彙總（跨所有案場的手動成本，標示案場）
  const reimb={dz:{total:0,done:0},gx:{total:0,done:0}};
  state.costs.forEach(c=>{ if(c.payer==='dz'||c.payer==='gx'){ const amt=Number(c.amount)||0; reimb[c.payer].total+=amt; if(c.reimbursed) reimb[c.payer].done+=amt; } });
  const personBlock=(k)=>{
    if(reimb[k].total<=0) return '';
    const pending=reimb[k].total-reimb[k].done;
    // 待報銷的逐筆（標示案場）
    const items=state.costs.filter(c=>c.payer===k && !c.reimbursed).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const byline=items.map(c=>{
      const sName=siteName(c.siteId)||'（未知案場）';
      return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--line)">
        <span><b>${esc(sName)}</b>　<span style="color:var(--muted);font-size:12px">${esc(c.date||'')}　${esc(c.item||'')}</span></span>
        <span style="display:flex;align-items:center;gap:8px;white-space:nowrap"><span class="num">${money(c.amount)}</span><button class="act" data-reimb="${c.id}" style="border:1px solid var(--info);border-radius:6px;padding:0 8px;color:var(--info)">報銷</button></span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-weight:600;padding:4px 0">
        <span>${payerName(k)}</span>
        <span class="num">墊付 ${money(reimb[k].total)}　已報銷 <span style="color:var(--accent)">${money(reimb[k].done)}</span>　待報銷 <span style="color:${pending>0?'var(--danger)':'var(--muted)'}">${money(pending)}</span></span>
      </div>
      ${pending>0?`<details ${'open'}><summary style="cursor:pointer;font-size:12px;color:var(--info);padding:2px 0">待報銷明細（${items.length} 筆，哪個案場）</summary>${byline}</details>`:'<div class="sub" style="padding:2px 0">全部已報銷 ✓</div>'}
    </div>`;
  };
  const reimbCard=(reimb.dz.total>0||reimb.gx.total>0)?`
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">墊付報銷彙總（東澤／廣昕）</div>
    ${personBlock('dz')}${personBlock('gx')}
    <p class="sub" style="margin-top:6px">展開「待報銷明細」可看到是哪個案場、哪一筆，直接按「報銷」標記。此處只記錄報銷狀態，不會動到帳戶餘額。</p>
  </div>`:'';
  return `
  <div class="metrics">
    <div class="metric"><div class="l">案場數</div><div class="v">${activeIds.length}${pausedIds.length?`<span style="font-size:12px;color:var(--muted)"> +${pausedIds.length}暫停</span>`:''}</div></div>
    <div class="metric"><div class="l">總成本</div><div class="v">${money(grand)}</div></div>
  </div>
  ${reimbCard}
  <p class="sub" style="margin:-6px 0 12px">一般案場成本＝期初＋出勤工資津貼＋手動成本；合作案場（橙色）成本＝手動成本明細加總（日期/項目/金額/誰付）。<button class="btn" id="export-sites" style="margin-left:10px" ${ids.length===0?'disabled style="opacity:.5"':''}>匯出 PDF</button></p>
  ${cards===''&&pausedCards===''?'<div class="card"><div class="empty">尚無案場成本資料。</div></div>':cards}${pausedCards}`;
}

function viewManage(){
  const empRows=state.employees.map(e=>{
    const hasRecords=state.attendance.some(r=>r.empId===e.id);
    const delBtn=hasRecords?'<span class="act muted" title="已有出工紀錄，無法刪除">🔒</span>':`<button class="act danger" data-delemp="${e.id}">刪</button>`;
    const toggle=e.active?`<button class="act" data-toggle="${e.id}">停用</button>`:`<button class="act" data-toggle="${e.id}">復用</button>`;
    return `<tr><td>${esc(e.name)}${e.partner?'<span class="tag" style="background:#e3efe9;color:var(--accent)">股東</span>':''}${!e.active?'<span class="tag">已停用</span>':''}</td>
      <td class="num">${money(e.daily)}</td>
      <td><button class="act" data-renemp="${e.id}">改名</button></td>
      <td><button class="act" data-raise="${e.id}">調薪</button></td>
      <td><button class="act" data-partner="${e.id}">${e.partner?'取消股東':'設為股東'}</button></td>
      <td>${toggle}</td><td>${delBtn}</td></tr>`;
  }).join('');
  const siteRowFor=(s)=>{
    const hasRecords=state.attendance.some(r=>r.siteId===s.id);
    const delBtn=hasRecords?'<span class="act muted" title="已有出工紀錄，無法刪除">🔒</span>':`<button class="act danger" data-delsite="${s.id}">刪</button>`;
    const paused=s.active===false;
    const toggle=`<button class="act" data-togglesite="${s.id}">${paused?'恢復啟用':'暫停'}</button>`;
    const nameCell=`${esc(s.name)}${s.coop?'<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案</span>':(s.type?`<span class="tag" style="background:#e3efe9;color:var(--accent)">${esc(s.type)}</span>`:'')}${paused?'<span class="tag" style="background:var(--warn-bg);color:var(--warn-ink)">已暫停</span>':''}`;
    const contractVal=(s.contract!==undefined&&s.contract!=='')?s.contract:(state.contracts[s.name]||'');
    const curType=s.type||(s.coop?'合作案':'代工');
    const settings=`<tr${paused?' style="color:var(--muted)"':''}><td colspan="4" style="padding-top:0">
      <details ${siteSettingsOpen[s.id]?'open':''} data-sitesettings="${s.id}" style="margin:2px 0 8px"><summary style="cursor:pointer;font-size:12px;color:var(--info)">案場設定（類型／稅率／負責人／帳戶）</summary>
        <div class="row" style="margin:8px 0 4px">
          <div class="field"><label>類型</label><select data-sitetype="${s.id}">${['代工','連工代料','業主分潤','合作案','舊制'].map(t=>`<option value="${t}" ${curType===t?'selected':''}>${t}${t==='合作案'?'（50/50）':t==='舊制'?'（全進公積金）':'（30/70）'}</option>`).join('')}</select></div>
          <div class="field"><label>稅率 %</label><input type="number" data-sitetax="${s.id}" value="${s.siteTaxPct!==undefined?s.siteTaxPct:(s.coopTaxPct||0)}" min="0" max="100" step="0.5" style="width:90px"></div>
          <div class="field"><label>負責人</label><select data-siteowner="${s.id}"><option value="">（未指定）</option>${state.employees.filter(e=>e.partner).map(p=>`<option value="${p.id}" ${s.siteOwnerId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
          <div class="field"><label>錢進哪個帳戶</label><select data-siteacc="${s.id}"><option value="">（未指定）</option>${state.accounts.map(a=>`<option value="${a.id}" ${s.siteAcc===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select></div>
          ${curType==='合作案'?`<div class="field"><label>管理人(你們)佔 %</label><input type="number" data-sitemgr="${s.id}" value="${s.coopMgrPct!==undefined?s.coopMgrPct:50}" min="0" max="100" step="5" style="width:120px"></div>`:''}
          <div class="field"><label>合約總額（選填）</label><input type="number" data-sitecontract="${s.id}" value="${contractVal}" placeholder="未設定" min="0" step="10000" style="width:140px"></div>
        </div>
        <p class="sub" style="margin:0 0 8px">改類型會影響分潤算法。代工/連工代料/業主分潤＝（總請款−成本−稅）做30/70；合作案＝（總請款−案場成本）對拆；舊制全進公積金。改設定後請款的分潤會自動跟著重算。</p>
        <button class="btn" data-sitesave="${s.id}">✓ 儲存設定</button>
        <span data-sitesaved="${s.id}" style="margin-left:10px;color:var(--accent);font-weight:600;display:none">已儲存 ✓</span>
      </details>
    </td></tr>`;
    return `<tr${paused?' style="color:var(--muted)"':''}><td>${nameCell}</td><td><button class="act" data-rensite="${s.id}">改名</button></td><td>${toggle}</td><td>${delBtn}</td></tr>${settings}`;
  };
  const activeSitesList=state.sites.filter(s=>s.active!==false);
  const pausedSitesList=state.sites.filter(s=>s.active===false);
  const siteRows=activeSitesList.map(siteRowFor).join('');
  const pausedSiteTable=pausedSitesList.length?`<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedSitesList.length}）</summary><table><tbody>${pausedSitesList.map(siteRowFor).join('')}</tbody></table></details>`:'';
  return `
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">員工</div>
    <p class="sub">調薪只影響之後登記的出工，舊紀錄維持當時日薪。離職請用「停用」保留歷史；只有從沒登記過出工的員工才能真正刪除。標記為「股東」的人會出現在代墊款分頁。</p>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>姓名</label><input id="e-name" placeholder="例：潘東澤"></div>
      <div class="field"><label>日薪</label><input id="e-daily" type="number" min="0" step="100" value="3000" style="width:120px"></div>
      <button class="btn" id="e-add">＋ 新增員工</button>
    </div>
    ${state.employees.length===0?'<div class="empty">尚無員工。</div>':`<table><thead><tr><th>姓名</th><th class="num">目前日薪</th><th></th><th></th><th></th><th></th><th></th></tr></thead><tbody>${empRows}</tbody></table>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">案場</div>
    <p class="sub">建案場時設好<b>類型、稅率、負責人、錢進哪個帳戶</b>，之後請款追蹤一輸入，系統就自動算分潤、自動進帳戶，不用再去分潤頁手動建。<b>代工／公司分潤</b>＝（總請款−稅）做30/70；<b>合作案</b>＝（總請款−案場成本）對拆、不出現在出工登記、成本記「案場成本」頁。改名會套用到所有相關紀錄。</p>
    <div class="row" style="margin-bottom:8px">
      <div class="field" style="flex:1;min-width:180px"><label>案場名稱</label><input id="s-name" placeholder="例：台北富邦"></div>
      <div class="field"><label>類型</label><select id="s-type">${['代工','連工代料','業主分潤','合作案','舊制'].map(t=>`<option value="${t}">${t}${t==='合作案'?'（50/50）':t==='舊制'?'（全進公積金）':'（30/70）'}</option>`).join('')}</select></div>
      <div class="field"><label>稅率 %</label><input type="number" id="s-tax" min="0" max="100" step="0.5" value="0" style="width:90px"></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>負責人</label><select id="s-owner"><option value="">（未指定）</option>${state.employees.filter(e=>e.partner).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
      <div class="field"><label>錢進哪個帳戶</label><select id="s-acc"><option value="">（未指定）</option>${state.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
      <div class="field" id="s-mgr-wrap" style="display:none"><label>管理人(你們)佔 %</label><input type="number" id="s-mgrpct" min="0" max="100" step="5" value="50" style="width:120px"></div>
      <button class="btn" id="s-add">＋ 新增案場</button>
    </div>
    ${state.sites.length===0?'<div class="empty">尚無案場。</div>':`${activeSitesList.length?`<table><thead><tr><th>名稱</th><th></th><th></th><th></th></tr></thead><tbody>${siteRows}</tbody></table>`:'<div class="empty">沒有啟用中的案場。</div>'}${pausedSiteTable}`}
  </div>`;
}

function bind(){
  document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; closeSidebar(); render(); });

  const pf=document.getElementById('pay-from'); if(pf) pf.onchange=()=>{ state.payFrom=pf.value; render(); };
  const pt=document.getElementById('pay-to'); if(pt) pt.onchange=()=>{ state.payTo=pt.value; render(); };
  const pm=document.getElementById('pay-thismonth'); if(pm) pm.onclick=()=>{ const d=defaultPayRange(); state.payFrom=d.from; state.payTo=d.to; render(); };
  const plm=document.getElementById('pay-lastmonth'); if(plm) plm.onclick=()=>{ const d=prevPayRange(); state.payFrom=d.from; state.payTo=d.to; render(); };
  const pa=document.getElementById('pay-all'); if(pa) pa.onclick=()=>{ state.payFrom=''; state.payTo=''; render(); };
  const tp=document.getElementById('toggle-partners'); if(tp) tp.onclick=()=>{ state.showPartners=!state.showPartners; render(); };

  // 加扣項：性質改變時切換項目清單
  const adjKind=document.getElementById('adj-kind'), adjLabel=document.getElementById('adj-label');
  if(adjKind&&adjLabel) adjKind.onchange=()=>{
    const opts=(adjKind.value==='add'?ADD_TYPES:DED_TYPES).map(t=>`<option value="${t}">${t}</option>`).join('');
    adjLabel.innerHTML=opts;
  };
  const adjAdd=document.getElementById('adj-add');
  if(adjAdd) adjAdd.onclick=()=>{
    const date=document.getElementById('adj-date').value;
    const empId=document.getElementById('adj-emp').value;
    const kind=document.getElementById('adj-kind').value;
    const label=document.getElementById('adj-label').value;
    const amount=parseFloat(document.getElementById('adj-amount').value);
    const note=document.getElementById('adj-note').value.trim();
    if(!date||!empId||!label||isNaN(amount)||amount<0) return;
    // 全勤獎金提醒：該員工在該筆所屬計薪週期內若有「請假」，提醒
    if(label.indexOf('全勤')>=0){
      const per=periodOf(date); // {from,to}
      const leaves=state.attendance.filter(r=>r.empId===empId && r.kind==='leave' && r.date>=per.from && r.date<=per.to);
      if(leaves.length>0){
        const emp=state.employees.find(e=>e.id===empId);
        const days=leaves.map(r=>r.date+(r.half?'(半天)':'')).sort().join('、');
        if(!confirm(`提醒：${emp?emp.name:''} 在本期（${per.from} ~ ${per.to}）有請假 ${leaves.length} 次（${days}）。\n\n請假會破全勤。確定還是要給全勤獎金嗎？`)) return;
      }
    }
    state.adjustments.push({id:uid(),date,empId,kind,label,amount,note});
    saveData(); render();
  };
  document.querySelectorAll('[data-deladj]').forEach(b=>b.onclick=()=>{ if(!confirm('確定刪除這筆加扣項？')) return; state.adjustments=state.adjustments.filter(a=>a.id!==b.dataset.deladj); saveData(); render(); });
  const es=document.getElementById('export-summary'); if(es) es.onclick=()=>exportSummaryPDF();
  const ed=document.getElementById('export-deals'); if(ed) ed.onclick=()=>exportDealsPDF();
  const eds=document.getElementById('export-deals-sel'); if(eds) eds.onclick=()=>exportDealsPDF(true);
  const rbi=document.getElementById('rebuild-income'); if(rbi) rbi.onclick=()=>{
    if(!confirm('重建所有分潤的「帳戶自動進帳」？\n會先清掉舊的自動進帳，再依每筆分潤的「錢進哪個帳戶」重新產生（代工/公司分潤＝金額−稅）。\n你手動記的收支不受影響。')) return;
    rebuildAllDealIncome(); saveData(); render();
  };
  const rsd=document.getElementById('resync-deals'); if(rsd) rsd.onclick=()=>{
    if(!confirm('重算所有案場分潤？\n\n會依各案場目前的「請款＋成本（期初/出工工資/手動）」重新計算每個案場的分潤與帳戶進帳，並清掉「對不上案場或已無請款」的殘留分潤。\n\n你在「進階」手動補的分潤不受影響。')) return;
    state.deals.filter(d=>d.autoSiteId).forEach(d=>{
      const s=state.sites.find(x=>x.id===d.autoSiteId);
      const tot=s?state.billings.filter(b=>b.site===s.name).reduce((a,b)=>a+(Number(b.amount)||0),0):0;
      if(!s || tot<=0){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    });
    state.deals.filter(d=>!d.autoSiteId).forEach(d=>{
      const s=state.sites.find(x=>x.name===d.name && !(x.coop||x.type==='合作案'));
      const tot=s?state.billings.filter(b=>b.site===s.name).reduce((a,b)=>a+(Number(b.amount)||0),0):0;
      if(s && tot>0){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id && t.fromDeal!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    });
    resyncAllSiteDeals();
    saveData(); render();
    alert('已重算所有案場分潤。請檢查分潤頁與各帳戶餘額。');
  };
  const wdb=document.getElementById('wipe-deals-bills'); if(wdb) wdb.onclick=()=>{
    const nDeals=state.deals.length, nBills=state.billings.length;
    if(!confirm(`即將清空：\n・分潤結算 ${nDeals} 筆\n・請款追蹤 ${nBills} 筆\n・以及分潤產生的「帳戶自動進帳」收入\n\n員工、案場、出工、公積金帳戶收支（含品佑垫付）、借支等都會保留。\n\n確定要清空嗎？`)) return;
    if(!confirm('再確認一次：這個動作無法復原。真的要清空分潤與請款嗎？')) return;
    state.deals=[];
    state.billings=[];
    state.ledger=state.ledger.filter(t=>!t.autoDealId && !t.fromDeal);
    state.sites.forEach(s=>{ delete s.coopCarriedTo; });
    saveData(); render();
    alert('已清空分潤與請款。其他資料保留。');
  };  document.querySelectorAll('[data-dealpick-cb]').forEach(cb=>cb.onchange=()=>{ dealSel[cb.dataset.dealpickCb]=cb.checked; });
  const dsa=document.getElementById('deals-selall'); if(dsa) dsa.onclick=()=>{ state.deals.forEach(d=>{ if(d.type==='代工'||d.type==='公司分潤'||d.type==='分潤/代料'||(d.type!=='合作案')) dealSel[d.id]=true; }); render(); };
  const dsn=document.getElementById('deals-selnone'); if(dsn) dsn.onclick=()=>{ dealSel={}; render(); };
  const eb=document.getElementById('export-billing'); if(eb) eb.onclick=()=>exportBillingPDF();
  const esi=document.getElementById('export-sites'); if(esi) esi.onclick=()=>exportSitesPDF();
  document.querySelectorAll('[data-payslip]').forEach(b=>b.onclick=()=>exportPayslipPDF(b.dataset.payslip));

  const gotoM=document.getElementById('goto-manage'); if(gotoM) gotoM.onclick=()=>{ state.tab='manage'; render(); };

  const fDate=document.getElementById('f-date');
  if(fDate){
    fDate.oninput=()=>{ entryDate=fDate.value; };
    fDate.onchange=()=>{ entryDate=fDate.value; };
    fDate.onblur=()=>{ entryDate=fDate.value; const fe=document.getElementById('f-emp'); if(fe) entryEmp=fe.value; render(); };
  }
  const fSite=document.getElementById('f-site'); if(fSite) fSite.onchange=()=>{ entrySite=fSite.value; const fe=document.getElementById('f-emp'); if(fe) entryEmp=fe.value; render(); };
  const fEmp=document.getElementById('f-emp'); if(fEmp) fEmp.onchange=()=>{ entryEmp=fEmp.value; };
  const fKind=document.getElementById('f-kind'); if(fKind) fKind.onchange=()=>{
    entryKind=fKind.value;
    const show=fKind.value==='work';
    document.querySelectorAll('.f-work-only').forEach(el=>{ el.style.display=show?'':'none'; });
    document.querySelectorAll('.f-leave-only').forEach(el=>{ el.style.display=fKind.value==='leave'?'':'none'; });
  };
  const fNight=document.getElementById('f-night'); if(fNight) fNight.onchange=()=>{ entryNight=fNight.checked; };

  const add=document.getElementById('f-add');
  if(add) add.onclick=()=>{
    const date=document.getElementById('f-date').value;
    const empId=document.getElementById('f-emp').value;
    const kindSel=document.getElementById('f-kind');
    const kind=kindSel?kindSel.value:'work';
    const emp=state.employees.find(e=>e.id===empId);
    if(!date||!empId||!emp) return;

    if(kind!=='work'){
      // 請假/休假：不需要案場與工時
      const label=kind==='leave'?'請假':'休假';
      const half=(kind==='leave' && document.getElementById('f-half') && document.getElementById('f-half').value==='half');
      const dup=state.attendance.find(r=>r.empId===empId&&r.date===date&&r.kind===kind);
      if(dup){ alert(`${emp.name} 在 ${date} 已經登記過${label}了。`); return; }
      state.attendance.push({id:uid(),date,empId,kind,half:half||false});
      entryDate=date; entryEmp=empId;
      entryKind=(kind==='off'?'off':'work');
      saveData(); render();
      return;
    }

    const siteId=document.getElementById('f-site').value;
    const hours=parseFloat(document.getElementById('f-hours').value);
    const overtime=parseFloat(document.getElementById('f-overtime').value)||0;
    const night=document.getElementById('f-night').checked;
    if(!siteId||isNaN(hours)) return;
    if(!Number.isInteger(hours)){ alert('工時請輸入整數小時（例如 8、9），不接受小數。'); return; }
    const sameDay=state.attendance.filter(r=>r.empId===empId&&r.date===date&&(!r.kind||r.kind==='work'));
    if(sameDay.length>0){
      const sameSite=sameDay.find(r=>r.siteId===siteId);
      let msg;
      if(sameSite){
        msg=`${emp.name} 在 ${date} 的「${siteName(siteId)}」已經登記過 ${sameSite.hours} 小時了。\n\n這很可能是重複登記。確定還要再記一筆嗎？`;
      } else {
        const where=sameDay.map(r=>`${siteName(r.siteId)} ${r.hours}h`).join('、');
        msg=`${emp.name} 在 ${date} 已經登記過：${where}。\n\n如果他今天還跑了「${siteName(siteId)}」這個案場，可以繼續；否則請取消。\n\n確定要再記一筆嗎？`;
      }
      if(!confirm(msg)) return;
    }
    state.attendance.push({id:uid(),date,empId,siteId,hours,overtime,night,dailyRate:emp.daily,kind:'work'});
    entryDate=date; entrySite=siteId; entryEmp=empId; entryNight=night;
    resyncAllSiteDeals();
    saveData(); render();
  };
  const allVac=document.getElementById('f-allvac');
  if(allVac) allVac.onclick=()=>{
    const date=document.getElementById('f-date').value;
    if(!date){ alert('請先選擇日期'); return; }
    const emps=state.employees.filter(e=>e.active);
    if(emps.length===0){ alert('沒有在職員工'); return; }
    const toAdd=emps.filter(e=>!state.attendance.some(r=>r.empId===e.id&&r.date===date&&r.kind==='off'));
    const skipped=emps.filter(e=>state.attendance.some(r=>r.empId===e.id&&r.date===date&&r.kind==='off'));
    let msg=`確定將 ${date} 設為全員休假？\n新增 ${toAdd.length} 人`;
    if(skipped.length>0) msg+=`（跳過已有休假紀錄的 ${skipped.length} 人：${skipped.map(e=>e.name).join('、')}）`;
    msg+='。';
    if(!confirm(msg)) return;
    toAdd.forEach(emp=>state.attendance.push({id:uid(),date,empId:emp.id,kind:'off',half:false}));
    entryDate=date;
    saveData(); render();
  };
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ const r=state.attendance.find(x=>x.id===b.dataset.del); if(!confirm(`確定刪除這筆出工？\n${r?esc(r.date)+'・'+empName(r.empId)+'・'+siteName(r.siteId):''}`)) return; state.attendance=state.attendance.filter(r=>r.id!==b.dataset.del); resyncAllSiteDeals(); saveData(); render(); });
  document.querySelectorAll('[data-togglegroup]').forEach(b=>b.onclick=()=>{
    const dk=b.dataset.togglegroup;
    const cur=entryOpenDates[dk];
    // 預設最近2天是展開的；第一次點要能正確切換，所以以目前顯示狀態為準
    const isOpen=b.textContent.trim().startsWith('▼');
    entryOpenDates[dk]=!isOpen; render();
  });
  document.querySelectorAll('[data-edithours]').forEach(b=>b.onclick=()=>{ entryEditId=b.dataset.edithours; render(); });
  document.querySelectorAll('[data-editok]').forEach(b=>b.onclick=()=>{
    const r=state.attendance.find(x=>x.id===b.dataset.editok); if(!r) return;
    const v=parseFloat(document.getElementById('edit-hours').value);
    const otv=parseFloat(document.getElementById('edit-ot').value)||0;
    if(!isNaN(v)&&v>=0){ r.hours=v; r.overtime=otv; saveData(); }
    entryEditId=null; render();
  });
  const ecancel=document.getElementById('edit-cancel'); if(ecancel) ecancel.onclick=()=>{ entryEditId=null; render(); };

  const ea=document.getElementById('e-add');
  if(ea) ea.onclick=()=>{
    const name=document.getElementById('e-name').value.trim();
    const daily=parseFloat(document.getElementById('e-daily').value);
    if(!name||isNaN(daily)) return;
    state.employees.push({id:uid(),name,daily,active:true}); saveData(); render();
  };
  document.querySelectorAll('[data-raise]').forEach(b=>b.onclick=()=>{
    const e=state.employees.find(x=>x.id===b.dataset.raise); if(!e)return;
    const cell=b.closest('td');
    cell.innerHTML=`<span class="inline"><input type="number" min="0" step="100" value="${e.daily}" id="raise-in"><button class="act" id="raise-ok">✓</button><button class="act muted" id="raise-cancel" style="cursor:pointer">✕</button></span>`;
    const inp=cell.querySelector('#raise-in'); inp.focus();
    cell.querySelector('#raise-ok').onclick=()=>{ const v=parseFloat(inp.value); if(!isNaN(v)){ e.daily=v; saveData(); } render(); };
    cell.querySelector('#raise-cancel').onclick=()=>render();
  });
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{ const e=state.employees.find(x=>x.id===b.dataset.toggle); if(e){ e.active=!e.active; saveData(); render(); } });
  document.querySelectorAll('[data-partner]').forEach(b=>b.onclick=()=>{ const e=state.employees.find(x=>x.id===b.dataset.partner); if(e){ e.partner=!e.partner; saveData(); render(); } });
  document.querySelectorAll('[data-delemp]').forEach(b=>b.onclick=()=>{ const e=state.employees.find(x=>x.id===b.dataset.delemp); if(!confirm(`確定刪除員工「${e?esc(e.name):''}」？`)) return; state.employees=state.employees.filter(e=>e.id!==b.dataset.delemp); saveData(); render(); });
  document.querySelectorAll('[data-renemp]').forEach(b=>b.onclick=()=>{
    const e=state.employees.find(x=>x.id===b.dataset.renemp); if(!e)return;
    const cell=b.closest('td');
    cell.innerHTML=`<span class="inline"><input value="${esc(e.name)}" id="ren-in" style="width:120px"><button class="act" id="ren-ok">✓</button><button class="act muted" id="ren-cancel" style="cursor:pointer">✕</button></span>`;
    const inp=cell.querySelector('#ren-in'); inp.focus();
    cell.querySelector('#ren-ok').onclick=()=>{ const v=inp.value.trim(); if(v){ e.name=v; saveData(); } render(); };
    cell.querySelector('#ren-cancel').onclick=()=>render();
  });

  document.querySelectorAll('[data-sitecontract]').forEach(inp=>inp.onchange=()=>{
    const s=state.sites.find(x=>x.id===inp.dataset.sitecontract); if(!s) return;
    const v=parseFloat(inp.value);
    if(isNaN(v)||v<=0){ s.contract=''; delete state.contracts[s.name]; }
    else { s.contract=v; state.contracts[s.name]=v; }
    saveData(); render();
  });
  document.querySelectorAll('[data-sitesettings]').forEach(dt=>dt.addEventListener('toggle',()=>{ siteSettingsOpen[dt.dataset.sitesettings]=dt.open; }));
  document.querySelectorAll('[data-sitetax]').forEach(inp=>inp.onchange=()=>{
    const s=state.sites.find(x=>x.id===inp.dataset.sitetax); if(!s) return;
    const v=parseFloat(inp.value); const nv=isNaN(v)?0:Math.max(0,v);
    s.siteTaxPct=nv; s.coopTaxPct=nv; resyncSiteDeal(s); saveData();
  });
  document.querySelectorAll('[data-sitetype]').forEach(sel=>sel.onchange=()=>{
    const s=state.sites.find(x=>x.id===sel.dataset.sitetype); if(!s) return;
    s.type=sel.value; s.coop=(sel.value==='合作案');
    if(s.coop && s.coopMgrPct===undefined) s.coopMgrPct=50;
    siteSettingsOpen[s.id]=true; resyncSiteDeal(s); saveData(); render();
  });
  document.querySelectorAll('[data-siteowner]').forEach(sel=>sel.onchange=()=>{
    const s=state.sites.find(x=>x.id===sel.dataset.siteowner); if(!s) return;
    s.siteOwnerId=sel.value; s.coopOwnerId=sel.value; resyncSiteDeal(s); saveData();
  });
  document.querySelectorAll('[data-sitesave]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.sitesave; const s=state.sites.find(x=>x.id===id); if(!s) return;
    // 主動把面板上目前的值讀進來（避免有欄位沒觸發 onchange）
    const typeSel=document.querySelector(`[data-sitetype="${id}"]`); if(typeSel){ s.type=typeSel.value; s.coop=(typeSel.value==='合作案'); if(s.coop&&s.coopMgrPct===undefined) s.coopMgrPct=50; }
    const taxInp=document.querySelector(`[data-sitetax="${id}"]`); if(taxInp){ const v=parseFloat(taxInp.value); s.siteTaxPct=isNaN(v)?0:Math.max(0,v); s.coopTaxPct=s.siteTaxPct; }
    const ownSel=document.querySelector(`[data-siteowner="${id}"]`); if(ownSel){ s.siteOwnerId=ownSel.value; s.coopOwnerId=ownSel.value; }
    const accSel=document.querySelector(`[data-siteacc="${id}"]`); if(accSel){ s.siteAcc=accSel.value; }
    const mgrInp=document.querySelector(`[data-sitemgr="${id}"]`); if(mgrInp){ const v=parseFloat(mgrInp.value); s.coopMgrPct=isNaN(v)?50:Math.max(0,Math.min(100,v)); }
    const conInp=document.querySelector(`[data-sitecontract="${id}"]`); if(conInp){ const v=parseFloat(conInp.value); if(isNaN(v)||v<=0){ s.contract=''; delete state.contracts[s.name]; } else { s.contract=v; state.contracts[s.name]=v; } }
    resyncSiteDeal(s); saveData();

    const targetFund=Math.max(minFund, Math.round(bookFund));
    const fundPaid=Math.max(0,Math.min(balance,targetFund));
    const avail=Math.max(0,balance-fundPaid);
    partners.forEach(p=>{
      const tgt=targetBonus[p.id]||0;
      let pay = totalTargetBonus<=0?0 : (avail>=totalTargetBonus?tgt:tgt*(avail/totalTargetBonus));
      const owe=Math.max(0,Math.round(tgt)-Math.round(pay));
      if(owe>0) state.oweBonus[p.id]=(state.oweBonus[p.id]||0)+owe;
    });
    saveData(); render();
  };
  document.querySelectorAll('[data-owepay]').forEach(b=>b.onclick=()=>{
    const pid=b.dataset.owepay; const cur=Math.round(state.oweBonus[pid]||0);
    const s=prompt(`補發多少給 ${empName(pid)}？目前被欠 ${money(cur)}`, cur);
    if(s===null) return;
    const v=parseFloat(s); if(isNaN(v)||v<0){ alert('請輸入正確金額'); return; }
    state.oweBonus[pid]=Math.max(0, cur-Math.round(v));
    saveData(); render();
  });
}

// 壓縮圖片為 base64 JPEG
function compressImage(file, maxW, quality, cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',quality));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// 每筆借支已扣金額 = 所有「來源為此借支」的扣項調整加總
function loanRepaid(loanId){
  return state.adjustments.filter(a=>a.loanId===loanId && a.kind==='ded').reduce((s,a)=>s+(Number(a.amount)||0),0);
}
function loanBalance(loan){ return Math.max(0, (Number(loan.amount)||0) - loanRepaid(loan.id)); }
// 本期是否已對此借支扣過款
function loanDeductedInRange(loanId,from,to){
  const inRange=d=>(!from||d>=from)&&(!to||d<=to);
  return state.adjustments.some(a=>a.loanId===loanId && a.kind==='ded' && inRange(a.date));
}

// 統一地點清單：案場（type=site）+ 自訂地點（type=loc，倉庫/貨車等）
function allLocations(){
  const a=state.sites.map(s=>({key:'site:'+s.id, name:s.name, kind:'案場'}));
  const b=state.locations.map(l=>({key:'loc:'+l.id, name:l.name, kind:l.kind||'地點'}));
  return a.concat(b);
}
function locLabel(key){
  if(!key) return '（未指定）';
  const f=allLocations().find(x=>x.key===key);
  return f?f.name:'（已移除）';
}

function evenSplit(amount, ids){
  const out={}; const n=ids.length; if(n===0) return out;
  const each=Math.round((amount/n)/1)*1; // 先平均
  let acc=0;
  ids.forEach((id,i)=>{ if(i<n-1){ out[id]=Math.round(amount/n); acc+=out[id]; } else { out[id]=Math.round(amount-acc); } });
  return out;
}

function accountName(id){ const a=state.accounts.find(x=>x.id===id); return a?a.name:'（已移除）'; }
function accountBalance(accId){
  const acc=state.accounts.find(a=>a.id===accId); if(!acc) return 0;
  const opening=Number(acc.opening)||0;
  const delta=state.ledger.filter(t=>t.accId===accId).reduce((s,t)=>s + (t.kind==='in'?1:-1)*(Number(t.amount)||0), 0);
  return opening+delta;
}

// ---- 案場損益及分潤結算 ----
const SCHEMES={
  'new':{label:'新制 30/70（負責人30%·公積金70%）', bonus:0.30, fund:0.70},
  'old':{label:'舊制 0/100（全進公積金）', bonus:0, fund:1.00},
};
// 合作案場：總請款、總成本、利潤、業主/管理人對拆（成本來自案場成本明細、請款來自請款追蹤）
function coopSiteCalc(site){
  const totalBill=state.billings.filter(b=>b.site===site.name).reduce((s,b)=>s+(Number(b.amount)||0),0);
  const totalCost=(state.costs||[]).filter(c=>c.siteId===site.id).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const taxPct=(site.coopTaxPct!==undefined&&site.coopTaxPct!=='')?Number(site.coopTaxPct):0;
  const tax=totalBill*taxPct/100;
  const profit=totalBill-totalCost-tax;
  const mgrPct=(site.coopMgrPct!==undefined&&site.coopMgrPct!=='')?Number(site.coopMgrPct):50;
  const ownerPct=100-mgrPct;
  return {totalBill,totalCost,tax,taxPct,profit,mgrPct,ownerPct,companyShare:profit*mgrPct/100,partnerShare:profit*ownerPct/100};
}
function dealCalc(d){
  const amount=Number(d.amount)||0, cost=Number(d.cost)||0;
  let tax;
  if(d.taxPct!==undefined && d.taxPct!=='' && d.taxPct!==null) tax=amount*(Number(d.taxPct)||0)/100;
  else tax=Number(d.tax)||0;
  const profit=amount-cost-tax;
  // 合作案：業主出資源、管理人(你們)管現場，利潤依業主%/管理人%拆；算到這就停，不做30/70
  if(d.type==='合作案'){
    const mgrPct=(d.mgrPct!==undefined&&d.mgrPct!=='')?Number(d.mgrPct):50;
    const ownerPct=100-mgrPct;
    const companyShare=profit*mgrPct/100;   // 管理人(你們公司)那份
    const partnerShare=profit*ownerPct/100; // 業主那份
    return {profit, tax, isDeal:true, companyShare, partnerShare, mgrPct, ownerPct, bonus:0, fund:0};
  }
  const sc=SCHEMES[d.scheme]||SCHEMES['new'];
  const bonus=profit>0?profit*sc.bonus:0;
  const fund=profit-bonus;
  return {profit,bonus,fund,tax,isDeal:false};
}
let dealPosting=null, dealEditId=null, dealCarry=null, coopCarry=null, billEditId=null, dealAccPick=null, billingAddEditId=null; // 入帳/編輯/帶去/請款編輯/選帳戶中

// 一筆分潤進帳戶的金額：代工/公司分潤＝金額−稅；（合作案在卡片另算，這裡不處理）
function dealIncomeAmount(d){
  const c=dealCalc(d);
  return Math.round((Number(d.amount)||0) - (c.tax||0)); // 金額 − 稅
}
// 同步：依分潤的 moneyAcc，自動在該帳戶維護一筆收入（標記 autoDealId）
function syncDealIncome(d){
  // 先移除這筆分潤舊的自動收入
  state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id);
  if(d.moneyAcc && d.type!=='合作案'){
    const amt=dealIncomeAmount(d);
    if(amt!==0){
      state.ledger.push({id:uid(), date:d.date||new Date().toISOString().slice(0,10), accId:d.moneyAcc, kind: amt>=0?'in':'out', amount:Math.abs(amt), note:`分潤進帳·${d.name}`, autoDealId:d.id});
    }
  }
}
// 重建所有分潤的自動收入（A方案：一次補齊）
function rebuildAllDealIncome(){
  state.ledger=state.ledger.filter(t=>!t.autoDealId);
  state.deals.forEach(d=>{ if(d.moneyAcc && d.type!=='合作案'){ const amt=dealIncomeAmount(d); if(amt!==0) state.ledger.push({id:uid(), date:d.date||new Date().toISOString().slice(0,10), accId:d.moneyAcc, kind:amt>=0?'in':'out', amount:Math.abs(amt), note:`分潤進帳·${d.name}`, autoDealId:d.id}); } });
}
// 案場成本（給分潤算淨利用）＝出工工資+津貼 + 手動成本 +（期初，但舊制不算期初）
function siteCostForDeal(site){
  const comp=computeRecords(state.attendance);
  let wage=0;
  state.attendance.forEach(r=>{ if(r.siteId!==site.id) return; const c=comp[r.id]; if(!c) return; wage+=c.total; });
  let manual=0;
  state.costs.forEach(co=>{ if(co.siteId===site.id) manual+=Number(co.amount)||0; });
  const opening=(site.type==='舊制')?0:(Number(site.opening)||0);
  return Math.round(wage+manual+opening);
}
function resyncAllSiteDeals(){ state.sites.forEach(s=>{ if(!(s.coop||s.type==='合作案')) resyncSiteDeal(s); }); }
// 案場驅動：代工/公司分潤案場 → 自動維護「一個案場一筆分潤」，金額＝該案場總請款
function resyncSiteDeal(site){
  // 合作案不走這裡（合作案在分潤頁用 coopSiteCalc 自動匯總）
  const totalBill=state.billings.filter(b=>b.site===site.name).reduce((s,b)=>s+(Number(b.amount)||0),0);
  let d=state.deals.find(x=>x.autoSiteId===site.id);
  if(site.coop || site.type==='合作案'){
    // 若之前是代工/公司分潤、後來改成合作案，移除舊的自動分潤與其進帳
    if(d){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    return;
  }
  if(totalBill<=0){
    // 沒有請款就不需要分潤；若已有自動分潤則移除
    if(d){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    return;
  }
  if(!d){
    d={id:uid(), autoSiteId:site.id, name:site.name, type:site.type||'代工', date:new Date().toISOString().slice(0,10), cost:0};
    state.deals.push(d);
  }
  d.name=site.name;
  d.type=site.type||'代工';
  d.amount=totalBill;
  d.cost=siteCostForDeal(site);              // 期初(舊制不算)+出工工資+手動成本
  d.taxPct=(site.siteTaxPct!==undefined?site.siteTaxPct:0);
  d.scheme=(site.type==='舊制')?'old':'new';  // 舊制全進公積金，其餘30/70
  d.ownerId=site.siteOwnerId||'';
  d.moneyAcc=site.siteAcc||'';
  syncDealIncome(d);
}

// ---- 請款單 ----
function viewBillingReq(){
  const list=state.billings.filter(b=>(b.docType||'請款單')==='請款單').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total=list.reduce((s,b)=>s+billingAmount(b),0);
  const totalSettled=list.filter(b=>b.settled).reduce((s,b)=>s+billingAmount(b),0);
  const unsettled=total-totalSettled;
  const siteSelOpts=`<option value="">（選案場）</option>`+state.sites.filter(s=>s.active!==false).map(s=>`<option value="${esc(s.name)}">${esc(s.name)}</option>`).join('');

  // 依案場分組
  const groups={};
  list.forEach(b=>{ const k=b.site||'（未填案場）'; (groups[k]=groups[k]||[]).push(b); });
  const siteNames=Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  const siteCards=siteNames.map(siteName=>{
    const siteList=groups[siteName];
    const siteTot=siteList.reduce((s,b)=>s+billingAmount(b),0);
    const siteSettled=siteList.filter(b=>b.settled).reduce((s,b)=>s+billingAmount(b),0);
    const open=!!formOpen['req-site-'+siteName];
    const entries=open?siteList.map((b,idx)=>{
      const sep=idx>0?'border-top:1px solid var(--line);':'';
      return `<div style="${sep}padding:${idx>0?'12px':'4px'} 0 10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
              <span style="font-size:18px;font-weight:800;color:var(--accent)">${money(billingAmount(b))}</span>
              <span style="font-size:12px;color:var(--muted)">${esc(b.date||'')}</span>
              ${b.method?`<span style="font-size:12px;color:var(--muted)">${esc(b.method)}</span>`:''}
              ${b.client?`<span style="font-size:12px;color:var(--muted)">${esc(b.client)}</span>`:''}
            </div>
            ${billingLineMeta(b)?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${billingLineMeta(b)}</div>`:''}
            ${b.note?`<div style="font-size:13px;color:var(--text);margin-top:4px;font-weight:500">${esc(b.note)}</div>`:''}
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0">
            <button class="act ${b.settled?'':'muted'}" data-togglesettle="${b.id}" style="${b.settled?'color:var(--accent)':''}">${b.settled?'✓ 已結算':'未結算'}</button>
            <button class="act" data-billprint="${b.id}">列印</button>
            <button class="act danger" data-delbill="${b.id}">刪</button>
          </div>
        </div>
      </div>`;
    }).join(''):'';
    return `<div class="card" style="border-left:3px solid ${siteSettled>=siteTot?'var(--accent)':'var(--line2)'}">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;cursor:pointer" data-toggle-form="req-site-${siteName}">
        <div style="font-size:15px;font-weight:700">${esc(siteName)}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:13px;color:var(--muted)">合計 <b style="color:var(--accent)">${money(siteTot)}</b>　未結算 <span style="color:var(--danger)">${money(siteTot-siteSettled)}</span></div>
          <span style="font-size:12px;color:var(--muted)">${open?'▲':'▼'}</span>
        </div>
      </div>
      ${entries}
    </div>`;
  }).join('');

  return `
  <div class="metrics">
    <div class="metric"><div class="l">請款單數</div><div class="v">${list.length}</div></div>
    <div class="metric"><div class="l">請款總額</div><div class="v" style="font-size:21px">${money(total)}</div></div>
    <div class="metric"><div class="l">未結算</div><div class="v" style="font-size:21px">${money(unsettled)}</div></div>
  </div>
  <div class="card">
    ${foldBtn('bnr','新增請款單')}
    ${formOpen.bnr?`<div class="row" style="margin-top:8px">
      <div class="field"><label>日期</label><input type="date" id="bnr-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field" style="flex:1;min-width:150px"><label>案場</label><select id="bnr-site">${siteSelOpts}</select></div>
      <div class="field"><label>單位</label><input id="bnr-unit" value="式" placeholder="式、天、坪" style="width:90px"></div>
      <div class="field"><label>數量</label><input type="number" id="bnr-qty" min="0" step="0.01" value="1" style="width:90px"></div>
      <div class="field"><label>單價</label><input type="number" id="bnr-unit-price" min="0" step="1" style="width:120px"></div>
      <div class="field"><label>小計</label><div id="bnr-subtotal" class="num" style="height:36px;display:flex;align-items:center;font-weight:700">$0</div></div>
      <div class="field"><label>方式</label><input id="bnr-method" placeholder="匯款" style="width:100px"></div>
      <div class="field"><label>業主</label><input id="bnr-client" placeholder="業主名稱" style="width:110px"></div>
      <div class="field" style="flex:1;min-width:180px"><label>說明</label><input id="bnr-note" placeholder="例：第一期工程款"></div>
      <div class="field"><label>結算</label><select id="bnr-settled"><option value="">未結算</option><option value="1">已結算</option></select></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn" id="bnr-add">＋ 新增請款單</button></div>`:''}
  </div>
  ${list.length===0?'<div class="card"><div class="empty">尚無請款單。點上方「新增請款單」開始登記。</div></div>':siteCards}`;
}
