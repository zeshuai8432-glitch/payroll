<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>點工薪資與案場人事成本管理</title>
<style>
  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --ink: #1a1d2e;
    --muted: #7a7f9a;
    --line: #e2e6f0;
    --line2: #c8cedf;
    --accent: #4f46e5;
    --accent2: #e5466b;
    --warn-bg: #fff8e6;
    --warn-ink: #92600a;
    --danger: #d63f3f;
    --info: #0e7db0;
    --radius: 16px;
    --shadow-sm: 0 1px 4px rgba(79,70,229,.07), 0 4px 16px rgba(79,70,229,.06);
    --shadow-md: 0 4px 24px rgba(79,70,229,.13), 0 1px 4px rgba(0,0,0,.06);
    --grad-top: linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #a855f7 100%);
    --grad-sidebar: linear-gradient(180deg, #f8f7ff 0%, #f0f2f8 100%);
    --metric-1: linear-gradient(135deg, #4f46e5, #7c3aed);
    --metric-2: linear-gradient(135deg, #0e7db0, #06b6d4);
    --metric-3: linear-gradient(135deg, #059669, #10b981);
    --metric-4: linear-gradient(135deg, #d97706, #f59e0b);
    --metric-5: linear-gradient(135deg, #e5466b, #f43f5e);
    --metric-6: linear-gradient(135deg, #7c3aed, #a855f7);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.6; }

  /* ── 頂部漸層列 ── */
  .top {
    background: var(--grad-top);
    color: #fff;
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 20px rgba(79,70,229,.35);
  }
  .top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .top h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .3px;
    text-shadow: 0 1px 6px rgba(0,0,0,.18);
  }
  .top .burger { display: none; background: rgba(255,255,255,.2); border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; border-radius: 8px; }
  .top .burger:hover { background: rgba(255,255,255,.3); }

  /* ── 側邊欄 ── */
  .layout { display: flex; min-height: calc(100vh - 58px); }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--grad-sidebar);
    border-right: 1px solid var(--line);
    padding: 18px 0 14px;
    overflow-y: auto;
  }
  .nav-group { margin-bottom: 8px; }
  .nav-group-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    padding: 10px 20px 5px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    opacity: .7;
  }
  .nav-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 9px 20px 9px 22px;
    font-size: 13.5px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--ink);
    border-left: 3px solid transparent;
    transition: all .18s;
    border-radius: 0 10px 10px 0;
    margin-right: 10px;
  }
  .nav-item:hover { background: rgba(79,70,229,.07); color: var(--accent); }
  .nav-item.active {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(79,70,229,.12), rgba(79,70,229,.04));
    color: var(--accent);
    font-weight: 700;
  }
  .main { flex: 1; min-width: 0; padding: 24px 28px 60px; max-width: 1080px; }
  .scrim { display: none; }
  @media (max-width: 760px) {
    /* ── 側邊欄抽屜 ── */
    .top .burger { display: block; }
    .sidebar { position: fixed; top: 52px; left: 0; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .22s cubic-bezier(.4,0,.2,1); box-shadow: 4px 0 24px rgba(79,70,229,.18); }
    .sidebar.open { transform: translateX(0); }
    .scrim.show { display: block; position: fixed; inset: 52px 0 0 0; background: rgba(30,27,75,.35); z-index: 55; backdrop-filter: blur(2px); }

    /* ── 頂列精簡 ── */
    .top { padding: 0 12px; height: 52px; gap: 10px; }
    .top h1 { font-size: 15px; }
    #cloud-status { display: inline; font-size: 11px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #cloud-refresh { font-size: 12px; padding: 4px 10px; }

    /* ── 主內容 ── */
    .layout { min-height: calc(100vh - 52px); }
    .main { padding: 12px 12px 60px; }

    /* ── 卡片 ── */
    .card { padding: 14px 14px; margin-bottom: 12px; border-radius: 12px; }

    /* ── 指標卡片 ── */
    .metrics { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .metric { padding: 13px 14px; border-radius: 12px; }
    .metric .v { font-size: 21px; }
    .metric .l { font-size: 10.5px; }

    /* ── 表單：欄位全寬堆疊 ── */
    .row { gap: 10px; }
    .field { width: 100%; }
    .field input, .field select { width: 100% !important; min-width: 0 !important; box-sizing: border-box; }
    /* 主要提交按鈕全寬 */
    .row > .btn { width: 100%; }

    /* ── 按鈕：加大觸控面積 ── */
    .act { padding: 8px 14px; font-size: 13.5px; }
    .btn { font-size: 15px; }

    /* ── 表格 ── */
    th { padding: 8px 7px; font-size: 10.5px; }
    td { padding: 9px 7px; font-size: 13px; }

    /* ── 卡片式表格（登記出工／代墊款／公積金 等）：手機上一列一張卡，不用左右滑 ── */
    table.cardtable { border: 0; }
    table.cardtable thead { display: none; }
    table.cardtable, table.cardtable tbody, table.cardtable tr, table.cardtable td { display: block; width: 100%; box-sizing: border-box; }
    table.cardtable tr {
      background: #fff; border: 1px solid var(--line); border-radius: 12px;
      padding: 10px 12px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(30,27,75,.06);
    }
    table.cardtable td {
      padding: 4px 0; border: 0; font-size: 14.5px; text-align: left !important;
      display: flex; justify-content: space-between; align-items: baseline; gap: 12px;
    }
    table.cardtable td::before {
      content: attr(data-label); color: var(--muted); font-size: 12px; font-weight: 600;
      flex: 0 0 auto; white-space: nowrap;
    }
    table.cardtable td:empty { display: none; }
    /* 沒有 data-label 的欄（例如操作按鈕列）靠右整排 */
    table.cardtable td[data-label=""]::before, table.cardtable td:not([data-label])::before { content: ""; }
    table.cardtable td.actions { justify-content: flex-end; flex-wrap: wrap; gap: 6px; padding-top: 8px; border-top: 1px dashed var(--line); margin-top: 4px; }
    table.cardtable td .num, table.cardtable td.num { font-weight: 700; }

    /* 登記出工：同一人的「人名列＋案場明細」在手機上組成一張卡 */
    table.cardtable tr.emp-head {
      margin-bottom: 0; border-bottom: 0;
      border-radius: 12px 12px 0 0; background: #f3f2fb;
      box-shadow: none;
    }
    table.cardtable tr.emp-head td[data-label="員工"] { font-size: 15.5px; }
    table.cardtable tr.emp-detail {
      margin-bottom: 0; margin-top: 0;
      border-top: 0; border-radius: 0;
      border-left: 3px solid var(--accent); box-shadow: none;
    }
    /* 一個人的最後一筆明細：收尾（圓角＋底部間距） */
    table.cardtable tr.emp-detail:last-child,
    table.cardtable tr.emp-detail:has(+ tr.emp-head) {
      border-radius: 0 0 12px 12px; margin-bottom: 12px;
    }
    /* 人名列的操作欄在手機上不佔空間 */
    table.cardtable tr.emp-head td.actions { display: none; }

    /* ── 側邊欄項目加高（觸控友善） ── */
    .nav-item { padding: 12px 20px 12px 22px; font-size: 14px; }
    /* ── 頂列按鈕文字切換 ── */
    .mob-hide { display: none; }
    .mob-show { display: inline !important; }
    /* ── 照片列縮圖自動填滿 ── */
    .photo-thumb { width: calc(33vw - 24px) !important; height: calc(25vw - 18px) !important; }
  }

  /* ── 卡片入場動畫 ── */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 卡片 ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 28px 32px 72px; }
  .card {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.75);
    border-radius: 20px;
    padding: 26px 30px;
    margin-bottom: 22px;
    box-shadow: 0 2px 8px rgba(79,70,229,.06), 0 8px 28px rgba(79,70,229,.08);
    transition: box-shadow .28s cubic-bezier(.4,0,.2,1), transform .28s cubic-bezier(.34,1.4,.64,1);
    will-change: transform;
    animation: cardIn .28s cubic-bezier(.4,0,.2,1) both;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(79,70,229,.11), 0 18px 48px rgba(79,70,229,.14);
    transform: translateY(-3px);
  }
  .card:active { transform: translateY(-1px); transition-duration: .08s; }

  /* ── 主內容留白 ── */
  .main { flex: 1; min-width: 0; padding: 28px 32px 72px; max-width: 1100px; }

  /* ── 表單 ── */
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11.5px; font-weight: 700; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; }
  input, select {
    height: 40px;
    padding: 0 14px;
    border: 1.5px solid var(--line2);
    border-radius: 12px;
    font-size: 14px;
    background: rgba(255,255,255,.9);
    font-family: inherit;
    color: var(--ink);
    transition: border-color .18s, box-shadow .18s, background .18s;
  }
  input:hover, select:hover { border-color: rgba(79,70,229,.4); background: #fff; }
  input:focus, select:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(79,70,229,.13); }
  input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }
  textarea {
    min-height: 40px; padding: 9px 14px;
    border: 1.5px solid var(--line2); border-radius: 12px;
    font-size: 14px; background: rgba(255,255,255,.9);
    font-family: inherit; color: var(--ink); resize: vertical;
    transition: border-color .18s, box-shadow .18s, background .18s;
  }
  textarea:hover { border-color: rgba(79,70,229,.4); background: #fff; }
  textarea:focus { outline: none; border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px rgba(79,70,229,.13); }
  /* 觸控裝置（平板／手機）欄位字級至少 16px：iOS/iPadOS 聚焦小於 16px 的欄位會自動放大頁面，
     造成版面亂跳、鍵盤看起來變小、打字卡卡。設 16px 可根治，桌機不受影響。 */
  @media (pointer: coarse){
    input, select, textarea { font-size: 16px; }
  }

  /* ── 統計數字卡片（彩色漸層） ── */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .metric {
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.7);
    border-radius: 18px;
    padding: 20px 22px;
    box-shadow: 0 2px 8px rgba(79,70,229,.07), 0 6px 20px rgba(79,70,229,.07);
    position: relative;
    overflow: hidden;
    transition: transform .22s cubic-bezier(.34,1.4,.64,1), box-shadow .22s;
    animation: cardIn .3s cubic-bezier(.4,0,.2,1) both;
  }
  .metric:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 8px 24px rgba(79,70,229,.14), 0 2px 6px rgba(79,70,229,.08); }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--metric-1);
    transition: height .22s;
  }
  .metric:hover::before { height: 5px; }
  .metric:nth-child(6n+2)::before { background: var(--metric-2); }
  .metric:nth-child(6n+3)::before { background: var(--metric-3); }
  .metric:nth-child(6n+4)::before { background: var(--metric-4); }
  .metric:nth-child(6n+5)::before { background: var(--metric-5); }
  .metric:nth-child(6n+6)::before { background: var(--metric-6); }
  .metric .l { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
  .metric .v {
    font-size: 27px;
    font-weight: 800;
    margin-top: 8px;
    background: var(--metric-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .metric:nth-child(6n+2) .v { background: var(--metric-2); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+3) .v { background: var(--metric-3); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+4) .v { background: var(--metric-4); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+5) .v { background: var(--metric-5); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+6) .v { background: var(--metric-6); -webkit-background-clip: text; background-clip: text; }

  /* ── 表格 ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .6px;
    text-transform: uppercase;
    padding: 11px 12px;
    border-bottom: 2px solid var(--line);
    white-space: nowrap;
    background: rgba(248,249,255,.9);
  }
  td { padding: 12px 12px; border-bottom: 1px solid var(--line); transition: background .15s, border-color .15s; }
  tr:hover td { background: rgba(79,70,229,.04); }
  tr:hover td:first-child { border-left: 3px solid rgba(79,70,229,.3); padding-left: 9px; }
  td:first-child { border-left: 3px solid transparent; transition: border-color .15s, padding .15s, background .15s; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* ── 按鈕 ── */
  /* 全域：所有 button 都是膠囊形 */
  button { border-radius: 999px !important; font-family: inherit; }

  /* 主要行動按鈕 — tonal primary (淺紫底 + 深紫字) */
  .btn {
    height: 40px;
    background: #ede9fe;
    color: #4338ca;
    border: 1.5px solid #c4b5fd;
    border-radius: 999px;
    padding: 0 22px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    transition: background .18s, transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
    will-change: transform;
  }
  .btn:hover { background: #ddd6fe; transform: translateY(-2px); box-shadow: 0 6px 18px rgba(99,102,241,.22); }
  .btn:active { transform: translateY(0) scale(.98); transition-duration: .07s; }
  .btn:disabled { opacity: .45; transform: none; cursor: not-allowed; }

  /* 次要行動按鈕 — tonal secondary (超淺紫底 + 深紫字) */
  .act {
    cursor: pointer;
    background: rgba(99,102,241,.08);
    border: none !important;
    font-size: 13px;
    padding: 5px 14px;
    color: #4338ca;
    font-family: inherit;
    border-radius: 999px;
    transition: background .15s, transform .15s cubic-bezier(.34,1.4,.64,1), color .15s;
    line-height: 1.5;
  }
  .act:hover { background: rgba(99,102,241,.16); transform: translateY(-1px); }
  .act:active { transform: translateY(0); transition-duration: .06s; }
  /* 危險 — tonal danger (淺紅底 + 深紅字) */
  .act.danger { color: #991b1b; background: rgba(220,38,38,.08); }
  .act.danger:hover { background: rgba(220,38,38,.16); }
  /* 靜態 — tonal muted (淺灰底 + 灰字) */
  .act.muted { color: #64748b; background: rgba(100,116,139,.07); cursor: default; }
  .act.muted:hover { background: rgba(100,116,139,.07); transform: none; }

  /* ── 標籤、訊息 ── */
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #fff8e6, #fef3c7);
    color: var(--warn-ink);
    border: 1px solid #fde68a;
    margin-left: 6px;
    transition: transform .15s cubic-bezier(.34,1.4,.64,1), box-shadow .15s;
  }
  .tag:hover { transform: scale(1.06); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
  .empty { color: var(--muted); font-size: 14px; padding: 44px 0; text-align: center; letter-spacing: .2px; }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 16px; line-height: 1.7; }
  details summary { cursor: pointer; font-size: 13px; color: var(--accent); font-weight: 600; transition: color .15s; }
  details summary:hover { color: var(--accent2); }
  .moon { color: var(--info); }
  .scroll { overflow-x: auto; border-radius: 12px; }
  .inline { display: flex; gap: 6px; align-items: center; }
  .inline input { height: 32px; width: 100px; }

  /* ── 列印用浮層（不動） ── */
  #print-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; overflow: auto; padding: 24px; }
  #print-overlay .pbar { position: sticky; top: 0; background: #fff; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line2); display: flex; gap: 10px; justify-content: flex-end; }
  #print-overlay .pdoc { max-width: 800px; margin: 0 auto; color: #1f2421; }
  #print-overlay h1 { font-size: 18px; margin: 0 0 2px; }
  #print-overlay .meta { font-size: 12px; color: #555; margin-bottom: 16px; }
  #print-overlay table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #print-overlay th, #print-overlay td { border: 1px solid #cfd2cd; padding: 6px 8px; }
  #print-overlay th { background: #eef1ee; text-align: left; font-size: 12px; text-transform: none; letter-spacing: 0; }
  #print-overlay td.num, #print-overlay th.num { text-align: right; font-variant-numeric: tabular-nums; }
  #print-overlay .total-row td { font-weight: 700; background: #f6f7f5; }
  #print-overlay .sign { margin-top: 32px; font-size: 13px; display: flex; gap: 48px; }
  #print-overlay .sign > div { border-top: 1px solid #1f2421; padding-top: 6px; min-width: 160px; }
  #print-overlay .sign > div div { border-top: none; padding-top: 0; min-width: 0; }
  #print-overlay .sub { font-size: 11px; color: #777; margin-top: 8px; }
  #print-overlay .sec { font-size: 13px; font-weight: 700; margin: 16px 0 6px; }
  #print-overlay h2.sec { font-size: 14px; margin: 18px 0 6px; padding-top: 10px; border-top: 1px solid #cfd2cd; }
  #print-overlay .paydoc h1 { color: #1f3a5f; border-bottom: 3px solid #dbeafe; padding-bottom: 8px; margin-bottom: 8px; }
  #print-overlay .paydoc .sec { padding: 7px 10px; border-radius: 8px; background: #eef6ff; color: #1e3a5f; border-left: 4px solid #60a5fa; }
  #print-overlay .paydoc .sec.add-sec { background: #eefaf4; color: #166534; border-left-color: #34d399; }
  #print-overlay .paydoc .sec.ded-sec { background: #fff1f2; color: #991b1b; border-left-color: #fb7185; }
  #print-overlay .paydoc .sec.summary-sec { background: #f8fafc; color: #334155; border-left-color: #94a3b8; }
  #print-overlay .paydoc th { background: #f1f5f9; color: #334155; }
  #print-overlay .paydoc tr.add-row td, #print-overlay .paydoc .add-amt { color: #047857; background: #f0fdf4; }
  #print-overlay .paydoc tr.ded-row td, #print-overlay .paydoc .ded-amt { color: #b91c1c; background: #fff1f2; }
  #print-overlay .paydoc .night-check { color: #0f766e; font-weight: 800; font-size: 14px; }
  #print-overlay .site-pill { display:inline-block; padding:2px 8px; border-radius:999px; font-weight:700; font-size:11px; border:1px solid transparent; }
  /* ── 藍色系商用報告風（bluedoc）── */
  #print-overlay .bluedoc { color: #1F2937; }
  #print-overlay .bluedoc h1 { color: #1E3A8A; font-size: 20px; letter-spacing: 1px; border-bottom: 3px solid #1E3A8A; padding-bottom: 8px; margin-bottom: 6px; }

  if(s==='') return NaN;
  if(!/^[0-9+\-*/().\s]+$/.test(s)) return NaN;

// 工數顯示：工數 = 工時÷8，用分數符號。例：9h → 1⅛ 工
const FRAC8={1:'⅛',2:'¼',3:'⅜',4:'½',5:'⅝',6:'¾',7:'⅞'};
function gongStr(hours){
  const h=Number(hours)||0;
  if(h===0) return '0 工';
  const whole=Math.floor(h/8);
  const rem=h-whole*8;
  let frac='';
  if(rem>0){
    if(Number.isInteger(rem)&&FRAC8[rem]) frac=FRAC8[rem];
    else frac=(rem/8).toString().replace(/^0/,'');
  }
  let s;
  if(whole>0&&frac) s=`${whole}${frac}`;
  else if(whole>0) s=`${whole}`;
  else s=frac||'0';
  return `${s} 工`;
}

const uniqueTexts = arr => [...new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean))];
const knownClients = () => uniqueTexts([...(state.textMemory&&state.textMemory.clients||[]), ...state.sites.map(s=>s.clientOwner||s.siteClientOwner||s.ownerName||''), ...state.billings.map(b=>b.client||''), ...state.deals.map(d=>d.owner||'')]);

const dataListHtml = (id, values) => `<datalist id="${id}">${values.map(v=>`<option value="${esc(v)}"></option>`).join('')}</datalist>`;
const SUB_SITE_TYPES=['代工','連工代料','業主分潤','舊制'];
const childSitesOf = s => s?state.sites.filter(x=>x.parentSiteId===s.id):[];
const childSiteFor = (s, subName) => s?state.sites.find(x=>x.parentSiteId===s.id&&x.name===subName):null;
const subSitesOf = s => {

const ensureSubSiteMeta = s => {

  const next=String(newName||'').trim();

  if(current.includes(next)){ alert('這個子案場名稱已經存在'); return false; }

const siteOptionValue = (siteName, subName='') => subName?`${siteName} / ${subName}`:siteName;
const splitSiteValue = value => {
  const raw=String(value||'');

};

}

};

const ownSettledBilledForSite = site => state.billings.filter(b=>b.settled).reduce((x,b)=>{ const sp=splitSiteValue(b.site); return x+((sp.parent===site.name&&!sp.sub)?billingAmount(b):0); },0);
// 子案場已收款工程款合計（「母 / 子」的請款 ＋ 相容以子案場本名開的請款）→ 記入母案場成本
const childWorkBilledForSite = site => {
  let sum=0;
  state.billings.filter(b=>b.settled).forEach(b=>{ const sp=splitSiteValue(b.site); if(sp.parent===site.name&&sp.sub) sum+=billingAmount(b); });
  childSitesOf(site).forEach(c=>{ if(c.name===site.name) return; state.billings.filter(b=>b.settled).forEach(b=>{ const sp=splitSiteValue(b.site); if(sp.parent===c.name&&!sp.sub) sum+=billingAmount(b); }); });
  return sum;
};

const canonSiteKey = v => {

  if(rec&&rec.parentSiteId&&!sp.sub){ const p=state.sites.find(x=>x.id===rec.parentSiteId); if(p) return p.name+' / '+rec.name; }

const measBilledDiffForKey = key => {
  const meas=state.measurements.filter(m=>canonSiteKey(m.site)===key).reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);

// 自動分潤的請款基準：母案場＝開給業主的已收款；子案場＝自己的工程款（「母 / 子」＋相容以子本名開的）

};

function applyData(d){
  if(!d) return;
  state.employees=d.employees||[]; state.sites=d.sites||[]; state.attendance=d.attendance||[]; state.adjustments=d.adjustments||[]; state.loans=d.loans||[]; state.tools=d.tools||[]; state.locations=d.locations||[]; state.assets=d.assets||[]; state.advances=d.advances||[]; state.accounts=d.accounts||[]; state.ledger=d.ledger||[]; state.deals=d.deals||[]; state.billings=d.billings||[]; state.measurements=d.measurements||[]; state.contracts=d.contracts||{}; state.costs=d.costs||[]; state.textMemory=d.textMemory||{clients:[],companies:[]}; state.parkAccId=d.parkAccId||''; state.oweBonus=d.oweBonus||{}; state.minFund=(d.minFund!==undefined?d.minFund:''); state.payrollSnapshots=d.payrollSnapshots||[]; state.deletedIds=d.deletedIds||[];
  state.employees.forEach(e=>{ if(e.active===undefined) e.active=true; });
  state.sites.forEach(s=>{
    if(s.parentSiteId){
      const p=state.sites.find(x=>x.id===s.parentSiteId);
      if(p){
        s.parentSiteName=p.name;
        p.subSites=subSitesOf(p);
        if(!p.subSites.includes(s.name)) p.subSites.push(s.name);
        ensureSubSiteMeta(p)[s.name]=s.type||ensureSubSiteMeta(p)[s.name]||'代工';
      }
    }
  });
  try{ resyncAllSiteDeals(); }catch(e){}
  mergeBillingSigs(d.billingSigs||{}, d.billingSigsLocked||{}, d.billingSigMeta||{});
  mergeDeletedPhotos(d.billingPhotosDeleted); // 先合併刪除記號，再合併照片才不會把已刪的補回
  if(d.billingPhotos) mergeCloudPhotos(d.billingPhotos);
}
function packData(){
  Object.keys(billingSigs).forEach(id=>{ billingSigMeta[id]=billingSigMeta[id]||{updatedAt:0}; });
  // billingPhotos 只同步 Drive URL（http 開頭），不同步 base64（太大）
  const photosSync={};
  Object.entries(billingPhotos).forEach(([id,urls])=>{
    const driveUrls=(urls||[]).filter(u=>typeof u==='string'&&u.startsWith('http'));
    if(driveUrls.length) photosSync[id]=driveUrls;
  });
  return {employees:state.employees,sites:state.sites,attendance:state.attendance,adjustments:state.adjustments,loans:state.loans,tools:state.tools,locations:state.locations,assets:state.assets,advances:state.advances,accounts:state.accounts,ledger:state.ledger,deals:state.deals,billings:state.billings,measurements:state.measurements,contracts:state.contracts,costs:state.costs,textMemory:state.textMemory,parkAccId:state.parkAccId,oweBonus:state.oweBonus,minFund:state.minFund,payrollSnapshots:state.payrollSnapshots,billingPhotos:photosSync,billingPhotosDeleted:billingPhotosDeleted,billingSigs:billingSigs,billingSigsLocked:billingSigsLocked,billingSigMeta:billingSigMeta,deletedIds:state.deletedIds||[],savedAt:Date.now()};
}
// 需要逐筆(依 id)合併的集合；deals 為衍生資料不合併，靠 resyncAllSiteDeals 重算
const MERGE_COLLECTIONS=['employees','sites','attendance','adjustments','loans','tools','locations','assets','advances','accounts','ledger','billings','measurements','costs','payrollSnapshots'];
// union：以 base 為主，把 add 裡「base 沒有的 id」補進來；相同 id 不覆蓋；已刪除(記號)的一律排除
function unionById(baseArr, addArr, delSet){
  const del=delSet||new Set(state.deletedIds||[]);
  const map=new Map();
  (baseArr||[]).forEach(r=>{ if(r&&r.id!=null && !del.has(r.id)) map.set(r.id,r); });
  (addArr||[]).forEach(r=>{ if(r&&r.id!=null && !del.has(r.id) && !map.has(r.id)) map.set(r.id,r); });
  return [...map.values()];
}
// ── 刪除記號(tombstone)：自動偵測哪些 id 被刪除，同步到各裝置，避免合併時被補回 ──
let _prevIds=null;
function collectIds(){ const s=new Set(); MERGE_COLLECTIONS.forEach(k=>(state[k]||[]).forEach(r=>{ if(r&&r.id!=null) s.add(r.id); })); return s; }
function refreshPrevIds(){ _prevIds=collectIds(); }
function recordDeletions(){ // 比對上次的 id 集合，消失的視為刪除，記入 deletedIds
  const cur=collectIds();
  if(_prevIds){
    const del=new Set(state.deletedIds||[]);
    _prevIds.forEach(id=>{ if(!cur.has(id)) del.add(id); });
    state.deletedIds=[...del];
  }
  _prevIds=cur;
}
// 把雲端文件 cd 與本機逐筆合併：較新的一方當底，較舊那方只補「缺的筆數」；已刪除的不補回
function mergeCloudDoc(cd){
  const localRaw=localStorage.getItem(LS);
  const localTs=localRaw?((JSON.parse(localRaw)||{}).savedAt||0):0;
  const cloudTs=Number(cd.savedAt)||0;
  const keepLogs={}; MERGE_COLLECTIONS.forEach(k=>keepLogs[k]=(state[k]||[]).slice());
  const keepDelIds=(state.deletedIds||[]).slice();
  if(cloudTs>=localTs){
    applyData(cd); // 內含 resyncAllSiteDeals + 合併簽名/照片（會把 deletedIds 設成雲端的）
    state.deletedIds=[...new Set([...(state.deletedIds||[]),...keepDelIds])]; // 補回本機刪除記號
    const del=new Set(state.deletedIds);
    MERGE_COLLECTIONS.forEach(k=>{ state[k]=unionById(state[k], keepLogs[k], del); });
  } else {
    state.deletedIds=[...new Set([...(state.deletedIds||[]),...(cd.deletedIds||[])])];
    const del=new Set(state.deletedIds);
    MERGE_COLLECTIONS.forEach(k=>{ state[k]=unionById(state[k], cd[k]||[], del); });
    mergeBillingSigs(cd.billingSigs||{}, cd.billingSigsLocked||{}, cd.billingSigMeta||{});
    mergeDeletedPhotos(cd.billingPhotosDeleted);
    if(cd.billingPhotos) mergeCloudPhotos(cd.billingPhotos);
  }
  // 依刪除記號再清一次各集合（applyData 套用的雲端資料可能含已刪的）
  const del=new Set(state.deletedIds||[]);
  MERGE_COLLECTIONS.forEach(k=>{ state[k]=(state[k]||[]).filter(r=>!(r&&del.has(r.id))); });
  try{ resyncAllSiteDeals(); }catch(e){} // 合併後重算財務，確保帳務正確
  refreshPrevIds();
}
// 合併雲端「已刪除照片」記號（union），並把已刪除的 url 從現有照片中清掉
function mergeDeletedPhotos(cloudDeleted){
  if(cloudDeleted) Object.entries(cloudDeleted).forEach(([id,urls])=>{
    billingPhotosDeleted[id]=[...new Set([...(billingPhotosDeleted[id]||[]),...(urls||[])])];
  });
  // 依刪除記號清掉現有照片
  Object.entries(billingPhotosDeleted).forEach(([id,delUrls])=>{
    if(billingPhotos[id]){
      const set=new Set(delUrls);
      billingPhotos[id]=billingPhotos[id].filter(u=>!set.has(u));
      if(billingPhotos[id].length===0) delete billingPhotos[id];
    }
  });
}
// 合併雲端照片 URL（去重、保留本機 base64 舊照片；但已刪除的不再加回）
function mergeCloudPhotos(cloudPhotos){
  Object.entries(cloudPhotos).forEach(([id,urls])=>{
    const del=new Set(billingPhotosDeleted[id]||[]);
    const existing=billingPhotos[id]||[];
    const merged=[...new Set([...existing,...urls])].filter(u=>!del.has(u)); // 排除已刪除的
    if(merged.length) billingPhotos[id]=merged; else delete billingPhotos[id];
  });
  savePhotos();
}

function exportBackup(){

function importBackup(file){

  reader.onload=()=>{

      const when=data._backupAt?('\n備份時間：'+data._backupAt.slice(0,16).replace('T',' ')):'';
      const cnt=`員工${(data.employees||[]).length}・出工${(data.attendance||[]).length}・分潤${(data.deals||[]).length}・請款${(data.billings||[]).length}`;
      if(!confirm(`確定用這個備份「覆蓋」目前的資料嗎？${when}\n內容：${cnt}\n\n這會取代現在畫面上的所有資料，且無法復原。建議還原前先「匯出備份」現況以防萬一。`)) return;
      // 還原照片（含 base64）
      if(data._fullPhotos){ try{ billingPhotos=data._fullPhotos; savePhotos(); }catch(e){} }
      applyData(data);
      refreshPrevIds(); // 還原視為新基準，避免被誤判為大量刪除

}

// 雲端讀寫：優先走 Firebase SDK，失敗或逾時自動改走 Firestore REST（避免卡在「讀取雲端中」）
function withTimeout(p,ms,msg){
  return Promise.race([p,new Promise((_,rej)=>setTimeout(()=>rej(new Error(msg||'連線逾時')),ms))]);
}
function fetchT(url,opts={},ms=10000){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(t));
}
async function cloudGet(){
  if(window.__fb&&window.__fb.ok){
    try{
      const snap=await withTimeout(window.__fb.doc.get(),6000,'SDK 逾時');
      return snap.exists?{ok:true,data:snap.data().json}:{ok:false};
    }catch(e){ /* SDK 失敗或逾時，改走 REST */ }
  }
  const r=await fetchT(FS_REST_URL,{},10000);
  if(r.status===404) return {ok:false};
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d=await r.json();
  const f=d.fields||{};
  return {ok:!!(f.json&&f.json.stringValue),data:f.json?f.json.stringValue:null};
}
async function cloudSet(payload){
  const savedAt=Date.now();
  if(window.__fb&&window.__fb.ok){
    try{ await withTimeout(window.__fb.doc.set({json:payload,savedAt}),8000,'SDK 逾時'); return; }catch(e){ /* SDK 失敗或逾時，改走 REST */ }
  }
  const r=await fetchT(FS_REST_URL,{method:'PATCH',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({fields:{json:{stringValue:payload},savedAt:{integerValue:String(savedAt)}}})},15000);
  if(!r.ok) throw new Error('HTTP '+r.status);
}
// 歷史備份：把 payload 寫到另一個文件（10 分鐘一格 / 或指定 key），純安全網，失敗不影響主流程
async function cloudBackup(payload, keyOverride){
  const key=keyOverride||('hist-'+new Date().toISOString().slice(0,15).replace(/[:T]/g,'-'));
  const savedAt=Date.now();
  try{
    if(window.__fb&&window.__fb.ok){
      await withTimeout(window.__fb.db.collection('payroll').doc(key).set({json:payload,savedAt}),8000,'SDK 逾時');
      return;
    }
  }catch(e){}
  try{
    await fetchT(FS_DOC_BASE+key+'?key='+FS_KEY,{method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields:{json:{stringValue:payload},savedAt:{integerValue:String(savedAt)}}})},15000);
  }catch(e){}
}
// 先讀本機快取（讓畫面秒開），再從雲端拉最新
function loadLocal(){
  try { localDirty=localStorage.getItem(LS_DIRTY)==='1'; } catch(e){}
  dirtyOther=localDirty; // 重新載入後無法區分先前變更類型，保守視為一般變更
  try { const raw=localStorage.getItem(LS); if(raw) applyData(JSON.parse(raw)); } catch(e){}
}
// 使用者正在表單打字時不要整頁重畫（避免輸入到一半被洗掉）
function userIsTyping(){
  const el=document.activeElement;
  if(!el) return false;
  const tag=(el.tagName||'').toUpperCase();
  if(tag==='TEXTAREA'||tag==='SELECT') return true;
  if(tag==='INPUT'){
    const t=(el.type||'').toLowerCase();
    return ['checkbox','radio','button','file','submit','range'].indexOf(t)===-1;
  }
  return false;
}
let deferredRender=false;
function safeRender(){
  if(userIsTyping()){ deferredRender=true; return; }
  render();
}
document.addEventListener('focusout',()=>{
  if(!deferredRender) return;
  setTimeout(()=>{ // 等焦點落定：若只是跳到下一個欄位就繼續延後
    if(userIsTyping()) return;
    if(deferredRender){ deferredRender=false; render(); }
  },150);
});
let _loadCloudSeq=0;
let _lastCloudJson=''; // 必須先宣告：loadCloud 第一次會讀它，未宣告會 ReferenceError 導致同步卡死
async function loadCloud(){
  const myseq=++_loadCloudSeq;
  setCloud('雲端同步中…');
  const prevCloudJson=_lastCloudJson;
  let settled=false;
  const watchdog=setTimeout(()=>{
    if(!settled && myseq===_loadCloudSeq){ setCloud('雲端逾時,已顯示本機資料(可繼續使用)'); }
  },10000);
  try {
    const j=await cloudGet();
    settled=true; clearTimeout(watchdog);
    if(j&&j.ok&&j.data){
      const cloudData=JSON.parse(j.data);
      lastCloudTs=cloudData.savedAt||0;
      const hadLocalChanges=localDirty;
      // 保留本機較新的重點標記，合併後回填
      const keepFlags={}; (state.measurements||[]).forEach(m=>{ if(m.flagAt) keepFlags[m.id]={flag:m.flag,flagAt:m.flagAt}; });
      // 有未上傳變更先備份本機（保險，萬一合併有誤仍可救）
      if(localDirty){
        try{
          const lp=localStorage.getItem(LS)||JSON.stringify(packData());
          cloudBackup(lp,'lostlocal-'+new Date().toISOString().slice(0,15).replace(/[:T]/g,'-'));
          localStorage.setItem('pm_lost_local_v1', lp);
        }catch(e){}
      }
      mergeCloudDoc(cloudData); // 逐筆(依id)合併雲端＋本機，兩邊資料都保留、不互相覆蓋
      // 回填本機較新的重點標記
      (state.measurements||[]).forEach(m=>{ const lf=keepFlags[m.id]; if(lf&&Number(lf.flagAt)>(Number(m.flagAt)||0)){ m.flag=lf.flag; m.flagAt=lf.flagAt; } });
      try{ localStorage.setItem(LS, JSON.stringify(packData())); }catch(e){}
      if(hadLocalChanges){
        // 我有未上傳資料 → 把合併後的完整版回推雲端，讓雲端也收到我的
        localDirty=true;
        if(saveTimer) clearTimeout(saveTimer);
        saveTimer=setTimeout(pushCloud,400);
        setCloud('已同步(合併回傳中…)');
      } else {
        try{ localStorage.removeItem(LS_DIRTY); }catch(e){}
        localDirty=false; dirtyOther=false;
        setCloud('已同步');
      }
      _lastCloudJson=j.data;
      safeRender();
    } else {
      // 雲端還沒資料：若本機有資料就自動上傳當底（保險，避免雲端被清空時本機也上不去）
      const hasLocal=MERGE_COLLECTIONS.some(k=>(state[k]||[]).length>0);
      if(hasLocal){ localDirty=true; if(saveTimer) clearTimeout(saveTimer); saveTimer=setTimeout(pushCloud,400); setCloud('雲端尚無資料，正在上傳本機…'); }
      else setCloud('雲端尚無資料');
    }
  } catch(e){ settled=true; clearTimeout(watchdog); setCloud('雲端讀取失敗：'+String(e&&e.message||e).slice(0,60)); }
}

let saveTimer=null, saving=false, pendingSave=false;
function saveData(kind){
  // 本機立即存；kind==='flag' 表示這次變更只有重點標記（衝突時可自動合併）
  recordDeletions(); // 偵測本次是否有刪除，記入刪除記號（避免合併時被補回）
  localDirty=true;
  if(kind!=='flag') dirtyOther=true;
  try{ localStorage.setItem(LS_DIRTY,'1'); localStorage.setItem(LS, JSON.stringify(packData())); }catch(e){}
  // 雲端防抖動：300ms 內多次變更只送一次
  if(saveTimer) clearTimeout(saveTimer);
  setCloud('儲存中…');
  saveTimer=setTimeout(pushCloud, 300);
}
async function pushCloud(){
  if(saving){ pendingSave=true; return; }
  if(!localDirty && Object.keys(localSigPending).length===0){ setCloud('已同步'); return; }
  saving=true;
  let merged=false;
  try {
    // 推送前先讀雲端，把雲端已有的資料「逐筆合併」進本機，再寫回union → 誰也不會蓋掉誰
    try{
      const keepFlags={}; (state.measurements||[]).forEach(m=>{ if(m.flagAt) keepFlags[m.id]={flag:m.flag,flagAt:m.flagAt}; });
      const g=await cloudGet();
      if(g&&g.ok&&g.data){
        const cd=JSON.parse(g.data);
        applyCloudSigsBeforePush(cd.billingSigs||{}, cd.billingSigsLocked||{}, cd.billingSigMeta||{});
        mergeCloudDoc(cd); // 逐筆union合併
        (state.measurements||[]).forEach(m=>{ const lf=keepFlags[m.id]; if(lf&&Number(lf.flagAt)>(Number(m.flagAt)||0)){ m.flag=lf.flag; m.flagAt=lf.flagAt; } });
        merged=true;
      }
    }catch(e){}
    const payload=JSON.stringify(packData());
    try{ localStorage.setItem(LS,payload); }catch(e){}
    await cloudSet(payload);
    cloudBackup(payload); // 成功後順手存一份歷史快照（非阻塞），日後可回溯
    localSigPending={}; localDirty=false; dirtyOther=false;
    try{ localStorage.removeItem(LS_DIRTY); }catch(e){}
    try{ lastCloudTs=Number((JSON.parse(payload)||{}).savedAt)||Date.now(); _lastCloudJson=payload; }catch(e){}
    setCloud('已同步');
    if(merged) safeRender(); // 合併後畫面同步更新（打字中則延後）
  } catch(e){ setCloud('雲端儲存失敗：'+String(e&&e.message||e).slice(0,50)); }
  saving=false;
  if(pendingSave){ pendingSave=false; pushCloud(); }
}
function flushCloudOnExit(){
  if(!localDirty && Object.keys(localSigPending).length===0) return;
  if(saveTimer){ clearTimeout(saveTimer); saveTimer=null; }
  const payload=JSON.stringify(packData());
  try{ localStorage.setItem(LS_DIRTY,'1'); localStorage.setItem(LS, payload); }catch(e){}
}
async function diagCloud(){
  setCloud('診斷中…');

    const cd=JSON.parse(j.data);

    setCloud(`✓ 雲端連線正常(${ms}ms)｜雲端存檔:${when}｜計量${(cd.measurements||[]).length}筆`);
  }catch(e){ setCloud('診斷失敗：'+String(e&&e.message||e).slice(0,70)); }
}
function setCloud(s){ cloudStatus=s; const el=document.getElementById('cloud-status'); if(el) el.textContent=s; }

// 保留舊名稱相容

function savePhotos(){

function saveSigMeta(){ try{ localStorage.setItem(LS_SIG_META,JSON.stringify(billingSigMeta)); }catch(e){} }
function mergeBillingSigs(inSigs={}, inLocked={}, inMeta={}){
  Object.keys(inSigs||{}).forEach(id=>{
    if(localSigPending[id] && billingSigs[id]) return; // 剛簽完待上傳的本機正式簽名優先
    if(!inMeta[id] && billingSigs[id]) return; // 舊版無時間戳簽名不可覆蓋現有簽名
    const incomingTs=Number((inMeta[id]||{}).updatedAt)||0;
    const localTs=Number((billingSigMeta[id]||{}).updatedAt)||0;
    if(!billingSigs[id] || incomingTs>localTs){
      billingSigs[id]=inSigs[id];
      billingSigsLocked[id]=!!inLocked[id];
      billingSigMeta[id]=inMeta[id]||{updatedAt:incomingTs||0};
    }
  });
  Object.keys(inLocked||{}).forEach(id=>{
    if(!billingSigsLocked[id] && (!billingSigMeta[id] || !inMeta[id] || Number((inMeta[id]||{}).updatedAt)>=Number((billingSigMeta[id]||{}).updatedAt||0))) billingSigsLocked[id]=!!inLocked[id];
  });
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
}
function applyCloudSigsBeforePush(cloudSigs={}, cloudLocked={}, cloudMeta={}){
  // 一般同步時，雲端簽名是權威；只有剛在本機重新簽、尚未成功推送的 localSigPending 可以覆蓋雲端。
  Object.keys(billingSigs).forEach(id=>{
    if(localSigPending[id]) return;
    if(cloudSigs[id]){
      billingSigs[id]=cloudSigs[id];
      billingSigsLocked[id]=!!cloudLocked[id];
      billingSigMeta[id]=cloudMeta[id]||{updatedAt:Number((cloudMeta[id]||{}).updatedAt)||0};
    } else {
      delete billingSigs[id];
      delete billingSigsLocked[id];
      delete billingSigMeta[id];
    }
  });
  Object.keys(cloudSigs||{}).forEach(id=>{
    if(localSigPending[id]) return;
    billingSigs[id]=cloudSigs[id];
    billingSigsLocked[id]=!!cloudLocked[id];
    billingSigMeta[id]=cloudMeta[id]||{updatedAt:Number((cloudMeta[id]||{}).updatedAt)||0};
  });
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
}
function loadSigs(){
  try{ const raw=localStorage.getItem(LS_SIGS); if(raw) Object.assign(billingSigs,JSON.parse(raw)); }catch(e){}
  try{ const raw=localStorage.getItem(LS_SIGS_LOCKED); if(raw) Object.assign(billingSigsLocked,JSON.parse(raw)); }catch(e){}
  try{ const raw=localStorage.getItem(LS_SIG_META); if(raw) Object.assign(billingSigMeta,JSON.parse(raw)); }catch(e){}
  // 遷移：把舊版存在 state.billings 裡的 signedPhoto 搬出來
  state.billings.forEach(b=>{ if(b.signedPhoto){ billingSigs[b.id]=b.signedPhoto; billingSigMeta[b.id]=billingSigMeta[b.id]||{updatedAt:Date.now()}; delete b.signedPhoto; } });
  Object.keys(billingSigs).forEach(id=>{ billingSigMeta[id]=billingSigMeta[id]||{updatedAt:0}; });
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  saveSigMeta();
}
function saveSig(id,url){
  deleteSig(id);
  billingSigs[id]=url;
  billingSigsLocked[id]=true; // 簽完自動鎖定
  billingSigMeta[id]={updatedAt:Date.now()};
  localSigPending[id]=true;
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
  setCloud('簽名已儲存，同步中…');
}
function deleteSig(id){
  delete billingSigs[id];
  delete billingSigsLocked[id];
  delete billingSigMeta[id];
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
}
function unlockSig(id){
  delete billingSigsLocked[id];
  billingSigMeta[id]={updatedAt:Date.now()};
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
}

function computeRecords(records){
  const byKey={};
  records.forEach(r=>{
    if(r.kind&&r.kind!=='work') return;
    const emp=state.employees.find(e=>e.id===r.empId);
    const empKey=(emp&&String(emp.name||'').trim())||r.empId;
    const k=empKey+'|'+r.date;
    (byKey[k]=byKey[k]||[]).push(r);
  });
  const out={};
  Object.values(byKey).forEach(group=>{
    const attended=group.filter(r=>(Number(r.hours)||0)>0);
    const totalAllowance=group.some(r=>r.night)?400:0;
    group.forEach(r=>{
      const daily=Number(r.dailyRate)||0, hourly=daily/8, h=Number(r.hours)||0;
      const ot=Number(r.overtime)||0;
      const baseWage=hourly*h;
      const overtimePay=hourly*1.33*ot;  // 加班以1.33倍時薪計
      const wage=baseWage + overtimePay;
      const allow=(h>0&&attended.length>0)?totalAllowance/attended.length:0;
      out[r.id]={wage,baseWage,overtimePay,allow,total:wage+allow};
    });
  });
  return out;
}

// 計薪週期以每月 11 號起算：一個週期 = 某月11號 ～ 次月10號
// 「本月週期」：找出包含今天的那個週期
function cycleContaining(d){
  const day=d.getDate();
  let startY=d.getFullYear(), startM=d.getMonth();
  if(day>11){
    // 12號之後，屬於本月11號起算的新週期
  } else {
    // 今天在 1~11 號，仍屬於上個月11號起算的週期
    startM-=1; if(startM<0){ startM=11; startY-=1; }
  }
  const from=new Date(startY,startM,11);
  const to=new Date(startY,startM+1,10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(from),to:fmt(to)};
}
function defaultPayRange(){ return cycleContaining(new Date()); }
function periodOf(dateStr){ return cycleContaining(new Date((dateStr||new Date().toISOString().slice(0,10))+'T00:00:00')); }
function prevPayRange(){
  const cur=cycleContaining(new Date());
  const f=new Date(cur.from+'T00:00:00');
  const pf=new Date(f.getFullYear(),f.getMonth()-1,11);
  const pt=new Date(f.getFullYear(),f.getMonth(),10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(pf),to:fmt(pt)};
}

const ADD_TYPES=['獎金','全勤獎金','其他加給'];
const DED_TYPES=['借支扣還','勞保自負額','健保自負額','工具遺失賠償','其他扣款'];

// 建立某計薪區間的完整發薪資料（基本工資 + 系統加項 + 手動加扣項 = 實發）
function buildPayroll(from,to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const comp=computeRecords(state.attendance);
  const byEmp={};
  state.attendance.filter(r=>inRange(r.date)).forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const e=byEmp[r.empId]=byEmp[r.empId]||{empId:r.empId,hours:0,wage:0,overtimeHours:0,overtimePay:0,allow:0,gross:0,days:new Set(),adds:[],deds:[],systemAdds:[]};
    const h=Number(r.hours)||0, ot=Number(r.overtime)||0;
    e.hours+=h; e.overtimeHours+=ot; e.wage+=Number(c.baseWage)||0; e.overtimePay+=Number(c.overtimePay)||0; e.allow+=c.allow; e.gross+=Number(c.baseWage)||0; e.days.add(r.date);
  });
  // 套用區間內的調整項
  state.adjustments.filter(a=>inRange(a.date)).forEach(a=>{
    const e=byEmp[a.empId]=byEmp[a.empId]||{empId:a.empId,hours:0,wage:0,overtimeHours:0,overtimePay:0,allow:0,gross:0,days:new Set(),adds:[],deds:[],systemAdds:[]};
    (a.kind==='add'?e.adds:e.deds).push(a);
  });
  Object.values(byEmp).forEach(e=>{
    const travelDays=e.allow>0?e.allow/400:0;
    e.systemAdds=[];
    if(e.allow>0) e.systemAdds.push({label:'出差外宿津貼',note:`共 ${travelDays.toLocaleString()} 天 × $400`,amount:e.allow});
    if(e.overtimePay>0) e.systemAdds.push({label:'加班費',note:`共 ${e.overtimeHours.toLocaleString()} 小時 × 時薪 × 1.33`,amount:e.overtimePay});
    e.manualAddTotal=e.adds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.systemAddTotal=e.systemAdds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.addTotal=e.manualAddTotal+e.systemAddTotal;
    e.dedTotal=e.deds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.net=e.gross+e.addTotal-e.dedTotal;
    // 借支扣還（還品佑）＝有 loanId 或標籤為「借支扣還」；其餘扣項（工具遺失/罰單/其他）歸東澤廣昕回收
    e.loanDedTotal=e.deds.filter(a=>a.loanId||a.label==='借支扣還').reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.otherDedTotal=e.dedTotal-e.loanDedTotal;
    // 公司（東澤/廣昕）負擔工資＝基本工資＋加項−非借支扣項＝實發＋借支扣還
    e.companyWage=e.net+e.loanDedTotal;
  });
  return byEmp;
}

let dashSiteOpen={}; // 各案場毛利：母案場展開看子案場的狀態
function viewDash(){
  if(!state.payFrom||!state.payTo){ const d=defaultPayRange(); state.payFrom=d.from; state.payTo=d.to; }
  const byEmp=buildPayroll(state.payFrom,state.payTo);
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const empIds=Object.keys(byEmp).filter(id=>!isPartner(id));
  const netSum=empIds.reduce((s,id)=>s+byEmp[id].net,0);
  const companySum=empIds.reduce((s,id)=>s+byEmp[id].companyWage,0);
  const headcount=empIds.filter(id=>byEmp[id].days.size>0).length;

  // 借支未還總額
  const loanOutstanding=state.loans.reduce((s,l)=>s+loanBalance(l),0);
  const loanPeople=new Set(state.loans.filter(l=>loanBalance(l)>0).map(l=>l.empId)).size;

  // 代墊款本期應領（股東：薪資＋代墊款）
  const partners=state.employees.filter(e=>e.partner);
  const inPay=d=> (!state.payFrom||d>=state.payFrom) && (!state.payTo||d<=state.payTo);
  const advDue=partners.reduce((s,p)=>{ const w=byEmp[p.id]?Number(byEmp[p.id].net)||0:0; const at=state.advances.filter(a=>a.empId===p.id&&inPay(a.date)).reduce((x,a)=>x+(Number(a.amount)||0),0); return s+w+at; },0);

  // 東澤／廣昕 墊付待報銷
  let reimbPending=0; state.costs.forEach(c=>{ if((c.payer==='dz'||c.payer==='gx')&&!c.reimbursed) reimbPending+=Number(c.amount)||0; });

  // 帳戶總餘額（含公積金帳戶）
  const totalBal=state.accounts.reduce((s,a)=>s+accountBalance(a.id),0);

  // 案場毛利、公積金累計
  let totProfit=0, totFund=0; state.deals.forEach(d=>{ const c=dealCalc(d); totProfit+=(c.profit||0); totFund+=(c.fund||0); });

  // 請款：已收款、合約總額、尚未收款（只算開給業主的，子案場工程款是成本不算收款）
  let totContract=0, totBilled=0;
  state.sites.filter(s=>!s.parentSiteId).forEach(s=>{
    totBilled+=ownSettledBilledForSite(s);
    const contract=Number(s.contract!==undefined&&s.contract!==''?s.contract:state.contracts[s.name])||0;
    if(contract>0) totContract+=contract;
  });
  const remain=Math.max(0, totContract-totBilled);

  // 計量可請款：各案場（依「母 / 子」鑰匙）計量累計 − 已開請款，取正值加總
  const measKeys=[...new Set(state.measurements.map(m=>canonSiteKey(m.site)))];
  const unbilledMeas=measKeys.reduce((s,k)=>{ const d=measBilledDiffForKey(k); return s+Math.max(0,d.diff); },0);

  const card=(goto,label,val,sub,accent)=>`<div class="metric" data-goto="${goto}" style="cursor:pointer${accent?';background:var(--accent);color:#fff':''}"><div class="l"${accent?' style="color:#fff;opacity:.85"':''}>${label}</div><div class="v"${accent?'':''} style="font-size:20px">${val}</div>${sub?`<div class="l"${accent?' style="color:#fff;opacity:.8"':''} style="margin-top:2px;font-weight:400">${sub}</div>`:''}</div>`;

  // 各案場毛利：列出所有母案場（含合作案）；母案場合計＝母自己＋各子案場，只要有子案場就能展開
  // 成本用共用的 computeRecords 一次算好，避免每個案場重覆掃 attendance
  const _dashComp=computeRecords(state.attendance);
  const _wageBySite={}; state.attendance.forEach(r=>{ const c=_dashComp[r.id]; if(!c) return; _wageBySite[r.siteId]=(_wageBySite[r.siteId]||0)+(Number(c.total)||0); });
  const _manualBySite={}; (state.costs||[]).forEach(co=>{ _manualBySite[co.siteId]=(_manualBySite[co.siteId]||0)+(Number(co.amount)||0); });
  const isCoopSite=s=>!!(s&&(s.coop||s.type==='合作案'));
  const costOf=s=>{ if(isCoopSite(s)) return _manualBySite[s.id]||0; const opening=(s.type==='舊制')?0:(Number(s.opening)||0); return Math.round((_wageBySite[s.id]||0)+(_manualBySite[s.id]||0)+opening); };
  const taxPctOf=s=>{ const p=isCoopSite(s)?s.coopTaxPct:s.siteTaxPct; return (p!==undefined&&p!=='')?Number(p):0; };
  const partProfit=(billed,cost,taxPct)=>billed-cost-(billed*taxPct/100);
  const buildSiteProfit=s=>{
    // 邏輯：子案場做的代工工程款（已收款）對母案場是「成本」，不是收入。
    // 母：已收款＝只算開給業主的請款(sub='')；成本＝母自身＋Σ子案場已收款工程款
    // 子：工程款(對母請款)−自身成本(出工工資＋手動)＝代工毛利
    const billMap={};
    state.billings.filter(b=>b.settled).forEach(b=>{ const sp=splitSiteValue(b.site); if(sp.parent!==s.name) return; const k=sp.sub||''; billMap[k]=(billMap[k]||0)+billingAmount(b); });
    const childRecs=childSitesOf(s);
    // 子案場權威清單＝母的 subSites 標籤 ∪ 有獨立紀錄的子案場名
    const subNames=[...new Set([...subSitesOf(s), ...childRecs.map(c=>c.name)])];
    const parts=[];
    subNames.forEach(sub=>{
      const rec=childSiteFor(s,sub)||childRecs.find(c=>c.name===sub)||null;
      // 子案場工程款＝「母 / 子」的已收款請款 ＋ 以子案場本名開的請款（相容舊資料）
      let billed=billMap[sub]||0;
      if(rec) billed+=state.billings.filter(b=>b.settled).reduce((x,b)=>{ const sp=splitSiteValue(b.site); return x+((sp.parent===rec.name&&!sp.sub)?billingAmount(b):0); },0);
      const cost=rec?costOf(rec):0;
      const taxPct=rec?taxPctOf(rec):0;
      parts.push({name:sub, billed, cost, profit:partProfit(billed,cost,taxPct)});
    });
    // 只出現在「母 / 子」請款、但既非 subSites 標籤也無獨立紀錄的（避免漏算）
    Object.keys(billMap).forEach(sub=>{ if(sub && !subNames.includes(sub)) parts.push({name:sub, billed:billMap[sub], cost:0, profit:billMap[sub]}); });
    const ownBilled=billMap['']||0;
    const ownCost=costOf(s);
    const childWorkSum=parts.reduce((x,p)=>x+p.billed,0); // 子案場已收款工程款 → 母的成本
    const cost=ownCost+childWorkSum;
    const profit=partProfit(ownBilled, cost, taxPctOf(s));
    return {id:s.id, name:s.name, coop:isCoopSite(s), billed:ownBilled, cost, ownCost, profit, parts};
  };
  const profitRowsHTML=list=>list.map(p=>{
    const badge=p.coop?'<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案</span>':'';

      <td class="num">${money(p.billed)}</td>

      <td class="num" style="font-weight:600;color:${p.profit>=0?'var(--accent)':'var(--danger)'}">${money(p.profit)}</td></tr>`;
    if(open){
      html+=`<tr style="background:var(--bg)"><td style="padding-left:28px;color:var(--muted)">↳ 母自身成本（工資＋手動＋期初）</td>
        <td class="num" style="color:var(--muted)">—</td>
        <td class="num" style="color:var(--muted)">${money(p.ownCost||0)}</td>
        <td class="num" style="color:var(--muted)">—</td></tr>`;
      html+=p.parts.map(pt=>`<tr style="background:var(--bg)"><td style="padding-left:28px;color:var(--muted)">↳ ${esc(pt.name)}${pt.billed<=0?' <span style="font-size:11px">未請款</span>':''}<span style="font-size:11px;color:var(--muted)">（代工）</span></td>
        <td class="num" style="color:var(--muted)">${money(pt.billed)}</td>
        <td class="num" style="color:var(--muted)">${money(pt.cost)}</td>
        <td class="num" style="color:${pt.profit>=0?'var(--accent)':'var(--danger)'}">${money(pt.profit)}</td></tr>`).join('');
    }
    return html;
  }).join('');
  const activeProfits=state.sites.filter(s=>s.active!==false && !s.parentSiteId).map(buildSiteProfit).sort((a,b)=>b.profit-a.profit);
  const pausedProfits=state.sites.filter(s=>s.active===false && !s.parentSiteId).map(buildSiteProfit).sort((a,b)=>b.profit-a.profit);
  const dealRows=profitRowsHTML(activeProfits);
  const pausedRows=profitRowsHTML(pausedProfits);

  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div style="font-size:15px;font-weight:600">總覽 · 本期 ${esc(state.payFrom||'')} ～ ${esc(state.payTo||'')}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <button class="act" id="dash-thisperiod" style="height:34px;padding:0 12px">本期</button>

    <p class="sub" style="margin:6px 0 0">點任一張卡片可跳到對應分頁。金額依上方期間計算（本期薪資、股東應領）。</p>
  </div>

  <div style="font-size:13px;font-weight:600;color:var(--muted);margin:4px 0 8px">本期薪資</div>
  <div class="metrics">
    ${card('payroll','本期實發薪資', money(netSum), headcount+' 人出工')}
    ${card('payroll','公司負擔工資', money(companySum), '品佑結算基準', true)}

  <div style="font-size:13px;font-weight:600;color:var(--muted);margin:4px 0 8px">應收應付 · 待處理</div>

let searchQuery='';
function viewSearch(){
  const q=(searchQuery||'').trim().toLowerCase();
  const qNum=q.replace(/[$,\s]/g,'');
  const hit=(hay,amt)=>{ if(!q) return false; const h=String(hay||'').toLowerCase(); if(h.includes(q)) return true; if(qNum&&/\d/.test(qNum)&&String(Math.round(Number(amt)||0)).includes(qNum)) return true; return false; };
  const groups=[];
  const push=(label,goto,items)=>{ if(items.length) groups.push({label,goto,items}); };
  const mny=v=>money(Number(v)||0);

  // 出工
  const att=state.attendance.filter(r=>hit(empName(r.empId)+' '+siteName(r.siteId)+' '+(r.date||'')+' '+(r.note||''), 0))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(r=>({date:r.date||'', desc:`${esc(empName(r.empId))}　${esc(siteName(r.siteId))}　${r.kind&&r.kind!=='work'?(r.kind==='leave'?'請假':'休假'):gongStr(Number(r.hours)||0)}`, amt:''}));
  push('出工','entry',att);

  // 借支
  const loans=state.loans.filter(l=>hit(empName(l.empId)+' '+(l.note||'')+' 借支', l.amount))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(l=>({date:l.date||'', desc:`${esc(empName(l.empId))}　${esc(l.note||'借支')}　未還 ${mny(loanBalance(l))}`, amt:mny(l.amount)}));
  push('借支','loans',loans);

  // 代墊款（股東）
  const advs=state.advances.filter(a=>hit(empName(a.empId)+' '+(a.purpose||''), a.amount))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(a=>({date:a.date||'', desc:`${esc(empName(a.empId))}　${esc(a.purpose||'')}`, amt:mny(a.amount)}));
  push('代墊款','advances',advs);

  // 帳務
  const led=state.ledger.filter(t=>hit(accountName(t.accId)+' '+(t.note||''), t.amount))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(t=>({date:t.date||'', desc:`${esc(accountName(t.accId))}　${esc(t.note||'')}`, amt:(t.kind==='in'?'+':'−')+mny(t.amount)}));
  push('帳務收支','accounts',led);

  // 調整項（加扣）
  const adj=state.adjustments.filter(a=>hit(empName(a.empId)+' '+(a.label||'')+' '+(a.note||''), a.amount))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(a=>({date:a.date||'', desc:`${esc(empName(a.empId))}　${a.kind==='add'?'加項':'扣項'} ${esc(a.label||'')}${a.note?'　'+esc(a.note):''}`, amt:(a.kind==='add'?'+':'−')+mny(a.amount)}));
  push('薪資加扣項','payroll',adj);

  // 案場成本
  const costs=(state.costs||[]).filter(c=>hit(siteName(c.siteId)+' '+(c.item||''), c.amount))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(c=>({date:c.date||'', desc:`${esc(siteName(c.siteId))}　${esc(c.item||'')}`, amt:mny(c.amount)}));
  push('案場成本','sites',costs);

  // 請款
  const bills=state.billings.filter(b=>hit(parentSiteName(b.site)+' '+(b.site||'')+' '+(b.client||'')+' '+(b.note||''), billingAmount(b)))
    .sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,50)
    .map(b=>({date:b.date||'', desc:`${esc(parentSiteName(b.site))}　${esc(b.docType||'請款單')}${b.client?'　'+esc(b.client):''}${b.settled?'':'　<span style="color:var(--danger)">未收款</span>'}`, amt:mny(billingAmount(b))}));
  push('請款','billing',bills);

  const totalHits=groups.reduce((s,g)=>s+g.items.length,0);
  const resultHTML=!q
    ? '<div class="empty">輸入員工、案場、項目或金額開始搜尋。</div>'
    : (totalHits===0
      ? '<div class="empty">找不到符合「'+esc(searchQuery)+'」的資料。</div>'
      : groups.map(g=>`<div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div style="font-size:14px;font-weight:600">${g.label}　<span style="color:var(--muted);font-size:12px">${g.items.length} 筆</span></div>
            <button class="act" data-goto="${g.goto}" style="border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:2px 10px">前往${g.label} →</button>
          </div>
          <div class="scroll"><table class="cardtable">
            <thead><tr><th style="width:100px">日期</th><th>內容</th><th class="num">金額</th></tr></thead>
            <tbody>${g.items.map(it=>`<tr><td data-label="日期">${esc(it.date)}</td><td data-label="內容">${it.desc}</td><td class="num" data-label="金額">${it.amt}</td></tr>`).join('')}</tbody>
          </table></div>
        </div>`).join(''));

  return `
  <div class="card">
    <div style="font-size:15px;font-weight:600;margin-bottom:6px">全域搜尋</div>
    <div class="row">
      <div class="field" style="flex:1;min-width:220px"><label>關鍵字（員工／案場／項目／金額）</label>
        <input id="search-input" value="${esc(searchQuery)}" placeholder="例：潘東澤、鼓山醫美、48000、住宿" autocomplete="off"></div>
      ${q?`<button class="act" id="search-clear" style="height:36px;padding:0 14px;align-self:flex-end">清除</button>`:''}
    </div>
    ${q?`<p class="sub" style="margin:8px 0 0">共 ${totalHits} 筆結果（每類最多顯示 50 筆）。</p>`:''}
  </div>
  ${resultHTML}`;
}

function viewPayroll(){
  if(!state.payFrom||!state.payTo){ const d=defaultPayRange(); state.payFrom=d.from; state.payTo=d.to; }
  const byEmp=buildPayroll(state.payFrom,state.payTo);
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const allIds=Object.keys(byEmp).sort((a,b)=>byEmp[b].net-byEmp[a].net);
  const empIds=allIds.filter(id=>!isPartner(id));       // 一般員工：發薪、計入總額
  const partnerIds=allIds.filter(id=>isPartner(id));    // 股東：走代墊款、不計入
  // 總額只算一般員工
  const grossSum=empIds.reduce((s,id)=>s+byEmp[id].gross,0);
  const netSum=empIds.reduce((s,id)=>s+byEmp[id].net,0);
  const companySum=empIds.reduce((s,id)=>s+byEmp[id].companyWage,0);   // 公司(東澤/廣昕)負擔工資合計＝品佑結算基準
  const otherDedSum=empIds.reduce((s,id)=>s+byEmp[id].otherDedTotal,0); // 賠付公司類扣項合計（工具/罰單/其他）

  const rowFor=(id,partner)=>{ const e=byEmp[id]; const emp=state.employees.find(x=>x.id===id);
    if(partner){
      return `<tr style="color:var(--muted)"><td>${esc(empName(id))}<span class="tag" style="background:#e3efe9;color:var(--accent)">股東·走代墊款</span></td>
        <td class="num">${e.days.size}</td><td class="num">${gongStr(e.hours)}</td>
        <td class="num">${money(e.gross)}</td>

        <td class="num">—</td>
        <td class="num">—</td>
        <td></td></tr>`;
    }
    const dedBreak=(e.loanDedTotal>0&&e.otherDedTotal>0)
      ? `<div style="font-size:10px;color:var(--muted)">借支 ${money(e.loanDedTotal)}・賠付 ${money(e.otherDedTotal)}</div>`
      : (e.otherDedTotal>0&&e.loanDedTotal===0 ? `<div style="font-size:10px;color:var(--muted)">賠付公司</div>` : '');
    return `<tr><td>${esc(empName(id))}${emp&&!emp.active?'<span class="tag">已停用</span>':''}</td>
      <td class="num">${e.days.size}</td><td class="num">${gongStr(e.hours)}</td>
      <td class="num">${money(e.gross)}</td>
      <td class="num" style="color:var(--accent)">${e.addTotal?'+'+money(e.addTotal):'—'}</td>
      <td class="num" style="color:var(--danger)">${e.dedTotal?'−'+money(e.dedTotal):'—'}${dedBreak}</td>
      <td class="num" style="font-weight:600">${money(e.net)}</td>
      <td class="num" style="font-weight:600;color:var(--accent)">${money(e.companyWage)}</td>
      <td><button class="act" data-payslip="${id}">明細單</button></td></tr>`;
  };
  let rows=empIds.map(id=>rowFor(id,false)).join('');
  if(state.showPartners) rows+=partnerIds.map(id=>rowFor(id,true)).join('');

  // 調整項輸入區
  const activeEmps=state.employees.filter(e=>e.active);
  const empOpts=activeEmps.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('');
  const addOpts=ADD_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('');
  const dedOpts=DED_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('');
  const inRange=d=> (!state.payFrom||d>=state.payFrom) && (!state.payTo||d<=state.payTo);
  const adjRows=state.adjustments.filter(a=>inRange(a.date)).sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`<tr>
    <td>${esc(a.date)}</td><td>${esc(empName(a.empId))}</td>
    <td><span class="tag" style="background:${a.kind==='add'?'#e3efe9':'#f6e1e1'};color:${a.kind==='add'?'var(--accent)':'var(--danger)'}">${a.kind==='add'?'加項':'扣項'}</span> ${esc(a.label)}</td>
    <td class="num">${a.kind==='add'?'+':'−'}${money(a.amount)}</td>
    <td>${esc(a.note||'')}</td>
    <td><button class="act danger" data-deladj="${a.id}">刪</button></td>
  </tr>`).join('');

  const loanDebtRows=state.employees.map(emp=>{
    const debt=state.loans.filter(l=>l.empId===emp.id).reduce((s,l)=>s+loanBalance(l),0);
    const pay=byEmp[emp.id]?Number(byEmp[emp.id].net)||0:0;
    const over=debt-pay;

    return `<tr>

  }).join('');

  // 本期借支扣款提示：尚未還清、且本期還沒扣過的借支
  const loanReminders=state.loans.filter(l=>loanBalance(l)>0 && !loanDeductedInRange(l.id,state.payFrom,state.payTo)).map(l=>{

  return `

    <div class="row">
      <div class="field"><label>起</label><input type="date" id="pay-from" value="${state.payFrom}"></div>
      <div class="field"><label>訖</label><input type="date" id="pay-to" value="${state.payTo}"></div>
      <button class="act" id="pay-thismonth" style="height:36px;padding:0 12px">本期</button>
      <button class="act" id="pay-lastmonth" style="height:36px;padding:0 12px">上期</button>

    </div>

    <div class="metric"><div class="l">員工數</div><div class="v">${empIds.length}${partnerIds.length?`<span style="font-size:12px;color:var(--muted)"> +${partnerIds.length}股東</span>`:''}</div></div>
    <div class="metric"><div class="l">基本工資</div><div class="v" style="font-size:20px">${money(grossSum)}</div></div>

    <div class="metric" style="background:var(--accent);color:#fff"><div class="l" style="color:#fff;opacity:.85">公司負擔工資（品佑結算基準）</div><div class="v" style="font-size:20px">${money(companySum)}${otherDedSum>0?`<span style="font-size:11px;opacity:.85"> 已扣賠付 ${money(otherDedSum)}</span>`:''}</div></div>
  </div>
  <div class="card">

        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);white-space:nowrap"><input type="checkbox" id="payslip-workdetails" ${payslipShowWorkDetails?'checked':''} style="width:15px;height:15px">明細單顯示出工明細</label>
        ${partnerIds.length?`<button class="act" id="toggle-partners" style="padding:0 12px;height:36px">${state.showPartners?'隱藏股東':'顯示股東'}</button>`:''}
        <button class="act" id="post-park-wage" ${rows===''?'disabled style="opacity:.5"':'style="border:1px solid var(--accent);color:var(--accent)"'}>記入品佑支出</button>
        <button class="act" id="snapshot-payroll" ${rows===''?'disabled style="opacity:.5"':'style="border:1px solid var(--accent);color:var(--accent)"'}>結算存檔（鎖定）</button>
        <button class="btn" id="export-summary" ${rows===''?'disabled style="opacity:.5"':''}>匯出總表 PDF</button>
      </div>
    </div>
    ${rows===''?'<div class="empty">此區間內尚無可計算的薪資。</div>':`
    <div class="scroll"><table>
      <thead><tr><th>員工</th><th class="num">出勤天</th><th class="num">總工數</th><th class="num">基本工資</th><th class="num">加項</th><th class="num">扣項</th><th class="num">實發金額</th><th class="num">公司負擔<br><span style="font-weight:400;font-size:9px">品佑結算</span></th><th></th></tr></thead>

        <td class="actions"><button class="act" data-snapprint="${s.id}">列印</button> <button class="act danger" data-snapdel="${s.id}">刪</button></td>

  ${loanDebtRows===''?'':`<div class="card" style="border-color:var(--danger)">
