          <button class="act muted" data-carrycancel="1" style="cursor:pointer">取消</button>
        </div>`;
      } else if(d.carriedTo){
        const tgt=state.deals.find(x=>x.id===d.carriedTo);
        action=`<span class="tag" style="background:#e3efe9;color:var(--accent)">已帶去：${tgt?esc(tgt.name):'（已刪）'}</span><button class="act danger" data-carryundo="${d.id}">撤銷</button>`;
      } else {
        action=`<button class="act" data-carry="${d.id}" style="border:1px solid var(--info);border-radius:6px;padding:2px 10px;color:var(--info)">帶去公司分潤 →</button>`;
      }
    } else if(d.posted){
      action=`<span class="tag" style="background:#e3efe9;color:var(--accent)">已結帳</span><button class="act danger" data-unpostdeal="${d.id}">撤銷</button>`;
    } else if(state.accounts.length===0){
      action='<span class="sub">需先建帳戶</span>';
    } else if(dealPosting===d.id){
      action=`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"><span class="sub" style="margin:0">公積金 ${money(c.fund)} 入哪個帳戶？</span>${state.accounts.map(a=>`<button class="act" data-dealpick="${d.id}::${a.id}" style="border:1px solid var(--accent);border-radius:6px;padding:2px 10px;color:var(--accent)">${esc(a.name)}</button>`).join('')}<button class="act muted" data-dealcancel="1" style="cursor:pointer">取消</button></div>`;
    } else {
      action=`<button class="act" data-postdeal="${d.id}" style="border:1px solid var(--accent);border-radius:6px;padding:2px 10px;color:var(--accent)">入公積金帳戶 →</button>`;
    }
    // 編輯模式：未入帳才可編輯
    if(dealEditId===d.id && !d.posted){
      return `<tr><td colspan="9" style="background:var(--bg)">
        <div class="row" style="margin:6px 0">
          <div class="field" style="flex:1;min-width:140px"><label>案場名稱</label><input id="de-name" value="${esc(d.name)}"></div>
          <div class="field"><label>類型</label><select id="de-type"><option value="代工" ${d.type==='代工'?'selected':''}>代工</option><option value="公司分潤" ${d.type==='公司分潤'||d.type==='分潤/代料'?'selected':''}>公司分潤（30/70）</option><option value="合作案" ${d.type==='合作案'?'selected':''}>合作案（對半）</option></select></div>
          <div class="field"><label>日期</label><input type="date" id="de-date" value="${d.date||''}"></div>
        </div>
        <div class="row" style="margin-bottom:6px">
          <div class="field"><label>請款金額</label><input type="number" id="de-amount" value="${d.amount||0}" step="1000" style="width:120px"></div>
          <div class="field"><label>工資/成本</label><input type="number" id="de-cost" value="${d.cost||0}" step="1000" style="width:120px"></div>
          <div class="field"><label>稅率(%)</label><input type="number" id="de-taxpct" value="${d.taxPct!==undefined?d.taxPct:0}" step="0.1" style="width:90px"></div>
          ${d.type==='合作案'
            ? `<div class="field"><label>管理人(你們)佔 %</label><input type="number" id="de-mgrpct" min="0" max="100" step="5" value="${d.mgrPct!==undefined?d.mgrPct:50}" style="width:130px"></div>`
            : `<div class="field"><label>制度</label><select id="de-scheme">${Object.entries(SCHEMES).map(([k,v])=>`<option value="${k}" ${d.scheme===k?'selected':''}>${v.label}</option>`).join('')}</select></div>`}
          <div class="field"><label>負責人</label><select id="de-owner"><option value="">（未指定）</option>${partners.map(p=>`<option value="${p.id}" ${d.ownerId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
          <div class="field" style="flex:1;min-width:110px"><label>業主</label><input id="de-client" value="${esc(d.owner||'')}"></div>
          <div class="field"><label>錢進哪個帳戶</label><select id="de-acc"><option value="">（未指定）</option>${state.accounts.map(a=>`<option value="${a.id}" ${d.moneyAcc===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select></div>
          <button class="btn" data-dealeditok="${d.id}">儲存</button>
          <button class="act muted" data-dealeditcancel="1" style="cursor:pointer;height:36px">取消</button>
        </div>
      </td></tr>`;
    }
    const editBtn=(!d.posted&&!d.carriedTo)?`<button class="act" data-dealedit="${d.id}">編輯</button> `:'';
    const typeLabel=isCoop?`合作案(業主${c.ownerPct}/管理人${c.mgrPct})`:(d.type==='公司分潤'||d.type==='分潤/代料'?'公司分潤'+sc.label.split('（')[0].replace('新制','30/70').replace('舊制','0/100'):'代工');
    const col6 = isCoop ? `<td class="num" style="color:var(--info)">管理人 ${money(c.companyShare)}</td>` : `<td class="num" style="color:var(--accent)">${money(c.bonus)}</td>`;
    const col7 = isCoop ? `<td class="num" style="color:var(--muted)">業主 ${money(c.partnerShare)}</td>` : `<td class="num">${money(c.fund)}</td>`;
    return `<tr>
      <td><input type="checkbox" data-dealpick-cb="${d.id}" ${dealSel[d.id]?'checked':''} style="width:16px;height:16px"></td>
      <td>${esc(d.name)}<div style="font-size:11px;color:var(--muted)">${typeLabel}${isCoop?'':'·'+esc(d.ownerId?empName(d.ownerId):'—')}${d.owner?'｜業主'+esc(d.owner):''}${d.moneyAcc?'｜錢在'+esc(accountName(d.moneyAcc)):''}</div></td>
      <td class="num">${money(d.amount)}</td>
      <td class="num">${money(d.cost)}</td>
      <td class="num">${money(c.tax)}${d.taxPct!==undefined&&d.taxPct!==''?`<div style="font-size:10px;color:var(--muted)">${d.taxPct}%</div>`:''}</td>
      <td class="num" style="font-weight:600;color:${c.profit<0?'var(--danger)':'var(--ink)'}">${money(c.profit)}</td>
      ${col6}
      ${col7}
      <td>${editBtn}${action} <button class="act danger" data-deldeal="${d.id}">刪</button></td>
    </tr>`;
  };
  // 依類型分組（合作案另在上方橘卡，這裡只列代工與公司分潤）
  const sortByDate=(a,b)=>(b.date||'').localeCompare(a.date||'');
  const daigongDeals=state.deals.filter(d=>d.type==='代工').sort(sortByDate);
  const companyDeals=state.deals.filter(d=>d.type==='公司分潤'||d.type==='分潤/代料').sort(sortByDate);
  const otherDeals=state.deals.filter(d=>d.type!=='代工'&&d.type!=='公司分潤'&&d.type!=='分潤/代料'&&d.type!=='合作案').sort(sortByDate);
  const tableHead=`<thead><tr><th style="width:28px"></th><th>案場</th><th class="num">金額</th><th class="num">成本</th><th class="num">稅金</th><th class="num">淨利</th><th class="num">獎金/管理人</th><th class="num">公積金/業主</th><th></th></tr></thead>`;
  const sectionFor=(title,list)=> list.length===0?'':`
    <div style="font-size:13px;font-weight:600;margin:14px 0 6px;color:var(--accent)">${title}（${list.length}）</div>
    <div class="scroll"><table>${tableHead}<tbody>${list.map(dealRow).join('')}</tbody></table></div>`;
  const dealsSections=sectionFor('代工',daigongDeals)+sectionFor('公司分潤',companyDeals)+sectionFor('其他',otherDeals);
  const anyDeals=daigongDeals.length+companyDeals.length+otherDeals.length;

  // 合作案場：自動匯總（一案一筆，可結案收合）
  const coopSites=state.sites.filter(s=>s.coop);
  const activeCoop=coopSites.filter(s=>!s.coopClosed && s.active!==false);
  const pausedCoop=coopSites.filter(s=>!s.coopClosed && s.active===false);
  const closedCoop=coopSites.filter(s=>s.coopClosed);
  const coopCard=(s)=>{
    const c=coopSiteCalc(s);
    const carried=s.coopCarriedTo?state.deals.find(x=>x.id===s.coopCarriedTo):null;
    const ownerSel=`<select data-coopowner="${s.id}"><option value="">（未指定）</option>${partners.map(p=>`<option value="${p.id}" ${s.coopOwnerId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select>`;
    let carryArea;
    if(carried){
      carryArea=`<span class="tag" style="background:#e3efe9;color:var(--accent)">管理人那半已帶去：${esc(carried.name)}</span> <button class="act danger" data-coopcarryundo="${s.id}">撤銷</button>`;
    } else if(coopCarry===s.id){
      const opts=state.deals.filter(x=>x.type==='公司分潤'||x.type==='分潤/代料').map(x=>`<button class="act" data-coopcarryinto="${s.id}::${x.id}" style="border:1px solid var(--accent);border-radius:6px;padding:2px 8px;color:var(--accent);margin:2px">${esc(x.name)}</button>`).join('');
      carryArea=`<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:6px">
        <span class="sub" style="margin:0">管理人應得 ${money(c.companyShare)} 帶去：</span>
        <button class="act" data-coopcarrynew="${s.id}" style="border:1px solid var(--accent);border-radius:6px;padding:2px 8px;color:var(--accent)">＋新建公司分潤</button>
        ${opts?`<span class="sub" style="margin:0">或併入：</span>${opts}`:''}
        <button class="act muted" data-coopcarrycancel="1" style="cursor:pointer">取消</button>
      </div>`;
    } else if(c.companyShare>0){
      carryArea=`<button class="act" data-coopcarry="${s.id}" style="border:1px solid var(--info);border-radius:6px;padding:3px 12px;color:var(--info)">把管理人那半帶去公司分潤 →</button>`;
    } else {
      carryArea='<span class="sub">利潤未轉正，暫不可帶去公司分潤</span>';
    }
    return `<div class="card" style="border-left:3px solid #d98430">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;flex-wrap:wrap;gap:6px">
        <div style="font-size:15px;font-weight:600">${esc(s.name)}<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案場</span>${s.coopClosed?'<span class="tag">已結案</span>':''}</div>
        <div style="font-size:13px">總請款 ${money(c.totalBill)}　−　成本 ${money(c.totalCost)}${c.tax>0?`　−　稅 ${money(c.tax)}`:''}　=　<b style="color:${c.profit<0?'var(--danger)':'var(--ink)'}">利潤 ${money(c.profit)}</b></div>
      </div>
      <div style="display:flex;gap:18px;flex-wrap:wrap;align-items:center;font-size:14px;margin:4px 0">
        <span style="color:var(--info)">管理人(你們) ${c.mgrPct}%：<b>${money(c.companyShare)}</b></span>
        <span style="color:var(--muted)">業主 ${c.ownerPct}%：${money(c.partnerShare)}</span>
      </div>
      <div class="row" style="margin:6px 0">
        <div class="field"><label>管理人(你們)佔 %</label><input type="number" data-coopmgr="${s.id}" value="${s.coopMgrPct!==undefined?s.coopMgrPct:50}" min="0" max="100" step="5" style="width:120px"></div>
        <div class="field"><label>稅率 %</label><input type="number" data-cooptax="${s.id}" value="${s.coopTaxPct!==undefined?s.coopTaxPct:0}" min="0" max="100" step="0.5" style="width:90px"></div>
        <div class="field"><label>負責人</label>${ownerSel}</div>
      </div>
      <p class="sub" style="margin:2px 0">請款在「請款追蹤」記、成本在「案場成本」逐筆記，這裡自動匯總、隨時更新。利潤未到帳前可為負，沒關係。</p>
      <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${carryArea}
        ${s.coopClosed
          ? `<button class="act" data-coopreopen="${s.id}">重新打開</button>`
          : `<button class="act danger" data-coopclose="${s.id}">結案</button>`}
      </div>
    </div>`;
  };
  const coopActiveHtml=activeCoop.map(coopCard).join('');
  const coopPausedHtml=pausedCoop.length?`<details><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停的合作案場（${pausedCoop.length}）</summary>${pausedCoop.map(coopCard).join('')}</details>`:'';
  const coopClosedHtml=closedCoop.length?`<details><summary style="cursor:pointer;font-weight:600;padding:8px 0">已結案的合作案場（${closedCoop.length}）</summary>${closedCoop.map(coopCard).join('')}</details>`:'';

  return `
  <div class="metrics">
    <div class="metric" style="background:var(--accent);color:#fff"><div class="l" style="color:#fff;opacity:.85">累計進公積金（已結帳）</div><div class="v">${money(totFund)}</div></div>
    ${bonusCards}
  </div>
  ${coopSites.length?`<div class="card" style="background:#fdf6ee"><div style="font-size:14px;font-weight:600;margin-bottom:2px">合作案場（自動匯總）</div><p class="sub" style="margin:0 0 8px">每個合作案場一筆，金額=該案場總請款、成本=該案場總成本，隨請款/成本變動。管理人那半可「帶去公司分潤」再算30/70。</p></div>${coopActiveHtml}${coopPausedHtml}${coopClosedHtml}`:''}
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">新增案場損益</div>
    <p class="sub">這裡手動建「代工」或「公司分潤(30/70)」。<b>合作案場</b >不在這裡建——到「員工/案場」把案場勾為合作案場，它會自動匯總顯示在上方（總請款−總成本對拆）。稅金＝金額×稅率%。公司分潤按「入公積金帳戶」才把公積金記進帳戶。</p>
    <div class="row">
      <div class="field" style="flex:1;min-width:160px"><label>案場名稱</label><input id="d-name" placeholder="例：義享影城"></div>
      <div class="field"><label>類型</label><select id="d-type"><option value="代工">代工</option><option value="公司分潤">公司分潤（30/70）</option></select></div>
      <div class="field"><label>日期</label><input type="date" id="d-date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="row" style="margin-top:8px">
      <div class="field"><label>請款金額</label><input type="number" id="d-amount" min="0" step="1000" style="width:130px"></div>
      <div class="field"><label>工資/成本</label><input type="number" id="d-cost" min="0" step="1000" style="width:130px"></div>
      <div class="field"><label>發票稅率(%)</label><input type="number" id="d-taxpct" min="0" step="0.1" value="0" style="width:110px"></div>
      <div class="field" id="d-scheme-wrap"><label>制度</label><select id="d-scheme">${schemeOpts}</select></div>
      <div class="field" id="d-mgr-wrap" style="display:none"><label>管理人(你們)佔 %</label><input type="number" id="d-mgrpct" min="0" max="100" step="5" value="50" style="width:130px"></div>
      <div class="field"><label>負責人</label><select id="d-owner"><option value="">（未指定）</option>${partnerOpts}</select></div>
      <div class="field" style="flex:1;min-width:120px"><label>業主（選填）</label><input id="d-client" placeholder="品佑、廣昕…"></div>
      <div class="field"><label>錢進哪個帳戶（選填）</label><select id="d-acc"><option value="">（未指定）</option>${state.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
      <button class="btn" id="d-add">＋ 新增</button>
    </div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:600">案場損益清單（代工／公司分潤）</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="act" id="deals-selall" style="border:1px solid var(--line2);border-radius:8px;padding:0 12px;height:34px">全選</button>
        <button class="act" id="deals-selnone" style="border:1px solid var(--line2);border-radius:8px;padding:0 12px;height:34px">取消全選</button>
        <button class="btn" id="export-deals-sel" ${anyDeals===0?'disabled style="opacity:.5"':''}>匯出選取</button>
        <button class="btn" id="export-deals" ${anyDeals===0?'disabled style="opacity:.5"':''}>全部匯出</button>
      </div>
    </div>
    ${anyDeals===0?'<div class="empty">尚無代工／公司分潤紀錄。（合作案場在上方橘色卡片）</div>':dealsSections}
  </div>`;
}

// ---- 案場請款追蹤 ----
function viewBilling(){
  // 依案場名稱分組
  const groups={};
  state.billings.forEach(b=>{ const k=b.site||'（未填案場）'; (groups[k]=groups[k]||[]).push(b); });
  const siteNames=Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  const totalBilled=state.billings.reduce((s,b)=>s+(Number(b.amount)||0),0);
  const totalSettled=state.billings.filter(b=>b.settled).reduce((s,b)=>s+(Number(b.amount)||0),0);
  const totalUnsettled=totalBilled-totalSettled;

  const cardForName=(name)=>{
    const list=groups[name].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const billed=list.reduce((s,b)=>s+(Number(b.amount)||0),0);
    const settled=list.filter(b=>b.settled).reduce((s,b)=>s+(Number(b.amount)||0),0);
    const unsettled=billed-settled;
    const contract=Number(state.contracts[name])||0;
    let progress='';
    if(contract>0){
      const pct=Math.min(100,Math.round(billed/contract*100));
      const remain=contract-billed;
      progress=`<div class="sub" style="margin:4px 0 8px">合約總額 ${money(contract)}　已請款 ${money(billed)}（${pct}%）　${remain>0?`尚未請款 <b>${money(remain)}</b>`:(remain<0?`<span style="color:var(--danger)">超出合約 ${money(-remain)}</span>`:'已請足')}
        <div style="height:6px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent)"></div></div></div>`;
    }
    const rows=list.map(b=>{
      if(billEditId===b.id){
        return `<tr><td colspan="7" style="background:var(--bg)">
          <div class="row" style="margin:6px 0">
            <div class="field"><label>請款日</label><input type="date" id="be-date" value="${b.date||''}"></div>
            <div class="field"><label>金額</label><input type="number" id="be-amount" value="${b.amount||0}" step="1000" style="width:120px"></div>
            <div class="field"><label>方式</label><input id="be-method" value="${esc(b.method||'')}" style="width:100px"></div>
            <div class="field"><label>業主</label><input id="be-client" value="${esc(b.client||'')}" style="width:110px"></div>
            <div class="field"><label>備註</label><input id="be-note" value="${esc(b.note||'')}" style="width:130px"></div>
            <button class="btn" data-billeditok="${b.id}">儲存</button>
            <button class="act muted" data-billeditcancel="1" style="cursor:pointer;height:36px">取消</button>
          </div>
        </td></tr>`;
      }
      return `<tr>
      <td>${esc(b.date||'')}</td><td class="num">${money(b.amount)}</td>
      <td>${esc(b.method||'')}</td><td>${esc(b.client||'')}</td>
      <td><button class="act ${b.settled?'':'muted'}" data-togglesettle="${b.id}" style="${b.settled?'color:var(--accent)':''}">${b.settled?'✓ 已結算':'未結算'}</button></td>
      <td>${esc(b.note||'')}</td>
      <td><button class="act" data-billedit="${b.id}">改</button> <button class="act danger" data-delbill="${b.id}">刪</button></td>
    </tr>`;}).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:600">${esc(name)}</div>
        <div style="font-size:14px">已請款 <b>${money(billed)}</b>　|　已結算 <span style="color:var(--accent)">${money(settled)}</span>　|　未結算 <span style="color:var(--danger)">${money(unsettled)}</span></div>
      </div>
      ${progress}
      <div class="row" style="margin:6px 0 10px">
        <div class="field"><label>合約總額（選填）</label><input type="number" data-contract="${esc(name)}" value="${contract||''}" placeholder="未設定" min="0" step="10000" style="width:150px"></div>
      </div>
      <div class="scroll"><table>
        <thead><tr><th>請款日</th><th class="num">金額</th><th>方式</th><th>業主</th><th>結算</th><th>備註</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table></div>
    </div>`;
  };
  const namePaused=name=>{ const st=state.sites.find(x=>x.name===name); return st&&st.active===false; };
  const activeNames=siteNames.filter(n=>!namePaused(n));
  const pausedNames=siteNames.filter(n=>namePaused(n));
  const cards=activeNames.map(cardForName).join('');
  const pausedCards=pausedNames.length?`<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedNames.length}）</summary>${pausedNames.map(cardForName).join('')}</details>`:'';

  const siteDatalist=state.sites.map(s=>`<option value="${esc(s.name)}">`).join('');

  return `
  <div class="metrics">
    <div class="metric"><div class="l">累計請款</div><div class="v" style="font-size:20px">${money(totalBilled)}</div></div>
    <div class="metric"><div class="l">已結算</div><div class="v" style="font-size:20px;color:var(--accent)">${money(totalSettled)}</div></div>
    <div class="metric"><div class="l">未結算（在外面的錢）</div><div class="v" style="font-size:20px;color:var(--danger)">${money(totalUnsettled)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:600">新增請款</div>
      <button class="btn" id="export-billing" ${state.billings.length===0?'disabled style="opacity:.5"':''}>匯出 PDF</button>
    </div>
    <p class="sub">記一筆請款。同一案場可多次請款，下方會自動按案場彙總。合約總額在各案場卡片填（選填）。合作案場的分潤不在這裡算——它會在「分潤結算」自動用該案場的總請款−總成本來顯示。</p>
    <datalist id="site-list">${siteDatalist}</datalist>
    <div class="row">
      <div class="field"><label>請款日</label><input type="date" id="b-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field" style="flex:1;min-width:140px"><label>案場名稱</label><input id="b-site" list="site-list" placeholder="輸入或選案場"></div>
      <div class="field"><label>金額（本期請款）</label><input type="number" id="b-amount" min="0" step="1000" style="width:140px"></div>
      <div class="field"><label>請款方式</label><input id="b-method" placeholder="匯款" style="width:100px"></div>
      <div class="field"><label>業主</label><input id="b-client" placeholder="品佑、廣昕" style="width:110px"></div>
      <div class="field"><label>結算</label><select id="b-settled"><option value="">未結算</option><option value="1">已結算</option></select></div>
    </div>
    <div class="row" style="margin-top:8px"><button class="btn" id="b-add">＋ 新增請款</button></div>
  </div>
  ${cards===''&&pausedCards===''?'<div class="card"><div class="empty">尚無請款紀錄。</div></div>':cards}${pausedCards}`;
}

];

      <button class="act" id="recon-clear" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">清除日期</button>

// 各明細「區段」HTML 建構（給合併匯出用；回傳一段 HTML 或 ''）
function reconSection(key, from, to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const rangeTxt=(from||to)?`${from||'起始'} ～ ${to||'迄今'}`:'全部期間';
  if(key==='payroll'){
    const byEmp=buildPayroll(from,to);
    const isP=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
    const ids=Object.keys(byEmp).filter(id=>!isP(id)).sort((a,b)=>byEmp[b].net-byEmp[a].net);
    if(ids.length===0) return '';
    let gG=0,gA=0,gD=0,gN=0;
    const rows=ids.map(id=>{ const e=byEmp[id]; gG+=e.gross;gA+=e.addTotal;gD+=e.dedTotal;gN+=e.net;
      return `<tr><td>${esc(empName(id))}</td><td class="num">${e.days.size}</td><td class="num">${money(e.gross)}</td><td class="num">${e.addTotal?money(e.addTotal):'-'}</td><td class="num">${e.dedTotal?money(e.dedTotal):'-'}</td><td class="num">${money(e.net)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">員工薪資總表（${rangeTxt}）</h2>
      <table><thead><tr><th>員工</th><th class="num">出勤天</th><th class="num">出工薪資</th><th class="num">加項</th><th class="num">扣項</th><th class="num">實發</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>合計</td><td class="num"></td><td class="num">${money(gG)}</td><td class="num">${money(gA)}</td><td class="num">${money(gD)}</td><td class="num">${money(gN)}</td></tr></tbody></table>`;
  }
  if(key==='advances'){
    const partners=state.employees.filter(e=>e.partner);
    const byEmp=buildPayroll(from,to);
    if(partners.length===0) return '';
    const rows=partners.map(p=>{
      const wage=byEmp[p.id]?byEmp[p.id].gross:0;
      const adv=state.advances.filter(a=>a.empId===p.id&&inRange(a.date)).reduce((s,a)=>s+(Number(a.amount)||0),0);
      return `<tr><td>${esc(p.name)}</td><td class="num">${money(wage)}</td><td class="num">${money(adv)}</td><td class="num" style="font-weight:700">${money(wage+adv)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">代墊款明細（${rangeTxt}）</h2>
      <table><thead><tr><th>股東</th><th class="num">工資</th><th class="num">代墊款</th><th class="num">應領</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if(key==='ledger'){
    const txs=state.ledger.filter(t=>inRange(t.date)).sort((a,b)=>a.date.localeCompare(b.date));
    if(txs.length===0) return '';
    let tin=0,tout=0;
    const rows=txs.map(t=>{ tin+=t.kind==='in'?(Number(t.amount)||0):0; tout+=t.kind==='out'?(Number(t.amount)||0):0;
      return `<tr><td>${esc(t.date)}</td><td>${esc(accountName(t.accId))}</td><td>${esc(t.note||'')}</td><td class="num">${t.kind==='in'?money(t.amount):'-'}</td><td class="num">${t.kind==='out'?money(t.amount):'-'}</td></tr>`;
    }).join('');
    return `<h2 class="sec">公積金帳戶收支（${rangeTxt}）</h2>
      <table><thead><tr><th>日期</th><th>帳戶</th><th>項目</th><th class="num">收入</th><th class="num">支出</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td colspan="3">合計</td><td class="num">${money(tin)}</td><td class="num">${money(tout)}</td></tr></tbody></table>`;
  }
  if(key==='billing'){
    if(state.billings.length===0) return '';
    const groups={}; state.billings.forEach(b=>{ const k=b.site||'（未填）'; (groups[k]=groups[k]||[]).push(b); });
    let GB=0,GS=0; const rows=Object.keys(groups).sort().map(name=>{
      const list=groups[name]; const billed=list.reduce((s,b)=>s+(Number(b.amount)||0),0); const settled=list.filter(b=>b.settled).reduce((s,b)=>s+(Number(b.amount)||0),0);
      GB+=billed; GS+=settled;
      return `<tr><td>${esc(name)}</td><td class="num">${money(billed)}</td><td class="num">${money(settled)}</td><td class="num">${money(billed-settled)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">請款追蹤明細（累計至今）</h2>
      <table><thead><tr><th>案場</th><th class="num">已請款</th><th class="num">已結算</th><th class="num">未結算</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>合計</td><td class="num">${money(GB)}</td><td class="num">${money(GS)}</td><td class="num">${money(GB-GS)}</td></tr></tbody></table>`;
  }
  if(key==='deals'){
    if(state.deals.length===0) return '';
    let gP=0,gB=0,gF=0;
    const rows=[...state.deals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{ const c=dealCalc(d); gP+=c.profit;gB+=c.bonus;gF+=c.fund;
      return `<tr><td>${esc(d.name)}</td><td class="num">${money(d.amount)}</td><td class="num">${money(d.cost)}</td><td class="num">${money(c.tax)}</td><td class="num">${money(c.profit)}</td><td class="num">${money(c.bonus)}</td><td class="num">${money(c.fund)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">分潤結算明細（累計至今）</h2>
      <table><thead><tr><th>案場</th><th class="num">金額</th><th class="num">成本</th><th class="num">稅金</th><th class="num">淨利</th><th class="num">獎金</th><th class="num">公積金</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>合計</td><td class="num"></td><td class="num"></td><td class="num"></td><td class="num">${money(gP)}</td><td class="num">${money(gB)}</td><td class="num">${money(gF)}</td></tr></tbody></table>`;
  }
  if(key==='sites'){
    const comp=computeRecords(state.attendance); const bySite={};
    state.sites.forEach(s=>{ bySite[s.id]={hours:0,wage:0,allow:0,total:0,opening:Number(s.opening)||0,name:s.name}; });
    state.attendance.forEach(r=>{ const c=comp[r.id]; if(!c)return; const s=bySite[r.siteId]=bySite[r.siteId]||{hours:0,wage:0,allow:0,total:0,opening:0,name:siteName(r.siteId)};
      s.hours+=Number(r.hours)||0; s.wage+=c.wage; s.allow+=c.allow; s.total+=c.total; });
    const ids=Object.keys(bySite); if(ids.length===0) return '';
    ids.forEach(id=>bySite[id].grand=bySite[id].total+bySite[id].opening);
    const grand=ids.reduce((s,id)=>s+bySite[id].grand,0); ids.sort((a,b)=>bySite[b].grand-bySite[a].grand);
    const rows=ids.map(id=>{ const s=bySite[id]; return `<tr><td>${esc(s.name||siteName(id))}</td><td class="num">${money(s.opening)}</td><td class="num">${money(s.wage)}</td><td class="num">${money(s.allow)}</td><td class="num" style="font-weight:700">${money(s.grand)}</td></tr>`; }).join('');
    return `<h2 class="sec">案場成本明細（累計至今）</h2>
      <table><thead><tr><th>案場</th><th class="num">期初</th><th class="num">系統工資</th><th class="num">津貼</th><th class="num">總成本</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>合計</td><td class="num"></td><td class="num"></td><td class="num"></td><td class="num">${money(grand)}</td></tr></tbody></table>`;
  }
  if(key==='yearend'){
    let bookFund=0, postedFund=0; const bonusByP={};
    state.deals.filter(d=>inRange(d.date)).forEach(d=>{ const c=dealCalc(d); bookFund+=c.fund; if(d.posted) postedFund+=c.fund; if(d.ownerId) bonusByP[d.ownerId]=(bonusByP[d.ownerId]||0)+c.bonus; });
    const notYetIn=bookFund-postedFund;
    const accRows=state.accounts.map(a=>`<tr><td>${esc(a.name)}</td><td class="num">${money(accountBalance(a.id))}</td></tr>`).join('');
    const totalAcc=state.accounts.reduce((s,a)=>s+accountBalance(a.id),0);
    const partners=state.employees.filter(e=>e.partner);
    const pRows=partners.map(p=>`<tr><td>${esc(p.name)}</td><td class="num">${money(bonusByP[p.id]||0)}</td></tr>`).join('');
    return `<h2 class="sec">年度總結（${rangeTxt}）</h2>
      <table><tbody>
        <tr><td>帳面公積金（分潤累計）</td><td class="num">${money(bookFund)}</td></tr>
        <tr><td>已入帳公積金</td><td class="num">${money(postedFund)}</td></tr>
        <tr class="total-row"><td>尚未入帳（待結清）</td><td class="num">${money(notYetIn)}</td></tr>
      </tbody></table>
      <div class="sec" style="font-size:12px">各帳戶實際餘額</div>
      <table><thead><tr><th>帳戶</th><th class="num">餘額</th></tr></thead><tbody>${accRows}<tr class="total-row"><td>合計</td><td class="num">${money(totalAcc)}</td></tr></tbody></table>
      <div class="sec" style="font-size:12px">各股東年度總獎金</div>
      <table><thead><tr><th>股東</th><th class="num">總獎金</th></tr></thead><tbody>${pRows}</tbody></table>`;
  }
  return '';
}
function exportRecon(){
  const picked=RECON_ITEMS.map(([k])=>k).filter(k=>reconPick[k]);
  const sections=picked.map(k=>reconSection(k,reconFrom,reconTo)).filter(Boolean);
  if(sections.length===0){ alert('勾選的項目目前都沒有可匯出的資料'); return; }
  const range=(reconFrom||reconTo)?`${reconFrom||'起始'} ～ ${reconTo||'迄今'}`:'全部期間';
  const inner=`<h1>對帳彙總</h1>
    <div class="meta">可套期間明細區間：${range}　|　列印日：${new Date().toISOString().slice(0,10)}</div>
    ${sections.join('<div style="height:18px"></div>')}`;
  printHTML('對帳彙總', inner);
}

// ---- 年度總結 ----
let yearFrom='', yearTo='';
function viewYearEnd(){
  const inRange=d=> (!yearFrom||d>=yearFrom) && (!yearTo||d<=yearTo);
  const partners=state.employees.filter(e=>e.partner);
  let bookFund=0, postedFund=0; const bonusByP={};
  state.deals.filter(d=>inRange(d.date)).forEach(d=>{ const c=dealCalc(d);
    bookFund+=c.fund;
    if(d.posted) postedFund+=c.fund;
    if(d.ownerId) bonusByP[d.ownerId]=(bonusByP[d.ownerId]||0)+c.bonus;
  });
  const notYetIn=bookFund-postedFund;
  const unposted=state.deals.filter(d=>inRange(d.date)&&!d.posted);
  const byAcc={};
  unposted.forEach(d=>{ const c=dealCalc(d); const k=d.moneyAcc||''; byAcc[k]=(byAcc[k]||0)+c.fund; });
  const accPendRows=Object.keys(byAcc).map(k=>`<tr><td>${esc(k?accountName(k):'（未指定帳戶）')}</td><td class="num" style="font-weight:600;color:var(--warn-ink)">${money(byAcc[k])}</td></tr>`).join('');
  const unpostedRows=[...unposted].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{ const c=dealCalc(d);
    return `<tr><td>${esc(d.name)}<div style="font-size:11px;color:var(--muted)">${esc(d.date||'')}${d.owner?'｜業主'+esc(d.owner):''}</div></td>
      <td class="num">${money(c.fund)}</td>
      <td>${d.moneyAcc?esc(accountName(d.moneyAcc)):'<span style="color:var(--muted)">未指定</span>'}</td></tr>`;
  }).join('');
  const accRows=state.accounts.map(a=>`<tr><td>${esc(a.name)}</td><td class="num" style="font-weight:600">${money(accountBalance(a.id))}</td></tr>`).join('');
  const totalAcc=state.accounts.reduce((s,a)=>s+accountBalance(a.id),0);
  const partnerRows=partners.map(p=>{
    const bonus=bonusByP[p.id]||0;
    const loanLeft=state.loans.filter(l=>l.empId===p.id).reduce((s,l)=>s+loanBalance(l),0);
    return `<tr><td>${esc(p.name)}</td><td class="num" style="color:var(--accent)">${money(bonus)}</td><td class="num">${loanLeft>0?money(loanLeft):'—'}</td></tr>`;
  }).join('');
  const dateInputs=`<div class="row" style="margin-bottom:12px">
    <div class="field"><label>起（依分潤日期）</label><input type="date" id="ye-from" value="${yearFrom}"></div>
    <div class="field"><label>訖</label><input type="date" id="ye-to" value="${yearTo}"></div>
    <button class="act" id="ye-clear" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">全部</button>
  </div>`;
  return `
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">年度總結</div>
    <p class="sub">把「帳面上公積金該累積多少（從分潤結算來，不論是否已入帳）」對照「實際各帳戶的錢」，看出年底要怎麼把錢結清。可選分潤日期區間（例如某一年度）。</p>
    ${dateInputs}
  </div>
  <div class="metrics">
    <div class="metric"><div class="l">帳面公積金（分潤累計）</div><div class="v" style="font-size:19px">${money(bookFund)}</div></div>
    <div class="metric"><div class="l">已入帳公積金</div><div class="v" style="font-size:19px;color:var(--accent)">${money(postedFund)}</div></div>
    <div class="metric" style="background:${notYetIn>0?'var(--warn-bg)':'var(--bg)'}"><div class="l" style="${notYetIn>0?'color:var(--warn-ink)':''}">尚未入帳（待結清）</div><div class="v" style="font-size:19px;${notYetIn>0?'color:var(--warn-ink)':''}">${money(notYetIn)}</div></div>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">公積金結清說明</div>
    <p class="sub">「帳面公積金」是所有案場分潤後該進公積金的總和。「已入帳」是你實際按過「入公積金帳戶」的部分。兩者的差 <b>${money(notYetIn)}</b> 就是<b>還沒撥進公積金的錢</b>——可能還躺在廣昕、品佑等帳戶裡。年底結清時，從那些帳戶把這筆撥進公積金帳戶、並在分潤頁按「入公積金帳戶」補登，帳面與實際就對平了。</p>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">各帳戶待撥公積金（尚未入帳的分潤，依錢進的帳戶彙總）</div>
    ${accPendRows===''?'<div class="empty">目前沒有尚未入帳的分潤。</div>':`<table><thead><tr><th>錢在哪個帳戶</th><th class="num">待撥公積金</th></tr></thead><tbody>${accPendRows}<tr class="total-row" style="font-weight:600"><td>合計</td><td class="num" style="color:var(--warn-ink)">${money(notYetIn)}</td></tr></tbody></table>
    <p class="sub" style="margin:8px 0 0">這代表各帳戶裡「帳面上屬於公積金、但還沒撥過去」的金額。例：品佑帳戶若顯示 47,303，表示品佑帳戶裡有這筆是該撥進公積金的。年底從該帳戶撥款後，到分潤頁按「入公積金帳戶」補登即可。</p>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">尚未入帳分潤明細</div>
    ${unpostedRows===''?'<div class="empty">沒有尚未入帳的分潤。</div>':`<div class="scroll"><table><thead><tr><th>案場</th><th class="num">應進公積金</th><th>錢在哪個帳戶</th></tr></thead><tbody>${unpostedRows}</tbody></table></div>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">各帳戶實際餘額</div>
    ${accRows===''?'<div class="empty">尚無帳戶。</div>':`<table><thead><tr><th>帳戶</th><th class="num">目前餘額</th></tr></thead><tbody>${accRows}<tr class="total-row" style="font-weight:600"><td>合計</td><td class="num">${money(totalAcc)}</td></tr></tbody></table>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">各股東年度概覽</div>
    ${partnerRows===''?'<div class="empty">尚未標記股東。</div>':`<table><thead><tr><th>股東</th><th class="num">年度總獎金（分潤）</th><th class="num">借支未還</th></tr></thead><tbody>${partnerRows}</tbody></table>`}
  </div>`;
}

loadLocal(); render(); loadCloud();
</script>
</body>
</html>
