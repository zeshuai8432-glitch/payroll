function viewBilling(){
  // 依案場名稱分組
  const groups={};
  state.billings.forEach(b=>{ const k=b.site||'（未填案場）'; (groups[k]=groups[k]||[]).push(b); });
  const siteNames=Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  const totalBilled=state.billings.reduce((s,b)=>s+(Number(b.amount)||0),0);
  const totalSettled=state.billings.filter(b=>b.settled).reduce((s,b)=>s+(Number(b.amount)||0),0);
  const totalUnsettled=totalBilled-totalSettled;

  const cardForName=(name)=>{
    const list=groups[name].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const billed=list.reduce((s,b)=>s+(Number(b.amount)||0),0);
    const settled=list.filter(b=>b.settled).reduce((s,b)=>s+(Number(b.amount)||0),0);
    const unsettled=billed-settled;
    const siteObj=state.sites.find(x=>x.name===name);
    const contract=Number(siteObj&&siteObj.contract!==undefined&&siteObj.contract!==''?siteObj.contract:state.contracts[name])||0;
    let progress='';
    if(contract>0){
      const pct=Math.min(100,Math.round(billed/contract*100));
      const remain=contract-billed;
      progress=`<div class="sub" style="margin:4px 0 8px">合約總額 ${money(contract)}　已請款 ${money(billed)}（${pct}%）　${remain>0?`尚未請款 <b>${money(remain)}</b>`:(remain<0?`<span style="color:var(--danger)">超出合約 ${money(-remain)}</span>`:'已請足')}
        <div style="height:6px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent)"></div></div></div>`;
    }
    const rows=list.map(b=>{
      const docType=b.docType||'請款單';
      if(billEditId===b.id){
        return `<tr><td colspan="8" style="background:var(--bg)">
          <div class="row" style="margin:6px 0">
            <div class="field"><label>類型</label><select id="be-type"><option value="請款單" ${docType==='請款單'?'selected':''}>請款單</option><option value="追加單" ${docType==='追加單'?'selected':''}>追加單</option></select></div>
            <div class="field"><label>請款日</label><input type="date" id="be-date" value="${b.date||''}"></div>
            <div class="field"><label>金額</label><input type="number" id="be-amount" value="${b.amount||0}" step="1000" style="width:120px"></div>
            <div class="field"><label>方式</label><input id="be-method" value="${esc(b.method||'')}" style="width:100px"></div>
            <div class="field"><label>業主</label><input id="be-client" value="${esc(b.client||'')}" style="width:110px"></div>
            <div class="field"><label>備註</label><input id="be-note" value="${esc(b.note||'')}" style="width:130px"></div>
            <button class="btn" data-billeditok="${b.id}">儲存</button>
            <button class="act muted" data-billeditcancel="1" style="cursor:pointer;height:36px">取消</button>
          </div>
        </td></tr>`;
      }
      const typeStyle=docType==='追加單'?'background:#fde9d4;color:#9a5b1a':'background:#e3efe9;color:var(--accent)';
      const photos=billingPhotos[b.id]||[];
      const thumbs=photos.map((url,i)=>`<div style="position:relative;display:inline-block;vertical-align:top"><img src="${url}" class="photo-thumb" style="width:80px;height:60px;object-fit:cover;border-radius:5px;border:1px solid var(--line)"><button data-photodel="${b.id}" data-photoidx="${i}" style="position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;border:none;background:var(--danger);color:#fff;font-size:12px;cursor:pointer;padding:0;line-height:20px;text-align:center">✕</button></div>`).join('');
      return `<tr>
      <td><span class="tag" style="${typeStyle}">${esc(docType)}</span> ${esc(b.date||'')}</td>
      <td class="num">${money(b.amount)}</td>
      <td>${esc(b.method||'')}</td><td>${esc(b.client||'')}</td>
      <td><button class="act ${b.settled?'':'muted'}" data-togglesettle="${b.id}" style="${b.settled?'color:var(--accent)':''}">${b.settled?'✓ 已結算':'未結算'}</button></td>
      <td>${esc(b.note||'')}</td>
      <td><button class="act" data-billprint="${b.id}">列印</button> <button class="act" data-billedit="${b.id}">改</button> <button class="act danger" data-delbill="${b.id}">刪</button></td>
    </tr>
    <tr style="background:var(--bg)">
      <td colspan="8" style="padding:5px 10px 8px">
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
          ${thumbs}
          <label style="cursor:pointer;display:flex;align-items:center;gap:4px;padding:5px 10px;background:var(--surface);border:1px dashed var(--line2);border-radius:8px;font-size:12px;color:var(--muted)">📷 上傳施作照片<input type="file" accept="image/*" multiple data-photoadd="${b.id}" style="display:none"></label>
        </div>
      </td>
    </tr>`;}).join('');
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:600">${esc(name)}${(()=>{const so=state.sites.find(x=>x.name===name);if(!so)return '';if(so.coop||so.type==='合作案')return '<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案</span>';if(so.type)return `<span class="tag" style="background:#e3efe9;color:var(--accent)">${esc(so.type)}</span>`;return '';})()}</div>
        <div style="font-size:14px">已請款 <b>${money(billed)}</b>　|　已結算 <span style="color:var(--accent)">${money(settled)}</span>　|　未結算 <span style="color:var(--danger)">${money(unsettled)}</span></div>
      </div>
      ${progress}
      <div class="scroll"><table>
        <thead><tr><th>日期</th><th class="num">金額</th><th>方式</th><th>業主</th><th>結算</th><th>備註</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table></div>
    </div>`;
  };
  const namePaused=name=>{ const st=state.sites.find(x=>x.name===name); return st&&st.active===false; };
  const activeNames=siteNames.filter(n=>!namePaused(n));
  const pausedNames=siteNames.filter(n=>namePaused(n));
  const cards=activeNames.map(cardForName).join('');
  const pausedCards=pausedNames.length?`<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedNames.length}）</summary>${pausedNames.map(cardForName).join('')}</details>`:'';

  const siteSelOpts=`<option value="">（選案場）</option>`+state.sites.filter(s=>s.active!==false).map(s=>{
    const tag=(s.coop||s.type==='合作案')?'（合作案）':(s.type?`（${s.type}）`:'');
    return `<option value="${esc(s.name)}">${esc(s.name)}${tag}</option>`;
  }).join('');

  return `
  <div class="metrics">
    <div class="metric"><div class="l">累計請款</div><div class="v" style="font-size:20px">${money(totalBilled)}</div></div>
    <div class="metric"><div class="l">已結算</div><div class="v" style="font-size:20px;color:var(--accent)">${money(totalSettled)}</div></div>
    <div class="metric"><div class="l">未結算（在外面的錢）</div><div class="v" style="font-size:20px;color:var(--danger)">${money(totalUnsettled)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:8px">
      <div style="font-size:14px;font-weight:600">新增單據</div>
      <button class="btn" id="export-billing" ${state.billings.length===0?'disabled style="opacity:.5"':''}>匯出 PDF</button>
    </div>
    <p class="sub">記一筆請款單或追加單。同一案場可多次登記，下方自動按案場彙總。追加單可在記錄後上傳施作照片，列印時會一併嵌入縮圖。</p>
    <div class="row">
      <div class="field"><label>類型</label><select id="b-type"><option value="請款單">請款單</option><option value="追加單">追加單</option></select></div>
      <div class="field"><label>請款日</label><input type="date" id="b-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="field" style="flex:1;min-width:140px"><label>案場名稱</label><select id="b-site">${siteSelOpts}</select></div>
      <div class="field"><label>金額</label><input type="number" id="b-amount" min="0" step="1000" style="width:140px"></div>
      <div class="field"><label>方式</label><input id="b-method" placeholder="匯款" style="width:100px"></div>
      <div class="field"><label>業主</label><input id="b-client" placeholder="品佑、廣昕" style="width:110px"></div>
      <div class="field"><label>備註</label><input id="b-note" placeholder="工程項目說明" style="width:160px"></div>
      <div class="field"><label>結算</label><select id="b-settled"><option value="">未結算</option><option value="1">已結算</option></select></div>
    </div>
    <div class="row" style="margin-top:8px"><button class="btn" id="b-add">＋ 新增</button></div>
  </div>
  ${cards===''&&pausedCards===''?'<div class="card"><div class="empty">尚無請款紀錄。</div></div>':cards}${pausedCards}`;
}

// 各明細「區段」HTML 建構（給合併匯出用；回傳一段 HTML 或 ''）
function reconSection(key, from, to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const rangeTxt=(from||to)?`${from||'起始'} ～ ${to||'迄今'}`:'全部期間';
  if(key==='payroll'){
    const byEmp=buildPayroll(from,to);
    const isP=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
    const ids=Object.keys(byEmp).filter(id=>!isP(id)).sort((a,b)=>byEmp[b].net-byEmp[a].net);
    if(ids.length===0) return '';
    let gG=0,gA=0,gD=0,gN=0;
    const rows=ids.map(id=>{ const e=byEmp[id]; gG+=e.gross;gA+=e.addTotal;gD+=e.dedTotal;gN+=e.net;
      return `<tr><td>${esc(empName(id))}</td><td class="num">${e.days.size}</td><td class="num">${money(e.gross)}</td><td class="num">${e.addTotal?money(e.addTotal):'-'}</td><td class="num">${e.dedTotal?money(e.dedTotal):'-'}</td><td class="num">${money(e.net)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">員工薪資總表（${rangeTxt}）</h2>
      <table><thead><tr><th>員工</th><th class="num">出勤天</th><th class="num">出工薪資</th><th class="num">加項</th><th class="num">扣項</th><th class="num">實發</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>合計</td><td class="num"></td><td class="num">${money(gG)}</td><td class="num">${money(gA)}</td><td class="num">${money(gD)}</td><td class="num">${money(gN)}</td></tr></tbody></table>`;
  }
  if(key==='advances'){
    const partners=state.employees.filter(e=>e.partner);
    const byEmp=buildPayroll(from,to);
    if(partners.length===0) return '';
    const rows=partners.map(p=>{
      const wage=byEmp[p.id]?byEmp[p.id].gross:0;
      const adv=state.advances.filter(a=>a.empId===p.id&&inRange(a.date)).reduce((s,a)=>s+(Number(a.amount)||0),0);
      return `<tr><td>${esc(p.name)}</td><td class="num">${money(wage)}</td><td class="num">${money(adv)}</td><td class="num" style="font-weight:700">${money(wage+adv)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">代墊款明細（${rangeTxt}）</h2>
      <table><thead><tr><th>股東</th><th class="num">工資</th><th class="num">代墊款</th><th class="num">應領</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if(key==='ledger'){
    const txs=state.ledger.filter(t=>inRange(t.date)).sort((a,b)=>a.date.localeCompare(b.date));
    if(txs.length===0) return '';
    let tin=0,tout=0;
    const rows=txs.map(t=>{ tin+=t.kind==='in'?(Number(t.amount)||0):0; tout+=t.kind==='out'?(Number(t.amount)||0):0;
      return `<tr><td>${esc(t.date)}</td><td>${esc(accountName(t.accId))}</td><td>${esc(t.note||'')}</td><td class="num">${t.kind==='in'?money(t.amount):'-'}</td><td class="num">${t.kind==='out'?money(t.amount):'-'}</td></tr>`;
    }).join('');
    return `<h2 class="sec">公積金帳戶收支（${rangeTxt}）</h2>

  }
  if(key==='sites'){
    const comp=computeRecords(state.attendance); const bySite={};
    state.sites.forEach(s=>{ bySite[s.id]={hours:0,wage:0,allow:0,total:0,opening:Number(s.opening)||0,name:s.name}; });
    state.attendance.forEach(r=>{ const c=comp[r.id]; if(!c)return; const s=bySite[r.siteId]=bySite[r.siteId]||{hours:0,wage:0,allow:0,total:0,opening:0,name:siteName(r.siteId)};
      s.hours+=Number(r.hours)||0; s.wage+=c.wage; s.allow+=c.allow; s.total+=c.total; });
    const ids=Object.keys(bySite); if(ids.length===0) return '';

    const grand=ids.reduce((s,id)=>s+bySite[id].grand,0); ids.sort((a,b)=>bySite[b].grand-bySite[a].grand);
    const rows=ids.map(id=>{ const s=bySite[id]; return `<tr><td>${esc(s.name||siteName(id))}</td><td class="num">${money(s.opening)}</td><td class="num">${money(s.wage)}</td><td class="num">${money(s.allow)}</td><td class="num" style="font-weight:700">${money(s.grand)}</td></tr>`; }).join('');

  }
  if(key==='yearend'){
    let bookFund=0, postedFund=0; const bonusByP={};
    state.deals.filter(d=>inRange(d.date)).forEach(d=>{ const c=dealCalc(d); bookFund+=c.fund; if(d.posted) postedFund+=c.fund; if(d.ownerId) bonusByP[d.ownerId]=(bonusByP[d.ownerId]||0)+c.bonus; });

      <table><thead><tr><th>股東</th><th class="num">總獎金</th></tr></thead><tbody>${pRows}</tbody></table>`;

let parkFrom='', parkTo='';

function viewParkAcc(){

  if(!state.parkAccId){
    return picker+`<div class="card"><div class="empty">請先在上方選擇「哪個帳戶是品佑代支出」。</div></div>`;
  }

  // 抓出 moneyAcc = 品佑 的分潤
  const parkDeals=state.deals.filter(d=>d.moneyAcc===state.parkAccId && d.type!=='合作案' && inRange(d.date));
  let targetBonus={}, targetFundByOwnerIgnore=0, bookFund=0, totalTargetBonus=0;
  const detailRows=[...parkDeals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{
    const c=dealCalc(d);
    if(d.ownerId) targetBonus[d.ownerId]=(targetBonus[d.ownerId]||0)+c.bonus;

  const balance=accountBalance(state.parkAccId); // 已扣完品佑垫付（記在帳戶支出）後的餘額

  const minFund=Math.max(0, Number(state.minFund)||0);

  // 分配：公積金先填「該留」，剩下分獎金（不夠照各人應拿比例分）
  const fundPaid=Math.max(0, Math.min(balance, targetFund));
  let availForBonus=Math.max(0, balance-fundPaid);
  let bonusPaid={}, oweThis={};
  partners.forEach(p=>{
    const tgt=targetBonus[p.id]||0;

    if(totalTargetBonus<=0) pay=0;

    else pay=tgt*(availForBonus/totalTargetBonus);
    pay=Math.round(pay);

    oweThis[p.id]=Math.max(0, Math.round(tgt)-pay);

  const fundShort=Math.max(0, targetFund-fundPaid); // 連「該留」都填不滿的部分

  const verify=`<div class="card">

    </div>
    <p class="sub" style="margin:6px 0 0">勾選①②③④要匯出的段落，按「匯出勾選 PDF」。</p>
  </div>`;

  return picker+`
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:6px">今年公積金水位</div>

  const balance=accountBalance(state.parkAccId);

  const avail=Math.max(0,balance-fundPaid);
  const parkAcc=state.accounts.find(a=>a.id===state.parkAccId);
  const op=parkAcc?Number(parkAcc.opening)||0:0;
  const parkIn=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='in').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const parkOut=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='out').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const row=(l,v)=>`<tr><td>${l}</td><td class="num">${v}</td></tr>`;
  let secs='';
  if(parkVerifySel.a!==false){
    const inTx=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='in').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const outTx=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='out').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    secs+=`<h2>① 品佑帳戶餘額</h2><table>${row('期初',money(op))}${row('＋ 收入合計',money(parkIn))}${inTx.map(t=>row('　'+esc(t.date||'')+' '+esc(t.note||''),money(t.amount))).join('')}${row('− 支出合計',money(parkOut))}${outTx.map(t=>row('　'+esc(t.date||'')+' '+esc(t.note||''),money(t.amount))).join('')}${row('<b>＝ 餘額</b>','<b>'+money(balance)+'</b>')}</table>`;
  }
  if(parkVerifySel.b!==false){
    secs+=`<h2>② 公積金該留多少</h2><table>${row('帳面該進公積金',money(Math.round(bookFund)))}${row('你設定至少留',money(minFund))}${row('＝ 取大的（該留）',money(targetFund))}${row('<b>實際填入</b>','<b>'+money(fundPaid)+'</b>')}</table>`;
  }
  if(parkVerifySel.c!==false){
    secs+=`<h2>③ 獎金可發</h2><table>${row('餘額',money(balance))}${row('− 公積金',money(fundPaid))}${row('<b>＝ 可發獎金</b>','<b>'+money(avail)+'</b>')}</table>`;
  }
  if(parkVerifySel.d!==false){
    const br=[...parkDeals].filter(d=>d.ownerId).map(d=>{const c=dealCalc(d);return row(esc(d.name)+'（'+esc(empName(d.ownerId))+'）',money(c.bonus));}).join('');
    secs+=`<h2>④ 帳面該發獎金（各案相加）</h2><table>${br||row('—','')}${row('<b>合計應發</b>','<b>'+money(Math.round(totalTargetBonus))+'</b>')}</table>`;
  }
  if(!secs){ alert('請至少勾選一個段落'); return; }
  printHTML('品佑帳戶結算·驗算明細', `<h1>品佑帳戶結算·驗算明細</h1><div class="meta">帳戶：${esc(accountName(state.parkAccId))}　|　列印日：${new Date().toISOString().slice(0,10)}</div>${secs}`);
}

// ---- 年度總結 ----
let yearFrom='', yearTo='';
let yeVerifySel={a:true,b:true,c:true}; // 年度驗算匯出勾選
function viewYearEnd(){
  const inRange=d=> (!yearFrom||d>=yearFrom) && (!yearTo||d<=yearTo);
  const partners=state.employees.filter(e=>e.partner);
  let bookFund=0; const bonusByP={};
  const allDeals=state.deals.filter(d=>inRange(d.date));
  allDeals.forEach(d=>{ const c=dealCalc(d);
    bookFund+=c.fund;
    if(d.ownerId) bonusByP[d.ownerId]=(bonusByP[d.ownerId]||0)+c.bonus;
  });
  const byAcc={};
  allDeals.forEach(d=>{ const c=dealCalc(d); const k=d.moneyAcc||''; byAcc[k]=(byAcc[k]||0)+c.fund; });
  const accPendRows=Object.keys(byAcc).map(k=>`<tr><td>${esc(k?accountName(k):'（未指定帳戶）')}</td><td class="num" style="font-weight:600">${money(byAcc[k])}</td></tr>`).join('');
  const unpostedRows=[...allDeals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{ const c=dealCalc(d);
    return `<tr><td>${esc(d.name)}<div style="font-size:11px;color:var(--muted)">${esc(d.date||'')}${d.owner?'｜業主'+esc(d.owner):''}</div></td>
      <td class="num">${money(c.fund)}</td>
      <td>${d.moneyAcc?esc(accountName(d.moneyAcc)):'<span style="color:var(--muted)">未指定</span>'}</td></tr>`;
  }).join('');
  const accRows=state.accounts.map(a=>`<tr><td>${esc(a.name)}</td><td class="num" style="font-weight:600">${money(accountBalance(a.id))}</td></tr>`).join('');
  const totalAcc=state.accounts.reduce((s,a)=>s+accountBalance(a.id),0);
  const partnerRows=partners.map(p=>{
    const bonus=bonusByP[p.id]||0;
    const loanLeft=state.loans.filter(l=>l.empId===p.id).reduce((s,l)=>s+loanBalance(l),0);
    return `<tr><td>${esc(p.name)}</td><td class="num" style="color:var(--accent)">${money(bonus)}</td><td class="num">${loanLeft>0?money(loanLeft):'—'}</td></tr>`;
  }).join('');
  const dateInputs=`<div class="row" style="margin-bottom:12px">
    <div class="field"><label>起（依分潤日期）</label><input type="date" id="ye-from" value="${yearFrom}"></div>
    <div class="field"><label>訖</label><input type="date" id="ye-to" value="${yearTo}"></div>
    <button class="act" id="ye-clear" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">全部</button>
  </div>`;
  // 驗算明細（一行一項、金額靠右）
  const vline2=(label,val,opt={})=>`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:5px 0;border-bottom:1px solid var(--line)${opt.strong?';font-weight:700':''}${opt.sub?';color:var(--muted);font-size:12px':''}"><span>${label}</span><span class="num" style="white-space:nowrap${opt.color?';color:'+opt.color:''}">${val}</span></div>`;
  const vhead2=(t,key)=>`<div style="font-weight:700;font-size:13px;margin:14px 0 4px;color:var(--accent);display:flex;align-items:center;gap:8px">${key?`<input type="checkbox" data-yvsel="${key}" ${yeVerifySel[key]!==false?'checked':''} style="width:15px;height:15px">`:''}<span>${t}</span></div>`;
  const txDetail2=(arr,color)=>`<details style="margin:2px 0 4px 0"><summary style="cursor:pointer;font-size:12px;color:var(--info)">明細（${arr.length} 筆）</summary><div style="padding-left:8px">${arr.map(t=>vline2(`${esc(t.date||'')}　${esc(t.note||'—')}`,money(t.amount),{sub:true,color})).join('')||'<div class="sub" style="padding:4px 0">無</div>'}</div></details>`;
  const fundLines=[...allDeals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{const c=dealCalc(d);return vline2(`${esc(d.name)}<span style="color:var(--muted);font-size:11px">　金額${money(d.amount)}・成本${money(d.cost)}・稅${money(c.tax)}</span>`,money(c.fund),{sub:false});}).join('');
  const bonusLines=partners.map(p=>{
    const items=allDeals.filter(d=>d.ownerId===p.id);
    if(items.length===0) return '';
    const sub=items.map(d=>{const c=dealCalc(d);return vline2(`　${esc(d.name)}`,money(c.bonus),{sub:true});}).join('');
    return vhead2(`${esc(p.name)} 獎金`)+sub+vline2('小計',money(bonusByP[p.id]||0),{strong:true,color:'var(--accent)'});
  }).join('');
  const accLines=state.accounts.map(a=>{
    const innTx=state.ledger.filter(t=>t.accId===a.id&&t.kind==='in').sort((x,y)=>(y.date||'').localeCompare(x.date||''));
    const outTx=state.ledger.filter(t=>t.accId===a.id&&t.kind==='out').sort((x,y)=>(y.date||'').localeCompare(x.date||''));
    const inn=innTx.reduce((s,t)=>s+(Number(t.amount)||0),0);
    const out=outTx.reduce((s,t)=>s+(Number(t.amount)||0),0);
    const op=Number(a.opening)||0;
    return vhead2(esc(a.name))+vline2('期初',money(op))
      +vline2('＋ 收入',money(inn),{color:'var(--accent)'})+txDetail2(innTx,'var(--accent)')
      +vline2('− 支出',money(out),{color:'var(--danger)'})+txDetail2(outTx,'var(--danger)')
      +vline2('＝ 餘額',money(op+inn-out),{strong:true});
  }).join('');
  const verifyYE=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <details style="flex:1;min-width:200px"><summary style="cursor:pointer;font-size:14px;font-weight:600">驗算明細（核對用，點開）</summary>
      <div style="margin-top:4px">
        ${vhead2('① 帳面公積金 = 各案場逐筆相加','a')}
        ${fundLines||'<div class="sub" style="padding:5px 0">無</div>'}
        ${vline2('公積金合計',money(bookFund),{strong:true})}
        ${vhead2('② 各股東獎金 = 該股東各案相加','b')}
        ${bonusLines||'<div class="sub" style="padding:5px 0">無</div>'}
        ${vhead2('③ 各帳戶餘額 = 期初 + 收入 − 支出','c')}
        ${accLines||'<div class="sub" style="padding:5px 0">無</div>'}
      </div>
      </details>
      <button class="btn" id="ye-verify-pdf" style="align-self:flex-start">匯出勾選 PDF</button>
    </div>
    <p class="sub" style="margin:6px 0 0">勾選①②③要匯出的段落，按「匯出勾選 PDF」。</p>
  </div>`;
  return `
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">年度總結</div>
    <p class="sub">不管錢進哪個帳戶，把所有分潤的公積金、各股東獎金加總，看完整帳面，一個股東都不漏。可選分潤日期區間（例如某一年度）。</p>
    ${dateInputs}
  </div>
  <div class="metrics">
    <div class="metric"><div class="l">帳面公積金（全部分潤）</div><div class="v" style="font-size:19px">${money(bookFund)}</div></div>
    <div class="metric"><div class="l">各帳戶實際餘額合計</div><div class="v" style="font-size:19px">${money(totalAcc)}</div></div>
  </div>
  ${verifyYE}
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">說明</div>
    <p class="sub">「帳面公積金」是所有案場分潤後該進公積金的總和（不管錢實際在哪個帳戶）。下面「各帳戶帳面公積金」把它依「錢進哪個帳戶」分開，讓你看出每個帳戶裡有多少是公積金。年底你再看兩個公積金帳戶（東澤、廣昕）的實際餘額，決定怎麼把公積金補足、平衡兩邊。</p>
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">各帳戶帳面公積金（依錢進的帳戶分組）</div>
    ${accPendRows===''?'<div class="empty">尚無分潤。</div>':`<table><thead><tr><th>錢在哪個帳戶</th><th class="num">帳面公積金</th></tr></thead><tbody>${accPendRows}<tr class="total-row" style="font-weight:600"><td>合計</td><td class="num">${money(bookFund)}</td></tr></tbody></table>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">公積金明細（每筆分潤＋錢在哪個帳戶）</div>
    ${unpostedRows===''?'<div class="empty">沒有分潤。</div>':`<div class="scroll"><table><thead><tr><th>案場</th><th class="num">應進公積金</th><th>錢在哪個帳戶</th></tr></thead><tbody>${unpostedRows}</tbody></table></div>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">各帳戶實際餘額</div>
    ${accRows===''?'<div class="empty">尚無帳戶。</div>':`<table><thead><tr><th>帳戶</th><th class="num">目前餘額</th></tr></thead><tbody>${accRows}<tr class="total-row" style="font-weight:600"><td>合計</td><td class="num">${money(totalAcc)}</td></tr></tbody></table>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">各股東年度概覽</div>
    ${partnerRows===''?'<div class="empty">尚未標記股東。</div>':`<table><thead><tr><th>股東</th><th class="num">年度總獎金（分潤）</th><th class="num">借支未還</th></tr></thead><tbody>${partnerRows}</tbody></table>`}
  </div>`;
}

function exportYearVerify(){
  const inRange=d=> (!yearFrom||d>=yearFrom) && (!yearTo||d<=yearTo);
  const partners=state.employees.filter(e=>e.partner);
  const allDeals=state.deals.filter(d=>inRange(d.date));
  let bookFund=0; const bonusByP={};
  allDeals.forEach(d=>{ const c=dealCalc(d); bookFund+=c.fund; if(d.ownerId) bonusByP[d.ownerId]=(bonusByP[d.ownerId]||0)+c.bonus; });
  const row=(l,v)=>`<tr><td>${l}</td><td class="num">${v}</td></tr>`;
  let secs='';
  if(yeVerifySel.a!==false){
    const fr=[...allDeals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{const c=dealCalc(d);return row(esc(d.name)+'　<span style="color:#777;font-size:11px">金額'+money(d.amount)+'・成本'+money(d.cost)+'・稅'+money(c.tax)+'</span>',money(c.fund));}).join('');
    secs+=`<h2>① 帳面公積金 = 各案場逐筆相加</h2><table>${fr||row('—','')}${row('<b>公積金合計</b>','<b>'+money(bookFund)+'</b>')}</table>`;
  }
  if(yeVerifySel.b!==false){
    let bl='';
    partners.forEach(p=>{ const items=allDeals.filter(d=>d.ownerId===p.id); if(!items.length) return;
      bl+=`<tr><td colspan="2" style="font-weight:700">${esc(p.name)} 獎金</td></tr>`;
      bl+=items.map(d=>{const c=dealCalc(d);return row('　'+esc(d.name),money(c.bonus));}).join('');
      bl+=row('　<b>小計</b>','<b>'+money(bonusByP[p.id]||0)+'</b>');
    });
    secs+=`<h2>② 各股東獎金 = 該股東各案相加</h2><table>${bl||row('—','')}</table>`;
  }
  if(yeVerifySel.c!==false){
    let al='';
    state.accounts.forEach(a=>{
      const inn=state.ledger.filter(t=>t.accId===a.id&&t.kind==='in').reduce((s,t)=>s+(Number(t.amount)||0),0);
      const out=state.ledger.filter(t=>t.accId===a.id&&t.kind==='out').reduce((s,t)=>s+(Number(t.amount)||0),0);
      const op=Number(a.opening)||0;
      al+=`<tr><td colspan="2" style="font-weight:700">${esc(a.name)}</td></tr>`;
      al+=row('　期初',money(op))+row('　＋ 收入',money(inn))+row('　− 支出',money(out))+row('　<b>＝ 餘額</b>','<b>'+money(op+inn-out)+'</b>');
    });
    secs+=`<h2>③ 各帳戶餘額 = 期初 + 收入 − 支出</h2><table>${al||row('—','')}</table>`;
  }
  if(!secs){ alert('請至少勾選一個段落'); return; }
  const period=(yearFrom||yearTo)?`${yearFrom||'起'} ~ ${yearTo||'今'}`:'全部期間';
  printHTML('年度總結·驗算明細', `<h1>年度總結·驗算明細</h1><div class="meta">期間：${period}　|　列印日：${new Date().toISOString().slice(0,10)}</div>${secs}`);
}

loadLocal(); loadPhotos(); render(); loadCloud();
</script>
