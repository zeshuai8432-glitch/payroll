    <div class="scroll"><table>
      <thead><tr><th>員工</th><th class="num">本期實發</th><th class="num">未還借支</th><th class="num">仍欠公司</th></tr></thead>
      <tbody>${loanDebtRows}</tbody></table></div>
  </div>`}
  ${loanReminders===''?'':`<div class="card" style="border-color:var(--accent)">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">💡 本期借支扣款提示</div>
    <p class="sub">以下員工有未還清借支、且本期尚未扣款。輸入本期要扣的金額後按「加入扣款」，系統會帶入本期扣項。</p>
    <div class="scroll"><table>
      <thead><tr><th>員工</th><th class="num">尚欠</th><th class="num">本期扣款</th><th></th></tr></thead>
      <tbody>${loanReminders}</tbody></table></div>
  </div>`}
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">本期加項／扣項</div>
    <p class="sub">獎金、全勤為加項；借支扣還、勞健保自負額、工具遺失賠償等為扣項。日期請填在本計薪區間內，才會算進本期。</p>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>日期</label><input type="date" id="adj-date" value="${state.payTo||''}"></div>
      <div class="field"><label>員工</label><select id="adj-emp">${empOpts}</select></div>
      <div class="field"><label>性質</label><select id="adj-kind"><option value="add">加項（+）</option><option value="ded">扣項（−）</option></select></div>
      <div class="field"><label>項目</label><select id="adj-label">${addOpts}</select></div>
      <div class="field"><label>金額</label><input type="number" id="adj-amount" min="0" step="100" style="width:120px"></div>
      <div class="field" style="flex:1;min-width:140px"><label>備註（選填）</label><input id="adj-note" placeholder="例：6月借支"></div>
      <button class="btn" id="adj-add">＋ 新增</button>
    </div>
    ${adjRows===''?'<div class="empty">本期尚無加扣項。</div>':`<div class="scroll"><table>
      <thead><tr><th>日期</th><th>員工</th><th>項目</th><th class="num">金額</th><th>備註</th><th></th></tr></thead>
      <tbody>${adjRows}</tbody></table></div>`}
  </div>`;
}

function viewSites(){
  const comp=computeRecords(state.attendance);
  const bySite={};
  state.sites.forEach(s=>{ bySite[s.id]={hours:0,wage:0,allow:0,total:0,emp:{},opening:Number(s.opening)||0,manual:0}; });
  state.attendance.forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const s=bySite[r.siteId]=bySite[r.siteId]||{hours:0,wage:0,allow:0,total:0,emp:{},opening:0,manual:0};
    s.hours+=Number(r.hours)||0; s.wage+=c.wage; s.allow+=c.allow; s.total+=c.total;
    s.emp[r.empId]=(s.emp[r.empId]||0)+c.total;
  });
  state.costs.forEach(co=>{ const s=bySite[co.siteId]; if(s) s.manual+=Number(co.amount)||0; });
  Object.values(bySite).forEach(s=>{ s.grandTotal=s.total+(s.opening||0)+(s.manual||0); });
  const grand=Object.values(bySite).reduce((s,x)=>s+x.grandTotal,0);
  const ids=Object.keys(bySite).sort((a,b)=>bySite[b].grandTotal-bySite[a].grandTotal);
  const payerName=who=>({dz:'東澤',gx:'廣昕',py:'品佑'}[who]||who||'—');
  const cardFor=(sid)=>{ const s=bySite[sid]; const site=state.sites.find(x=>x.id===sid); const isCoop=site&&site.coop;
    const empBreak=Object.entries(s.emp).sort((a,b)=>b[1]-a[1]).map(([eid,v])=>`<tr><td>${esc(empName(eid))}</td><td class="num">${money(v)}</td></tr>`).join('');
    const pct=grand>0?Math.round(s.grandTotal/grand*100):0;
    const myCosts=state.costs.filter(c=>c.siteId===sid).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const costRows=myCosts.map(c=>{
      if(costEditId===c.id){
        return `<tr><td colspan="5" style="background:var(--bg)">
          <div class="row" style="margin:6px 0">
            <div class="field"><label>日期</label><input type="date" id="ce-date" value="${c.date||''}"></div>
            <div class="field" style="flex:1;min-width:120px"><label>項目</label><input id="ce-item" value="${esc(c.item||'')}"></div>
            <div class="field"><label>金額</label><input type="number" id="ce-amount" value="${c.amount||0}" min="0" step="1000" style="width:120px"></div>
            <div class="field"><label>誰支付</label><select id="ce-payer"><option value="dz" ${c.payer==='dz'?'selected':''}>東澤</option><option value="gx" ${c.payer==='gx'?'selected':''}>廣昕</option><option value="py" ${c.payer==='py'?'selected':''}>品佑</option></select></div>
            <button class="btn" data-costeditok="${c.id}">儲存</button>
            <button class="act muted" data-costeditcancel="1" style="cursor:pointer;height:36px">取消</button>
          </div>
        </td></tr>`;
      }
      const canReimb=(c.payer==='dz'||c.payer==='gx');
      const reimbCell=canReimb
        ? (c.reimbursed
            ? `<span class="tag" style="background:#e3efe9;color:var(--accent)">已報銷${c.reimbDate?' '+esc(c.reimbDate):''}</span><button class="act" data-unreimb="${c.id}">取消</button>`
            : `<button class="act" data-reimb="${c.id}" style="border:1px solid var(--danger);border-radius:6px;padding:0 10px;color:#fff;background:var(--danger)">待報銷·按此報銷</button>`)
        : '';
      const payerTag=c.payer==='dz'||c.payer==='gx'
        ? (c.reimbursed?'<span class="tag" style="background:#e3efe9;color:var(--accent)">已報銷</span>':'<span class="tag" style="background:var(--warn-bg);color:var(--warn-ink)">待報銷</span>')
        : '';
      return `<tr${(canReimb&&!c.reimbursed)?' style="background:#fff8f0"':''}><td>${esc(c.date||'')}</td><td>${c.subSite?subSiteTag(siteOptionValue(site.name,c.subSite)):''} ${esc(c.item||'')}</td><td class="num">${money(c.amount)}</td><td>${esc(payerName(c.payer))}${payerTag}</td><td>${reimbCell} <button class="act" data-costedit="${c.id}">改</button> <button class="act danger" data-delcost="${c.id}">刪</button></td></tr>`;
    }).join('');
    const byPayer={}; myCosts.forEach(c=>{ byPayer[c.payer||'—']=(byPayer[c.payer||'—']||0)+(Number(c.amount)||0); });
    const payerSummary=Object.keys(byPayer).length?`<div class="sub" style="margin:4px 0">各人墊付：${Object.entries(byPayer).map(([k,v])=>`${esc(payerName(k))} ${money(v)}`).join('、')}</div>`:'';
    return `<div class="card" ${isCoop?'style="border-left:3px solid #d98430"':''}>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <div style="font-size:15px;font-weight:600">${esc(siteName(sid))}${isCoop?'<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案場</span>':''}</div>
        <div style="font-size:18px;font-weight:600">${money(s.grandTotal)}</div>
      </div>
      <p class="sub">${isCoop?'手動成本明細加總':`總工數 ${gongStr(s.hours)}・系統工資 ${money(s.wage)}・津貼 ${money(s.allow)}`}${s.opening>0?`・期初 ${money(s.opening)}`:''}${s.manual>0?`・手動成本 ${money(s.manual)}`:''}・占總成本 ${pct}%</p>
      ${isCoop?'':`<div class="row" style="margin-bottom:6px">
        <div class="field"><label>期初人事成本（從Excel抄入，選填）</label><input type="number" data-opening="${sid}" value="${s.opening||''}" placeholder="未設定" min="0" step="1000" style="width:170px"></div>
      </div>`}
      ${payerSummary}
      <details data-sitecostdetails="${sid}" ${(siteCostDetailsOpen[sid]!==undefined?siteCostDetailsOpen[sid]:(isCoop||myCosts.some(c=>c.id===costEditId)))?'open':''}><summary>手動成本明細（${myCosts.length} 筆）</summary>
        <div class="row" style="margin:8px 0">
          <div class="field"><label>日期</label><input type="date" data-costdate="${sid}" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="field" style="flex:1;min-width:120px"><label>項目</label><input data-costitem="${sid}" placeholder="材料、工資、機具…"></div>
          <div class="field"><label>金額</label><input type="number" data-costamount="${sid}" min="0" step="1000" style="width:120px"></div>
          <div class="field"><label>誰支付</label><select data-costpayer="${sid}"><option value="dz">東澤</option><option value="gx">廣昕</option><option value="py">品佑</option></select></div>
          <button class="act" data-costadd="${sid}" style="border:1px solid var(--accent);border-radius:6px;padding:0 12px;color:var(--accent);height:36px">＋ 加成本</button>
        </div>
        ${costRows?`<table><thead><tr><th>日期</th><th>項目</th><th class="num">金額</th><th>誰付</th><th></th></tr></thead><tbody>${costRows}</tbody></table>`:'<div class="sub">尚無手動成本。</div>'}
      </details>
      ${empBreak&&!isCoop?`<details data-siteempdetails="${sid}" ${siteEmpDetailsOpen[sid]?'open':''}><summary>系統內各員工金額明細</summary>
        <table style="margin-top:8px"><thead><tr><th>員工</th><th class="num">金額</th></tr></thead><tbody>${empBreak}</tbody></table>
      </details>`:''}
    </div>`;
  };
  const isPaused=sid=>{ const st=state.sites.find(x=>x.id===sid); return st&&st.active===false; };
  const activeIds=ids.filter(sid=>!isPaused(sid));
  const pausedIds=ids.filter(sid=>isPaused(sid));
  const cards=activeIds.map(cardFor).join('');
  const pausedCards=pausedIds.length?`<details ${detailAttrs('site-cost-paused')} style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedIds.length}）</summary>${pausedIds.map(cardFor).join('')}</details>`:'';
  // 東澤/廣昕 墊付報銷彙總（跨所有案場的手動成本，標示案場）
  const reimb={dz:{total:0,done:0},gx:{total:0,done:0}};
  state.costs.forEach(c=>{ if(c.payer==='dz'||c.payer==='gx'){ const amt=Number(c.amount)||0; reimb[c.payer].total+=amt; if(c.reimbursed) reimb[c.payer].done+=amt; } });
  const personBlock=(k)=>{
    if(reimb[k].total<=0) return '';
    const pending=reimb[k].total-reimb[k].done;
    // 待報銷的逐筆（標示案場）
    const items=state.costs.filter(c=>c.payer===k && !c.reimbursed).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    const byline=items.map(c=>{
      const sName=siteName(c.siteId)||'（未知案場）';
      return `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--line)">
        <span><b>${esc(sName)}</b>　<span style="color:var(--muted);font-size:12px">${esc(c.date||'')}　${esc(c.item||'')}</span></span>
        <span style="display:flex;align-items:center;gap:8px;white-space:nowrap"><span class="num">${money(c.amount)}</span><button class="act" data-reimb="${c.id}" style="border:1px solid var(--info);border-radius:6px;padding:0 8px;color:var(--info)">報銷</button></span>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-weight:600;padding:4px 0">
        <span>${payerName(k)}</span>
        <span class="num">墊付 ${money(reimb[k].total)}　已報銷 <span style="color:var(--accent)">${money(reimb[k].done)}</span>　待報銷 <span style="color:${pending>0?'var(--danger)':'var(--muted)'}">${money(pending)}</span></span>
      </div>
      ${pending>0?`<details ${detailAttrs('site-cost-reimb-'+k,true)}><summary style="cursor:pointer;font-size:12px;color:var(--info);padding:2px 0">待報銷明細（${items.length} 筆，哪個案場）</summary>${byline}</details>`:'<div class="sub" style="padding:2px 0">全部已報銷 ✓</div>'}
    </div>`;
  };
  const reimbCard=(reimb.dz.total>0||reimb.gx.total>0)?`
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">墊付報銷彙總（東澤／廣昕）</div>
    ${personBlock('dz')}${personBlock('gx')}
    <p class="sub" style="margin-top:6px">展開「待報銷明細」可看到是哪個案場、哪一筆，直接按「報銷」標記。此處只記錄報銷狀態，不會動到帳戶餘額。</p>
  </div>`:'';
  return `
  <div class="metrics">
    <div class="metric"><div class="l">案場數</div><div class="v">${activeIds.length}${pausedIds.length?`<span style="font-size:12px;color:var(--muted)"> +${pausedIds.length}暫停</span>`:''}</div></div>
    <div class="metric"><div class="l">總成本</div><div class="v">${money(grand)}</div></div>
  </div>
  ${reimbCard}
  <p class="sub" style="margin:-6px 0 12px">一般案場成本＝期初＋出勤工資津貼＋手動成本；合作案場（橙色）成本＝手動成本明細加總（日期/項目/金額/誰付）。<button class="btn" id="export-sites" style="margin-left:10px" ${ids.length===0?'disabled style="opacity:.5"':''}>匯出 PDF</button></p>
  ${cards===''&&pausedCards===''?'<div class="card"><div class="empty">尚無案場成本資料。</div></div>':cards}${pausedCards}`;
}

function viewManage(){
  const empRows=state.employees.map(e=>{
    const hasRecords=state.attendance.some(r=>r.empId===e.id);
    const delBtn=hasRecords?'<span class="act muted" title="已有出工紀錄，無法刪除">🔒</span>':`<button class="act danger" data-delemp="${e.id}">刪</button>`;
    const toggle=e.active?`<button class="act" data-toggle="${e.id}">停用</button>`:`<button class="act" data-toggle="${e.id}">復用</button>`;
    return `<tr><td>${esc(e.name)}${e.partner?'<span class="tag" style="background:#e3efe9;color:var(--accent)">股東</span>':''}${!e.active?'<span class="tag">已停用</span>':''}</td>
      <td class="num">${money(e.daily)}</td>
      <td><button class="act" data-renemp="${e.id}">改名</button></td>
      <td><button class="act" data-raise="${e.id}">調薪</button></td>
      <td><button class="act" data-partner="${e.id}">${e.partner?'取消股東':'設為股東'}</button></td>
      <td>${toggle}</td><td>${delBtn}</td></tr>`;
  }).join('');
  const siteRowFor=(s)=>{
    const hasRecords=state.attendance.some(r=>r.siteId===s.id);
    const delBtn=hasRecords?'<span class="act muted" title="已有出工紀錄，無法刪除">🔒</span>':`<button class="act danger" data-delsite="${s.id}">刪</button>`;
    const paused=s.active===false;
    const toggle=`<button class="act" data-togglesite="${s.id}">${paused?'恢復啟用':'暫停'}</button>`;
    const nameCell=`${esc(s.name)}${s.coop?'<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案</span>':(s.type?`<span class="tag" style="background:#e3efe9;color:var(--accent)">${esc(s.type)}</span>`:'')}${(s.clientOwner||s.siteClientOwner||s.ownerName)?`<span class="tag" style="background:#eef2f7;color:var(--info)">業主：${esc(s.clientOwner||s.siteClientOwner||s.ownerName)}</span>`:''}${paused?'<span class="tag" style="background:var(--warn-bg);color:var(--warn-ink)">已暫停</span>':''}`;
    const contractVal=(s.contract!==undefined&&s.contract!=='')?s.contract:(state.contracts[s.name]||'');
    const curType=s.type||(s.coop?'合作案':'代工');
    const applyUnit=s.applyUnit||s.contractCompany||s.company||'';
    const clientOwner=s.clientOwner||s.siteClientOwner||s.ownerName||'';
    const importCandidates=state.sites.filter(x=>x.id!==s.id && x.active!==false && !x.parentSiteId && !(x.coop||x.type==='合作案') && !subSitesOf(s).includes(x.name));
    const settings=`<tr${paused?' style="color:var(--muted)"':''}><td colspan="4" style="padding-top:0">
      <details ${siteSettingsOpen[s.id]?'open':''} data-sitesettings="${s.id}" style="margin:2px 0 8px"><summary style="cursor:pointer;font-size:12px;color:var(--info)">案場設定（類型／稅率／負責人／帳戶／申請單位／業主）</summary>
        <div class="row" style="margin:8px 0 4px">
          <div class="field"><label>類型</label><select data-sitetype="${s.id}">${['代工','連工代料','業主分潤','合作案','舊制'].map(t=>`<option value="${t}" ${curType===t?'selected':''}>${t}${t==='合作案'?'（50/50）':t==='舊制'?'（全進公積金）':'（30/70）'}</option>`).join('')}</select></div>
          <div class="field"><label>稅率 %</label><input type="number" data-sitetax="${s.id}" value="${s.siteTaxPct!==undefined?s.siteTaxPct:(s.coopTaxPct||0)}" min="0" max="100" step="0.5" style="width:90px"></div>
          <div class="field"><label>負責人</label><select data-siteowner="${s.id}"><option value="">（未指定）</option>${state.employees.filter(e=>e.partner).map(p=>`<option value="${p.id}" ${s.siteOwnerId===p.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
          <div class="field"><label>錢進哪個帳戶</label><select data-siteacc="${s.id}"><option value="">（未指定）</option>${state.accounts.map(a=>`<option value="${a.id}" ${s.siteAcc===a.id?'selected':''}>${esc(a.name)}</option>`).join('')}</select></div>
          ${curType==='合作案'?`<div class="field"><label>管理人(你們)佔 %</label><input type="number" data-sitemgr="${s.id}" value="${s.coopMgrPct!==undefined?s.coopMgrPct:50}" min="0" max="100" step="5" style="width:120px"></div>`:''}
          <div class="field"><label>合約總額（選填）</label><input type="number" data-sitecontract="${s.id}" value="${contractVal}" placeholder="未設定" min="0" step="10000" style="width:140px"></div>
          <div class="field" style="flex:1;min-width:180px"><label>申請單位（簽約公司）</label><input data-siteapplyunit="${s.id}" list="company-memory-list" value="${esc(applyUnit)}" placeholder="例：東澤工程有限公司"></div>
          <div class="field" style="flex:1;min-width:160px"><label>業主</label><input data-siteclientowner="${s.id}" list="client-memory-list" value="${esc(clientOwner)}" placeholder="例：王先生、四季酒店"></div>
        </div>
        ${curType==='合作案'?`<div style="margin:6px 0 10px;padding:10px;background:var(--bg);border-radius:10px">
          <div style="font-size:12px;font-weight:700;margin-bottom:6px;color:var(--muted)">樓層 / 子案場</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px">${subSitesOf(s).map(sub=>`<span class="tag" style="background:#eef6ff;color:#1d4ed8;border-color:#bfdbfe;gap:6px">${esc(sub)} <select data-subtype="${s.id}" data-subsite="${esc(sub)}" style="height:24px;border:1px solid #bfdbfe;border-radius:6px;background:white;color:#1d4ed8;font-size:12px">${SUB_SITE_TYPES.map(t=>`<option value="${t}" ${subSiteType(s,sub)===t?'selected':''}>${t}</option>`).join('')}</select><button class="act" data-rensubsite="${s.id}" data-subsite="${esc(sub)}" style="height:22px;padding:0 6px;margin-left:2px;font-size:11px;color:var(--info)">改名</button><button class="act" data-extractsubsite="${s.id}" data-subsite="${esc(sub)}" style="height:22px;padding:0 6px;margin-left:2px;font-size:11px;color:var(--info)">拉出</button><button class="act danger" data-delsubsite="${s.id}" data-subsite="${esc(sub)}" style="height:22px;padding:0 6px;margin-left:2px;font-size:11px">刪</button></span>`).join('')||'<span class="sub" style="margin:0">尚未設定樓層。</span>'}</div>
          <div class="row">
            <div class="field" style="flex:1;min-width:160px"><label>新增樓層</label><input data-subsiteinput="${s.id}" placeholder="例：9F、10F、A棟"></div>
            <button class="act" data-addsubsite="${s.id}" style="border:1px solid var(--accent);border-radius:6px;padding:0 12px;color:var(--accent);height:36px">＋ 加樓層</button>
          </div>
          <div class="row" style="margin-top:8px;border-top:1px dashed var(--line);padding-top:8px">
            <div class="field" style="flex:1;min-width:220px"><label>收納既有案場為子案場</label><select data-importsubsite="${s.id}"><option value="">選擇已建立的子樓層案場</option>${importCandidates.map(x=>`<option value="${x.id}">${esc(x.name)}${x.type?`（${esc(x.type)}）`:''}</option>`).join('')}</select></div>
            <button class="act" data-importsubsitebtn="${s.id}" style="border:1px solid var(--info);border-radius:6px;padding:0 12px;color:var(--info);height:36px">收納到合作案底下</button>
          </div>
        </div>`:''}
        <p class="sub" style="margin:0 0 8px">申請單位會帶到請款單／追加單 PDF。改類型會影響分潤算法。代工/連工代料/業主分潤＝（總請款−成本−稅）做30/70；合作案＝（總請款−案場成本）對拆；舊制全進公積金。改設定後請款的分潤會自動跟著重算。</p>
        <button class="btn" data-sitesave="${s.id}">✓ 儲存設定</button>
        <span data-sitesaved="${s.id}" style="margin-left:10px;color:var(--accent);font-weight:600;display:none">已儲存 ✓</span>
      </details>
    </td></tr>`;
    return `<tr${paused?' style="color:var(--muted)"':''}><td>${nameCell}</td><td><button class="act" data-rensite="${s.id}">改名</button></td><td>${toggle}</td><td>${delBtn}</td></tr>${settings}`;
  };
  const activeSitesList=state.sites.filter(s=>s.active!==false&&!s.parentSiteId);
  const pausedSitesList=state.sites.filter(s=>s.active===false&&!s.parentSiteId);
  const siteRows=activeSitesList.map(siteRowFor).join('');
  const pausedSiteTable=pausedSitesList.length?`<details ${detailAttrs('manage-paused-sites')} style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedSitesList.length}）</summary><table><tbody>${pausedSitesList.map(siteRowFor).join('')}</tbody></table></details>`:'';
  return `
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">員工</div>

    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>姓名</label><input id="e-name" placeholder="例：潘東澤"></div>
      <div class="field"><label>日薪</label><input id="e-daily" type="number" min="0" step="100" value="3000" style="width:120px"></div>
      <button class="btn" id="e-add">＋ 新增員工</button>
    </div>
    ${state.employees.length===0?'<div class="empty">尚無員工。</div>':`<table><thead><tr><th>姓名</th><th class="num">目前日薪</th><th></th><th></th><th></th><th></th><th></th></tr></thead><tbody>${empRows}</tbody></table>`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">案場</div>
    <p class="sub">建案場時設好<b>類型、稅率、負責人、錢進哪個帳戶、申請單位、業主</b>，之後請款追蹤一輸入，系統就自動算分潤、自動進帳戶；請款單／追加單 PDF 也會自動帶申請單位。<b>代工／公司分潤</b>＝（總請款−稅）做30/70；<b>合作案</b>＝（總請款−案場成本）對拆、不出現在出工登記、成本記「案場成本」頁。改名會套用到所有相關紀錄。</p>
    <div class="row" style="margin-bottom:8px">
      <div class="field" style="flex:1;min-width:180px"><label>案場名稱</label><input id="s-name" placeholder="例：台北富邦"></div>
      <div class="field"><label>類型</label><select id="s-type">${['代工','連工代料','業主分潤','合作案','舊制'].map(t=>`<option value="${t}">${t}${t==='合作案'?'（50/50）':t==='舊制'?'（全進公積金）':'（30/70）'}</option>`).join('')}</select></div>
      <div class="field"><label>稅率 %</label><input type="number" id="s-tax" min="0" max="100" step="0.5" value="0" style="width:90px"></div>
    </div>
    <div class="row" style="margin-bottom:10px">
      <div class="field"><label>負責人</label><select id="s-owner"><option value="">（未指定）</option>${state.employees.filter(e=>e.partner).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div>
      <div class="field"><label>錢進哪個帳戶</label><select id="s-acc"><option value="">（未指定）</option>${state.accounts.map(a=>`<option value="${a.id}">${esc(a.name)}</option>`).join('')}</select></div>
      <div class="field" style="flex:1;min-width:180px"><label>申請單位（簽約公司）</label><input id="s-applyunit" list="company-memory-list" placeholder="例：東澤工程有限公司"></div>
      <div class="field" style="flex:1;min-width:160px"><label>業主</label><input id="s-clientowner" list="client-memory-list" placeholder="例：王先生、四季酒店"></div>
      <div class="field" id="s-mgr-wrap" style="display:none"><label>管理人(你們)佔 %</label><input type="number" id="s-mgrpct" min="0" max="100" step="5" value="50" style="width:120px"></div>
      <button class="btn" id="s-add">＋ 新增案場</button>
    </div>
    ${state.sites.length===0?'<div class="empty">尚無案場。</div>':`${activeSitesList.length?`<table><thead><tr><th>名稱</th><th></th><th></th><th></th></tr></thead><tbody>${siteRows}</tbody></table>`:'<div class="empty">沒有啟用中的案場。</div>'}${pausedSiteTable}`}
    ${dataListHtml('client-memory-list', knownClients())}
    ${dataListHtml('company-memory-list', knownCompanies())}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">資料備份與還原</div>
    <p class="sub" style="margin:0 0 10px">「匯出備份」把目前全部資料存成一個檔案下載保存；「匯入還原」讀回備份檔、覆蓋現在的資料。建議每週匯出一份存到雲端／檔案App，做大動作（例如重算、大量改資料）前也先匯出一份。</p>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn" id="backup-export">⬇︎ 匯出備份</button>
      <button class="act" id="backup-import-btn" style="border:1px solid var(--info);border-radius:8px;padding:0 14px;height:38px;color:var(--info)">⬆︎ 匯入還原…</button>
      <input type="file" id="backup-import-file" accept="application/json,.json" style="display:none">
      <span class="sub" id="backup-status" style="margin:0"></span>
    </div>
  </div>`;
}

function bind(){
  const bkE=document.getElementById('backup-export'); if(bkE) bkE.onclick=()=>exportBackup();
  const bkBtn=document.getElementById('backup-import-btn'); const bkFile=document.getElementById('backup-import-file');
  if(bkBtn&&bkFile){ bkBtn.onclick=()=>bkFile.click(); bkFile.onchange=()=>{ if(bkFile.files&&bkFile.files[0]) importBackup(bkFile.files[0]); bkFile.value=''; }; }
  document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; closeSidebar(); render(); });
  document.querySelectorAll('[data-goto]').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.goto; render(); });
  document.querySelectorAll('[data-sitetoggle]').forEach(b=>b.onclick=()=>{ const id=b.dataset.sitetoggle; dashSiteOpen[id]=!dashSiteOpen[id]; render(); });
  const dtp=document.getElementById('dash-thisperiod'); if(dtp) dtp.onclick=()=>{ const d=defaultPayRange(); state.payFrom=d.from; state.payTo=d.to; render(); };
  const dlp=document.getElementById('dash-lastperiod'); if(dlp) dlp.onclick=()=>{ const d=prevPayRange(); state.payFrom=d.from; state.payTo=d.to; render(); };
  const si=document.getElementById('search-input'); if(si) si.oninput=()=>{ searchQuery=si.value; render(); const n=document.getElementById('search-input'); if(n){ n.focus(); const v=n.value; try{ n.setSelectionRange(v.length,v.length); }catch(e){} } };
  const sc=document.getElementById('search-clear'); if(sc) sc.onclick=()=>{ searchQuery=''; render(); const n=document.getElementById('search-input'); if(n) n.focus(); };
  const yiPrev=document.getElementById('yi-prev'); if(yiPrev) yiPrev.onclick=()=>{ yearIncomeYear--; render(); };
  const yiNext=document.getElementById('yi-next'); if(yiNext) yiNext.onclick=()=>{ yearIncomeYear++; render(); };
  const yiYear=document.getElementById('yi-year'); if(yiYear) yiYear.onchange=()=>{ const v=parseInt(yiYear.value,10); if(v>=2000&&v<=2100){ yearIncomeYear=v; render(); } };
  const yiPdf=document.getElementById('yi-pdf'); if(yiPdf) yiPdf.onclick=()=>printYearIncome();
  const yiCsv=document.getElementById('yi-csv'); if(yiCsv) yiCsv.onclick=()=>exportYearIncomeCSV();
  document.querySelectorAll('[data-toggle-form]').forEach(b=>b.onclick=()=>{ const k=b.dataset.toggleForm; formOpen[k]=!formOpen[k]; render(); });

  const pf=document.getElementById('pay-from'); if(pf) pf.onchange=()=>{ state.payFrom=pf.value; render(); };
  const pt=document.getElementById('pay-to'); if(pt) pt.onchange=()=>{ state.payTo=pt.value; render(); };
  const pm=document.getElementById('pay-thismonth'); if(pm) pm.onclick=()=>{ const d=defaultPayRange(); state.payFrom=d.from; state.payTo=d.to; render(); };
  const plm=document.getElementById('pay-lastmonth'); if(plm) plm.onclick=()=>{ const d=prevPayRange(); state.payFrom=d.from; state.payTo=d.to; render(); };
  const pa=document.getElementById('pay-all'); if(pa) pa.onclick=()=>{ state.payFrom=''; state.payTo=''; render(); };
  const tp=document.getElementById('toggle-partners'); if(tp) tp.onclick=()=>{ state.showPartners=!state.showPartners; render(); };
  const psw=document.getElementById('payslip-workdetails'); if(psw) psw.onchange=()=>{ payslipShowWorkDetails=psw.checked; };
  const lf=document.getElementById('loan-from'); if(lf) lf.onchange=()=>{ loanFrom=lf.value; render(); };
  const lt=document.getElementById('loan-to'); if(lt) lt.onchange=()=>{ loanTo=lt.value; render(); };
  const ltp=document.getElementById('loan-thisperiod'); if(ltp) ltp.onclick=()=>{ const d=defaultPayRange(); loanFrom=d.from; loanTo=d.to; render(); };
  const llp=document.getElementById('loan-lastperiod'); if(llp) llp.onclick=()=>{ const d=prevPayRange(); loanFrom=d.from; loanTo=d.to; render(); };
  const laAll=document.getElementById('loan-all'); if(laAll) laAll.onclick=()=>{ loanFrom=''; loanTo=''; render(); };

  // 加扣項：性質改變時切換項目清單
  const adjKind=document.getElementById('adj-kind'), adjLabel=document.getElementById('adj-label');
  if(adjKind&&adjLabel) adjKind.onchange=()=>{
    const opts=(adjKind.value==='add'?ADD_TYPES:DED_TYPES).map(t=>`<option value="${t}">${t}</option>`).join('');
    adjLabel.innerHTML=opts;
  };
  const adjAdd=document.getElementById('adj-add');
  if(adjAdd) adjAdd.onclick=()=>{
    const date=document.getElementById('adj-date').value;
    const empId=document.getElementById('adj-emp').value;
    const kind=document.getElementById('adj-kind').value;
    const label=document.getElementById('adj-label').value;
    const amount=parseFloat(document.getElementById('adj-amount').value);
    const note=document.getElementById('adj-note').value.trim();
    if(!date||!empId||!label||isNaN(amount)||amount<0) return;
    // 全勤獎金提醒：該員工在該筆所屬計薪週期內若有「請假」，提醒
    if(label.indexOf('全勤')>=0){
      const per=periodOf(date); // {from,to}
      const leaves=state.attendance.filter(r=>r.empId===empId && r.kind==='leave' && r.date>=per.from && r.date<=per.to);
      if(leaves.length>0){
        const emp=state.employees.find(e=>e.id===empId);
        const days=leaves.map(r=>r.date+(r.half?'(半天)':'')).sort().join('、');
        if(!confirm(`提醒：${emp?emp.name:''} 在本期（${per.from} ~ ${per.to}）有請假 ${leaves.length} 次（${days}）。\n\n請假會破全勤。確定還是要給全勤獎金嗎？`)) return;
      }
    }
    state.adjustments.push({id:uid(),date,empId,kind,label,amount,note});
    saveData(); render();
  };
  document.querySelectorAll('[data-deladj]').forEach(b=>b.onclick=()=>{ if(!confirm('確定刪除這筆加扣項？')) return; state.adjustments=state.adjustments.filter(a=>a.id!==b.dataset.deladj); saveData(); render(); });
  const es=document.getElementById('export-summary'); if(es) es.onclick=()=>exportSummaryPDF();
  const ppw=document.getElementById('post-park-wage'); if(ppw) ppw.onclick=()=>postParkWage();
  const snp=document.getElementById('snapshot-payroll'); if(snp) snp.onclick=()=>snapshotPayroll();
  document.querySelectorAll('[data-snapprint]').forEach(b=>b.onclick=()=>printSnapshot(b.dataset.snapprint));
  document.querySelectorAll('[data-snapdel]').forEach(b=>b.onclick=()=>deleteSnapshot(b.dataset.snapdel));
  const ed=document.getElementById('export-deals'); if(ed) ed.onclick=()=>exportDealsPDF();
  const eds=document.getElementById('export-deals-sel'); if(eds) eds.onclick=()=>exportDealsPDF(true);
  const rbi=document.getElementById('rebuild-income'); if(rbi) rbi.onclick=()=>{
    if(!confirm('重建所有分潤的「帳戶自動進帳」？\n會先清掉舊的自動進帳，再依每筆分潤的「錢進哪個帳戶」重新產生（代工/公司分潤＝金額−稅）。\n你手動記的收支不受影響。')) return;
    rebuildAllDealIncome(); saveData(); render();
  };
  const rsd=document.getElementById('resync-deals'); if(rsd) rsd.onclick=()=>{
    if(!confirm('重算所有案場分潤？\n\n會依各案場目前的「請款＋成本（期初/出工工資/手動）」重新計算每個案場的分潤與帳戶進帳，並清掉「對不上案場或已無請款」的殘留分潤。\n\n你在「進階」手動補的分潤不受影響。')) return;
    state.deals.filter(d=>d.autoSiteId).forEach(d=>{
      const s=state.sites.find(x=>x.id===d.autoSiteId);
      const tot=s?dealBillBasisForSite(s):0;
      if(!s || tot<=0){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    });
    state.deals.filter(d=>!d.autoSiteId).forEach(d=>{
      const s=state.sites.find(x=>x.name===d.name && !(x.coop||x.type==='合作案'));
      const tot=s?dealBillBasisForSite(s):0;
      if(s && tot>0){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id && t.fromDeal!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    });
    resyncAllSiteDeals();
    saveData(); render();
    alert('已重算所有案場分潤。請檢查分潤頁與各帳戶餘額。');
  };
  const wdb=document.getElementById('wipe-deals-bills'); if(wdb) wdb.onclick=()=>{
    const nDeals=state.deals.length, nBills=state.billings.length;
    if(!confirm(`即將清空：\n・分潤結算 ${nDeals} 筆\n・請款追蹤 ${nBills} 筆\n・以及分潤產生的「帳戶自動進帳」收入\n\n員工、案場、出工、公積金帳戶收支（含品佑垫付）、借支等都會保留。\n\n確定要清空嗎？`)) return;
    if(!confirm('再確認一次：這個動作無法復原。真的要清空分潤與請款嗎？')) return;
    state.deals=[];
    state.billings=[];
    state.ledger=state.ledger.filter(t=>!t.autoDealId && !t.fromDeal);
    state.sites.forEach(s=>{ delete s.coopCarriedTo; });
    saveData(); render();
    alert('已清空分潤與請款。其他資料保留。');
  };  document.querySelectorAll('[data-dealpick-cb]').forEach(cb=>cb.onchange=()=>{ dealSel[cb.dataset.dealpickCb]=cb.checked; });
  const dsa=document.getElementById('deals-selall'); if(dsa) dsa.onclick=()=>{ state.deals.forEach(d=>{ if(d.type==='代工'||d.type==='公司分潤'||d.type==='分潤/代料'||(d.type!=='合作案')) dealSel[d.id]=true; }); render(); };
  const dsn=document.getElementById('deals-selnone'); if(dsn) dsn.onclick=()=>{ dealSel={}; render(); };
  const eb=document.getElementById('export-billing'); if(eb) eb.onclick=()=>exportBillingPDF();
  const esi=document.getElementById('export-sites'); if(esi) esi.onclick=()=>exportSitesPDF();
  document.querySelectorAll('[data-payslip]').forEach(b=>b.onclick=()=>exportPayslipPDF(b.dataset.payslip));

  const gotoM=document.getElementById('goto-manage'); if(gotoM) gotoM.onclick=()=>{ state.tab='manage'; render(); };

  const fDate=document.getElementById('f-date');
  if(fDate){
    fDate.oninput=()=>{ entryDate=fDate.value; };
    fDate.onchange=()=>{ entryDate=fDate.value; refreshEntryTodayNote(); };
    fDate.onblur=()=>{ entryDate=fDate.value; const fe=document.getElementById('f-emp'); if(fe) entryEmp=fe.value; refreshEntryTodayNote(); };
  }
  const fEmp=document.getElementById('f-emp'); if(fEmp) fEmp.onchange=()=>{ entryEmp=fEmp.value; };
  const fKind=document.getElementById('f-kind'); if(fKind) fKind.onchange=()=>{
    entryKind=fKind.value;
    const show=fKind.value==='work';
    document.querySelectorAll('.f-work-only').forEach(el=>{ el.style.display=show?'':'none'; });
    document.querySelectorAll('.f-leave-only').forEach(el=>{ el.style.display=(fKind.value!=='work')?'':'none'; });
    // 請假長度欄位只在「請假」時顯示
    const halfWrap=document.getElementById('f-half'); if(halfWrap&&halfWrap.closest('.field')) halfWrap.closest('.field').style.display=(fKind.value==='leave')?'':'none';
  };

  // 多案場輸入：各行欄位變更 → 只更新草稿，不重繪（避免跳動）
  const syncEntryLinesFromDOM=()=>{
    document.querySelectorAll('.entry-line').forEach(row=>{
      const i=+row.dataset.lineidx; if(isNaN(i)||!entryLines[i]) return;
      const s=row.querySelector(`[data-line-site="${i}"]`); if(s) entryLines[i].siteId=s.value;
      const h=row.querySelector(`[data-line-hours="${i}"]`); if(h) entryLines[i].hours=h.value;
      const o=row.querySelector(`[data-line-ot="${i}"]`); if(o) entryLines[i].overtime=o.value;
      const n=row.querySelector(`[data-line-night="${i}"]`); if(n) entryLines[i].night=n.checked;
    });
  };
  document.querySelectorAll('[data-line-site],[data-line-hours],[data-line-ot],[data-line-night]').forEach(el=>{
    el.onchange=()=>syncEntryLinesFromDOM();
  });
  const addLineBtn=document.getElementById('f-addline');
  if(addLineBtn) addLineBtn.onclick=()=>{ syncEntryLinesFromDOM(); ensureEntryLines(); entryLines.push({siteId:'',hours:'8',overtime:'0',night:false}); render(); };
  document.querySelectorAll('[data-line-remove]').forEach(b=>b.onclick=()=>{ syncEntryLinesFromDOM(); const i=+b.dataset.lineRemove; entryLines.splice(i,1); ensureEntryLines(); render(); });

  // 請假/休假送出（單筆）
  const addLeave=document.getElementById('f-add-leave');
  if(addLeave) addLeave.onclick=()=>{
    const date=document.getElementById('f-date').value;
    const empId=document.getElementById('f-emp').value;
    const kind=document.getElementById('f-kind').value;
    const emp=state.employees.find(e=>e.id===empId);
    if(!date||!empId||!emp||kind==='work') return;
    const label=kind==='leave'?'請假':'休假';
    const half=(kind==='leave' && document.getElementById('f-half') && document.getElementById('f-half').value==='half');
    const dup=state.attendance.find(r=>r.empId===empId&&r.date===date&&r.kind===kind);
    if(dup){ alert(`${emp.name} 在 ${date} 已經登記過${label}了。`); return; }
    state.attendance.push({id:uid(),date,empId,kind,half:half||false});
    entryDate=date; entryEmp=empId;
    saveData(); render();
  };

  // 出工送出（多案場一次）
  const add=document.getElementById('f-add');
  if(add) add.onclick=()=>{
    syncEntryLinesFromDOM();
    const date=document.getElementById('f-date').value;
    const empId=document.getElementById('f-emp').value;
    const emp=state.employees.find(e=>e.id===empId);
    if(!date||!empId||!emp){ alert('請先選日期和員工'); return; }
    // 整理有效行：要有案場，且工時或加班至少一個 > 0（或有過夜）
    const valid=[];
    for(const ln of entryLines){
      if(!ln.siteId) continue; // 沒選案場的行略過
      const hoursRaw=String(ln.hours==null?'':ln.hours).trim();
      const hours=hoursRaw===''?0:parseFloat(hoursRaw);
      const overtime=parseFloat(ln.overtime)||0;
      if(isNaN(hours)||hours<0){ alert('工時請填 0 或正整數（只加班可留空）。'); return; }
      if(!Number.isInteger(hours)){ alert('工時請填整數小時（例如 8、9）。'); return; }
      if(hours===0 && overtime<=0 && !ln.night) continue; // 空行略過
      valid.push({siteId:ln.siteId, hours, overtime, night:!!ln.night});
    }
    if(valid.length===0){ alert('請至少填一個案場（有工時或加班）。'); return; }
    // 同案場重複偵測（本次多行內 + 已存在的當日紀錄）
    const seen={};
    for(const v of valid){ if(seen[v.siteId]){ alert(`「${siteName(v.siteId)}」在這次登記裡出現兩次，請合併或移除其中一行。`); return; } seen[v.siteId]=1; }
    const existToday=state.attendance.filter(r=>r.empId===empId&&r.date===date&&(!r.kind||r.kind==='work'));
    const dupSites=valid.filter(v=>existToday.some(r=>r.siteId===v.siteId)).map(v=>siteName(v.siteId));
    if(dupSites.length>0){
      if(!confirm(`${emp.name} 在 ${date} 已經登記過：${dupSites.join('、')}。\n\n確定要再記一次（會變成多筆）嗎？`)) return;
    }
    valid.forEach(v=>state.attendance.push({id:uid(),date,empId,siteId:v.siteId,hours:v.hours,overtime:v.overtime,night:v.night,dailyRate:emp.daily,kind:'work'}));
    entryDate=date; entryEmp=empId;
    // 送出後保留案場明細輸入值（登記下一個人常常是同案場同工時），不清空
    resyncAllSiteDeals();
    saveData(); render();
  };
  // 模式切換
  const emEmp=document.getElementById('emode-emp'); if(emEmp) emEmp.onclick=()=>{ entryByMode='emp'; render(); };
  const emSite=document.getElementById('emode-site'); if(emSite) emSite.onclick=()=>{ entryByMode='site'; render(); };
  // 依案場·多員工：勾選狀態記憶
  document.querySelectorAll('[data-empick]').forEach(cb=>cb.onchange=()=>{ if(cb.checked) entryEmpPick[cb.dataset.empick]=true; else delete entryEmpPick[cb.dataset.empick]; });
  const esSelall=document.getElementById('es-selall');
  if(esSelall) esSelall.onclick=()=>{
    const boxes=[...document.querySelectorAll('[data-empick]')];
    const allChecked=boxes.length>0 && boxes.every(cb=>cb.checked);
    boxes.forEach(cb=>{ cb.checked=!allChecked; if(cb.checked) entryEmpPick[cb.dataset.empick]=true; else delete entryEmpPick[cb.dataset.empick]; });
    esSelall.textContent=allChecked?'全選員工':'取消全選';
  };
  const esAdd=document.getElementById('es-add');
  if(esAdd) esAdd.onclick=()=>{
    const date=document.getElementById('f-date').value;
    const siteId=document.getElementById('es-site').value;
    const hoursRaw=String(document.getElementById('es-hours').value||'').trim();
    const hours=hoursRaw===''?0:parseFloat(hoursRaw);
    const overtime=parseFloat(document.getElementById('es-ot').value)||0;
    const night=document.getElementById('es-night').checked;
    const picked=[...document.querySelectorAll('[data-empick]:checked')].map(cb=>cb.dataset.empick);
    if(!date||!siteId){ alert('請先選日期與案場'); return; }
    if(isNaN(hours)||hours<0){ alert('工時請填 0 或正整數（只加班可留空）。'); return; }
    if(!Number.isInteger(hours)){ alert('工時請填整數小時（例如 8、9）。'); return; }
    if(hours===0 && overtime<=0 && !night){ alert('工時或加班至少填一個（或勾過夜）。'); return; }
    if(picked.length===0){ alert('請至少勾選一位員工。'); return; }
    const dupEmps=picked.filter(eid=>state.attendance.some(r=>r.empId===eid&&r.date===date&&r.siteId===siteId&&(!r.kind||r.kind==='work'))).map(eid=>empName(eid));
    if(dupEmps.length>0){
      if(!confirm(`${dupEmps.join('、')} 在 ${date} 已登記過「${siteName(siteId)}」。\n\n確定要再記一次（會變成多筆）嗎？`)) return;
    }
    picked.forEach(eid=>{ const emp=state.employees.find(e=>e.id===eid); if(emp) state.attendance.push({id:uid(),date,empId:eid,siteId,hours,overtime,night,dailyRate:emp.daily,kind:'work'}); });
    entryDate=date;
    entrySitePick=siteId; entrySiteHours=String(hours); entrySiteOt=String(overtime); entrySiteNight=night;
    entryEmpPick={}; // 送出後清空員工勾選，案場/工時保留方便下一批
    resyncAllSiteDeals();
    saveData(); render();
  };
  const allVac=document.getElementById('f-allvac');
  if(allVac) allVac.onclick=()=>{
    const date=document.getElementById('f-date').value;
    if(!date){ alert('請先選擇日期'); return; }
    const emps=state.employees.filter(e=>e.active);
    if(emps.length===0){ alert('沒有在職員工'); return; }
    const toAdd=emps.filter(e=>!state.attendance.some(r=>r.empId===e.id&&r.date===date&&r.kind==='off'));
    const skipped=emps.filter(e=>state.attendance.some(r=>r.empId===e.id&&r.date===date&&r.kind==='off'));
    let msg=`確定將 ${date} 設為全員休假？\n新增 ${toAdd.length} 人`;
    if(skipped.length>0) msg+=`（跳過已有休假紀錄的 ${skipped.length} 人：${skipped.map(e=>e.name).join('、')}）`;
    msg+='。';
    if(!confirm(msg)) return;
    toAdd.forEach(emp=>state.attendance.push({id:uid(),date,empId:emp.id,kind:'off',half:false}));
    entryDate=date;

  const mse=document.getElementById('meas-show-expr'); if(mse) mse.onchange=()=>{ measShowExpr=mse.checked; };
  bindBillingSubtotal('bnr'); bindBillingSubtotal('bna'); bindBillingSubtotal('bae'); bindMeasSubtotal();
  bindSiteClientAutofill('bnr-site','bnr-client');
  bindSiteClientAutofill('bna-site','bna-client');
  bindSiteClientAutofill('bae-site','bae-client');
  bindSiteClientAutofill('b-site','b-client');
  document.querySelectorAll('[data-billprint]').forEach(b=>b.onclick=()=>printBillingDoc(b.dataset.billprint));
  document.querySelectorAll('[data-billsign]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.billsign;
    if(billingSigsLocked[id]){
      if(!confirm('此簽名已鎖定。\n確定要解鎖並重新簽名？')) return;
      unlockSig(id);
    }
    openFullscreenSign(url=>{ saveSig(id,url); saveData(); pushCloud(); render(); }, '工程師簽名');
  });
  document.querySelectorAll('[data-billsign-so]').forEach(b=>b.onclick=()=>{
    const key=b.dataset.billsignSo+'::so'; // 所長簽名，另存一個 key
    if(billingSigsLocked[key]){
      if(!confirm('此簽名已鎖定。\n確定要解鎖並重新簽名？')) return;
      unlockSig(key);
    }
    openFullscreenSign(url=>{ saveSig(key,url); saveData(); pushCloud(); render(); }, '所長簽名');
  });
  document.querySelectorAll('[data-site-printall]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const site=b.dataset.sitePrintall;
    const ids=state.billings.filter(x=>(x.docType||'請款單')==='追加單'&&parentSiteName(x.site)===site).sort((a,c)=>(a.date||'').localeCompare(c.date||'')).map(x=>x.id);
    printBillingDocs(ids);
  });
  document.querySelectorAll('[data-site-printsel]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const ids=[...document.querySelectorAll('[data-billcheck]:checked')].map(cb=>cb.dataset.billcheck);
    printBillingDocs(ids);
  });
  document.querySelectorAll('[data-site-selectall]').forEach(b=>b.onclick=e=>{
    e.stopPropagation();
    const card=b.closest('.card'); if(!card) return;
    const boxes=[...card.querySelectorAll('[data-billcheck]')];
    const allChecked=boxes.length>0 && boxes.every(cb=>cb.checked);
    boxes.forEach(cb=>{ cb.checked=!allChecked; }); // 全勾或全取消（就地切換，不重繪）
    b.textContent=allChecked?'全選':'取消全選';
  });
  document.querySelectorAll('[data-togglesettle]').forEach(b=>b.onclick=()=>{
    const bill=state.billings.find(x=>x.id===b.dataset.togglesettle);
    if(bill){
      // 從請款追蹤頁改回未收款 → 單據會離開追蹤頁，先確認
      if(b.dataset.fromtrack&&bill.settled&&!confirm('改回未收款後，這筆會退出請款追蹤，回到「請款單／追加單」頁管理。\n確定嗎？')) return;
      bill.settled=!bill.settled;
      const so=state.sites.find(x=>x.name===parentSiteName(bill.site));
      if(so) resyncSiteDeal(so);
      saveData(); render();
    }
  });
  document.querySelectorAll('[data-photoadd]').forEach(inp=>inp.onchange=async()=>{
    const id=inp.dataset.photoadd;
    const files=Array.from(inp.files); if(!files.length) return;
    const arr=(billingPhotos[id]||[]).slice();
    let ok=0, fail=0, failedNames=[];
    setCloud(`上傳照片中… (0/${files.length})`);
    for(let i=0;i<files.length;i++){
      setCloud(`上傳照片中… (${i+1}/${files.length})`);
      try{
        const url=await uploadBillingPhoto(files[i]);
        arr.push(url);
        billingPhotos[id]=arr;
        savePhotos();
        saveData(); // 每成功一張就同步一次，避免手機中途關閉造成最後幾張遺失
        ok++;
      }catch(e){
        fail++;
        failedNames.push(files[i].name||`第 ${i+1} 張`);
        console.warn('photo upload failed', e);
      }
    }
    inp.value='';
    billingPhotos[id]=arr; savePhotos();
    if(ok>0) saveData();
    setCloud(fail?`照片上傳：成功 ${ok} 張，失敗 ${fail} 張`:`照片已上傳 ${ok} 張`);
    if(fail) alert(`有 ${fail} 張照片沒有上傳成功：\n${failedNames.join('\n')}\n\n請確認手機網路正常，照片格式請用 JPG/PNG；如果是 iPhone，請在相機設定改成「最相容」後再拍，或把失敗的照片截圖後重新上傳。`);
    render();
  });
  document.querySelectorAll('[data-photodel]').forEach(b=>b.onclick=()=>{
    const id=b.dataset.photodel; const idx=parseInt(b.dataset.photoidx);
    if(!billingPhotos[id]) return;
    const url=billingPhotos[id][idx];
    if(url){ billingPhotosDeleted[id]=[...new Set([...(billingPhotosDeleted[id]||[]),url])]; } // 記下刪除，避免同步時被補回
    billingPhotos[id].splice(idx,1);
    if(billingPhotos[id].length===0) delete billingPhotos[id];
    savePhotos(); saveData(); render(); // saveData 把刪除記號推到雲端
  });
  document.querySelectorAll('[data-delbill]').forEach(b=>b.onclick=()=>{
    const bill=state.billings.find(x=>x.id===b.dataset.delbill);
    if(!confirm('確定刪除這筆請款？')) return;
    const siteName=bill?bill.site:null;
    state.billings=state.billings.filter(x=>x.id!==b.dataset.delbill);
    // 重算該案場分潤（找得到案場就 resync）
    const so=state.sites.find(x=>x.name===siteName); if(so) resyncSiteDeal(so);
    // 防呆：清掉任何「對應案場已無請款」的自動分潤
    state.deals.filter(d=>d.autoSiteId).forEach(d=>{
      const s=state.sites.find(x=>x.id===d.autoSiteId);
      const tot=s?dealBillBasisForSite(s):0;
      if(!s || tot<=0){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    });
    saveData(); render();
  });
  document.querySelectorAll('[data-contract]').forEach(inp=>inp.onchange=()=>{
    const name=inp.dataset.contract; const v=parseFloat(inp.value);
    if(isNaN(v)||v<=0) delete state.contracts[name]; else state.contracts[name]=v;
    saveData(); render();
  });

  // 對帳匯出
  const rf=document.getElementById('recon-from'); if(rf) rf.onchange=()=>{ reconFrom=rf.value; render(); };
  const rt=document.getElementById('recon-to'); if(rt) rt.onchange=()=>{ reconTo=rt.value; render(); };
  const rtp=document.getElementById('recon-thisperiod'); if(rtp) rtp.onclick=()=>{ const d=defaultPayRange(); reconFrom=d.from; reconTo=d.to; render(); };
  const rcl=document.getElementById('recon-clear'); if(rcl) rcl.onclick=()=>{ reconFrom=''; reconTo=''; render(); };
  document.querySelectorAll('[data-reconpick]').forEach(cb=>cb.onchange=()=>{ reconPick[cb.dataset.reconpick]=cb.checked; render(); });
  const rex=document.getElementById('recon-export'); if(rex) rex.onclick=()=>exportRecon();

  // 年度總結
  const yf=document.getElementById('ye-from'); if(yf) yf.onchange=()=>{ yearFrom=yf.value; render(); };
  const yt=document.getElementById('ye-to'); if(yt) yt.onchange=()=>{ yearTo=yt.value; render(); };
  const yc=document.getElementById('ye-clear'); if(yc) yc.onclick=()=>{ yearFrom=''; yearTo=''; render(); };
  document.querySelectorAll('[data-yvsel]').forEach(cb=>cb.onchange=()=>{ yeVerifySel[cb.dataset.yvsel]=cb.checked; });
  const yvpdf=document.getElementById('ye-verify-pdf'); if(yvpdf) yvpdf.onclick=()=>exportYearVerify();

  // 品佑帳戶結算
  const pacc=document.getElementById('park-acc'); if(pacc) pacc.onchange=()=>{ state.parkAccId=pacc.value; saveData(); render(); };
  const pkf=document.getElementById('park-from'); if(pkf) pkf.onchange=()=>{ parkFrom=pkf.value; render(); };
  const pkt=document.getElementById('park-to'); if(pkt) pkt.onchange=()=>{ parkTo=pkt.value; render(); };
  const pkc=document.getElementById('park-clear'); if(pkc) pkc.onclick=()=>{ parkFrom=''; parkTo=''; render(); };
  const pmf=document.getElementById('park-minfund'); if(pmf) pmf.onchange=()=>{ const v=parseFloat(pmf.value); state.minFund=isNaN(v)?'':Math.max(0,v); saveData(); render(); };
  document.querySelectorAll('[data-pvsel]').forEach(cb=>cb.onchange=()=>{ parkVerifySel[cb.dataset.pvsel]=cb.checked; });
  const pvpdf=document.getElementById('park-verify-pdf'); if(pvpdf) pvpdf.onclick=()=>exportParkVerify();
  const paddowe=document.getElementById('park-addowe');
  if(paddowe) paddowe.onclick=()=>{
    if(!confirm('把本期少拿的獎金累加到「欠獎金」？\n（之後可在帳況允許時補發）')) return;
    const partners=state.employees.filter(e=>e.partner);
    const inRange=d=> (!parkFrom||(d>=parkFrom)) && (!parkTo||(d<=parkTo));
    const parkDeals=state.deals.filter(d=>d.moneyAcc===state.parkAccId && d.type!=='合作案' && inRange(d.date));
    let targetBonus={}, bookFund=0, totalTargetBonus=0;
    parkDeals.forEach(d=>{ const c=dealCalc(d); if(d.ownerId) targetBonus[d.ownerId]=(targetBonus[d.ownerId]||0)+c.bonus; bookFund+=c.fund; totalTargetBonus+=c.bonus; });
    const balance=accountBalance(state.parkAccId);
    const minFund=Math.max(0, Number(state.minFund)||0);
    const targetFund=Math.max(minFund, Math.round(bookFund));
    const fundPaid=Math.max(0,Math.min(balance,targetFund));
    const avail=Math.max(0,balance-fundPaid);
    partners.forEach(p=>{
      const tgt=targetBonus[p.id]||0;
      let pay = totalTargetBonus<=0?0 : (avail>=totalTargetBonus?tgt:tgt*(avail/totalTargetBonus));
      const owe=Math.max(0,Math.round(tgt)-Math.round(pay));
      if(owe>0) state.oweBonus[p.id]=(state.oweBonus[p.id]||0)+owe;
    });
    saveData(); render();
  };
  document.querySelectorAll('[data-owepay]').forEach(b=>b.onclick=()=>{
    const pid=b.dataset.owepay; const cur=Math.round(state.oweBonus[pid]||0);
    const s=prompt(`補發多少給 ${empName(pid)}？目前被欠 ${money(cur)}`, cur);
    if(s===null) return;
    const v=parseFloat(s); if(isNaN(v)||v<0){ alert('請輸入正確金額'); return; }
    state.oweBonus[pid]=Math.max(0, cur-Math.round(v));
    saveData(); render();
  });
}

// ---- PDF 匯出（以列印視窗產生，可存成 PDF 或直接列印）----
function printHTML(title, inner, opts){
  // 移除舊浮層
  const old=document.getElementById('print-overlay'); if(old) old.remove();
  // 全站 PDF 統一藍色系商用報告風；薪資明細單（paydoc）保留專屬加減項配色
  const themed=inner.includes('class="paydoc"')||inner.includes('class="bluedoc"')
    ?inner
    :`<div class="bluedoc">${inner}<div class="foot"><span>本報表由系統自動產生</span><span>${new Date().toISOString().slice(0,10)}</span></div></div>`;
  const landscape=!!(opts&&opts.landscape);
  const ov=document.createElement('div');
  ov.id='print-overlay';
  if(landscape) ov.classList.add('landscape');
  ov.innerHTML=`
    <div class="pbar">
      <button class="btn" id="po-print">列印 / 存成 PDF</button>
      <button class="act" id="po-close" style="padding:0 14px">關閉</button>
    </div>
    <div class="pdoc"${landscape?' style="max-width:1100px"':''}>${themed}</div>`;
  document.body.appendChild(ov);
  document.getElementById('po-print').onclick=()=>window.print();
  document.getElementById('po-close').onclick=()=>ov.remove();
  ov.scrollTop=0;
}

// ---- 薪資月結存檔 + 鎖定 ----
// 把本期計算結果凍結成一份快照，日後回看都是當時發的數字，不受後續出勤/調整項修改影響
function snapshotPayroll(){
  const from=state.payFrom||'', to=state.payTo||'';
  if(!from||!to){ alert('請先在上方選好計薪期間（起訖日）再結算存檔。'); return; }
  const byEmp=buildPayroll(from,to);
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const ids=Object.keys(byEmp).filter(id=>!isPartner(id));
  if(ids.length===0){ alert('本期沒有員工薪資資料，無法存檔。'); return; }
  const rows=ids.map(id=>{ const e=byEmp[id]; return {empId:id, name:empName(id), days:e.days.size, hours:e.hours, gross:e.gross, addTotal:e.addTotal, dedTotal:e.dedTotal, loanDedTotal:e.loanDedTotal, otherDedTotal:e.otherDedTotal, net:e.net, companyWage:e.companyWage}; })
    .sort((a,b)=>b.net-a.net);
  const totals={ gross:rows.reduce((s,r)=>s+r.gross,0), add:rows.reduce((s,r)=>s+r.addTotal,0), ded:rows.reduce((s,r)=>s+r.dedTotal,0), net:rows.reduce((s,r)=>s+r.net,0), company:rows.reduce((s,r)=>s+r.companyWage,0) };
  const existing=(state.payrollSnapshots||[]).find(s=>s.from===from&&s.to===to);
  if(existing){
    if(!confirm(`這個計薪期間（${from} ～ ${to}）已經存檔過（${new Date(existing.createdAt).toLocaleString()}）。\n\n要用目前的數字覆蓋舊存檔嗎？`)) return;
    state.payrollSnapshots=state.payrollSnapshots.filter(s=>s!==existing);
  } else {
    if(!confirm(`要結算並鎖定本期薪資嗎？\n\n期間：${from} ～ ${to}\n人數：${rows.length} 人\n實發合計：${money(totals.net)}\n公司負擔合計：${money(totals.company)}\n\n存檔後回看都是這份凍結的數字，不受之後修改出勤/調整項影響。`)) return;
  }
  state.payrollSnapshots.push({ id:uid(), from, to, createdAt:Date.now(), rows, totals });
  saveData(); pushCloud(); render();
  alert(`已結算存檔並鎖定：${from} ～ ${to}\n實發合計 ${money(totals.net)}`);
}
function deleteSnapshot(id){
  const s=(state.payrollSnapshots||[]).find(x=>x.id===id); if(!s) return;
  if(!confirm(`確定刪除這份存檔嗎？\n期間：${s.from} ～ ${s.to}\n\n（只刪除凍結的存檔紀錄，不影響出勤與薪資計算。）`)) return;
  state.payrollSnapshots=state.payrollSnapshots.filter(x=>x.id!==id);
  saveData(); pushCloud(); render();
}

    <p class="sub">此為結算當時凍結的數字，之後修改出勤／調整項不會改變本存檔。</p>`;

// 一鍵：把本期「公司負擔工資」記成品佑帳戶的一筆支出（項目＝該期起算月日＋工資，例：0711工資）
function postParkWage(){
  if(!state.parkAccId){ alert('尚未指定品佑帳戶。\n請到「品佑帳戶結算」頁選「哪個帳戶是品佑代支出」後再試。'); return; }
  const byEmp=buildPayroll(state.payFrom,state.payTo);
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const amount=Math.round(Object.keys(byEmp).filter(id=>!isPartner(id)).reduce((s,id)=>s+byEmp[id].companyWage,0));
  if(amount<=0){ alert('本期公司負擔工資為 0，沒有可記入的金額。'); return; }
  // 發薪日＝計薪迄日的隔天（例：計薪到 7/10 → 隔天 7/11 發，記「0711工資」）
  const nextDay=iso=>{ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); };
  // 落在某月 11 號前後三天（8～14）內就一律歸到該月 11 號，避免忘記按或期間微調時項目/日期跑掉
  const snap11=iso=>{ const d=new Date(iso+'T00:00:00'); if(d.getDate()>=8&&d.getDate()<=14) d.setDate(11); return d.toISOString().slice(0,10); };
  const payday=snap11(state.payTo?nextDay(state.payTo):new Date().toISOString().slice(0,10));
  const note=payday.slice(5,7)+payday.slice(8,10)+'工資'; // 例：0711工資
  const date=payday;
  const tag=(state.payFrom||'')+'~'+(state.payTo||'');
  const dup=state.ledger.find(t=>t.payrollWage===tag && t.accId===state.parkAccId);

// 壓縮圖片為 base64 JPEG。手機原圖常過大，逐步壓小避免雲端上傳失敗。
function fileToDataURL(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result);
    reader.onerror=()=>reject(new Error('讀取照片失敗'));
    reader.readAsDataURL(file);
  });
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img);
    img.onerror=()=>reject(new Error('照片格式無法處理，請改用 JPG/PNG'));
    img.src=src;
  });
}
// HEIC（iPhone 高效率格式）自動轉檔：先試瀏覽器原生解碼，失敗再載入轉檔器
function isHeicFile(file){
  const t=(file.type||'').toLowerCase(), n=(file.name||'').toLowerCase();
  return t.includes('heic')||t.includes('heif')||/\.hei[cf]$/.test(n);
}
let _heicLibP=null;
function loadHeicLib(){
  if(window.heic2any) return Promise.resolve();
  if(_heicLibP) return _heicLibP;
  _heicLibP=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js';
    s.onload=()=>resolve();
    s.onerror=()=>{ _heicLibP=null; reject(new Error('HEIC 轉檔器載入失敗，請檢查網路')); };
    document.head.appendChild(s);
  });
  return _heicLibP;
}
async function heicToJpegBlob(file){
  await loadHeicLib();
  const out=await window.heic2any({blob:file,toType:'image/jpeg',quality:0.85});
  return Array.isArray(out)?out[0]:out;
}
async function compressBlobP(blob,maxW,quality,maxBytes){
  const src=await fileToDataURL(blob);
  const img=await loadImage(src);
  let w0=img.naturalWidth||img.width, h0=img.naturalHeight||img.height;
  if(!w0||!h0) throw new Error('照片尺寸讀取失敗');
  let wLimit=maxW, q=quality, out='';
  for(let tries=0; tries<8; tries++){
    const scale=Math.min(1,wLimit/w0);
    const w=Math.max(1,Math.round(w0*scale)), h=Math.max(1,Math.round(h0*scale));
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    const ctx=c.getContext('2d');
    ctx.drawImage(img,0,0,w,h);
    out=c.toDataURL('image/jpeg',q);
    const approxBytes=Math.ceil(out.length*0.75);
    if(approxBytes<=maxBytes) return out;
    if(q>0.48) q-=0.08; else wLimit=Math.round(wLimit*0.82);
  }
  return out;
}
async function compressImageP(file,maxW=1000,quality=0.72,maxBytes=850000){
  if(!file) throw new Error('請選擇照片檔');
  const looksImage=(file.type&&file.type.startsWith('image/'))||/\.(jpe?g|png|webp|gif|bmp|heic|heif)$/i.test(file.name||'');
  if(!looksImage) throw new Error('請選擇照片檔');
  try{
    return await compressBlobP(file,maxW,quality,maxBytes); // 原生解碼（新版 Safari 可直接吃 HEIC）
  }catch(e){
    if(isHeicFile(file)){
      const jpeg=await heicToJpegBlob(file); // 原生不行 → 轉檔器轉 JPG 再壓
      return await compressBlobP(jpeg,maxW,quality,maxBytes);
    }
    throw e;
  }
}
async function uploadBillingPhoto(file){
  const dataUrl=await compressImageP(file,1000,0.72,850000);
  const res=await fetch(CLOUD_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'uploadPhoto',data:dataUrl,name:file.name||'photo.jpg'})
  });
  let j=null;
  try{ j=await res.json(); }catch(e){}
  if(!res.ok || !j || !j.ok || !j.url) throw new Error((j&&j.error)||('照片上傳失敗 HTTP '+res.status));
  return j.url;
}

// 全版面簽名畫布（業主／工程師／所長共用）；title 可指定簽名人抬頭
function openFullscreenSign(onSaved, title){
  const fs=document.createElement('div');

  fs.innerHTML=`
    <div style="height:56px;display:flex;align-items:center;padding:0 10px;gap:6px;border-bottom:1px solid #e0e0e0;flex-shrink:0;background:#fff;user-select:none;-webkit-user-select:none">

      <button id="fs-erase" style="height:36px;padding:0 14px;border:none;background:rgba(100,116,139,.08);color:#475569;font-size:13px;cursor:pointer">橡皮擦</button>
      <button id="fs-clear" style="height:36px;padding:0 14px;border:none;background:rgba(100,116,139,.08);color:#475569;font-size:13px;cursor:pointer">清除</button>
      <button id="fs-cancel" style="height:36px;padding:0 14px;border:none;background:rgba(100,116,139,.08);color:#475569;font-size:13px;cursor:pointer">取消</button>
    </div>
    <canvas id="fs-canvas" width="${Math.round(W*DPR)}" height="${Math.round(H*DPR)}"
      style="flex:1;width:100%;background:#fff;touch-action:none;cursor:crosshair;display:block"></canvas>
    <div style="height:72px;display:flex;align-items:center;justify-content:center;padding:0 16px;border-top:1px solid #e0e0e0;flex-shrink:0;background:#fff;user-select:none;-webkit-user-select:none">
      <button id="fs-done" style="width:100%;max-width:480px;height:52px;background:#ede9fe;color:#3730a3;border:2px solid #c4b5fd;font-size:18px;font-weight:800;cursor:pointer;letter-spacing:.5px">✓ 儲存簽名</button>
    </div>`;
  document.body.appendChild(fs);
  const oldBodySelect=document.body.style.userSelect;
  const oldWebkitSelect=document.body.style.webkitUserSelect;
  const oldBodyTouchAction=document.body.style.touchAction;
  document.body.style.userSelect='none';
  document.body.style.webkitUserSelect='none';
  document.body.style.touchAction='none';

  const cv=document.getElementById('fs-canvas');
  const ctx=cv.getContext('2d');
  ctx.lineCap='round'; ctx.lineJoin='round';
  let drawing=false, eraser=false, lastPt=null, prevPt=null, activePointerId=null;
  // 預設 Apple Pencil 模式，手掌/手指不會干擾；需要手指簽名時可切換。
  let penOnly=true;

  function applyMode(){
    if(eraser){ ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=28; cv.style.cursor='cell'; }
    else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle='#111'; cv.style.cursor='crosshair'; }
  }
  applyMode();

  // 包一層 wrapper 讓提示文字可絕對定位在畫布正中央
  const cvWrap=document.createElement('div');
  cvWrap.style='position:relative;flex:1;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none';
  cv.style.cssText='width:100%;height:100%;background:#fff;touch-action:none;cursor:crosshair;display:block;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none';
  cv.parentNode.insertBefore(cvWrap,cv);
  cvWrap.appendChild(cv);
  const hint=document.createElement('div');
  hint.style='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;color:#bbb;pointer-events:none;user-select:none;text-align:center;line-height:1.7';
  cvWrap.appendChild(hint);

  function updateModeUI(){
    const mb=document.getElementById('fs-mode');
    if(penOnly){
      mb.textContent='✏ 筆簽';
      mb.style.cssText='height:36px;padding:0 14px;border:none;border-radius:999px;background:#ede9fe;color:#4338ca;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap';
      hint.innerHTML='請使用 Apple Pencil 簽名<br><span style="font-size:14px">點「☝ 手簽」可改用手指</span>';
    } else {
      mb.textContent='☝ 手簽';
      mb.style.cssText='height:36px;padding:0 14px;border:none;border-radius:999px;background:#fef3c7;color:#92400e;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap';
      hint.innerHTML='請用手指簽名<br><span style="font-size:14px">點「✏ 筆簽」可改用 Apple Pencil</span>';
    }
  }
  updateModeUI();

  function allowedPointer(e){
    if(e.pointerType==='mouse') return true;
    if(e.pointerType==='pen') return true;
    return !penOnly; // touch 只在手簽模式允許
  }
  const blockTouch=e=>{
    if(e.target.closest && e.target.closest('button')) return;
    // Apple Pencil 模式下，手掌/手指只阻止預設行為，不參與簽名。
    e.preventDefault();
  };
  fs.addEventListener('touchstart', blockTouch, {passive:false});
  fs.addEventListener('touchmove', blockTouch, {passive:false});
  fs.addEventListener('gesturestart', e=>e.preventDefault());
  function closeSig(){
    document.body.style.userSelect=oldBodySelect;
    document.body.style.webkitUserSelect=oldWebkitSelect;
    document.body.style.touchAction=oldBodyTouchAction;
    fs.remove();
  }

  function pointerPos(e){
    const r=cv.getBoundingClientRect();
    return {
      x:(e.clientX-r.left)*(cv.width/r.width),
      y:(e.clientY-r.top)*(cv.height/r.height),
      p:e.pressure&&e.pressure>0?e.pressure:(e.pointerType==='pen'?0.45:0.55)
    };
  }
  function drawSegment(pt){
    if(!lastPt){ lastPt=pt; prevPt=pt; return; }
    const mid={x:(lastPt.x+pt.x)/2,y:(lastPt.y+pt.y)/2};
    ctx.lineWidth=eraser?28*DPR:Math.max(1.8*DPR, (2.2 + pt.p*2.8)*DPR);
    ctx.beginPath();
    ctx.moveTo(prevPt.x,prevPt.y);
    ctx.quadraticCurveTo(lastPt.x,lastPt.y,mid.x,mid.y);
    ctx.stroke();
    prevPt=mid;
    lastPt=pt;
  }
  function drawEvent(e){
    const events=(typeof e.getCoalescedEvents==='function')?e.getCoalescedEvents():[e];
    events.forEach(ev=>drawSegment(pointerPos(ev)));
  }

  cv.addEventListener('pointerdown', e=>{
    if(!allowedPointer(e)){ e.preventDefault(); return; }
    if(drawing && activePointerId!==null && e.pointerId!==activePointerId){ e.preventDefault(); return; }
    e.preventDefault();
    hint.style.display='none';
    applyMode(); drawing=true;
    activePointerId=e.pointerId;
    fs.querySelectorAll('button').forEach(btn=>btn.style.pointerEvents='none');
    lastPt=null; prevPt=null;
    drawEvent(e);
    cv.setPointerCapture(e.pointerId);
  });
  cv.addEventListener('pointermove', e=>{
    if(!allowedPointer(e)){ e.preventDefault(); return; }
    if(!drawing||e.pointerId!==activePointerId) return;
    e.preventDefault();
    drawEvent(e);
  });
  function stopDrawing(){
    drawing=false; activePointerId=null; lastPt=null; prevPt=null;
    fs.querySelectorAll('button').forEach(btn=>btn.style.pointerEvents='');
  }
  cv.addEventListener('pointerup', e=>{ if(!allowedPointer(e)){ e.preventDefault(); return; } if(e.pointerId!==activePointerId) return; if(drawing){ e.preventDefault(); drawEvent(e); } stopDrawing(); });
  cv.addEventListener('pointercancel', e=>{ if(!allowedPointer(e)){ e.preventDefault(); return; } if(e.pointerId!==activePointerId) return; stopDrawing(); });

  document.getElementById('fs-mode').onclick=()=>{ penOnly=!penOnly; updateModeUI(); hint.style.display=''; };
  const eb=document.getElementById('fs-erase');
  eb.onclick=()=>{ eraser=!eraser; eb.textContent=eraser?'✏ 切回筆':'橡皮擦'; eb.style.background=eraser?'#fde9d4':'transparent'; eb.style.color=eraser?'#9a5b1a':''; applyMode(); };
  document.getElementById('fs-clear').onclick=()=>{ ctx.globalCompositeOperation='source-over'; ctx.clearRect(0,0,cv.width,cv.height); lastPt=null; prevPt=null; applyMode(); };
  document.getElementById('fs-cancel').onclick=()=>closeSig();
  document.getElementById('fs-done').onclick=()=>{
    const d=ctx.getImageData(0,0,cv.width,cv.height).data;
    if(!d.some((v,i)=>i%4===3&&v>10)){ alert('請先簽名或寫上補充說明'); return; }
    // 縮小到最大 800×500 再存，控制檔案大小讓雲端同步正常
    const MAX_W=800, MAX_H=500;
    const scale=Math.min(MAX_W/cv.width, MAX_H/cv.height, 1);
    const tmp=document.createElement('canvas');
    tmp.width=Math.round(cv.width*scale); tmp.height=Math.round(cv.height*scale);
    const tc=tmp.getContext('2d'); tc.fillStyle='#fff'; tc.fillRect(0,0,tmp.width,tmp.height);
    tc.drawImage(cv,0,0,tmp.width,tmp.height);
    closeSig();
    onSaved(tmp.toDataURL('image/jpeg',0.85));
  };
}

// ---- 借支 ----
// 每筆借支已扣金額 = 所有「來源為此借支」的扣項調整加總
function loanRepaid(loanId){
  const bySalary=state.adjustments.filter(a=>a.loanId===loanId && a.kind==='ded').reduce((s,a)=>s+(Number(a.amount)||0),0);
  const loan=state.loans.find(l=>l.id===loanId);
  const byCash=loan&&Array.isArray(loan.repayments)?loan.repayments.reduce((s,r)=>s+(Number(r.amount)||0),0):0; // 私下現金還款（不扣薪）
  return bySalary+byCash;
}
function loanBalance(loan){ return Math.max(0, (Number(loan.amount)||0) - loanRepaid(loan.id)); }
// 本期是否已對此借支扣過款
function loanDeductedInRange(loanId,from,to){
  const inRange=d=>(!from||d>=from)&&(!to||d<=to);
  return state.adjustments.some(a=>a.loanId===loanId && a.kind==='ded' && inRange(a.date));
}

function evenSplit(amount, ids){
  const out={}; const n=ids.length; if(n===0) return out;
  const each=Math.round((amount/n)/1)*1; // 先平均
  let acc=0;
  ids.forEach((id,i)=>{ if(i<n-1){ out[id]=Math.round(amount/n); acc+=out[id]; } else { out[id]=Math.round(amount-acc); } });
  return out;
}

  const acc=state.accounts.find(a=>a.id===accId); if(!acc) return 0;
  const opening=Number(acc.opening)||0;
  const delta=state.ledger.filter(t=>t.accId===accId).reduce((s,t)=>s + (t.kind==='in'?1:-1)*(Number(t.amount)||0), 0);
  return opening+delta;
}

const SCHEMES={
  'new':{label:'新制 30/70（負責人30%·公積金70%）', bonus:0.30, fund:0.70},
  'old':{label:'舊制 0/100（全進公積金）', bonus:0, fund:1.00},

// 合作案場：總請款、總成本、利潤、業主/管理人對拆（成本來自案場成本明細、請款來自請款追蹤）
function coopSiteCalc(site){
  // 已收款只算開給業主的；子案場工程款＋手動成本＝成本。利潤對拆後，管理人那半可帶去公司分潤走 30/70
  const totalBill=ownSettledBilledForSite(site);
  const childWork=childWorkBilledForSite(site);
  const totalCost=(state.costs||[]).filter(c=>c.siteId===site.id).reduce((s,c)=>s+(Number(c.amount)||0),0)+childWork;
  const taxPct=(site.coopTaxPct!==undefined&&site.coopTaxPct!=='')?Number(site.coopTaxPct):0;
  const tax=totalBill*taxPct/100;
  const profit=totalBill-totalCost-tax;
  const mgrPct=(site.coopMgrPct!==undefined&&site.coopMgrPct!=='')?Number(site.coopMgrPct):50;
  const ownerPct=100-mgrPct;
  return {totalBill,totalCost,childWork,tax,taxPct,profit,mgrPct,ownerPct,companyShare:profit*mgrPct/100,partnerShare:profit*ownerPct/100};
}
function dealCalc(d){
  const amount=Number(d.amount)||0, cost=Number(d.cost)||0;
  let tax;
  if(d.taxPct!==undefined && d.taxPct!=='' && d.taxPct!==null) tax=amount*(Number(d.taxPct)||0)/100;
  else tax=Number(d.tax)||0;
  const profit=amount-cost-tax;
  // 合作案：業主出資源、管理人(你們)管現場，利潤依業主%/管理人%拆；算到這就停，不做30/70
  if(d.type==='合作案'){
    const mgrPct=(d.mgrPct!==undefined&&d.mgrPct!=='')?Number(d.mgrPct):50;
    const ownerPct=100-mgrPct;
    const companyShare=profit*mgrPct/100;   // 管理人(你們公司)那份
    const partnerShare=profit*ownerPct/100; // 業主那份
    return {profit, tax, isDeal:true, companyShare, partnerShare, mgrPct, ownerPct, bonus:0, fund:0};
  }
  const sc=SCHEMES[d.scheme]||SCHEMES['new'];
  const bonus=profit>0?profit*sc.bonus:0;
  const fund=profit-bonus;
  return {profit,bonus,fund,tax,isDeal:false};
}

function rebuildAllDealIncome(){

  state.deals.forEach(d=>{ if(d.moneyAcc && d.type!=='合作案'){ const amt=dealIncomeAmount(d); if(amt!==0) state.ledger.push({id:uid(), date:d.date||new Date().toISOString().slice(0,10), accId:d.moneyAcc, kind:amt>=0?'in':'out', amount:Math.abs(amt), note:`分潤進帳·${d.name}`, autoDealId:d.id}); } });

// 案場成本（給分潤算淨利用）＝出工工資+津貼 + 手動成本 +（期初，但舊制不算期初）
function siteCostForDeal(site){
  const comp=computeRecords(state.attendance);
  let wage=0;
  state.attendance.forEach(r=>{ if(r.siteId!==site.id) return; const c=comp[r.id]; if(!c) return; wage+=c.total; });
  let manual=0;
  state.costs.forEach(co=>{ if(co.siteId===site.id) manual+=Number(co.amount)||0; });
  const opening=(site.type==='舊制')?0:(Number(site.opening)||0);
  return Math.round(wage+manual+opening);
}
function resyncAllSiteDeals(){
  // ① 去重：同一案場只能有一筆自動分潤。多裝置同步時，各台可能各自生成一筆（不同 id），
  //    造成同一案場在帳戶被重複進帳。這裡以 autoSiteId 為準，只保留一筆。
  const seen=new Set();
  state.deals=state.deals.filter(d=>{
    if(!d || !d.autoSiteId) return true;
    if(seen.has(d.autoSiteId)) return false;
    seen.add(d.autoSiteId); return true;
  });
  // 同名案場只讓第一個驅動自動分潤：多裝置同步可能產生兩筆同名案場，
  // 而請款是「依案場名」歸戶，兩個同名案場會抓到同一筆請款，導致分潤結算重複兩筆。
  const doneNames=new Set();
  const doneChild=new Set(); // 同母之下同名子案場只讓第一個驅動（多裝置同步防重複）
  state.sites.forEach(s=>{
    if(s.coop||s.type==='合作案') return;
    // 子案場也產生自己的分潤：金額＝工程款、成本＝自身工資＋手動，淨利走 30/70
    // （工程款在母案場那邊已扣成成本，兩層各算各的、不重複）
    if(s.parentSiteId){
      const key=s.parentSiteId+'|'+s.name;
      if(doneChild.has(key)){ const dup=state.deals.find(x=>x.autoSiteId===s.id); if(dup){ state.ledger=state.ledger.filter(t=>t.autoDealId!==dup.id); state.deals=state.deals.filter(x=>x.id!==dup.id); } return; }
      doneChild.add(key);
      resyncSiteDeal(s);
      return;
    }
    if(doneNames.has(s.name)){
      const dup=state.deals.find(x=>x.autoSiteId===s.id);
      if(dup){ state.ledger=state.ledger.filter(t=>t.autoDealId!==dup.id); state.deals=state.deals.filter(x=>x.id!==dup.id); }
      return;
    }
    doneNames.add(s.name);
    resyncSiteDeal(s);
  });
  // ② 清孤兒：autoDealId 指向已不存在的分潤（多裝置舊隨機 id 殘留的「分潤進帳」），
  //    這些就是同一案場被重複算進公積金帳戶的來源，一律移除。
  const dealIds=new Set(state.deals.map(d=>d.id));
  state.ledger=state.ledger.filter(t=>!(t && t.autoDealId!=null && !dealIds.has(t.autoDealId)));
}
// 案場驅動：代工/公司分潤案場 → 自動維護「一個案場一筆分潤」，金額＝該案場總請款
function resyncSiteDeal(site){
  // 合作案不走這裡（合作案在分潤頁用 coopSiteCalc 自動匯總）
  // 母案場：請款金額只算開給業主的；子案場工程款記入母的成本
  // 子案場：請款金額＝自己的工程款（對母請款），成本＝自身工資＋手動，淨利走 30/70
  const totalBill=dealBillBasisForSite(site);
  let d=state.deals.find(x=>x.autoSiteId===site.id);
  if(site.coop || site.type==='合作案'){
    // 若之前是代工/公司分潤、後來改成合作案，移除舊的自動分潤與其進帳
    if(d){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    return;
  }
  if(totalBill<=0){
    // 沒有請款就不需要分潤；若已有自動分潤則移除
    if(d){ state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id); state.deals=state.deals.filter(x=>x.id!==d.id); }
    return;
  }
  const stableId='site-'+site.id; // 固定 id＝以案場 id 為準，讓每台裝置對同一案場產生同一筆分潤
  if(!d){
    d={id:stableId, autoSiteId:site.id, name:site.name, type:site.type||'代工', date:new Date().toISOString().slice(0,10), cost:0};
    state.deals.push(d);
  } else if(d.id!==stableId){
    // 舊版用隨機 id 建立的自動分潤：多裝置各生一組 id，帳戶就被重複進帳。
    // 遷移成固定 id，並清掉它舊 id 的自動進帳（下方 syncDealIncome 會重推正確的一筆）。
    state.ledger=state.ledger.filter(t=>t.autoDealId!==d.id);
    d.id=stableId;
  }
  const parentRec=site.parentSiteId?state.sites.find(x=>x.id===site.parentSiteId):null;
  d.name=parentRec?(parentRec.name+' / '+site.name):site.name; // 子案場分潤標成「母 / 子」避免同名混淆
  d.type=site.type||'代工';
  d.amount=totalBill;
  // 母案場成本＝自身（期初/出工工資/手動）＋子案場已收款工程款；子案場成本＝只算自身
  d.cost=siteCostForDeal(site)+(site.parentSiteId?0:childWorkBilledForSite(site));
  d.taxPct=(site.siteTaxPct!==undefined?site.siteTaxPct:0);
  d.scheme=(site.type==='舊制')?'old':'new';  // 舊制全進公積金，其餘30/70
  d.ownerId=site.siteOwnerId||'';
  d.moneyAcc=site.siteAcc||'';
  syncDealIncome(d);
}

// ---- 請款單 ----
function viewBillingReq(){
  const list=state.billings.filter(b=>(b.docType||'請款單')==='請款單').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const total=list.reduce((s,b)=>s+billingAmount(b),0);
  const totalSettled=list.filter(b=>b.settled).reduce((s,b)=>s+billingAmount(b),0);
  const unsettled=total-totalSettled;
  const siteSelOpts=siteSelectOptions();

  // 依案場分組
  const groups={};
  list.forEach(b=>{ const k=parentSiteName(b.site)||'（未填案場）'; (groups[k]=groups[k]||[]).push(b); });
  const allSiteNames=Object.keys(groups).sort((a,b)=>a.localeCompare(b));
  const isPausedSite=n=>{ const so=state.sites.find(x=>x.name===n); return !!(so&&so.active===false); };
  const siteNames=allSiteNames.filter(n=>!isPausedSite(n));
  const pausedNames=allSiteNames.filter(isPausedSite);

  const renderSiteCard=siteName=>{
    const siteList=groups[siteName];
    const siteTot=siteList.reduce((s,b)=>s+billingAmount(b),0);
    const siteSettled=siteList.filter(b=>b.settled).reduce((s,b)=>s+billingAmount(b),0);
    const open=!!formOpen['req-site-'+siteName];
    const entries=open?siteList.map((b,idx)=>{
      const sep=idx>0?'border-top:1px solid var(--line);':'';
      return `<div style="${sep}padding:${idx>0?'12px':'4px'} 0 10px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
              <span style="font-size:18px;font-weight:800;color:var(--accent)">${money(billingAmount(b))}</span>
              <span style="font-size:12px;color:var(--muted)">${esc(b.date||'')}</span>
              ${subSiteTag(b.site)}
              ${b.method?`<span style="font-size:12px;color:var(--muted)">${esc(b.method)}</span>`:''}
              ${b.client?`<span style="font-size:12px;color:var(--muted)">${esc(b.client)}</span>`:''}
            </div>
            ${billingLineMeta(b)?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${billingLineMeta(b)}</div>`:''}
            ${b.note?`<div style="font-size:13px;color:var(--text);margin-top:4px;font-weight:500">${esc(b.note)}</div>`:''}
          </div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0">
            <button class="act ${b.settled?'':'muted'}" data-togglesettle="${b.id}" style="${b.settled?'color:var(--accent)':''}">${b.settled?'✓ 已收款':'未收款'}</button>
            ${isCoopSiteValue(b.site)?`<button class="act" data-copy-req="${b.id}">複製內容</button>`:''}
            <button class="act" data-billprint="${b.id}">列印</button>
            <button class="act danger" data-delbill="${b.id}">刪</button>
          </div>
        </div>
      </div>`;
    }).join(''):'';
    return `<div class="card" style="border-left:3px solid ${siteSettled>=siteTot?'var(--accent)':'var(--line2)'}">
      <div style="display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;cursor:pointer" data-toggle-form="req-site-${siteName}">
        <div style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap">${esc(siteDisplayLabel(siteName))}${siteTypeTag(siteName)}</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="font-size:13px;color:var(--muted)">合計 <b style="color:var(--accent)">${money(siteTot)}</b>　案場未收款合計 <span style="color:var(--danger)">${money(siteTot-siteSettled)}</span></div>
          <span style="font-size:12px;color:var(--muted)">${open?'▲':'▼'}</span>
        </div>
      </div>
      ${entries}
    </div>`;
  };
  const siteCards=siteNames.map(renderSiteCard).join('');
  const pausedOpen=!!formOpen['req-paused-sites'];
  const pausedSection=pausedNames.length?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" data-toggle-form="req-paused-sites">
      <div style="font-size:14px;font-weight:600;color:var(--muted)">⏸ 已暫停案場（${pausedNames.length}）</div>
      <span style="font-size:12px;color:var(--muted)">${pausedOpen?'▲ 收合':'▼ 展開'}</span>
    </div>
  </div>${pausedOpen?pausedNames.map(renderSiteCard).join(''):''}`:'';

  return `
  <div class="metrics">
    <div class="metric"><div class="l">請款單數</div><div class="v">${list.length}</div></div>
    <div class="metric"><div class="l">請款總額</div><div class="v" style="font-size:21px">${money(total)}</div></div>
    <div class="metric"><div class="l">全部未收款合計</div><div class="v" style="font-size:21px">${money(unsettled)}</div></div>
  </div>
  <div class="card">
    ${foldBtn('bnr','新增請款單')}
    ${formOpen.bnr?`<div class="row" style="margin-top:8px">
      <div class="field"><label>日期</label><input type="date" id="bnr-date" value="${billingReqDraft?esc(billingReqDraft.date):new Date().toISOString().slice(0,10)}"></div>
      <div class="field" style="flex:1;min-width:150px"><label>案場</label><select id="bnr-site">${siteSelOpts}</select></div>
      <div class="field"><label>單位</label><input id="bnr-unit" value="式" placeholder="式、天、坪" style="width:90px"></div>
      <div class="field"><label>數量</label><input type="number" id="bnr-qty" min="0" step="0.01" value="${billingReqDraft?'':'1'}" style="width:90px"></div>
      <div class="field"><label>單價</label><input type="number" id="bnr-unit-price" min="0" step="1" style="width:120px"></div>
      <div class="field"><label>小計</label><div id="bnr-subtotal" class="num" style="height:36px;display:flex;align-items:center;font-weight:700">$0</div></div>
      <div class="field"><label>方式</label><input id="bnr-method" placeholder="匯款" value="${billingReqDraft?esc(billingReqDraft.method):''}" style="width:100px"></div>
      <div class="field"><label>業主</label><input id="bnr-client" list="client-memory-list" placeholder="業主名稱" value="${billingReqDraft?esc(billingReqDraft.client):''}" style="width:110px"></div>
      <div class="field" style="flex:1;min-width:180px"><label>說明</label><input id="bnr-note" placeholder="例：第一期工程款" value="${billingReqDraft?esc(billingReqDraft.note):''}"></div>
      <div class="field"><label>收款狀態</label><select id="bnr-settled"><option value="">未收款</option><option value="1" ${billingReqDraft&&billingReqDraft.settled?'selected':''}>已收款</option></select></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn" id="bnr-add">＋ 新增請款單</button></div>`:''}
    ${dataListHtml('client-memory-list', knownClients())}
  </div>
  ${list.length===0?'<div class="card"><div class="empty">尚無請款單。點上方「新增請款單」開始登記。</div></div>':siteCards+pausedSection}`;
}
