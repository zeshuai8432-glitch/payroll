// ---- 計量明細 ----
function measurementTypeLabel(m){
  const mt=m.measureType||'';
  const isPartition=mt==='partition'||(!mt&&m.width&&m.height);
  return isPartition?'隔間':(mt==='ceiling'?'天花板':(mt==='carry'?'搬運':''));
}
// 類型分組 key 與順序（案場內再依類型分段用）
function measTypeKey(m){
  const mt=m.measureType||'';
  if(mt==='partition'||(!mt&&m.width&&m.height)) return 'partition';
  if(mt==='ceiling') return 'ceiling';
  if(mt==='carry') return 'carry';
  return 'other';
}
const MEAS_TYPE_ORDER=[['partition','隔間'],['ceiling','天花板'],['carry','搬運'],['other','其他']];
// 重點標記三色循環：黃=注意 → 紅=待確認 → 藍=業主指定 → 取消
const MEAS_FLAGS={
  y:{label:'追加',   bg:'#FEF3C7', ink:'#d97706'},
  r:{label:'待確認', bg:'#FEE2E2', ink:'#dc2626'},
  b:{label:'業主指定', bg:'#DBEAFE', ink:'#2563EB'},
};
const MEAS_FLAG_CYCLE=['','y','r','b'];
function measFlagKey(m){ if(m.flag===true||m.flag==='g') return 'y'; return MEAS_FLAGS[m.flag]?m.flag:''; } // 舊資料 true/綠色 視為黃(追加)
// 標記依 flagAt 時間戳雙向合併（同簽名檔邏輯），新的蓋舊的，取消(空字串)也會同步
function mergeMeasFlags(cloudList){
  let changed=false;
  const byId={}; (cloudList||[]).forEach(c=>{ if(c&&c.id) byId[c.id]=c; });
  (state.measurements||[]).forEach(l=>{
    const c=byId[l.id]; if(!c) return;
    const ca=Number(c.flagAt)||0, la=Number(l.flagAt)||0;
    if(ca>la){ l.flag=c.flag; l.flagAt=c.flagAt; changed=true; }
  });
  return changed;
}
function measurementSizeLabel(m){
  const mt=m.measureType||'';
  const isPartition=mt==='partition'||(!mt&&m.width&&m.height);
  const cnt=Number(m.count)||1;
  const carrySize=m.sizeText||((m.width&&m.height)?`${Number(m.width)||0} × ${Number(m.height)||0} m`:(m.width?`寬 ${Number(m.width)||0} m`:(m.height?`高 ${Number(m.height)||0} m`:'')));
  if(isPartition){
    const w=Number(m.width)||0, h=Number(m.height)||0;
    if(w>0&&h>0) return `${w} × ${h} m${cnt>1?` ×${cnt}間`:''}`;
    return cnt>1?`每間 ${Number(m.perQty)||''} ×${cnt}間`:'—';
  }
  if(mt==='carry') return carrySize;
  return cnt>1?`每間 ${Number(m.perQty)||''} ×${cnt}間`:'—';
}
function viewMeasurements(){
  const siteSelOpts=siteSelectOptions(measDraft?measDraft.site:(measKeep?measKeep.site:''));
  const mdType=measDraft?(measDraft.measureType||'partition'):(measKeep?measKeep.measureType:'partition');
  const mdAutoArea=measDraft&&mdType==='partition'&&measDraft.unit==='㎡';
  const mdQty=measDraft?(mdAutoArea?'':(Number(measDraft.count)>1&&measDraft.perQty?measDraft.perQty:measDraft.qty)):'';
  const list=[...state.measurements].sort((a,b)=>(b.date||'').localeCompare(a.date||'')||(a.site||'').localeCompare(b.site||''));
  const grandTotal=list.reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);

  const bysite={};
  list.forEach(m=>{ const k=parentSiteName(m.site)||'（未填案場）'; (bysite[k]=bysite[k]||[]).push(m); });
  const siteNames=Object.keys(bysite).sort((a,b)=>a.localeCompare(b));

  const siteCards=siteNames.map(name=>{
    const rows=bysite[name];
    const siteTotal=rows.reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);
    const open=!!formOpen['meas-site-'+name];
    const allSel=rows.length>0&&rows.every(m=>measSel[m.id]);
    const renderRow=m=>{
      const amt=(Number(m.qty)||0)*(Number(m.unitPrice)||0);
      const sizeLabel=measurementSizeLabel(m);
      if(measEditId===m.id){
        const isPart=(m.measureType||'partition')==='partition'||(!m.measureType&&m.width&&m.height);
        return `<tr><td colspan="10" style="padding:12px 14px;background:var(--bg)">

            <div class="field"><label>日期</label><input type="date" id="me-date" value="${esc(m.date||'')}"></div>
            <div class="field" style="flex:1;min-width:200px"><label>項目（可換行）</label><textarea id="me-item" rows="2">${esc(m.item||'')}</textarea></div>
            <div class="field"><label>單位</label><input id="me-unit" value="${esc(m.unit||'')}" style="width:80px"></div>
            ${isPart?`<div class="field"><label>寬(m)</label><input type="number" id="me-width" value="${m.width!=null?m.width:''}" min="0" step="0.01" style="width:85px"></div>
            <div class="field"><label>高(m)</label><input type="number" id="me-height" value="${m.height!=null?m.height:''}" min="0" step="0.01" style="width:85px"></div>`:''}
            ${m.measureType==='carry'?`<div class="field"><label>尺寸</label><input id="me-size" value="${esc(m.sizeText||'')}" style="width:130px"></div>`:''}
            ${m.measureType!=='carry'?`<div class="field"><label>間數</label><input type="number" id="me-count" value="${Number(m.count)||1}" min="1" step="1" style="width:75px"></div>`:''}
            <div class="field"><label>總數量</label><input type="number" id="me-qty" value="${m.qty}" min="0" step="0.01" style="width:95px"></div>
            <div class="field"><label>單價（可算式）</label><input id="me-price" value="${esc(m.priceExpr||String(m.unitPrice))}" style="width:110px"></div>
            <div class="field" style="flex:1;min-width:140px"><label>備注（可換行）</label><textarea id="me-note" rows="2">${esc(m.note||'')}</textarea></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
            <button class="btn" id="meas-edit-ok" data-meid="${m.id}">儲存</button>
            <button class="act muted" id="meas-edit-cancel" style="cursor:pointer;height:40px">取消</button>
            ${isPart?'<span class="sub" style="margin:0">單位㎡時，改寬高會自動以 寬×高×間數 重算總數量</span>':''}
          </div>
        </td></tr>`;
      }
      const fk=measFlagKey(m); const ff=fk?MEAS_FLAGS[fk]:null;
      return `<tr${ff?` style="background:${ff.bg}"`:''}>
        <td style="text-align:center"><input type="checkbox" data-measpick-cb="${m.id}" ${measSel[m.id]?'checked':''} style="width:16px;height:16px"></td>
        <td>${esc(m.date||'')}</td>
        <td style="max-width:280px;white-space:normal;word-break:break-word">${ff?`<span style="color:${ff.ink};font-weight:700;font-size:11px">★${ff.label}</span> `:''}${escBr(m.item||'')}${m.billedTo&&state.billings.some(b=>b.id===m.billedTo)?'<span class="tag" style="background:#e3efe9;color:var(--accent)">已帶入請款</span>':''}</td>
        <td style="text-align:right">${esc(sizeLabel)}</td>
        <td style="text-align:center">${esc(m.unit||'')}</td>
        <td style="text-align:right">${(Number(m.qty)||0).toLocaleString()}</td>
        <td style="text-align:right">${money(Number(m.unitPrice)||0)}${m.priceExpr?`<div style="font-size:11px;color:var(--muted)">=${esc(m.priceExpr)}</div>`:''}</td>
        <td style="text-align:right;font-weight:700">${money(amt)}</td>
        <td style="max-width:140px;color:var(--muted);font-size:12px">${escBr(m.note||'')}</td>
        <td style="white-space:nowrap"><button class="act" data-flag-meas="${m.id}" title="重點標記：點擊循環 追加→待確認→業主指定→取消" style="padding:2px 8px;font-size:12px;${ff?`color:${ff.ink};background:${ff.bg}`:''}">★</button> <button class="act" data-copy-meas="${m.id}" style="padding:2px 10px;font-size:12px">複製</button> <button class="act" data-edit-meas="${m.id}" style="padding:2px 10px;font-size:12px">改</button> <button class="act danger" data-del-meas="${m.id}" style="padding:2px 10px;font-size:12px">刪</button></td>
      </tr>`;
    };
    // 案場內依類型分段：隔間 → 天花板 → 搬運，各段有小計
    const trs=open?MEAS_TYPE_ORDER.map(([k,label])=>{
      const g=rows.filter(m=>measTypeKey(m)===k);
      if(!g.length) return '';
      const sub=g.reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);
      return `<tr><td colspan="10" style="background:rgba(99,102,241,.07);padding:7px 12px;font-weight:700;font-size:12px;color:#4338ca">${label}（${g.length}筆）<span style="float:right">小計 ${money(sub)}</span></td></tr>`+g.map(renderRow).join('');
    }).join(''):'';
    // 計量 vs 請款差額（依「母 / 子」正規化鑰匙逐一比對）
    const keys=[...new Set(rows.map(m=>canonSiteKey(m.site)))].sort();
    const diffLines=keys.map(k=>{
      const d=measBilledDiffForKey(k);
      const label=k===name?'':(k.startsWith(name+' / ')?('↳ '+k.slice(name.length+3)):k);
      return `<div style="display:flex;justify-content:space-between;gap:10px;font-size:12px;padding:2px 0">

            <th style="padding:6px 10px"></th>
          </tr></thead>
          <tbody>${trs}</tbody>
        </table>

  }).join('');

  return `

    <div class="metric"><div class="l">筆數</div><div class="v">${list.length}</div></div>

      <div class="field" style="flex:1;min-width:150px"><label>案場</label><select id="meas-site">${siteSelOpts}</select></div>
      <div class="field" style="flex:1;min-width:220px"><label id="meas-item-label">項目（可換行）</label><textarea id="meas-item" rows="2" placeholder="例：貼磁磚、矽酸鈣板（長說明可按 Enter 換行）">${measDraft?esc(measDraft.item||''):''}</textarea></div>
      <div class="field"><label>單位</label><input id="meas-unit" value="${measDraft?esc(measDraft.unit||'㎡'):'㎡'}" placeholder="㎡、坪、才、式" style="width:90px"></div>
      <div class="field" id="meas-width-field"><label>寬度（m）</label><input type="number" id="meas-width" value="${measDraft&&measDraft.width!=null?measDraft.width:''}" min="0" step="0.01" style="width:95px"></div>
      <div class="field" id="meas-height-field"><label>高度（m）</label><input type="number" id="meas-height" value="${measDraft&&measDraft.height!=null?measDraft.height:''}" min="0" step="0.01" style="width:95px"></div>
      <div class="field" id="meas-size-field" style="display:none;flex:1 1 220px;min-width:220px"><label>尺寸</label><input id="meas-size" value="${measDraft?esc(measDraft.sizeText||''):''}" placeholder="例：4尺×8尺、120×240" style="width:100%"></div>
      <div class="field" id="meas-count-field"><label>間數（選填）</label><input type="number" id="meas-count" value="${measDraft&&Number(measDraft.count)>1?Number(measDraft.count):''}" min="1" step="1" placeholder="1" style="width:90px"></div>
      <div class="field" style="flex:0 0 130px;min-width:130px"><label id="meas-qty-label">數量/面積</label><input type="number" id="meas-qty" value="${mdQty}" min="0" step="0.01" style="width:100%"></div>
      <div class="field"><label>單價（可算式）</label><input id="meas-price" value="${measDraft?esc(measDraft.priceExpr||String(measDraft.unitPrice)):''}" placeholder="1200 或 1200*1.1" style="width:130px"></div>
      <div class="field"><label>小計</label><div id="meas-subtotal" class="num" style="height:36px;display:flex;align-items:center;font-weight:700">$0</div></div>
      <div class="field"><label>日期</label><input type="date" id="meas-date" value="${measKeep&&measKeep.date?esc(measKeep.date):new Date().toISOString().slice(0,10)}"></div>
      <div class="field" style="flex:1;min-width:150px"><label>備注（可換行）</label><textarea id="meas-note" rows="2" placeholder="（選填）">${measDraft?esc(measDraft.note||''):''}</textarea></div>
    </div>
    <div class="row" style="margin-top:10px"><button class="btn" id="meas-add">＋ 新增</button></div>`:''}
  </div>
  ${list.length===0?'<div class="card"><div class="empty">尚無計量明細。點上方「新增」開始登記。</div></div>':siteCards}`;
}

function exportMeasurementsPDF(selectedOnly=false){
  let list=[...state.measurements].sort((a,b)=>(a.site||'').localeCompare(b.site||'')||(a.date||'').localeCompare(b.date||''));
  if(selectedOnly) list=list.filter(m=>measSel[m.id]);
  if(list.length===0){ alert(selectedOnly?'尚未勾選任何計量明細':'尚無可匯出的計量明細'); return; }
  const bysite={};
  list.forEach(m=>{ const k=parentSiteName(m.site)||'未指定案場'; (bysite[k]=bysite[k]||[]).push(m); });
  const sections=Object.keys(bysite).sort((a,b)=>a.localeCompare(b)).map(name=>{
    const rows=bysite[name];
    const subtotal=rows.reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);
    const rowHtml=m=>{
      const amt=(Number(m.qty)||0)*(Number(m.unitPrice)||0);
      const fk=measFlagKey(m); const ff=fk?MEAS_FLAGS[fk]:null;
      return `<tr${fk?` class="flag-${fk}"`:''}>
        <td>${esc(m.date||'')}</td>
        <td style="white-space:normal;word-break:break-word">${ff?`<span style="color:${ff.ink};font-weight:700;font-size:10px">★${ff.label}</span> `:''}${escBr(m.item||'')}</td>
        <td>${esc(measurementSizeLabel(m))}</td>
        <td>${esc(m.unit||'')}</td>
        <td class="num">${(Number(m.qty)||0).toLocaleString()}</td>
        <td class="num">${money(Number(m.unitPrice)||0)}${measShowExpr&&m.priceExpr?`<div style="font-size:10px;color:#888">=${esc(m.priceExpr)}</div>`:''}</td>
        <td class="num">${money(amt)}</td>
        <td>${escBr(m.note||'')}</td>
      </tr>`;
    };
    // 案場內依類型分段（隔間→天花板→搬運），各段有段落標題與小計
    const trs=MEAS_TYPE_ORDER.map(([k,label])=>{
      const g=rows.filter(m=>measTypeKey(m)===k);
      if(!g.length) return '';
      const sub=g.reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);
      return `<tr class="type-head"><td colspan="8" style="padding:6px 8px">${label}（${g.length}筆）　小計 ${money(sub)}</td></tr>`+g.map(rowHtml).join('');
    }).join('');
    return `<h2>${esc(name)}</h2>
      <table><thead><tr><th>日期</th><th>項目</th><th>尺寸</th><th>單位</th><th class="num">數量</th><th class="num">單價</th><th class="num">小計</th><th>備註</th></tr></thead>
      <tbody>${trs}<tr class="total-row"><td colspan="6">案場合計</td><td class="num">${money(subtotal)}</td><td></td></tr></tbody></table>`;
  }).join('<div style="height:16px"></div>');
  const total=list.reduce((s,m)=>s+(Number(m.qty)||0)*(Number(m.unitPrice)||0),0);
  const title='計量明細';
  const today=new Date().toISOString().slice(0,10);
  const inner=`<div class="bluedoc">
    <h1>${title}</h1>
    <div class="meta">匯出日期：${today}　|　筆數：${list.length}　|　總金額：${money(total)}</div>
    ${sections}
    <table style="margin-top:18px"><tbody><tr class="total-row"><td>總計</td><td class="num">${money(total)}</td></tr></tbody></table>
    <div class="foot"><span>本報表由系統自動產生</span><span>${today}</span></div>
  </div>`;
  printHTML(title, inner);
}

function viewBilling(){
  // 依案場名稱分組
  const trackedBillings=state.billings.filter(b=>b.settled);
  const pendingCount=state.billings.length-trackedBillings.length;
  const groups={};
  trackedBillings.forEach(b=>{ const k=parentSiteName(b.site)||'（未填案場）'; (groups[k]=groups[k]||[]).push(b); });
  const siteNames=Object.keys(groups).sort((a,b)=>a.localeCompare(b));

  const totalBilled=trackedBillings.reduce((s,b)=>s+billingAmount(b),0);
  const totalSettled=totalBilled;
  const totalUnsettled=0;

  const cardForName=(name)=>{
    const list=groups[name].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    // 分兩區：對業主請款（sub=''，計入合約進度）／子案場工程款（「母 / 子」，對母案場是成本，不計入進度）
    const ownList=list.filter(b=>!splitSiteValue(b.site).sub);
    const childList=list.filter(b=>!!splitSiteValue(b.site).sub);
    const billedOwn=ownList.reduce((s,b)=>s+billingAmount(b),0);
    const billedChild=childList.reduce((s,b)=>s+billingAmount(b),0);
    const siteObj=state.sites.find(x=>x.name===name);
    const contract=Number(siteObj&&siteObj.contract!==undefined&&siteObj.contract!==''?siteObj.contract:state.contracts[name])||0;
    let progress='';
    if(contract>0){
      const pct=Math.min(100,Math.round(billedOwn/contract*100));
      const remain=contract-billedOwn;
      progress=`<div class="sub" style="margin:4px 0 8px">合約總額 ${money(contract)}　對業主已收款 ${money(billedOwn)}（${pct}%）　${remain>0?`尚未收款 <b>${money(remain)}</b>`:(remain<0?`<span style="color:var(--danger)">超出合約 ${money(-remain)}</span>`:'已收足')}
        <div style="height:6px;background:var(--line);border-radius:3px;margin-top:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:var(--accent)"></div></div></div>`;
    }
    const rowFor=b=>{
      const docType=b.docType||'請款單';
      if(billEditId===b.id){
        return `<tr><td colspan="8" style="background:var(--bg)">
          <div class="row" style="margin:6px 0">
            <div class="field"><label>類型</label><select id="be-type"><option value="請款單" ${docType==='請款單'?'selected':''}>請款單</option><option value="追加單" ${docType==='追加單'?'selected':''}>追加單</option></select></div>
            <div class="field"><label>請款日</label><input type="date" id="be-date" value="${b.date||''}"></div>
            <div class="field"><label>金額</label><input type="number" id="be-amount" value="${b.amount||0}" step="1000" style="width:120px"></div>
            <div class="field"><label>方式</label><input id="be-method" value="${esc(b.method||'')}" style="width:100px"></div>
            <div class="field"><label>業主</label><input id="be-client" list="client-memory-list" value="${esc(b.client||'')}" style="width:110px"></div>
            <div class="field"><label>備註</label><input id="be-note" value="${esc(b.note||'')}" style="width:130px"></div>
            <button class="btn" data-billeditok="${b.id}">儲存</button>
            <button class="act muted" data-billeditcancel="1" style="cursor:pointer;height:36px">取消</button>
          </div>
        </td></tr>`;
      }
      const typeStyle=docType==='追加單'?'background:#fde9d4;color:#9a5b1a':'background:#e3efe9;color:var(--accent)';
      const photos=billingPhotos[b.id]||[];
      const thumbs=photos.map((url,i)=>`<div style="position:relative;display:inline-block;vertical-align:top"><img src="${url}" class="photo-thumb" style="width:80px;height:60px;object-fit:cover;border-radius:5px;border:1px solid var(--line)"><button data-photodel="${b.id}" data-photoidx="${i}" style="position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;border:none;background:var(--danger);color:#fff;font-size:12px;cursor:pointer;padding:0;line-height:20px;text-align:center">✕</button></div>`).join('');
      return `<tr>
      <td><span class="tag" style="${typeStyle}">${esc(docType)}</span> ${esc(b.date||'')} ${subSiteTag(b.site)}</td>
      <td class="num">${money(billingAmount(b))}</td>
      <td>${esc(b.method||'')}</td><td>${esc(b.client||'')}</td>
      <td><button class="act ${b.settled?'':'muted'}" data-togglesettle="${b.id}" data-fromtrack="1" style="${b.settled?'color:var(--accent)':''}">${b.settled?'✓ 已收款':'未收款'}</button></td>
      <td>${esc(b.note||'')}</td>
      <td><button class="act" data-billprint="${b.id}">列印</button> <button class="act" data-billedit="${b.id}">改</button> <button class="act danger" data-delbill="${b.id}">刪</button></td>
    </tr>
    <tr style="background:var(--bg)">
      <td colspan="8" style="padding:5px 10px 8px">
        <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center">
          ${thumbs}
          <label style="cursor:pointer;display:flex;align-items:center;gap:4px;padding:5px 10px;background:var(--surface);border:1px dashed var(--line2);border-radius:8px;font-size:12px;color:var(--muted)">📷 上傳施作照片<input type="file" accept="image/jpeg,image/png,image/webp,image/heic,image/heif,.heic,.heif" multiple data-photoadd="${b.id}" style="display:none"></label>
        </div>
      </td>
    </tr>`;};
    const ownRows=ownList.map(rowFor).join('');
    const childRows=childList.map(rowFor).join('');
    const tableHead=`<thead><tr><th>日期</th><th class="num">金額</th><th>方式</th><th>業主</th><th>收款</th><th>備註</th><th></th></tr></thead>`;
    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;flex-wrap:wrap;gap:8px">
        <div style="font-size:15px;font-weight:600">${esc(name)}${(()=>{const so=state.sites.find(x=>x.name===name);if(!so)return '';if(so.coop||so.type==='合作案')return '<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案</span>';if(so.type)return `<span class="tag" style="background:#e3efe9;color:var(--accent)">${esc(so.type)}</span>`;return '';})()}</div>
        <div style="font-size:14px">對業主已收款 <b>${money(billedOwn)}</b>${billedChild>0?`　<span style="color:var(--muted)">子案場工程款 ${money(billedChild)}</span>`:''}</div>
      </div>
      ${progress}
      ${ownRows?`<div style="font-size:13px;font-weight:600;margin:6px 0 4px">對業主請款</div>
      <div class="scroll"><table>${tableHead}<tbody>${ownRows}</tbody></table></div>`:'<div class="sub" style="margin:6px 0">尚無對業主的已收款請款。</div>'}
      ${childRows?`<div style="font-size:13px;font-weight:600;margin:12px 0 4px">子案場工程款 <span class="tag" style="background:#fde9d4;color:#9a5b1a">對母案場是成本</span> <span style="font-weight:400;font-size:11px;color:var(--muted)">不計入合約進度；各子案場的分潤在「分潤結算」以「母 / 子」名稱列出</span></div>
      <div class="scroll"><table>${tableHead}<tbody>${childRows}</tbody></table></div>`:''}
    </div>`;
  };
  const namePaused=name=>{ const st=state.sites.find(x=>x.name===name); return st&&st.active===false; };
  const activeNames=siteNames.filter(n=>!namePaused(n));
  const pausedNames=siteNames.filter(n=>namePaused(n));
  const cards=activeNames.map(cardForName).join('');
  const pausedCards=pausedNames.length?`<details ${detailAttrs('billing-track-paused')} style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedNames.length}）</summary>${pausedNames.map(cardForName).join('')}</details>`:'';

  return `
  <div class="metrics">
    <div class="metric"><div class="l">已收款請款</div><div class="v" style="font-size:20px">${money(totalBilled)}</div></div>
    <div class="metric"><div class="l">已收款筆數</div><div class="v" style="font-size:20px;color:var(--accent)">${trackedBillings.length}</div></div>
    <div class="metric"><div class="l">未收款未列入</div><div class="v" style="font-size:20px;color:var(--muted)">${pendingCount}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <p class="sub" style="margin:0;flex:1;min-width:200px">流程：請款單先給業主確認 → 業主撥款後，到「請款單／追加單」頁按「✓ 已收款」→ 單據自動進入這裡追蹤。金額還會變動的單據請留在請款單頁。</p>
      <button class="btn" id="export-billing" ${trackedBillings.length===0?'disabled style="opacity:.5"':''}>匯出 PDF</button>
    </div>
  </div>
  ${cards===''&&pausedCards===''?'<div class="card"><div class="empty">尚無已收款請款紀錄。</div></div>':cards}${pausedCards}
  ${dataListHtml('client-memory-list', knownClients())}`;
}

// 各明細「區段」HTML 建構（給合併匯出用；回傳一段 HTML 或 ''）
function reconSection(key, from, to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const rangeTxt=(from||to)?`${from||'起始'} ～ ${to||'迄今'}`:'全部期間';
  if(key==='payroll'){
    const byEmp=buildPayroll(from,to);
    const isP=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
    const ids=Object.keys(byEmp).filter(id=>!isP(id)).sort((a,b)=>byEmp[b].net-byEmp[a].net);
    if(ids.length===0) return '';
    let gG=0,gA=0,gD=0,gN=0,gC=0;
    const rows=ids.map(id=>{ const e=byEmp[id]; gG+=e.gross;gA+=e.addTotal;gD+=e.dedTotal;gN+=e.net;gC+=e.companyWage;
      return `<tr><td>${esc(empName(id))}</td><td class="num">${e.days.size}</td><td class="num">${money(e.gross)}</td><td class="num">${e.addTotal?money(e.addTotal):'-'}</td><td class="num">${e.dedTotal?money(e.dedTotal):'-'}</td><td class="num">${money(e.net)}</td><td class="num">${money(e.companyWage)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">員工薪資總表（${rangeTxt}）</h2>
      <table><thead><tr><th>員工</th><th class="num">出勤天</th><th class="num">基本工資</th><th class="num">加項</th><th class="num">扣項</th><th class="num">實發</th><th class="num">公司負擔</th></tr></thead>
      <tbody>${rows}<tr class="total-row"><td>合計</td><td class="num"></td><td class="num">${money(gG)}</td><td class="num">${money(gA)}</td><td class="num">${money(gD)}</td><td class="num">${money(gN)}</td><td class="num">${money(gC)}</td></tr></tbody></table>
      <p class="sub">公司負擔工資（品佑結算基準）＝實發＋借支扣還＝基本工資＋加項−非借支扣項。</p>`;
  }
  if(key==='advances'){
    const partners=state.employees.filter(e=>e.partner);
    const byEmp=buildPayroll(from,to);
    if(partners.length===0) return '';
    const rows=partners.map(p=>{
      const wage=byEmp[p.id]?byEmp[p.id].net:0; // 與代墊款卡片、入帳一致（實發）
      const adv=state.advances.filter(a=>a.empId===p.id&&inRange(a.date)).reduce((s,a)=>s+(Number(a.amount)||0),0);
      return `<tr><td>${esc(p.name)}</td><td class="num">${money(wage)}</td><td class="num">${money(adv)}</td><td class="num" style="font-weight:700">${money(wage+adv)}</td></tr>`;
    }).join('');
    return `<h2 class="sec">代墊款明細（${rangeTxt}）</h2>
      <table><thead><tr><th>股東</th><th class="num">工資</th><th class="num">代墊款</th><th class="num">應領</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  if(key==='ledger'){
    const txs=state.ledger.filter(t=>inRange(t.date)).sort((a,b)=>a.date.localeCompare(b.date));
    if(txs.length===0) return '';
    let tin=0,tout=0;
    const rows=txs.map(t=>{ tin+=t.kind==='in'?(Number(t.amount)||0):0; tout+=t.kind==='out'?(Number(t.amount)||0):0;
      return `<tr><td>${esc(t.date)}</td><td>${esc(accountName(t.accId))}</td><td>${esc(t.note||'')}</td><td class="num">${t.kind==='in'?money(t.amount):'-'}</td><td class="num">${t.kind==='out'?money(t.amount):'-'}</td></tr>`;
    }).join('');
    return `<h2 class="sec">公積金帳戶收支（${rangeTxt}）</h2>
      <table><thead><tr><th>日期</th><th>帳戶</th><th>項目</th><th class="num">收入</th><th class="num">支出</th></tr></thead>

  if(key==='sites'){

    const ids=Object.keys(bySite); if(ids.length===0) return '';

  }
  return '';
}

// ---- 員工年度收入彙總（逐月 + 全年合計，可匯出 PDF / CSV）----
let yearIncomeYear=new Date().getFullYear();
function yearIncomeData(year){
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const byId={}; const monthTotals=Array(12).fill(0);
  for(let m=0;m<12;m++){
    const mm=String(m+1).padStart(2,'0');
    const from=`${year}-${mm}-01`;
    const last=new Date(year,m+1,0).getDate();
    const to=`${year}-${mm}-${String(last).padStart(2,'0')}`;
    const be=buildPayroll(from,to);
    Object.keys(be).forEach(id=>{ if(isPartner(id)) return; const e=be[id]; const net=Number(e.net)||0;
      if(net===0 && e.days.size===0 && e.addTotal===0 && e.dedTotal===0) return;
      byId[id]=byId[id]||{id,name:empName(id),months:Array(12).fill(0),total:0};
      byId[id].months[m]+=net; byId[id].total+=net; monthTotals[m]+=net;
    });
  }
  const emps=Object.values(byId).sort((a,b)=>b.total-a.total);
  const grand=emps.reduce((s,e)=>s+e.total,0);
  return {emps,monthTotals,grand};
}
function printYearIncome(){
  const data=yearIncomeData(yearIncomeYear);
  if(data.emps.length===0){ alert(`${yearIncomeYear} 年沒有薪資資料。`); return; }
  const mHead=Array.from({length:12},(_,i)=>`<th class="num">${i+1}月</th>`).join('');
  const rows=data.emps.map(e=>`<tr><td>${esc(e.name)}</td>${e.months.map(v=>`<td class="num">${v?money(v):'-'}</td>`).join('')}<td class="num" style="font-weight:700">${money(e.total)}</td></tr>`).join('');
  const totalRow=`<tr class="total-row"><td>合計</td>${data.monthTotals.map(v=>`<td class="num">${v?money(v):'-'}</td>`).join('')}<td class="num">${money(data.grand)}</td></tr>`;
  const inner=`<h1>員工年度收入彙總 ${yearIncomeYear}</h1>
    <div class="meta">依實發金額（每月按出勤日期歸月）　|　列印日期：${new Date().toISOString().slice(0,10)}　|　共 ${data.emps.length} 人</div>
    <table><thead><tr><th>員工</th>${mHead}<th class="num">全年合計</th></tr></thead>

  printHTML('員工年度收入 '+yearIncomeYear, inner, {landscape:true});
}
function exportYearIncomeCSV(){
  const data=yearIncomeData(yearIncomeYear);
  if(data.emps.length===0){ alert(`${yearIncomeYear} 年沒有薪資資料。`); return; }
  const csv=s=>{ const t=String(s==null?'':s); return /[",\n]/.test(t)?'"'+t.replace(/"/g,'""')+'"':t; };
  const head=['員工',...Array.from({length:12},(_,i)=>`${i+1}月`),'全年合計'];
  const lines=[head.map(csv).join(',')];
  data.emps.forEach(e=>{ lines.push([csv(e.name),...e.months.map(v=>Math.round(v)),Math.round(e.total)].join(',')); });
  lines.push([csv('合計'),...data.monthTotals.map(v=>Math.round(v)),Math.round(data.grand)].join(','));
  const text='﻿'+lines.join('\r\n'); // BOM 讓 Excel 正確辨識中文
  try{
    const blob=new Blob([text],{type:'text/csv;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`員工年度收入-${yearIncomeYear}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){ alert('匯出失敗：'+e.message); }
}

let parkFrom='', parkTo='';
let parkVerifySel={a:true,b:true,c:true,d:true}; // 品佑驗算匯出勾選
function viewParkAcc(){
  const inRange=d=> (!parkFrom||(d>=parkFrom)) && (!parkTo||(d<=parkTo));
  const partners=state.employees.filter(e=>e.partner);
  const accOpts=`<option value="">（請選擇）</option>`+state.accounts.map(a=>`<option value="${a.id}" ${state.parkAccId===a.id?'selected':''}>${esc(a.name)}</option>`).join('');

  const picker=`<div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">品佑帳戶結算</div>
    <p class="sub">品佑帳戶餘額（收入−品佑垫付支出）就是「扣完該還品佑後、要拆的錢」。系統用它分配：公積金優先填滿，剩下分獎金；獎金不夠就按各人應拿比例分，少拿的可累加成「欠獎金」跨年補。前提：錢在品佑的案子，建分潤時「錢進哪個帳戶」要選品佑。</p>
    <div class="row" style="margin-bottom:8px">
      <div class="field" style="min-width:200px"><label>哪個帳戶是「品佑代支出」</label><select id="park-acc">${accOpts}</select></div>
      <div class="field"><label>起（依分潤日期）</label><input type="date" id="park-from" value="${parkFrom}"></div>
      <div class="field"><label>訖</label><input type="date" id="park-to" value="${parkTo}"></div>
      <button class="act" id="park-clear" style="height:36px;padding:0 12px;align-self:flex-end">全部期間</button>
    </div>
  </div>`;

  if(!state.parkAccId){
    return picker+`<div class="card"><div class="empty">請先在上方選擇「哪個帳戶是品佑代支出」。</div></div>`;
  }

  // 抓出 moneyAcc = 品佑 的分潤
  const parkDeals=state.deals.filter(d=>d.moneyAcc===state.parkAccId && d.type!=='合作案' && inRange(d.date));
  let targetBonus={}, targetFundByOwnerIgnore=0, bookFund=0, totalTargetBonus=0;
  const detailRows=[...parkDeals].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map(d=>{
    const c=dealCalc(d);
    const afterTax=(Number(d.amount)||0)-(c.tax||0);
    if(d.ownerId) targetBonus[d.ownerId]=(targetBonus[d.ownerId]||0)+c.bonus;
    bookFund+=c.fund; totalTargetBonus+=c.bonus;
    return `<tr><td>${esc(d.name)}<div style="font-size:11px;color:var(--muted)">${esc(d.date||'')}${d.ownerId?'｜'+esc(empName(d.ownerId)):''}</div></td>
      <td class="num">${money(d.amount)}${taxBreakdownHtml(d,c)}</td><td class="num">${money(c.tax)}</td><td class="num">${money(afterTax)}</td><td class="num" style="color:var(--accent)">${money(c.bonus)}</td><td class="num">${money(c.fund)}</td></tr>`;
  }).join('');

  const balance=accountBalance(state.parkAccId); // 已扣完品佑垫付（記在帳戶支出）後的餘額

  // 公積金「該留」＝ max(你設定的至少留, 帳面該進的公積金)
  const minFund=Math.max(0, Number(state.minFund)||0);
  const targetFund=Math.max(minFund, Math.round(bookFund));
  // 分配：公積金先填「該留」，剩下分獎金（不夠照各人應拿比例分）
  const fundPaid=Math.max(0, Math.min(balance, targetFund));
  let availForBonus=Math.max(0, balance-fundPaid);
  let bonusPaid={}, oweThis={};
  partners.forEach(p=>{
    const tgt=targetBonus[p.id]||0;
    let pay;
    if(totalTargetBonus<=0) pay=0;
    else if(availForBonus>=totalTargetBonus) pay=tgt;
    else pay=tgt*(availForBonus/totalTargetBonus);
    pay=Math.round(pay);
    bonusPaid[p.id]=pay;
    oweThis[p.id]=Math.max(0, Math.round(tgt)-pay);
  });
  const fundShort=Math.max(0, targetFund-fundPaid); // 連「該留」都填不滿的部分

  const bonusRows=partners.map(p=>{
    const tgt=Math.round(targetBonus[p.id]||0), pay=bonusPaid[p.id]||0, owe=oweThis[p.id]||0;
    return `<tr><td>${esc(p.name)} 管理獎金</td>
      <td class="num">${money(tgt)}</td>
      <td class="num" style="font-weight:600;color:var(--accent)">${money(pay)}</td>
      <td class="num" style="color:${owe>0?'var(--danger)':'var(--muted)'}">${owe>0?money(owe):'—'}</td></tr>`;
  }).join('');

  // 已累積欠獎金（跨年保存）
  const oweRows=partners.map(p=>{
    const owed=Math.round(state.oweBonus[p.id]||0);
    return `<tr><td>${esc(p.name)}</td><td class="num" style="color:${owed>0?'var(--danger)':'var(--muted)'};font-weight:600">${owed>0?money(owed):'0'}</td>
      <td>${owed>0?`<button class="act" data-owepay="${p.id}">補發…</button>`:''}</td></tr>`;
  }).join('');
  const anyOwe=partners.some(p=>(state.oweBonus[p.id]||0)>0);

  // 驗算區（一行一項、金額靠右）
  const parkIn=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='in').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const parkOut=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='out').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const parkAcc=state.accounts.find(a=>a.id===state.parkAccId);
  const parkOpening=parkAcc?Number(parkAcc.opening)||0:0;
  const vline=(label,val,opt={})=>`<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:5px 0;border-bottom:1px solid var(--line)${opt.strong?';font-weight:700':''}${opt.sub?';color:var(--muted);font-size:12px':''}"><span>${label}</span><span class="num" style="white-space:nowrap${opt.color?';color:'+opt.color:''}">${val}</span></div>`;
  const vhead=(t,key)=>`<div style="font-weight:700;font-size:13px;margin:14px 0 4px;color:var(--accent);display:flex;align-items:center;gap:8px">${key?`<input type="checkbox" data-pvsel="${key}" ${parkVerifySel[key]!==false?'checked':''} style="width:15px;height:15px">`:''}<span>${t}</span></div>`;
  const bonusByDeal=[...parkDeals].filter(d=>d.ownerId).map(d=>{const c=dealCalc(d);return vline(`${esc(d.name)}（${esc(empName(d.ownerId))}）`,money(c.bonus),{sub:true});}).join('');
  // 收入/支出明細（可收合）
  const parkInTx=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='in').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const parkOutTx=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='out').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const txDetail=(arr,color,key)=>`<details ${detailAttrs('park-tx-'+key)} style="margin:2px 0 4px 0"><summary style="cursor:pointer;font-size:12px;color:var(--info)">明細（${arr.length} 筆）</summary><div style="padding-left:8px">${arr.map(t=>vline(`${esc(t.date||'')}　${esc(t.note||'—')}`,money(t.amount),{sub:true,color})).join('')||'<div class="sub" style="padding:4px 0">無</div>'}</div></details>`;
  const verify=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <details ${detailAttrs('park-verify')} style="flex:1;min-width:200px"><summary style="cursor:pointer;font-size:14px;font-weight:600">驗算明細（核對用，點開）</summary>
      <div style="margin-top:4px">
        ${vhead('① 品佑帳戶餘額','a')}
        ${vline('期初',money(parkOpening))}
        ${vline('＋ 收入合計',money(parkIn),{color:'var(--accent)'})}
        ${txDetail(parkInTx,'var(--accent)','in')}
        ${vline('− 支出合計',money(parkOut),{color:'var(--danger)'})}
        ${txDetail(parkOutTx,'var(--danger)','out')}

// 品佑驗算匯出 PDF（依勾選的段落）
function exportParkVerify(){
  if(!state.parkAccId){ alert('請先選品佑帳戶'); return; }
  const inRange=d=> (!parkFrom||(d>=parkFrom)) && (!parkTo||(d<=parkTo));
  const partners=state.employees.filter(e=>e.partner);
  const parkDeals=state.deals.filter(d=>d.moneyAcc===state.parkAccId && d.type!=='合作案' && inRange(d.date));
  let targetBonus={}, bookFund=0, totalTargetBonus=0;
  parkDeals.forEach(d=>{ const c=dealCalc(d); if(d.ownerId) targetBonus[d.ownerId]=(targetBonus[d.ownerId]||0)+c.bonus; bookFund+=c.fund; totalTargetBonus+=c.bonus; });
  const balance=accountBalance(state.parkAccId);
  const minFund=Math.max(0,Number(state.minFund)||0);
  const targetFund=Math.max(minFund,Math.round(bookFund));
  const fundPaid=Math.max(0,Math.min(balance,targetFund));
  const avail=Math.max(0,balance-fundPaid);
  const parkAcc=state.accounts.find(a=>a.id===state.parkAccId);
  const op=parkAcc?Number(parkAcc.opening)||0:0;
  const parkIn=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='in').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const parkOut=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='out').reduce((s,t)=>s+(Number(t.amount)||0),0);
  const row=(l,v)=>`<tr><td>${l}</td><td class="num">${v}</td></tr>`;
  let secs='';
  if(parkVerifySel.a!==false){
    const inTx=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='in').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const outTx=state.ledger.filter(t=>t.accId===state.parkAccId&&t.kind==='out').sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    secs+=`<h2>① 品佑帳戶餘額</h2><table>${row('期初',money(op))}${row('＋ 收入合計',money(parkIn))}${inTx.map(t=>row('　'+esc(t.date||'')+' '+esc(t.note||''),money(t.amount))).join('')}${row('− 支出合計',money(parkOut))}${outTx.map(t=>row('　'+esc(t.date||'')+' '+esc(t.note||''),money(t.amount))).join('')}${row('<b>＝ 餘額</b>','<b>'+money(balance)+'</b>')}</table>`;
  }
  if(parkVerifySel.b!==false){
    secs+=`<h2>② 公積金該留多少</h2><table>${row('帳面該進公積金',money(Math.round(bookFund)))}${row('你設定至少留',money(minFund))}${row('＝ 取大的（該留）',money(targetFund))}${row('<b>實際填入</b>','<b>'+money(fundPaid)+'</b>')}</table>`;
  }
  if(parkVerifySel.c!==false){
    secs+=`<h2>③ 獎金可發</h2><table>${row('餘額',money(balance))}${row('− 公積金',money(fundPaid))}${row('<b>＝ 可發獎金</b>','<b>'+money(avail)+'</b>')}</table>`;
  }
  if(parkVerifySel.d!==false){
    const br=[...parkDeals].filter(d=>d.ownerId).map(d=>{const c=dealCalc(d);return row(esc(d.name)+'（'+esc(empName(d.ownerId))+'）',money(c.bonus));}).join('');
    secs+=`<h2>④ 帳面該發獎金（各案相加）</h2><table>${br||row('—','')}${row('<b>合計應發</b>','<b>'+money(Math.round(totalTargetBonus))+'</b>')}</table>`;
  }
  if(!secs){ alert('請至少勾選一個段落'); return; }
  printHTML('品佑帳戶結算·驗算明細', `<h1>品佑帳戶結算·驗算明細</h1><div class="meta">帳戶：${esc(accountName(state.parkAccId))}　|　列印日：${new Date().toISOString().slice(0,10)}</div>${secs}`);
}

    secs+=`<h2>② 各股東獎金 = 該股東各案相加</h2><table>${bl||row('—','')}</table>`;
  }
  if(yeVerifySel.c!==false){
    let al='';
    state.accounts.forEach(a=>{
      const inn=state.ledger.filter(t=>t.accId===a.id&&t.kind==='in').reduce((s,t)=>s+(Number(t.amount)||0),0);
      const out=state.ledger.filter(t=>t.accId===a.id&&t.kind==='out').reduce((s,t)=>s+(Number(t.amount)||0),0);
      const op=Number(a.opening)||0;
      al+=`<tr><td colspan="2" style="font-weight:700">${esc(a.name)}</td></tr>`;
      al+=row('　期初',money(op))+row('　＋ 收入',money(inn))+row('　− 支出',money(out))+row('　<b>＝ 餘額</b>','<b>'+money(op+inn-out)+'</b>');
    });
    secs+=`<h2>③ 各帳戶餘額 = 期初 + 收入 − 支出</h2><table>${al||row('—','')}</table>`;
  }
  if(!secs){ alert('請至少勾選一個段落'); return; }
  const period=(yearFrom||yearTo)?`${yearFrom||'起'} ~ ${yearTo||'今'}`:'全部期間';
  printHTML('年度總結·驗算明細', `<h1>年度總結·驗算明細</h1><div class="meta">期間：${period}　|　列印日：${new Date().toISOString().slice(0,10)}</div>${secs}`);
}

// 手機關頁/切換 App 時，盡量把最後資料補送到雲端，避免只留在本機。
window.addEventListener('beforeunload', ()=>{
  flushCloudOnExit();
});
window.addEventListener('pagehide', ()=>flushCloudOnExit());
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden') flushCloudOnExit();
  else if(document.visibilityState==='visible'){
    // 切回本頁自動拉雲端最新（本機無未上傳變更時才拉，避免蓋掉）
    if(!localDirty&&!saving) loadCloud();
  }
});

(function(){ const v=document.getElementById('app-version'); if(v){ v.textContent=APP_VERSION; v.style.display=''; } })(); // 版本號常駐顯示，方便確認是否拿到新版
loadLocal(); loadPhotos(); loadSigs(); refreshPrevIds();
try{ const t=localStorage.getItem(LS_TAB); if(t) state.tab=t; }catch(e){} // 還原上次所在分頁
render(); loadCloud();
</script>
