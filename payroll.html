<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點工薪資與案場人事成本管理</title>
<style>
  :root {
    --bg: #f4f5f3; --surface: #ffffff; --ink: #1f2421; --muted: #6b6f6c;
    --line: #e4e6e2; --line2: #cfd2cd; --accent: #2f5d50; --accent2: #c25a2b;
    --warn-bg: #faeeda; --warn-ink: #854f0b; --danger: #a32d2d; --info: #185fa5;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.6; }
  .top { background: var(--accent); color: #fff; padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 50; }
  .top h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: .5px; }
  .top .burger { display: none; background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .layout { display: flex; min-height: calc(100vh - 50px); }
  .sidebar { width: 210px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--line); padding: 14px 0; overflow-y: auto; }
  .nav-group { margin-bottom: 6px; }
  .nav-group-label { font-size: 11px; color: var(--muted); padding: 10px 20px 4px; letter-spacing: .5px; }
  .nav-item { display: block; width: 100%; text-align: left; padding: 9px 20px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--ink); border-left: 3px solid transparent; }
  .nav-item:hover { background: var(--bg); }
  .nav-item.active { border-left-color: var(--accent); background: var(--bg); color: var(--accent); font-weight: 600; }
  .main { flex: 1; min-width: 0; padding: 20px 24px 60px; max-width: 1080px; }
  .scrim { display: none; }
  @media (max-width: 760px) {
    .top .burger { display: block; }
    .sidebar { position: fixed; top: 50px; left: 0; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .2s; box-shadow: 2px 0 12px rgba(0,0,0,.15); }
    .sidebar.open { transform: translateX(0); }
    .scrim.show { display: block; position: fixed; inset: 50px 0 0 0; background: rgba(0,0,0,.3); z-index: 55; }
    .main { padding: 16px; }
  }
  .container { max-width: 1080px; margin: 0 auto; padding: 20px 24px 60px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 16px 20px; margin-bottom: 16px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 12px; color: var(--muted); }
  input, select { height: 36px; padding: 0 10px; border: 1px solid var(--line2);
    border-radius: 8px; font-size: 14px; background: #fff; font-family: inherit; }
  input[type=checkbox] { width: 18px; height: 18px; }
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .metric { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; }
  .metric .l { font-size: 12px; color: var(--muted); }
  .metric .v { font-size: 24px; font-weight: 600; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 9px 8px;
    border-bottom: 1px solid var(--line2); white-space: nowrap; }
  td { padding: 9px 8px; border-bottom: 1px solid var(--line); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .btn { height: 36px; background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 0 16px; cursor: pointer; font-size: 14px; font-family: inherit; }
  .btn:hover { opacity: .92; }
  .act { cursor: pointer; background: none; border: none; font-size: 13px; padding: 2px 6px;
    color: var(--info); font-family: inherit; }
  .act.danger { color: var(--danger); }
  .act.muted { color: var(--muted); cursor: default; }
  .tag { display: inline-block; font-size: 11px; padding: 1px 8px; border-radius: 999px;
    background: var(--warn-bg); color: var(--warn-ink); margin-left: 6px; }
  .empty { color: var(--muted); font-size: 14px; padding: 24px 0; text-align: center; }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 12px; }
  details summary { cursor: pointer; font-size: 13px; color: var(--info); }
  .moon { color: var(--info); }
  .scroll { overflow-x: auto; }
  .inline { display: flex; gap: 6px; align-items: center; }
  .inline input { height: 30px; width: 100px; }

  /* 列印用浮層 */
  #print-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; overflow: auto; padding: 24px; }
  #print-overlay .pbar { position: sticky; top: 0; background: #fff; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line2); display: flex; gap: 10px; justify-content: flex-end; }
  #print-overlay .pdoc { max-width: 800px; margin: 0 auto; color: #1f2421; }
  #print-overlay h1 { font-size: 18px; margin: 0 0 2px; }
  #print-overlay .meta { font-size: 12px; color: #555; margin-bottom: 16px; }
  #print-overlay table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #print-overlay th, #print-overlay td { border: 1px solid #cfd2cd; padding: 6px 8px; }
  #print-overlay th { background: #eef1ee; text-align: left; }
  #print-overlay td.num, #print-overlay th.num { text-align: right; font-variant-numeric: tabular-nums; }
  #print-overlay .total-row td { font-weight: 700; background: #f6f7f5; }
  #print-overlay .sign { margin-top: 32px; font-size: 13px; display: flex; gap: 48px; }
  #print-overlay .sign div { border-top: 1px solid #1f2421; padding-top: 6px; min-width: 160px; }
  #print-overlay .sub { font-size: 11px; color: #777; margin-top: 8px; }
  #print-overlay .sec { font-size: 13px; font-weight: 700; margin: 16px 0 6px; }
  #print-overlay h2.sec { font-size: 14px; margin: 18px 0 6px; padding-top: 10px; border-top: 1px solid #cfd2cd; }
  @media print {
    body > .top, body > .layout { display: none !important; }
    #print-overlay { position: static; padding: 0; }
    #print-overlay .pbar { display: none !important; }
    @page { size: A4; margin: 16mm; }
  }
</style>
</head>
<body>
<div class="top">
  <button class="burger" id="burger" aria-label="選單">☰</button>
  <h1>點工薪資管理系統</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span id="cloud-status" style="font-size:12px;opacity:.9">連線中…</span>
    <button id="cloud-refresh" style="background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px">↻ 重新整理</button>
  </div>
</div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="scrim" id="scrim"></div>
  <main class="main" id="body"></main>
</div>

<script>
const LS = 'pm_data_v2';
const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbyMPs38UNzAwX3bcD2n9nQBz0HofUW9qFweSOnmoySs8VW2bJYHn47RdyZLQ8bD8SNWTg/exec';
let state = { employees:[], sites:[], attendance:[], adjustments:[], loans:[], tools:[], locations:[], assets:[], advances:[], accounts:[], ledger:[], deals:[], billings:[], contracts:{}, costs:[], tab:'entry' };
let cloudStatus='連線中…';
let entryDate='', entrySite='', entryEmp=''; // 登記出工：記住上次選的日期、案場、員工
let entryOpenDates={}, entryEditId=null; // 出工紀錄分組收合狀態與正在編輯的紀錄

const round = n => Math.round(n);
const money = n => '$' + round(n).toLocaleString();
// 工數顯示：工數 = 工時÷8，用分數符號。例：9h → 1⅛ 工
const FRAC8={1:'⅛',2:'¼',3:'⅜',4:'½',5:'⅝',6:'¾',7:'⅞'};
function gongStr(hours){
  const h=Number(hours)||0;
  if(h===0) return '0 工';
  const whole=Math.floor(h/8);
  const rem=h-whole*8;
  let frac='';
  if(rem>0){
    if(Number.isInteger(rem)&&FRAC8[rem]) frac=FRAC8[rem];
    else frac=(rem/8).toString().replace(/^0/,'');
  }
  let s;
  if(whole>0&&frac) s=`${whole}${frac}`;
  else if(whole>0) s=`${whole}`;
  else s=frac||'0';
  return `${s} 工`;
}
function gongH(hours){ const h=Number(hours)||0; return `${gongStr(h)}<span style="color:var(--muted);font-size:11px">(${Math.round(h*10)/10}h)</span>`; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const empName = id => { const e=state.employees.find(x=>x.id===id); return e?e.name:'（已移除）'; };
const siteName = id => { const s=state.sites.find(x=>x.id===id); return s?s.name:'（已移除）'; };

function applyData(d){
  if(!d) return;
  state.employees=d.employees||[]; state.sites=d.sites||[]; state.attendance=d.attendance||[]; state.adjustments=d.adjustments||[]; state.loans=d.loans||[]; state.tools=d.tools||[]; state.locations=d.locations||[]; state.assets=d.assets||[]; state.advances=d.advances||[]; state.accounts=d.accounts||[]; state.ledger=d.ledger||[]; state.deals=d.deals||[]; state.billings=d.billings||[]; state.contracts=d.contracts||{}; state.costs=d.costs||[];
  state.employees.forEach(e=>{ if(e.active===undefined) e.active=true; });
}
function packData(){
  return {employees:state.employees,sites:state.sites,attendance:state.attendance,adjustments:state.adjustments,loans:state.loans,tools:state.tools,locations:state.locations,assets:state.assets,advances:state.advances,accounts:state.accounts,ledger:state.ledger,deals:state.deals,billings:state.billings,contracts:state.contracts,costs:state.costs};
}

// 先讀本機快取（讓畫面秒開），再從雲端拉最新
function loadLocal(){
  try { const raw=localStorage.getItem(LS); if(raw) applyData(JSON.parse(raw)); } catch(e){}
}
async function loadCloud(){
  setCloud('讀取雲端中…');
  try {
    const res=await fetch(CLOUD_URL, {method:'GET'});
    const j=await res.json();
    if(j&&j.ok&&j.data){ applyData(JSON.parse(j.data)); try{localStorage.setItem(LS,j.data);}catch(e){} setCloud('已同步'); }
    else { setCloud('雲端尚無資料'); }
  } catch(e){ setCloud('雲端讀取失敗（顯示本機資料）'); }
  render();
}

let saveTimer=null, saving=false, pendingSave=false;
function saveData(){
  // 本機立即存（不怕當掉）
  try{ localStorage.setItem(LS, JSON.stringify(packData())); }catch(e){}
  // 雲端防抖動：1秒內多次變更只送一次
  if(saveTimer) clearTimeout(saveTimer);
  setCloud('儲存中…');
  saveTimer=setTimeout(pushCloud, 800);
}
async function pushCloud(){
  if(saving){ pendingSave=true; return; }
  saving=true;
  try {
    await fetch(CLOUD_URL, {method:'POST', body: JSON.stringify(packData())});
    setCloud('已同步');
  } catch(e){ setCloud('雲端儲存失敗（已存本機）'); }
  saving=false;
  if(pendingSave){ pendingSave=false; pushCloud(); }
}
function setCloud(s){ cloudStatus=s; const el=document.getElementById('cloud-status'); if(el) el.textContent=s; }

// 保留舊名稱相容
function loadData(){ loadLocal(); }

function computeRecords(records){
  const byKey={};
  records.forEach(r=>{ const k=r.empId+'|'+r.date; (byKey[k]=byKey[k]||[]).push(r); });
  const out={};
  Object.values(byKey).forEach(group=>{
    const attended=group.filter(r=>(Number(r.hours)||0)>0);
    const totalAllowance=group.filter(r=>r.night).length*400;
    group.forEach(r=>{
      const daily=Number(r.dailyRate)||0, hourly=daily/8, h=Number(r.hours)||0;
      const wage=hourly*h;  // 每小時同時薪，各案場各自算
      const allow=(attended.length>0&&h>0)?totalAllowance/attended.length:0;
      out[r.id]={wage,allow,total:wage+allow};
    });
  });
  return out;
}

function tabsBar(){
  const groups=[
    ['薪資作業',[['entry','登記出工'],['payroll','員工薪資']]],
    ['財務管理',[['loans','借支管理'],['tools','工具管理'],['advances','代墊款'],['accounts','公積金帳戶'],['deals','分潤結算'],['billing','請款追蹤'],['yearend','年度總結'],['recon','對帳匯出']]],
    ['設定',[['sites','案場成本'],['manage','員工/案場']]],
  ];
  return groups.map(([label,items])=>`
    <div class="nav-group">
      <div class="nav-group-label">${label}</div>
      ${items.map(([id,t])=>`<button class="nav-item ${state.tab===id?'active':''}" data-tab="${id}">${t}</button>`).join('')}
    </div>`).join('');
}
function render(){
  document.getElementById('sidebar').innerHTML=tabsBar();
  const body=document.getElementById('body');
  body.innerHTML = state.tab==='entry'?viewEntry():state.tab==='payroll'?viewPayroll():state.tab==='sites'?viewSites():state.tab==='loans'?viewLoans():state.tab==='tools'?viewTools():state.tab==='advances'?viewAdvances():state.tab==='accounts'?viewAccounts():state.tab==='deals'?viewDeals():state.tab==='billing'?viewBilling():state.tab==='yearend'?viewYearEnd():state.tab==='recon'?viewRecon():viewManage();
  bind();
}

function viewEntry(){
  const activeEmps=state.employees.filter(e=>e.active);
  const empOpts=activeEmps.map(e=>`<option value="${e.id}">${esc(e.name)}（日薪 ${e.daily}）</option>`).join('');
  const activeSites=state.sites.filter(s=>s.active!==false && !s.coop);
  const siteOpts=activeSites.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  const needEmp=activeEmps.length===0, needSite=activeSites.length===0;
  const noSetup=needEmp||needSite;
  let setupMsg='';
  if(noSetup){
    const missing=[needEmp?'在職員工':null, needSite?'啟用中的案場（工地）':null].filter(Boolean).join(' 和 ');
    setupMsg=`<div style="text-align:center;padding:24px 12px">
      <div style="font-size:15px;font-weight:600;margin-bottom:6px">還不能登記出工</div>
      <div class="sub" style="margin-bottom:14px">登記出工前，需要先建立 <b>${missing}</b>。${needSite?'（若案場都被暫停了，到「員工/案場」把要用的案場切回啟用。）':''}</div>
      <button class="btn" id="goto-manage">前往「員工/案場」設定 →</button>
    </div>`;
  }
  const today=new Date().toISOString().slice(0,10);
  const curDate=entryDate||today;
  const curSite=entrySite|| (activeSites[0]?activeSites[0].id:'');
  // 今天(所選日期)這個案場已登記哪幾位
  let todayNote='';
  if(curSite){
    const done=state.attendance.filter(r=>r.date===curDate&&r.siteId===curSite);
    if(done.length>0){
      const names=done.map(r=>`${esc(empName(r.empId))}${r.hours?`(${gongStr(r.hours)})`:''}`).join('、');
      todayNote=`<div class="sub" style="margin:8px 0 0;padding:8px 10px;background:var(--bg);border-radius:8px">📋 ${esc(siteName(curSite))}・${esc(curDate)} 已登記 ${done.length} 位：${names}</div>`;
    } else {
      todayNote=`<div class="sub" style="margin:8px 0 0">📋 ${esc(siteName(curSite))}・${esc(curDate)} 尚無人登記。</div>`;
    }
  }
  const comp=computeRecords(state.attendance);
  // 依日期分組（新到舊）
  const byDate={};
  state.attendance.forEach(r=>{ (byDate[r.date]=byDate[r.date]||[]).push(r); });
  const dateKeys=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const WD=['日','一','二','三','四','五','六'];
  const groupsHtml=dateKeys.map((dk,idx)=>{
    const list=byDate[dk].sort((a,b)=>(siteName(a.siteId)).localeCompare(siteName(b.siteId)));
    const dayHours=list.reduce((s,r)=>s+(Number(r.hours)||0),0);
    const dayTotal=list.reduce((s,r)=>s+((comp[r.id]||{}).total||0),0);
    const wd=WD[new Date(dk+'T00:00:00').getDay()];
    const open=(entryOpenDates[dk]!==undefined)?entryOpenDates[dk]:(idx<2); // 預設展開最近2天
    const rows=list.map(r=>{
      const c=comp[r.id]||{wage:0,allow:0,total:0};
      const editing=(entryEditId===r.id);
      const hoursCell=editing
        ? `<span class="inline"><input type="number" id="edit-hours" value="${r.hours}" min="0" max="24" step="1" style="width:80px;height:30px"><span style="font-size:11px;color:var(--muted)">時</span><button class="act" id="edit-ok" data-editok="${r.id}">✓</button><button class="act muted" id="edit-cancel" style="cursor:pointer">✕</button></span>`
        : `${gongH(r.hours)} <button class="act" data-edithours="${r.id}" style="font-size:12px">改</button>`;
      return `<tr>
        <td>${esc(siteName(r.siteId))}</td>
        <td>${esc(empName(r.empId))}</td>
        <td class="num">${hoursCell}</td>
        <td class="num">${r.night?'<span class="moon">●夜</span>':'—'}</td>
        <td class="num">${money(c.wage)}</td>
        <td class="num">${c.allow>0?money(c.allow):'—'}</td>
        <td class="num" style="font-weight:600">${money(c.total)}</td>
        <td><button class="act danger" data-del="${r.id}">刪</button></td>
      </tr>`;
    }).join('');
    return `<div style="margin-bottom:10px;border:1px solid var(--line);border-radius:8px;overflow:hidden">
      <div data-togglegroup="${dk}" style="cursor:pointer;background:var(--bg);padding:10px 12px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:600;font-size:14px">${open?'▼':'▶'} ${esc(dk)}（週${wd}）</div>
        <div class="sub" style="margin:0">${list.length} 人 · ${gongStr(dayHours)} · ${money(dayTotal)}</div>
      </div>
      ${open?`<div class="scroll"><table>
        <thead><tr><th>案場</th><th>員工</th><th class="num">工數</th><th class="num">過夜</th><th class="num">工資</th><th class="num">津貼</th><th class="num">小計</th><th></th></tr></thead>
        <tbody>${rows}</tbody></table></div>`:''}
    </div>`;
  }).join('');
  const empOptsSel=activeEmps.map(e=>`<option value="${e.id}" ${e.id===entryEmp?'selected':''}>${esc(e.name)}（日薪 ${e.daily}）</option>`).join('');
  const siteOptsSel=activeSites.map(s=>`<option value="${s.id}" ${s.id===curSite?'selected':''}>${esc(s.name)}</option>`).join('');
  return `
  <div class="card">
    <p class="sub">登記一筆出工。日期與案場會保留，方便連續登記同案場多人。同一人同一天跑多案場就分開登記多筆。</p>
    ${noSetup?setupMsg:`
    <div class="row">
      <div class="field"><label>日期</label><input type="date" id="f-date" value="${curDate}"></div>
      <div class="field"><label>員工</label><select id="f-emp">${empOptsSel}</select></div>
      <div class="field"><label>案場</label><select id="f-site">${siteOptsSel}</select></div>
      <div class="field"><label>工時（小時，整數）</label><input type="number" id="f-hours" min="0" max="24" step="1" value="8" style="width:110px"></div>
      <div class="field"><label>過夜外宿</label><div style="height:36px;display:flex;align-items:center"><input type="checkbox" id="f-night"></div></div>
      <button class="btn" id="f-add">＋ 新增</button>
    </div>
    ${todayNote}`}
  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:8px">出工紀錄（依日期分組，點日期可收合）</div>
    ${state.attendance.length===0?'<div class="empty">尚無出工紀錄。</div>':groupsHtml}
  </div>`;
}

// 計薪週期以每月 11 號起算：一個週期 = 某月11號 ～ 次月10號
// 「本月週期」：找出包含今天的那個週期
function cycleContaining(d){
  const day=d.getDate();
  let startY=d.getFullYear(), startM=d.getMonth();
  if(day>11){
    // 12號之後，屬於本月11號起算的新週期
  } else {
    // 今天在 1~11 號，仍屬於上個月11號起算的週期
    startM-=1; if(startM<0){ startM=11; startY-=1; }
  }
  const from=new Date(startY,startM,11);
  const to=new Date(startY,startM+1,10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(from),to:fmt(to)};
}
function defaultPayRange(){ return cycleContaining(new Date()); }
function prevPayRange(){
  const cur=cycleContaining(new Date());
  const f=new Date(cur.from+'T00:00:00');
  const pf=new Date(f.getFullYear(),f.getMonth()-1,11);
  const pt=new Date(f.getFullYear(),f.getMonth(),10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(pf),to:fmt(pt)};
}
// 預設調整項類型
const ADD_TYPES=['獎金','全勤獎金','其他加給'];
const DED_TYPES=['借支扣還','勞保自負額','健保自負額','工具遺失賠償','其他扣款'];

// 建立某計薪區間的完整發薪資料（出工薪資 + 加扣項 = 實發）
function buildPayroll(from,to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const comp=computeRecords(state.attendance);
  const byEmp={};
  state.attendance.filter(r=>inRange(r.date)).forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const e=byEmp[r.empId]=byEmp[r.empId]||{empId:r.empId,hours:0,wage:0,allow:0,gross:0,days:new Set(),adds:[],deds:[]};
    e.hours+=Number(r.hours)||0; e.wage+=c.wage; e.allow+=c.allow; e.gross+=c.total; e.days.add(r.date);
  });
  // 套用區間內的調整項
  state.adjustments.filter(a=>inRange(a.date)).forEach(a=>{
    const e=byEmp[a.empId]=byEmp[a.empId]||{empId:a.empId,hours:0,wage:0,allow:0,gross:0,days:new Set(),adds:[],deds:[]};
    (a.kind==='add'?e.adds:e.deds).push(a);
  });
  Object.values(byEmp).forEach(e=>{
    e.addTotal=e.adds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.dedTotal=e.deds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.net=e.gross+e.addTotal-e.dedTotal;
  });
  return byEmp;
}

function viewPayroll(){
  if(!state.payFrom||!state.payTo){ const d=defaultPayRange(); state.payFrom=d.from; state.payTo=d.to; }
  const byEmp=buildPayroll(state.payFrom,state.payTo);
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const allIds=Object.keys(byEmp).sort((a,b)=>byEmp[b].net-byEmp[a].net);
  const empIds=allIds.filter(id=>!isPartner(id));       // 一般員工：發薪、計入總額
  const partnerIds=allIds.filter(id=>isPartner(id));    // 股東：走代墊款、不計入
  // 總額只算一般員工
  const grossSum=empIds.reduce((s,id)=>s+byEmp[id].gross,0);
  const netSum=empIds.reduce((s,id)=>s+byEmp[id].net,0);

  const rowFor=(id,partner)=>{ const e=byEmp[id]; const emp=state.employees.find(x=>x.id===id);

  const inRange=d=> (!state.payFrom||d>=state.payFrom) && (!state.payTo||d<=state.payTo);
  const adjRows=state.adjustments.filter(a=>inRange(a.date)).sort((a,b)=>b.date.localeCompare(a.date)).map(a=>`<tr>
    <td>${esc(a.date)}</td><td>${esc(empName(a.empId))}</td>

    <td class="num">${a.kind==='add'?'+':'−'}${money(a.amount)}</td>
    <td>${esc(a.note||'')}</td>

  // 本期借支扣款提示：尚未還清、且本期還沒扣過的借支
  const loanReminders=state.loans.filter(l=>loanBalance(l)>0 && !loanDeductedInRange(l.id,state.payFrom,state.payTo)).map(l=>{
    const bal=loanBalance(l), suggest=Math.min(l.perPeriod,bal);
    return `<tr>
      <td>${esc(empName(l.empId))}</td>
      <td class="num">${money(bal)}</td>

      <td><button class="act" data-repay="${l.id}" style="border:1px solid var(--accent);border-radius:6px;padding:3px 10px;color:var(--accent)">扣這期 ${money(suggest)}</button></td>
    </tr>`;

    <div style="font-size:14px;font-weight:600;margin-bottom:4px">計薪期間</div>
    <p class="sub">計薪週期以每月 11 號起算（本期＝上月11號～本月10號）。可隨時手動改起訖日期。</p>
    <div class="row">
      <div class="field"><label>起</label><input type="date" id="pay-from" value="${state.payFrom}"></div>
      <div class="field"><label>訖</label><input type="date" id="pay-to" value="${state.payTo}"></div>

      <button class="act" id="pay-lastmonth" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">上期</button>
      <button class="act" id="pay-all" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">全部</button>
    </div>
  </div>
  <div class="metrics">
    <div class="metric"><div class="l">區間</div><div class="v" style="font-size:15px">${state.payFrom||'—'} ～ ${state.payTo||'—'}</div></div>
    <div class="metric"><div class="l">員工數</div><div class="v">${empIds.length}${partnerIds.length?`<span style="font-size:12px;color:var(--muted)"> +${partnerIds.length}股東</span>`:''}</div></div>
    <div class="metric"><div class="l">出工薪資</div><div class="v" style="font-size:20px">${money(grossSum)}</div></div>
    <div class="metric"><div class="l">實發總額</div><div class="v">${money(netSum)}</div></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap">
      <div style="font-size:14px;font-weight:600">本期薪資</div>
      <div style="display:flex;gap:8px">
        ${partnerIds.length?`<button class="act" id="toggle-partners" style="border:1px solid var(--line2);border-radius:8px;padding:0 12px;height:36px">${state.showPartners?'隱藏股東':'顯示股東'}</button>`:''}

    ${rows===''?'<div class="empty">此區間內尚無可計算的薪資。</div>':`

  </div>
  ${loanReminders===''?'':`<div class="card" style="border-color:var(--accent)">
    <div style="font-size:14px;font-weight:600;margin-bottom:4px">💡 本期借支扣款提示</div>

  <div class="card">

    <p class="sub">獎金、全勤為加項；借支扣還、勞健保自負額、工具遺失賠償等為扣項。日期請填在本計薪區間內，才會算進本期。</p>

function viewSites(){
  const comp=computeRecords(state.attendance);
  const bySite={};
  state.sites.forEach(s=>{ bySite[s.id]={hours:0,wage:0,allow:0,total:0,emp:{},opening:Number(s.opening)||0,manual:0}; });
  state.attendance.forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const s=bySite[r.siteId]=bySite[r.siteId]||{hours:0,wage:0,allow:0,total:0,emp:{},opening:0,manual:0};
    s.hours+=Number(r.hours)||0; s.wage+=c.wage; s.allow+=c.allow; s.total+=c.total;
    s.emp[r.empId]=(s.emp[r.empId]||0)+c.total;
  });
  state.costs.forEach(co=>{ const s=bySite[co.siteId]; if(s) s.manual+=Number(co.amount)||0; });
  Object.values(bySite).forEach(s=>{ s.grandTotal=s.total+(s.opening||0)+(s.manual||0); });
  const grand=Object.values(bySite).reduce((s,x)=>s+x.grandTotal,0);
  const ids=Object.keys(bySite).sort((a,b)=>bySite[b].grandTotal-bySite[a].grandTotal);
  const payerName=who=>({dz:'潘東澤',gx:'廣昕',py:'品佑'}[who]||who||'—');
  const cardFor=(sid)=>{ const s=bySite[sid]; const site=state.sites.find(x=>x.id===sid); const isCoop=site&&site.coop;
    const empBreak=Object.entries(s.emp).sort((a,b)=>b[1]-a[1]).map(([eid,v])=>`<tr><td>${esc(empName(eid))}</td><td class="num">${money(v)}</td></tr>`).join('');
    const pct=grand>0?Math.round(s.grandTotal/grand*100):0;
    const myCosts=state.costs.filter(c=>c.siteId===sid).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const costRows=myCosts.map(c=>`<tr><td>${esc(c.date||'')}</td><td>${esc(c.item||'')}</td><td class="num">${money(c.amount)}</td><td>${esc(payerName(c.payer))}</td><td><button class="act danger" data-delcost="${c.id}">刪</button></td></tr>`).join('');
    const byPayer={}; myCosts.forEach(c=>{ byPayer[c.payer||'—']=(byPayer[c.payer||'—']||0)+(Number(c.amount)||0); });
    const payerSummary=Object.keys(byPayer).length?`<div class="sub" style="margin:4px 0">各人墊付：${Object.entries(byPayer).map(([k,v])=>`${esc(payerName(k))} ${money(v)}`).join('、')}</div>`:'';
    return `<div class="card" ${isCoop?'style="border-left:3px solid #d98430"':''}>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <div style="font-size:15px;font-weight:600">${esc(siteName(sid))}${isCoop?'<span class="tag" style="background:#fde9d4;color:#9a5b1a">合作案場</span>':''}</div>
        <div style="font-size:18px;font-weight:600">${money(s.grandTotal)}</div>
      </div>
      <p class="sub">${isCoop?'手動成本明細加總':`總工數 ${gongStr(s.hours)}・系統工資 ${money(s.wage)}・津貼 ${money(s.allow)}`}${s.opening>0?`・期初 ${money(s.opening)}`:''}${s.manual>0?`・手動成本 ${money(s.manual)}`:''}・占總成本 ${pct}%</p>
      ${isCoop?'':`<div class="row" style="margin-bottom:6px">
        <div class="field"><label>期初人事成本（從Excel抄入，選填）</label><input type="number" data-opening="${sid}" value="${s.opening||''}" placeholder="未設定" min="0" step="1000" style="width:170px"></div>
      </div>`}
      ${payerSummary}
      <details ${isCoop?'open':''}><summary>手動成本明細（${myCosts.length} 筆）</summary>
        <div class="row" style="margin:8px 0">
          <div class="field"><label>日期</label><input type="date" data-costdate="${sid}" value="${new Date().toISOString().slice(0,10)}"></div>
          <div class="field" style="flex:1;min-width:120px"><label>項目</label><input data-costitem="${sid}" placeholder="材料、工資、機具…"></div>
          <div class="field"><label>金額</label><input type="number" data-costamount="${sid}" min="0" step="1000" style="width:120px"></div>
          <div class="field"><label>誰支付</label><select data-costpayer="${sid}"><option value="dz">潘東澤</option><option value="gx">廣昕</option><option value="py">品佑</option></select></div>
          <button class="act" data-costadd="${sid}" style="border:1px solid var(--accent);border-radius:6px;padding:0 12px;color:var(--accent);height:36px">＋ 加成本</button>
        </div>
        ${costRows?`<table><thead><tr><th>日期</th><th>項目</th><th class="num">金額</th><th>誰付</th><th></th></tr></thead><tbody>${costRows}</tbody></table>`:'<div class="sub">尚無手動成本。</div>'}
      </details>
      ${empBreak&&!isCoop?`<details><summary>系統內各員工金額明細</summary>
        <table style="margin-top:8px"><thead><tr><th>員工</th><th class="num">金額</th></tr></thead><tbody>${empBreak}</tbody></table>
      </details>`:''}
    </div>`;
  };
  const isPaused=sid=>{ const st=state.sites.find(x=>x.id===sid); return st&&st.active===false; };

  const pausedIds=ids.filter(sid=>isPaused(sid));
  const cards=activeIds.map(cardFor).join('');
  const pausedCards=pausedIds.length?`<details style="margin-top:10px"><summary style="cursor:pointer;font-weight:600;padding:8px 0">已暫停案場（${pausedIds.length}）</summary>${pausedIds.map(cardFor).join('')}</details>`:'';

  ${cards===''&&pausedCards===''?'<div class="card"><div class="empty">尚無案場成本資料。</div></div>':cards}${pausedCards}`;
}

      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;align-self:flex-end;height:38px"><input type="checkbox" id="s-coop" style="width:18px;height:18px">這是合作案場</label>
      <button class="btn" id="s-add">＋ 新增案場</button>
    </div>
    ${state.sites.length===0?'<div class="empty">尚無案場。</div>':`<table><thead><tr><th>名稱</th><th></th><th></th><th></th><th></th></tr></thead><tbody>${siteRows}</tbody></table>`}
  </div>`;
}

function bind(){
  document.querySelectorAll('.nav-item').forEach(b=>b.onclick=()=>{ state.tab=b.dataset.tab; closeSidebar(); render(); });

  const pf=document.getElementById('pay-from'); if(pf) pf.onchange=()=>{ state.payFrom=pf.value; render(); };
  const pt=document.getElementById('pay-to'); if(pt) pt.onchange=()=>{ state.payTo=pt.value; render(); };

  const adjAdd=document.getElementById('adj-add');
  if(adjAdd) adjAdd.onclick=()=>{
    const date=document.getElementById('adj-date').value;
    const empId=document.getElementById('adj-emp').value;
    const kind=document.getElementById('adj-kind').value;
    const label=document.getElementById('adj-label').value;
    const amount=parseFloat(document.getElementById('adj-amount').value);
    const note=document.getElementById('adj-note').value.trim();
    if(!date||!empId||!label||isNaN(amount)||amount<0) return;
    state.adjustments.push({id:uid(),date,empId,kind,label,amount,note});
    saveData(); render();
  };
  document.querySelectorAll('[data-deladj]').forEach(b=>b.onclick=()=>{ if(!confirm('確定刪除這筆加扣項？')) return; state.adjustments=state.adjustments.filter(a=>a.id!==b.dataset.deladj); saveData(); render(); });
  const es=document.getElementById('export-summary'); if(es) es.onclick=()=>exportSummaryPDF();
  const ed=document.getElementById('export-deals'); if(ed) ed.onclick=()=>exportDealsPDF();
  const eds=document.getElementById('export-deals-sel'); if(eds) eds.onclick=()=>exportDealsPDF(true);
  document.querySelectorAll('[data-dealpick-cb]').forEach(cb=>cb.onchange=()=>{ dealSel[cb.dataset.dealpickCb]=cb.checked; });
  const dsa=document.getElementById('deals-selall'); if(dsa) dsa.onclick=()=>{ state.deals.forEach(d=>{ if(d.type==='代工'||d.type==='公司分潤'||d.type==='分潤/代料'||(d.type!=='合作案')) dealSel[d.id]=true; }); render(); };
  const dsn=document.getElementById('deals-selnone'); if(dsn) dsn.onclick=()=>{ dealSel={}; render(); };
  const eb=document.getElementById('export-billing'); if(eb) eb.onclick=()=>exportBillingPDF();
  const esi=document.getElementById('export-sites'); if(esi) esi.onclick=()=>exportSitesPDF();
  document.querySelectorAll('[data-payslip]').forEach(b=>b.onclick=()=>exportPayslipPDF(b.dataset.payslip));

  const gotoM=document.getElementById('goto-manage'); if(gotoM) gotoM.onclick=()=>{ state.tab='manage'; render(); };

  const fDate=document.getElementById('f-date'); if(fDate) fDate.onchange=()=>{ entryDate=fDate.value; const fe=document.getElementById('f-emp'); if(fe) entryEmp=fe.value; render(); };
  const fSite=document.getElementById('f-site'); if(fSite) fSite.onchange=()=>{ entrySite=fSite.value; const fe=document.getElementById('f-emp'); if(fe) entryEmp=fe.value; render(); };
  const fEmp=document.getElementById('f-emp'); if(fEmp) fEmp.onchange=()=>{ entryEmp=fEmp.value; };

  const add=document.getElementById('f-add');
  if(add) add.onclick=()=>{
    const date=document.getElementById('f-date').value;
    const empId=document.getElementById('f-emp').value;
    const siteId=document.getElementById('f-site').value;
    const hours=parseFloat(document.getElementById('f-hours').value);
    const night=document.getElementById('f-night').checked;
    const emp=state.employees.find(e=>e.id===empId);
    if(!date||!empId||!siteId||isNaN(hours)||!emp) return;
    if(!Number.isInteger(hours)){ alert('工時請輸入整數小時（例如 8、9），不接受小數。'); return; }
    // 防呆：同人同日是否已登記
    const sameDay=state.attendance.filter(r=>r.empId===empId&&r.date===date);
    if(sameDay.length>0){
      const sameSite=sameDay.find(r=>r.siteId===siteId);
      let msg;
      if(sameSite){
        msg=`${emp.name} 在 ${date} 的「${siteName(siteId)}」已經登記過 ${sameSite.hours} 小時了。\n\n這很可能是重複登記。確定還要再記一筆嗎？`;
      } else {
        const where=sameDay.map(r=>`${siteName(r.siteId)} ${r.hours}h`).join('、');
        msg=`${emp.name} 在 ${date} 已經登記過：${where}。\n\n如果他今天還跑了「${siteName(siteId)}」這個案場，可以繼續；否則請取消。\n\n確定要再記一筆嗎？`;
      }
      if(!confirm(msg)) return;
    }
    state.attendance.push({id:uid(),date,empId,siteId,hours,night,dailyRate:emp.daily});
    // 保留日期與案場（員工不保留，登記後清空方便接著選下一個人）
    entryDate=date; entrySite=siteId; entryEmp='';
    saveData(); render();
  };
  document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ const r=state.attendance.find(x=>x.id===b.dataset.del); if(!confirm(`確定刪除這筆出工？\n${r?esc(r.date)+'・'+empName(r.empId)+'・'+siteName(r.siteId):''}`)) return; state.attendance=state.attendance.filter(r=>r.id!==b.dataset.del); saveData(); render(); });
  document.querySelectorAll('[data-togglegroup]').forEach(b=>b.onclick=()=>{
    const dk=b.dataset.togglegroup;
    const cur=entryOpenDates[dk];
    // 預設最近2天是展開的；第一次點要能正確切換，所以以目前顯示狀態為準
    const isOpen=b.textContent.trim().startsWith('▼');
    entryOpenDates[dk]=!isOpen; render();
  });
  document.querySelectorAll('[data-edithours]').forEach(b=>b.onclick=()=>{ entryEditId=b.dataset.edithours; render(); });
  document.querySelectorAll('[data-editok]').forEach(b=>b.onclick=()=>{
    const r=state.attendance.find(x=>x.id===b.dataset.editok); if(!r) return;
    const v=parseFloat(document.getElementById('edit-hours').value);
    if(!isNaN(v)&&v>=0){ r.hours=v; saveData(); }
    entryEditId=null; render();
  });
  const ecancel=document.getElementById('edit-cancel'); if(ecancel) ecancel.onclick=()=>{ entryEditId=null; render(); };

  const ea=document.getElementById('e-add');
  if(ea) ea.onclick=()=>{
    const name=document.getElementById('e-name').value.trim();
    const daily=parseFloat(document.getElementById('e-daily').value);
    if(!name||isNaN(daily)) return;
    state.employees.push({id:uid(),name,daily,active:true}); saveData(); render();
  };
  document.querySelectorAll('[data-raise]').forEach(b=>b.onclick=()=>{
    const e=state.employees.find(x=>x.id===b.dataset.raise); if(!e)return;
    const cell=b.closest('td');
    cell.innerHTML=`<span class="inline"><input type="number" min="0" step="100" value="${e.daily}" id="raise-in"><button class="act" id="raise-ok">✓</button><button class="act muted" id="raise-cancel" style="cursor:pointer">✕</button></span>`;
    const inp=cell.querySelector('#raise-in'); inp.focus();
    cell.querySelector('#raise-ok').onclick=()=>{ const v=parseFloat(inp.value); if(!isNaN(v)){ e.daily=v; saveData(); } render(); };
    cell.querySelector('#raise-cancel').onclick=()=>render();
  });
  document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>{ const e=state.employees.find(x=>x.id===b.dataset.toggle); if(e){ e.active=!e.active; saveData(); render(); } });
  document.querySelectorAll('[data-partner]').forEach(b=>b.onclick=()=>{ const e=state.employees.find(x=>x.id===b.dataset.partner); if(e){ e.partner=!e.partner; saveData(); render(); } });
  document.querySelectorAll('[data-delemp]').forEach(b=>b.onclick=()=>{ const e=state.employees.find(x=>x.id===b.dataset.delemp); if(!confirm(`確定刪除員工「${e?esc(e.name):''}」？`)) return; state.employees=state.employees.filter(e=>e.id!==b.dataset.delemp); saveData(); render(); });
  document.querySelectorAll('[data-renemp]').forEach(b=>b.onclick=()=>{
    const e=state.employees.find(x=>x.id===b.dataset.renemp); if(!e)return;
    const cell=b.closest('td');
    cell.innerHTML=`<span class="inline"><input value="${esc(e.name)}" id="ren-in" style="width:120px"><button class="act" id="ren-ok">✓</button><button class="act muted" id="ren-cancel" style="cursor:pointer">✕</button></span>`;
    const inp=cell.querySelector('#ren-in'); inp.focus();
    cell.querySelector('#ren-ok').onclick=()=>{ const v=inp.value.trim(); if(v){ e.name=v; saveData(); } render(); };
    cell.querySelector('#ren-cancel').onclick=()=>render();
  });

  const sa=document.getElementById('s-add');
  if(sa) sa.onclick=()=>{ const name=document.getElementById('s-name').value.trim(); if(!name)return; const coop=document.getElementById('s-coop')?document.getElementById('s-coop').checked:false; state.sites.push({id:uid(),name,coop}); saveData(); render(); };
  document.querySelectorAll('[data-delsite]').forEach(b=>b.onclick=()=>{ const s=state.sites.find(x=>x.id===b.dataset.delsite); if(!confirm(`確定刪除案場「${s?esc(s.name):''}」？`)) return; state.sites=state.sites.filter(s=>s.id!==b.dataset.delsite); saveData(); render(); });
  document.querySelectorAll('[data-togglecoop]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.togglecoop); if(!s) return;
    if(!s.coop){
      const hasRec=state.attendance.some(r=>r.siteId===s.id);
      if(hasRec && !confirm('這個案場已有出工紀錄。設為合作案場後，它將不出現在出工登記，成本改用手動明細。確定設為合作案場？')) return;
    }
    s.coop=!s.coop; saveData(); render();
  });
  document.querySelectorAll('[data-togglesite]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.togglesite); if(!s) return;
    // active 預設視為 true；按一下在 啟用 ↔ 暫停 間切換
    s.active = (s.active===false) ? true : false;
    saveData(); render();
  });
  document.querySelectorAll('[data-opening]').forEach(inp=>inp.onchange=()=>{
    const s=state.sites.find(x=>x.id===inp.dataset.opening); if(!s) return;
    const v=parseFloat(inp.value);
    if(isNaN(v)||v<=0) delete s.opening; else s.opening=v;
    saveData(); render();
  });
  document.querySelectorAll('[data-costadd]').forEach(b=>b.onclick=()=>{
    const sid=b.dataset.costadd;
    const date=document.querySelector(`[data-costdate="${sid}"]`).value;
    const item=document.querySelector(`[data-costitem="${sid}"]`).value.trim();
    const amount=parseFloat(document.querySelector(`[data-costamount="${sid}"]`).value);
    const payer=document.querySelector(`[data-costpayer="${sid}"]`).value;
    if(!date||isNaN(amount)||amount<=0){ alert('請填日期與金額'); return; }
    state.costs.push({id:uid(),siteId:sid,date,item,amount,payer});
    saveData(); render();
  });
  document.querySelectorAll('[data-delcost]').forEach(b=>b.onclick=()=>{
    if(!confirm('確定刪除這筆成本？')) return;
    state.costs=state.costs.filter(c=>c.id!==b.dataset.delcost); saveData(); render();
  });
  document.querySelectorAll('[data-rensite]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.rensite); if(!s)return;
    const cell=b.closest('td');
    cell.innerHTML=`<span class="inline"><input value="${esc(s.name)}" id="rens-in" style="width:160px"><button class="act" id="rens-ok">✓</button><button class="act muted" id="rens-cancel" style="cursor:pointer">✕</button></span>`;
    const inp=cell.querySelector('#rens-in'); inp.focus();
    cell.querySelector('#rens-ok').onclick=()=>{ const v=inp.value.trim(); if(v){ s.name=v; saveData(); } render(); };
    cell.querySelector('#rens-cancel').onclick=()=>render();
  });

  const la=document.getElementById('loan-add');
  if(la) la.onclick=()=>{
    const date=document.getElementById('loan-date').value;
    const empId=document.getElementById('loan-emp').value;
    const amount=parseFloat(document.getElementById('loan-amount').value);
    const perPeriod=parseFloat(document.getElementById('loan-per').value);
    const note=document.getElementById('loan-note').value.trim();
    if(!date||!empId||isNaN(amount)||amount<=0||isNaN(perPeriod)||perPeriod<=0) return;
    state.loans.push({id:uid(),date,empId,amount,perPeriod,note});
    saveData(); render();
  };
  document.querySelectorAll('[data-delloan]').forEach(b=>b.onclick=()=>{
    if(!confirm('刪除這筆借支？已扣除的紀錄不會跟著刪除。')) return;
    state.loans=state.loans.filter(l=>l.id!==b.dataset.delloan); saveData(); render();
  });
  document.querySelectorAll('[data-repay]').forEach(b=>b.onclick=()=>{
    const loan=state.loans.find(l=>l.id===b.dataset.repay); if(!loan) return;
    const bal=loanBalance(loan);
    const amt=Math.min(loan.perPeriod, bal);
    if(amt<=0) return;
    state.adjustments.push({id:uid(),date:state.payTo||new Date().toISOString().slice(0,10),empId:loan.empId,kind:'ded',label:'借支扣還',amount:amt,note:(loan.note?loan.note+' ':'')+'借支分期',loanId:loan.id});
    saveData(); render();
  });

  // 工具遺失：設定分攤
  const ts=document.getElementById('tool-setup');
  if(ts) ts.onclick=()=>{
    const date=document.getElementById('tool-date').value;
    const brand=document.getElementById('tool-brand').value.trim();
    const model=document.getElementById('tool-model').value.trim();
    const amount=parseFloat(document.getElementById('tool-amount').value);
    if(!date||isNaN(amount)||amount<=0){ alert('請填遺失日與金額'); return; }
    toolDraft={date,brand,model,amount,picks:{}};
    render();
  };
  // 勾選/取消分攤人
  document.querySelectorAll('[data-toolpick]').forEach(cb=>cb.onclick=()=>{
    if(!toolDraft) return;
    const id=cb.dataset.toolpick;
    if(cb.checked) toolDraft.picks[id]=0; else delete toolDraft.picks[id];
    // 重新平均
    toolDraft.picks=evenSplit(toolDraft.amount, Object.keys(toolDraft.picks));
    render();
  });
  // 微調個別金額
  document.querySelectorAll('[data-toolamt]').forEach(inp=>inp.onchange=()=>{
    if(!toolDraft) return;
    const id=inp.dataset.toolamt; const v=parseFloat(inp.value);
    toolDraft.picks[id]=isNaN(v)?0:v;
    render();
  });
  const te=document.getElementById('tool-even');
  if(te) te.onclick=()=>{ if(!toolDraft) return; toolDraft.picks=evenSplit(toolDraft.amount, Object.keys(toolDraft.picks)); render(); };
  const tcancel=document.getElementById('tool-cancel');
  if(tcancel) tcancel.onclick=()=>{ toolDraft=null; render(); };
  const tconfirm=document.getElementById('tool-confirm');
  if(tconfirm) tconfirm.onclick=()=>{
    if(!toolDraft) return;
    const ids=Object.keys(toolDraft.picks); if(ids.length===0) return;
    const toolId=uid();
    const shares={};
    ids.forEach(id=>{ shares[id]=Number(toolDraft.picks[id])||0; });
    state.tools.push({id:toolId,date:toolDraft.date,brand:toolDraft.brand,model:toolDraft.model,amount:toolDraft.amount,shares});
    // 各分攤人帶入當期扣項（日期用遺失日，會落在該計薪週期）
    ids.forEach(id=>{
      const amt=Number(toolDraft.picks[id])||0; if(amt<=0) return;
      state.adjustments.push({id:uid(),date:toolDraft.date,empId:id,kind:'ded',label:'工具遺失賠償',amount:amt,note:`${toolDraft.brand||''} ${toolDraft.model||''}`.trim(),toolId});
    });
    toolDraft=null; saveData(); render();
  };
  document.querySelectorAll('[data-deltool]').forEach(b=>b.onclick=()=>{
    if(!confirm('刪除這筆工具遺失？相關的扣項也會一併刪除。')) return;
    const tid=b.dataset.deltool;
    state.tools=state.tools.filter(t=>t.id!==tid);
    state.adjustments=state.adjustments.filter(a=>a.toolId!==tid);
    saveData(); render();
  });

  // 工具資產
  const asAdd=document.getElementById('as-add');
  if(asAdd) asAdd.onclick=()=>{
    const name=document.getElementById('as-name').value.trim();
    if(!name){ alert('請填工具名稱'); return; }
    const brand=document.getElementById('as-brand').value.trim();
    const model=document.getElementById('as-model').value.trim();
    const buyDate=document.getElementById('as-buy').value;
    const price=parseFloat(document.getElementById('as-price').value);
    const locKey=document.getElementById('as-loc').value;
    state.assets.push({id:uid(),name,brand,model,buyDate,price:isNaN(price)?null:price,locKey});
    saveData(); render();
  };
  document.querySelectorAll('[data-assetloc]').forEach(sel=>sel.onchange=()=>{
    const a=state.assets.find(x=>x.id===sel.dataset.assetloc); if(!a) return;
    a.locKey=sel.value; saveData(); render();
  });
  document.querySelectorAll('[data-delasset]').forEach(b=>b.onclick=()=>{
    const a=state.assets.find(x=>x.id===b.dataset.delasset); if(!confirm(`確定刪除工具「${a?esc(a.name):''}」？`)) return;
    state.assets=state.assets.filter(a=>a.id!==b.dataset.delasset); saveData(); render();
  });

  // 地點
  const locAdd=document.getElementById('loc-add');
  if(locAdd) locAdd.onclick=()=>{
    const name=document.getElementById('loc-name').value.trim();
    const kind=document.getElementById('loc-kind').value;
    if(!name) return;
    state.locations.push({id:uid(),name,kind}); saveData(); render();
  };
  document.querySelectorAll('[data-delloc]').forEach(b=>b.onclick=()=>{
    const l=state.locations.find(x=>x.id===b.dataset.delloc); if(!confirm(`確定刪除地點「${l?esc(l.name):''}」？`)) return;
    state.locations=state.locations.filter(l=>l.id!==b.dataset.delloc); saveData(); render();
  });

  // 代墊款
  const avf=document.getElementById('adv-from'); if(avf) avf.onchange=()=>{ advFrom=avf.value; render(); };
  const avt=document.getElementById('adv-to'); if(avt) avt.onchange=()=>{ advTo=avt.value; render(); };
  const avtp=document.getElementById('adv-thisperiod'); if(avtp) avtp.onclick=()=>{ const d=defaultPayRange(); advFrom=d.from; advTo=d.to; render(); };
  const avlp=document.getElementById('adv-lastperiod'); if(avlp) avlp.onclick=()=>{ const d=prevPayRange(); advFrom=d.from; advTo=d.to; render(); };
  const avAdd=document.getElementById('adv-add');
  if(avAdd) avAdd.onclick=()=>{
    const date=document.getElementById('adv-date').value;
    const empId=document.getElementById('adv-emp').value;
    const amount=parseFloat(document.getElementById('adv-amount').value);
    const purpose=document.getElementById('adv-purpose').value.trim();
    if(!date||!empId||isNaN(amount)||amount<=0){ alert('請填日期、金額'); return; }
    state.advances.push({id:uid(),date,empId,amount,purpose});
    saveData(); render();
  };
  document.querySelectorAll('[data-deladv]').forEach(b=>b.onclick=()=>{
    if(!confirm('確定刪除這筆代墊款？')) return;
    state.advances=state.advances.filter(a=>a.id!==b.dataset.deladv); saveData(); render();
  });
  document.querySelectorAll('[data-postadv]').forEach(b=>b.onclick=()=>{ advPosting=b.dataset.postadv; render(); });
  document.querySelectorAll('[data-postcancel]').forEach(b=>b.onclick=()=>{ advPosting=null; render(); });
  document.querySelectorAll('[data-postpick]').forEach(b=>b.onclick=()=>{
    const [pid,accId]=b.dataset.postpick.split('::');
    const byEmp=buildPayroll(advFrom,advTo);
    const wage=byEmp[pid]?byEmp[pid].gross:0;
    const advTotal=state.advances.filter(a=>a.empId===pid && (!advFrom||a.date>=advFrom) && (!advTo||a.date<=advTo)).reduce((s,a)=>s+(Number(a.amount)||0),0);
    const due=wage+advTotal;
    if(due<=0){ advPosting=null; render(); return; }
    const postKey=`${advFrom}~${advTo}|${pid}`;
    state.ledger.push({id:uid(),date:advTo||new Date().toISOString().slice(0,10),accId,kind:'out',amount:due,note:`代墊款報銷 ${empName(pid)}（${advFrom}~${advTo}）`,fromAdvance:postKey});
    advPosting=null; saveData(); render();
  });
  document.querySelectorAll('[data-unpost]').forEach(b=>b.onclick=()=>{
    if(!confirm('撤銷這筆入帳？帳戶裡對應的支出會一併刪除。')) return;
    state.ledger=state.ledger.filter(t=>t.id!==b.dataset.unpost); saveData(); render();
  });

  // 公積金帳戶
  const accAdd=document.getElementById('acc-add');
  if(accAdd) accAdd.onclick=()=>{
    const name=document.getElementById('acc-name').value.trim();
    const opening=parseFloat(document.getElementById('acc-opening').value);
    if(!name){ alert('請填帳戶名稱'); return; }
    state.accounts.push({id:uid(),name,opening:isNaN(opening)?0:opening});
    saveData(); render();

    if(t&&t.fromAdvance){ alert('這筆是代墊款入帳產生的，請到「代墊款」按該股東的「撤銷入帳」來移除。'); return; }
    if(!confirm('確定刪除這筆收支？')) return;

  const ledClr=document.getElementById('led-clearrange'); if(ledClr) ledClr.onclick=()=>{ ledgerFrom=''; ledgerTo=''; render(); };
  const expLed=document.getElementById('export-ledger'); if(expLed) expLed.onclick=()=>exportLedgerPDF();

    if(mw) mw.style.display=(t==='合作案')?'':'none';

  if(dTypeSel){ dTypeSel.onchange=dToggleType; dToggleType(); }
  const dAdd=document.getElementById('d-add');
  if(dAdd) dAdd.onclick=()=>{
    const name=document.getElementById('d-name').value.trim();
    const type=document.getElementById('d-type').value;
    const date=document.getElementById('d-date').value;
    const amount=parseFloat(document.getElementById('d-amount').value);
    const cost=parseFloat(document.getElementById('d-cost').value);
    const taxPct=parseFloat(document.getElementById('d-taxpct').value);
    const scheme=document.getElementById('d-scheme').value;
    const mgrPct=parseFloat(document.getElementById('d-mgrpct').value);
    const ownerId=document.getElementById('d-owner').value;
    const owner=document.getElementById('d-client').value.trim();
    const moneyAcc=document.getElementById('d-acc').value;
    if(!name||isNaN(amount)){ alert('請填案場名稱與請款金額'); return; }

  document.querySelectorAll('[data-deldeal]').forEach(b=>b.onclick=()=>{

    if(!confirm(msg)) return;
    state.ledger=state.ledger.filter(t=>t.fromDeal!==b.dataset.deldeal);
    state.deals=state.deals.filter(x=>x.id!==b.dataset.deldeal); saveData(); render();

  document.querySelectorAll('[data-postdeal]').forEach(b=>b.onclick=()=>{ dealPosting=b.dataset.postdeal; render(); });
  document.querySelectorAll('[data-carry]').forEach(b=>b.onclick=()=>{ dealCarry=b.dataset.carry; render(); });
  document.querySelectorAll('[data-carrycancel]').forEach(b=>b.onclick=()=>{ dealCarry=null; render(); });
  document.querySelectorAll('[data-carrynew]').forEach(b=>b.onclick=()=>{
    const d=state.deals.find(x=>x.id===b.dataset.carrynew); if(!d) return;
    const c=dealCalc(d);
    const nd={id:uid(),name:d.name+'（公司分潤）',type:'公司分潤',date:new Date().toISOString().slice(0,10),amount:Math.round(c.companyShare),cost:0,taxPct:0,scheme:'new',ownerId:d.ownerId||'',owner:d.owner||'',moneyAcc:d.moneyAcc||'',posted:false,fromCoop:d.id};

  document.querySelectorAll('[data-carryinto]').forEach(b=>b.onclick=()=>{
    const [cid,tid]=b.dataset.carryinto.split('::');
    const d=state.deals.find(x=>x.id===cid), t=state.deals.find(x=>x.id===tid);
    if(!d||!t) return;
    if(t.posted){ alert('該公司分潤案已入帳，請先撤銷再併入。'); return; }
    // 負責人核對
    if(d.ownerId && t.ownerId && d.ownerId!==t.ownerId){
      if(!confirm(`負責人不同：合作案是「${empName(d.ownerId)}」，但「${esc(t.name)}」的負責人是「${empName(t.ownerId)}」。\n確定還要併入嗎？`)) return;
    } else if(d.ownerId && !t.ownerId){
      if(!confirm(`「${esc(t.name)}」沒有指定負責人，合作案負責人是「${empName(d.ownerId)}」。確定併入嗎？`)) return;
    }
    const c=dealCalc(d);
    t.amount=(Number(t.amount)||0)+Math.round(c.companyShare);
    d.carriedTo=tid; dealCarry=null; saveData(); render();
  });
  document.querySelectorAll('[data-carryundo]').forEach(b=>b.onclick=()=>{
    const d=state.deals.find(x=>x.id===b.dataset.carryundo); if(!d) return;

    if(tgt){
      if(tgt.fromCoop===d.id){ // 當初是新建的 → 整筆刪掉
        state.deals=state.deals.filter(x=>x.id!==tgt.id);
      } else { // 當初是併入 → 把金額扣回

  document.querySelectorAll('[data-coopmgr]').forEach(inp=>inp.onchange=()=>{
    const s=state.sites.find(x=>x.id===inp.dataset.coopmgr); if(!s) return;
    const v=parseFloat(inp.value); s.coopMgrPct=isNaN(v)?50:Math.max(0,Math.min(100,v)); saveData(); render();
  });
  document.querySelectorAll('[data-cooptax]').forEach(inp=>inp.onchange=()=>{
    const s=state.sites.find(x=>x.id===inp.dataset.cooptax); if(!s) return;

  });
  document.querySelectorAll('[data-coopowner]').forEach(sel=>sel.onchange=()=>{
    const s=state.sites.find(x=>x.id===sel.dataset.coopowner); if(!s) return;
    s.coopOwnerId=sel.value; saveData(); render();
  });
  document.querySelectorAll('[data-coopclose]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.coopclose); if(!s) return;
    if(!confirm(`確定將「${esc(s.name)}」結案？\n結案後會收合起來，之後有追加可再「重新打開」。`)) return;
    s.coopClosed=true; saveData(); render();
  });
  document.querySelectorAll('[data-coopreopen]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.coopreopen); if(!s) return;
    s.coopClosed=false; saveData(); render();
  });
  document.querySelectorAll('[data-coopcarry]').forEach(b=>b.onclick=()=>{ coopCarry=b.dataset.coopcarry; render(); });
  document.querySelectorAll('[data-coopcarrycancel]').forEach(b=>b.onclick=()=>{ coopCarry=null; render(); });
  document.querySelectorAll('[data-coopcarrynew]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.coopcarrynew); if(!s) return;
    const c=coopSiteCalc(s);
    const nd={id:uid(),name:s.name+'（公司分潤）',type:'公司分潤',date:new Date().toISOString().slice(0,10),amount:Math.round(c.companyShare),cost:0,taxPct:0,scheme:'new',ownerId:s.coopOwnerId||'',owner:'',moneyAcc:'',posted:false,fromCoopSite:s.id};
    state.deals.push(nd); s.coopCarriedTo=nd.id; coopCarry=null; saveData(); render();
  });
  document.querySelectorAll('[data-coopcarryinto]').forEach(b=>b.onclick=()=>{
    const [sid,tid]=b.dataset.coopcarryinto.split('::');
    const s=state.sites.find(x=>x.id===sid), t=state.deals.find(x=>x.id===tid);
    if(!s||!t) return;
    if(t.posted){ alert('該公司分潤案已入帳，請先撤銷再併入。'); return; }
    const c=coopSiteCalc(s);
    if(s.coopOwnerId && t.ownerId && s.coopOwnerId!==t.ownerId){
      if(!confirm(`負責人不同：合作案是「${empName(s.coopOwnerId)}」，目標案場是「${empName(t.ownerId)}」。確定併入？`)) return;
    }
    t.amount=(Number(t.amount)||0)+Math.round(c.companyShare);
    s.coopCarriedTo=tid; coopCarry=null; saveData(); render();
  });
  document.querySelectorAll('[data-coopcarryundo]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.coopcarryundo); if(!s) return;
    if(!confirm('撤銷「帶去公司分潤」？')) return;
    const c=coopSiteCalc(s);
    const tgt=state.deals.find(x=>x.id===s.coopCarriedTo);
    if(tgt){
      if(tgt.fromCoopSite===s.id) state.deals=state.deals.filter(x=>x.id!==tgt.id);
      else tgt.amount=Math.max(0,(Number(tgt.amount)||0)-Math.round(c.companyShare));
    }
    delete s.coopCarriedTo; saveData(); render();
  });
  document.querySelectorAll('[data-dealedit]').forEach(b=>b.onclick=()=>{ dealEditId=b.dataset.dealedit; render(); });
  document.querySelectorAll('[data-dealeditcancel]').forEach(b=>b.onclick=()=>{ dealEditId=null; render(); });
  document.querySelectorAll('[data-dealeditok]').forEach(b=>b.onclick=()=>{
    const d=state.deals.find(x=>x.id===b.dataset.dealeditok); if(!d) return;
    const name=document.getElementById('de-name').value.trim();
    const amount=parseFloat(document.getElementById('de-amount').value);
    if(!name||isNaN(amount)){ alert('請填案場名稱與請款金額'); return; }
    d.name=name;
    const newType=document.getElementById('de-type').value;
    d.type=newType;
    d.date=document.getElementById('de-date').value;
    d.amount=amount;
    const cost=parseFloat(document.getElementById('de-cost').value); d.cost=isNaN(cost)?0:cost;
    const tp=parseFloat(document.getElementById('de-taxpct').value); d.taxPct=isNaN(tp)?0:tp;
    const schemeEl=document.getElementById('de-scheme');
    const mgrEl=document.getElementById('de-mgrpct');

    d.owner=document.getElementById('de-client').value.trim();

  });
  document.querySelectorAll('[data-dealcancel]').forEach(b=>b.onclick=()=>{ dealPosting=null; render(); });
  document.querySelectorAll('[data-dealpick]').forEach(b=>b.onclick=()=>{
    const [did,accId]=b.dataset.dealpick.split('::');

    if(c.fund!==0){
      state.ledger.push({id:uid(),date:d.date||new Date().toISOString().slice(0,10),accId,kind:c.fund>=0?'in':'out',amount:Math.abs(c.fund),note:`分潤結算·${d.name}（公積金${c.fund>=0?'收入':'虧損'}）`,fromDeal:did});

  document.querySelectorAll('[data-unpostdeal]').forEach(b=>b.onclick=()=>{
    if(!confirm('撤銷結帳？帳戶裡對應的公積金收支會一併刪除，累計獎金也會扣回。')) return;
    const did=b.dataset.unpostdeal;
    state.ledger=state.ledger.filter(t=>t.fromDeal!==did);
    const d=state.deals.find(x=>x.id===did); if(d){ d.posted=false; delete d.postAcc; }

  // 請款追蹤
  document.querySelectorAll('[data-billedit]').forEach(b=>b.onclick=()=>{ billEditId=b.dataset.billedit; render(); });
  document.querySelectorAll('[data-billeditcancel]').forEach(b=>b.onclick=()=>{ billEditId=null; render(); });
  document.querySelectorAll('[data-billeditok]').forEach(b=>b.onclick=()=>{

    bill.date=document.getElementById('be-date').value;

  if(bAdd) bAdd.onclick=()=>{

    const site=document.getElementById('b-site').value.trim();

    const method=document.getElementById('b-method').value.trim();
    const client=document.getElementById('b-client').value.trim();

    saveData(); render();
  };
  document.querySelectorAll('[data-togglesettle]').forEach(b=>b.onclick=()=>{
    const bill=state.billings.find(x=>x.id===b.dataset.togglesettle); if(bill){ bill.settled=!bill.settled; saveData(); render(); }
  });
  document.querySelectorAll('[data-delbill]').forEach(b=>b.onclick=()=>{
    const bill=state.billings.find(x=>x.id===b.dataset.delbill);
    if(!confirm('確定刪除這筆請款？')) return;
    state.billings=state.billings.filter(x=>x.id!==b.dataset.delbill); saveData(); render();
  });
  document.querySelectorAll('[data-contract]').forEach(inp=>inp.onchange=()=>{
    const name=inp.dataset.contract; const v=parseFloat(inp.value);
    if(isNaN(v)||v<=0) delete state.contracts[name]; else state.contracts[name]=v;
    saveData(); render();
  });

  // 對帳匯出
  const rf=document.getElementById('recon-from'); if(rf) rf.onchange=()=>{ reconFrom=rf.value; render(); };
  const rt=document.getElementById('recon-to'); if(rt) rt.onchange=()=>{ reconTo=rt.value; render(); };
  const rtp=document.getElementById('recon-thisperiod'); if(rtp) rtp.onclick=()=>{ const d=defaultPayRange(); reconFrom=d.from; reconTo=d.to; render(); };
  const rcl=document.getElementById('recon-clear'); if(rcl) rcl.onclick=()=>{ reconFrom=''; reconTo=''; render(); };
  document.querySelectorAll('[data-reconpick]').forEach(cb=>cb.onchange=()=>{ reconPick[cb.dataset.reconpick]=cb.checked; render(); });
  const rex=document.getElementById('recon-export'); if(rex) rex.onclick=()=>exportRecon();

  // 年度總結
  const yf=document.getElementById('ye-from'); if(yf) yf.onchange=()=>{ yearFrom=yf.value; render(); };
  const yt=document.getElementById('ye-to'); if(yt) yt.onchange=()=>{ yearTo=yt.value; render(); };
  const yc=document.getElementById('ye-clear'); if(yc) yc.onclick=()=>{ yearFrom=''; yearTo=''; render(); };
}

// ---- PDF 匯出（以列印視窗產生，可存成 PDF 或直接列印）----
function printHTML(title, inner){
  // 移除舊浮層
  const old=document.getElementById('print-overlay'); if(old) old.remove();
  const ov=document.createElement('div');
  ov.id='print-overlay';
  ov.innerHTML=`
    <div class="pbar">
      <button class="btn" id="po-print">列印 / 存成 PDF</button>
      <button class="act" id="po-close" style="border:1px solid var(--line2);border-radius:8px;padding:0 14px">關閉</button>
    </div>
    <div class="pdoc">${inner}</div>`;
  document.body.appendChild(ov);
  document.getElementById('po-print').onclick=()=>window.print();
  document.getElementById('po-close').onclick=()=>ov.remove();
  ov.scrollTop=0;
}

function exportSummaryPDF(){
  const byEmp=buildPayroll(state.payFrom,state.payTo);
  const isPartner=id=>{ const e=state.employees.find(x=>x.id===id); return e&&e.partner; };
  const ids=Object.keys(byEmp).filter(id=>!isPartner(id)).sort((a,b)=>byEmp[b].net-byEmp[a].net);
  if(ids.length===0) return;
  let gG=0,gA=0,gD=0,gN=0;
  const rows=ids.map(id=>{ const e=byEmp[id]; gG+=e.gross;gA+=e.addTotal;gD+=e.dedTotal;gN+=e.net;
    return `<tr><td>${esc(empName(id))}</td><td class="num">${e.days.size}</td><td class="num">${gongStr(e.hours)}</td>
      <td class="num">${money(e.gross)}</td><td class="num">${e.addTotal?money(e.addTotal):'-'}</td>
      <td class="num">${e.dedTotal?money(e.dedTotal):'-'}</td><td class="num">${money(e.net)}</td></tr>`;
  }).join('');
  const inner=`<h1>薪資總表</h1>
    <div class="meta">計薪期間：${state.payFrom||'起始'} ～ ${state.payTo||'迄今'}　|　列印日期：${new Date().toISOString().slice(0,10)}　|　共 ${ids.length} 人</div>
    <table><thead><tr><th>員工</th><th class="num">出勤天</th><th class="num">總工數</th><th class="num">出工薪資</th><th class="num">加項</th><th class="num">扣項</th><th class="num">實發金額</th></tr></thead>
    <tbody>${rows}
      <tr class="total-row"><td>合計</td><td class="num"></td><td class="num"></td><td class="num">${money(gG)}</td><td class="num">${money(gA)}</td><td class="num">${money(gD)}</td><td class="num">${money(gN)}</td></tr>
    </tbody></table>
    <p class="sub">出工薪資＝工資＋津貼（工資為各案場工時×時薪，各案場各自計算）。實發＝出工薪資＋加項−扣項。金額四捨五入至整數。</p>`;
  printHTML('薪資總表 '+(state.payFrom||''), inner);
}

function exportPayslipPDF(empId){
  const byEmp=buildPayroll(state.payFrom,state.payTo);
  const e=byEmp[empId]; if(!e) return;
  const addRows=e.adds.map(a=>`<tr><td>${esc(a.label)}</td><td>${esc(a.note||'')}</td><td class="num">+${money(a.amount)}</td></tr>`).join('');
  const dedRows=e.deds.map(a=>`<tr><td>${esc(a.label)}</td><td>${esc(a.note||'')}</td><td class="num">−${money(a.amount)}</td></tr>`).join('');
  // 該員工本期各日出工明細
  const inRange=d=> (!state.payFrom||d>=state.payFrom) && (!state.payTo||d<=state.payTo);
  const comp=computeRecords(state.attendance);
  const myRecs=state.attendance.filter(r=>r.empId===empId&&inRange(r.date)).sort((a,b)=>a.date.localeCompare(b.date));
  const recRows=myRecs.map(r=>{ const c=comp[r.id]||{wage:0,allow:0,total:0};
    return `<tr><td>${esc(r.date)}</td><td>${esc(siteName(r.siteId))}</td><td class="num">${gongStr(r.hours)}</td><td class="num">${r.night?'是':'-'}</td>

// 請款追蹤明細 PDF
function exportBillingPDF(){

// ---- 借支 ----
// 每筆借支已扣金額 = 所有「來源為此借支」的扣項調整加總
function loanRepaid(loanId){
  return state.adjustments.filter(a=>a.loanId===loanId && a.kind==='ded').reduce((s,a)=>s+(Number(a.amount)||0),0);
}
function loanBalance(loan){ return Math.max(0, (Number(loan.amount)||0) - loanRepaid(loan.id)); }
// 本期是否已對此借支扣過款
function loanDeductedInRange(loanId,from,to){
  const inRange=d=>(!from||d>=from)&&(!to||d<=to);
  return state.adjustments.some(a=>a.loanId===loanId && a.kind==='ded' && inRange(a.date));
}

// ---- 地點與工具資產 ----
// 統一地點清單：案場（type=site）+ 自訂地點（type=loc，倉庫/貨車等）
function allLocations(){
  const a=state.sites.map(s=>({key:'site:'+s.id, name:s.name, kind:'案場'}));
  const b=state.locations.map(l=>({key:'loc:'+l.id, name:l.name, kind:l.kind||'地點'}));
  return a.concat(b);
}
function locLabel(key){
  if(!key) return '（未指定）';
  const f=allLocations().find(x=>x.key===key);
  return f?f.name:'（已移除）';
}

    const items=groups[k].sort((x,y)=>(x.name||'').localeCompare(y.name||''));

function evenSplit(amount, ids){
  const out={}; const n=ids.length; if(n===0) return out;
  const each=Math.round((amount/n)/1)*1; // 先平均
  let acc=0;
  ids.forEach((id,i)=>{ if(i<n-1){ out[id]=Math.round(amount/n); acc+=out[id]; } else { out[id]=Math.round(amount-acc); } });
  return out;
}

// ---- 案場損益及分潤結算 ----
const SCHEMES={
  'new':{label:'新制 30/70（負責人30%·公積金70%）', bonus:0.30, fund:0.70},
  'old':{label:'舊制 0/100（全進公積金）', bonus:0, fund:1.00},
};
// 合作案場：總請款、總成本、利潤、業主/管理人對拆（成本來自案場成本明細、請款來自請款追蹤）
function coopSiteCalc(site){
  const totalBill=state.billings.filter(b=>b.site===site.name).reduce((s,b)=>s+(Number(b.amount)||0),0);
  const totalCost=(state.costs||[]).filter(c=>c.siteId===site.id).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const taxPct=(site.coopTaxPct!==undefined&&site.coopTaxPct!=='')?Number(site.coopTaxPct):0;
  const tax=totalBill*taxPct/100;
  const profit=totalBill-totalCost-tax;
  const mgrPct=(site.coopMgrPct!==undefined&&site.coopMgrPct!=='')?Number(site.coopMgrPct):50;
  const ownerPct=100-mgrPct;
  return {totalBill,totalCost,tax,taxPct,profit,mgrPct,ownerPct,companyShare:profit*mgrPct/100,partnerShare:profit*ownerPct/100};
}
function dealCalc(d){
  const amount=Number(d.amount)||0, cost=Number(d.cost)||0;
  let tax;
  if(d.taxPct!==undefined && d.taxPct!=='' && d.taxPct!==null) tax=amount*(Number(d.taxPct)||0)/100;
  else tax=Number(d.tax)||0;
  const profit=amount-cost-tax;
  // 合作案：業主出資源、管理人(你們)管現場，利潤依業主%/管理人%拆；算到這就停，不做30/70
  if(d.type==='合作案'){
    const mgrPct=(d.mgrPct!==undefined&&d.mgrPct!=='')?Number(d.mgrPct):50;
    const ownerPct=100-mgrPct;
    const companyShare=profit*mgrPct/100;   // 管理人(你們公司)那份
    const partnerShare=profit*ownerPct/100; // 業主那份
    return {profit, tax, isDeal:true, companyShare, partnerShare, mgrPct, ownerPct, bonus:0, fund:0};
  }
  const sc=SCHEMES[d.scheme]||SCHEMES['new'];
  const bonus=profit>0?profit*sc.bonus:0;
  const fund=profit-bonus;
  return {profit,bonus,fund,tax,isDeal:false};
}

  let totFund=0; const bonusByPartner={};
  state.deals.forEach(d=>{ if(!d.posted) return; const c=dealCalc(d);
    totFund+=c.fund;

  const bonusCards=partners.map(p=>`<div class="metric"><div class="l">${esc(p.name)} 累計獎金</div><div class="v" style="font-size:18px">${money(bonusByPartner[p.id]||0)}</div></div>`).join('');

  const dealRow=(d)=>{

    const sc=SCHEMES[d.scheme]||SCHEMES['new'];
    let action;
    const isCoop=d.type==='合作案';

        action=`<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
          <span class="sub" style="margin:0">管理人應得 ${money(c.companyShare)} 帶去：</span>
          <button class="act" data-carrynew="${d.id}" style="border:1px solid var(--accent);border-radius:6px;padding:2px 8px;color:var(--accent)">＋新建公司分潤</button>
