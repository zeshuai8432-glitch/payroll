<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>品佑帳本</title>
<style>
  :root{
    --accent:#4f46e5; --accent2:#6366f1; --ink:#1f2430; --muted:#6b7280;
    --line:#e5e7eb; --line2:#d1d5db; --bg:#f5f6fb; --surface:#fff;
    --ok:#059669; --danger:#dc2626; --warn:#d97706; --info:#2563eb;
    --shadow:0 1px 3px rgba(79,70,229,.08),0 6px 20px rgba(79,70,229,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-text-size-adjust:100%}
  .top{position:sticky;top:0;z-index:20;background:linear-gradient(120deg,#4f46e5,#6366f1);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px rgba(79,70,229,.25)}
  .top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.5px}
  .top .bal{margin-left:auto;text-align:right;font-size:12px;opacity:.9}
  .top .bal b{display:block;font-size:16px;font-weight:700}
  nav{position:sticky;top:0;z-index:15;display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch}
  nav button{flex:0 0 auto;border:none;background:none;padding:12px 16px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap}
  nav button.on{color:var(--accent);border-bottom-color:var(--accent)}
  main{max-width:1100px;margin:0 auto;padding:16px}
  .card{background:var(--surface);border-radius:16px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
  .card h2{font-size:15px;margin:0 0 12px;font-weight:700}
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
  .metric{background:var(--surface);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
  .metric .l{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.4px}
  .metric .v{font-size:20px;font-weight:700;margin-top:3px}
  .metric.accent{background:linear-gradient(120deg,#4f46e5,#6366f1);color:#fff}
  .metric.accent .l{color:#fff;opacity:.85}
  .row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.3px}
  input,select,textarea{height:40px;padding:0 12px;border:1.5px solid var(--line2);border-radius:10px;font-size:14px;font-family:inherit;color:var(--ink);background:#fff;width:100%}
  textarea{height:auto;padding:9px 12px;resize:vertical}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.13)}
  @media (pointer:coarse){ input,select,textarea{font-size:16px} }
  .btn{height:40px;padding:0 18px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer}
  .btn:disabled{opacity:.5}
  .act{height:34px;padding:0 12px;border:1px solid var(--line2);border-radius:8px;background:#fff;color:var(--ink);font-size:13px;cursor:pointer}
  .act.danger{color:var(--danger);border-color:#fecaca}
  .act.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 10px;text-align:left;border-bottom:1px solid var(--line)}
  th{font-size:11px;color:var(--muted);font-weight:700;background:#fafafe;white-space:nowrap}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  tr.total td{font-weight:700;background:#f4f4fd;border-top:2px solid var(--line2)}
  .empty{text-align:center;color:var(--muted);padding:36px 0;font-size:14px}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;background:#eef2ff;color:var(--accent)}
  .pos{color:var(--ok)} .neg{color:var(--danger)}
  .sub{font-size:12px;color:var(--muted);margin:0 0 12px}
  .bar{height:7px;border-radius:4px;background:var(--line);overflow:hidden;margin-top:5px}
  .bar>i{display:block;height:100%;background:var(--accent)}
  /* 列印單據 */
  #print-overlay{position:fixed;inset:0;background:#fff;z-index:9999;overflow:auto;padding:20px}
  #print-overlay .pbar{position:sticky;top:0;background:#fff;display:flex;gap:10px;justify-content:flex-end;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:16px}
  #print-overlay .pdoc{max-width:820px;margin:0 auto;color:#1f2937}
  #print-overlay .pdoc table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0}
  #print-overlay .pdoc th,#print-overlay .pdoc td{border:1px solid #cbd5e1;padding:7px 9px;text-align:left}
  #print-overlay .pdoc th{background:#eef2ff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #print-overlay .pdoc td.num,#print-overlay .pdoc th.num{text-align:right;font-variant-numeric:tabular-nums}
  #print-overlay .pdoc tr.total td{background:#eff6ff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @media print{ body>*:not(#print-overlay){display:none!important} #print-overlay{position:static;padding:0;overflow:visible} #print-overlay .pbar{display:none!important} @page{size:A4;margin:14mm} }
</style>
<div class="top">
  <h1>品佑帳本</h1>
  <span id="cloud-status" style="font-size:11px;opacity:.85;margin-left:10px;white-space:nowrap;max-width:40vw;overflow:hidden;text-overflow:ellipsis"></span>
  <div class="bal"><span id="bal-l">帳面淨額</span><b id="bal-v">—</b></div>
</div>
<nav id="nav"></nav>
<main id="app"></main>
<script>
const LS='pinyou_data_v1';
const LS_CLOUD='pinyou_cloud_url';
const LS_DIRTY='pinyou_dirty';
const MERGE=['projects','expenses','incomes','companies','quotes','invoices','purchases','myCompanies'];
const TABS=[['dash','儀表板'],['proj','案場'],['exp','支出'],['inc','請款'],['quote','報價單'],['invoice','請款單'],['purchase','採購單'],['co','通訊錄'],['set','設定']];
let state=blank();
let tab='dash';
let expFilter='', expItemFilter='', incFilter='', expEditId=null;
let docDraft=null; // 編輯中的報價單/請款單草稿
const DEFAULT_CLOUD_URL='https://script.google.com/macros/s/AKfycbxFLYgepJcn4-Sw_BvgTb-jUijDaSmRSfMkdfrnlwrVgDzDxE65KidWbao3Bq6ooL7q/exec';
let cloudUrl=localStorage.getItem(LS_CLOUD)||DEFAULT_CLOUD_URL;
let cloudStatus='', saving=false, pendingSave=false, saveTimer=null, localDirty=false, _prevIds=null;

function blank(){ return {projects:[],expenses:[],incomes:[],companies:[],accounts:['東澤工程行','品佑工程有限公司','廣昕工程行'],items:[],myCompanies:[
  {id:'c-py',name:'品佑工程有限公司',taxId:'',addr:'',tel:'',bank:''},
  {id:'c-dz',name:'東澤工程行',taxId:'',addr:'',tel:'',bank:''},
  {id:'c-gx',name:'廣昕工程行',taxId:'',addr:'',tel:'',bank:''}
],quotes:[],invoices:[],purchases:[],deletedIds:[]}; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function money(n){ n=Math.round(Number(n)||0); return (n<0?'-':'')+'$'+Math.abs(n).toLocaleString('en-US'); }
function pct(n){ return (Number(n)||0*1).toLocaleString('en-US',{style:'percent',maximumFractionDigits:1}); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function today(){ return new Date().toISOString().slice(0,10); }
function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }

function packData(){ return {projects:state.projects,expenses:state.expenses,incomes:state.incomes,companies:state.companies,accounts:state.accounts,items:state.items||[],quotes:state.quotes||[],invoices:state.invoices||[],purchases:state.purchases||[],myCompanies:state.myCompanies||[],deletedIds:state.deletedIds||[],savedAt:Date.now()}; }
function load(){ try{ const r=localStorage.getItem(LS); if(r){ state=Object.assign(blank(),JSON.parse(r)); } }catch(e){} localDirty=!!localStorage.getItem(LS_DIRTY); _prevIds=collectIds(); }
function save(){
  recordDeletions();
  localDirty=true;
  try{ localStorage.setItem(LS_DIRTY,'1'); localStorage.setItem(LS,JSON.stringify(packData())); }catch(e){}
  render();
  if(cloudUrl){ setStatus('儲存中…'); if(saveTimer) clearTimeout(saveTimer); saveTimer=setTimeout(pushCloud,400); }
}
// ---- 雲端同步（Google Apps Script，Drive 儲存；逐筆合併、防資料遺失）----
function setStatus(s){ cloudStatus=s; const el=document.getElementById('cloud-status'); if(el) el.textContent=(cloudUrl?'☁ ':'')+s; }
function safeRender(){ const a=document.activeElement; if(a&&/^(INPUT|SELECT|TEXTAREA)$/.test(a.tagName)) return; render(); }
function collectIds(){ const s=new Set(); MERGE.forEach(k=>(state[k]||[]).forEach(r=>{ if(r&&r.id!=null) s.add(r.id); })); return s; }
function recordDeletions(){ const cur=collectIds(); if(_prevIds){ const del=new Set(state.deletedIds||[]); _prevIds.forEach(id=>{ if(!cur.has(id)) del.add(id); }); state.deletedIds=[...del]; } _prevIds=cur; }
function unionById(base,add,del){ const map=new Map(); (base||[]).forEach(r=>{ if(r&&r.id!=null&&!del.has(r.id)) map.set(r.id,r); }); (add||[]).forEach(r=>{ if(r&&r.id!=null&&!del.has(r.id)&&!map.has(r.id)) map.set(r.id,r); }); return [...map.values()]; }
function mergeCloudDoc(cd){
  const localTs=Number((JSON.parse(localStorage.getItem(LS)||'{}')||{}).savedAt)||0;
  const cloudTs=Number(cd.savedAt)||0;
  const keep={}; MERGE.forEach(k=>keep[k]=(state[k]||[]).slice());
  const keepDel=(state.deletedIds||[]).slice();
  if(cloudTs>=localTs){
    MERGE.forEach(k=>{ state[k]=Array.isArray(cd[k])?cd[k]:[]; });
    state.deletedIds=[...new Set([...(cd.deletedIds||[]),...keepDel])];
    (cd.accounts||[]).forEach(a=>{ if(!state.accounts.includes(a)) state.accounts.unshift(a); });
    const del=new Set(state.deletedIds);
    MERGE.forEach(k=>{ state[k]=unionById(state[k],keep[k],del); });
  } else {
    state.deletedIds=[...new Set([...(state.deletedIds||[]),...(cd.deletedIds||[])])];
    const del=new Set(state.deletedIds);
    MERGE.forEach(k=>{ state[k]=unionById(state[k],cd[k]||[],del); });
    (cd.accounts||[]).forEach(a=>{ if(!state.accounts.includes(a)) state.accounts.push(a); });
  }
  const del=new Set(state.deletedIds||[]);
  MERGE.forEach(k=>{ state[k]=(state[k]||[]).filter(r=>!(r&&del.has(r.id))); });
  _prevIds=collectIds();
}
async function loadCloud(){
  if(!cloudUrl) { setStatus('本機模式'); return; }
  setStatus('讀取雲端中…');
  try{
    const r=await fetch(cloudUrl,{method:'GET'});
    const txt=await r.text(); let j=null; try{ j=JSON.parse(txt); }catch(_){}
    if(!j){ setStatus(`雲端回應異常 HTTP${r.status}（GAS未回JSON）`); return; }
    if(j.ok && j.data){
      mergeCloudDoc(JSON.parse(j.data));
      try{ localStorage.setItem(LS,JSON.stringify(packData())); }catch(e){}
      safeRender();
      if(localDirty){ setStatus('已同步（回傳中…）'); pushCloud(); } else setStatus('已同步');
    } else {
      // 雲端還沒資料：若本機有資料就上傳當底（不管有沒有未存變更）
      const hasLocal=MERGE.some(k=>(state[k]||[]).length>0);
      if(hasLocal){ localDirty=true; setStatus('雲端無資料，正在上傳本機…'); pushCloud(); }
      else setStatus('雲端尚無資料（本機也是空的）');
    }
  }catch(e){ setStatus('雲端讀取失敗：'+String((e&&e.message)||e).slice(0,26)); }
}
async function pushCloud(){
  if(!cloudUrl) return;
  if(saving){ pendingSave=true; return; }
  if(!localDirty){ setStatus('已同步'); return; }
  saving=true;
  let kb=0, getOK=false;
  try{
    try{ const gr=await fetch(cloudUrl,{method:'GET'}); const gt=await gr.text(); const gj=JSON.parse(gt); getOK=true; if(gj&&gj.ok&&gj.data) mergeCloudDoc(JSON.parse(gj.data)); }catch(e){}
    const payload=JSON.stringify(packData());
    try{ localStorage.setItem(LS,payload); }catch(e){}
    kb=Math.round(payload.length/1024);
    const pr=await fetch(cloudUrl,{method:'POST',body:payload});
    let pj=null; const txt=await pr.text(); try{ pj=JSON.parse(txt); }catch(_){}
    if(pj&&pj.ok){ localDirty=false; try{ localStorage.removeItem(LS_DIRTY); }catch(e){} setStatus('已同步'); safeRender(); }
    else if(pj){ setStatus('推送失敗：'+String(pj.error||'').slice(0,40)); }
    else { setStatus(`雲端回應異常 HTTP${pr.status}・資料${kb}KB`); }
  }catch(e){ setStatus('儲存失敗：'+String((e&&e.message)||e).slice(0,22)+`・資料${kb}KB・讀取${getOK?'OK':'也失敗'}`); }
  saving=false;
  if(pendingSave){ pendingSave=false; pushCloud(); }
}

// ---- 衍生計算 ----
function siteIncome(name){ return state.incomes.filter(x=>x.site===name).reduce((s,x)=>s+num(x.amount),0); }
function siteExpense(name){ return state.expenses.filter(x=>x.site===name).reduce((s,x)=>s+num(x.amount),0); }
function projOpening(p){ return num(p.openingBilled!=null?p.openingBilled:p.billed); } // 相容舊 billed 欄位
function projCalc(p){
  // 已請款＝期初已請款(手動) ＋ 該案場請款明細加總（自動連動）；累積支出＝支出明細加總
  const income=projOpening(p)+siteIncome(p.name), expense=siteExpense(p.name);
  const retain=num(p.contract)*num(p.retainPct);
  const progress=num(p.contract)?income/num(p.contract):0;
  const unbilled=num(p.contract)-retain-income;
  const profit=num(p.contract)-expense;
  return {income,expense,retain,progress,unbilled,profit};
}
// 所有出現過的案場名（案場清單 + 支出/請款有用到的）
function allSiteNames(){
  const s=new Set(state.projects.map(p=>p.name));
  state.expenses.forEach(x=>x.site&&s.add(x.site));
  state.incomes.forEach(x=>x.site&&s.add(x.site));
  return [...s];
}
function itemNames(){
  const s=new Set(state.items||[]);
  state.expenses.forEach(x=>x.item&&s.add(x.item));
  return [...s];
}

function setBalance(){
  const billed=state.projects.reduce((s,p)=>s+projOpening(p),0)+state.incomes.reduce((s,x)=>s+num(x.amount),0);
  const exp=state.expenses.reduce((s,x)=>s+num(x.amount),0);
  const el=document.getElementById('bal-v'); if(el) el.textContent=money(billed-exp);
  const l=document.getElementById('bal-l'); if(l) l.textContent='已請款−支出';
}

// ================= 各頁 =================
function viewDash(){
  const projs=state.projects;
  const totContract=projs.reduce((s,p)=>s+num(p.contract),0);
  const totIncome=projs.reduce((s,p)=>s+projCalc(p).income,0);
  const totExpense=state.expenses.reduce((s,x)=>s+num(x.amount),0);
  const totProfit=projs.reduce((s,p)=>s+projCalc(p).profit,0);

  const metrics=`<div class="metrics">
    <div class="metric"><div class="l">案場數</div><div class="v">${projs.length}</div></div>
    <div class="metric"><div class="l">合約總額</div><div class="v">${money(totContract)}</div></div>
    <div class="metric"><div class="l">已請款總額</div><div class="v" style="color:var(--info)">${money(totIncome)}</div></div>
    <div class="metric"><div class="l">累積支出總額</div><div class="v" style="color:var(--danger)">${money(totExpense)}</div></div>
    <div class="metric accent"><div class="l">已請款−支出</div><div class="v">${money(totIncome-totExpense)}</div></div>
  </div>`;

  // 各入款帳號收款
  const byAcc={};
  state.incomes.forEach(x=>{ const a=x.account||'（未指定）'; byAcc[a]=(byAcc[a]||0)+num(x.amount); });
  const incLogTot=state.incomes.reduce((s,x)=>s+num(x.amount),0);
  const accRows=Object.entries(byAcc).sort((a,b)=>b[1]-a[1]).map(([a,v])=>`<tr><td>${esc(a)}</td><td class="num">${money(v)}</td></tr>`).join('');
  const accCard=Object.keys(byAcc).length?`<div class="card"><h2>各帳戶收款（依請款明細）</h2><p class="sub">此為「請款明細」逐筆記錄依入款帳號的加總，供對帳用（可能與案場「已請款」不同，因請款明細不一定每筆都登記）。</p><div class="scroll"><table><thead><tr><th>入款帳號</th><th class="num">收款</th></tr></thead><tbody>${accRows}<tr class="total"><td>合計</td><td class="num">${money(incLogTot)}</td></tr></tbody></table></div></div>`:'';

  // 案場進度表
  let projRows=projs.map(p=>{ const c=projCalc(p);
    return `<tr>
      <td>${esc(p.name)}${p.untaxed?'<span class="tag" style="background:#fef3c7;color:#92400e;margin-left:4px">未稅</span>':''}${p.note?`<div style="font-size:11px;color:var(--muted)">${esc(p.note)}</div>`:''}</td>
      <td class="num">${money(p.contract)}</td>
      <td class="num">${c.retain?money(c.retain):'—'}</td>
      <td class="num" style="color:var(--info)">${money(c.income)}</td>
      <td class="num">${num(p.contract)?pct(c.progress):'—'}<div class="bar"><i style="width:${Math.min(100,Math.max(0,c.progress*100))}%"></i></div></td>
      <td class="num ${c.unbilled<0?'neg':''}">${money(c.unbilled)}</td>
      <td class="num" style="color:var(--danger)">${money(c.expense)}</td>
      <td class="num ${c.profit<0?'neg':'pos'}" style="font-weight:700">${money(c.profit)}</td>
    </tr>`;
  }).join('');
  const projCard=`<div class="card"><h2>案場請款進度</h2>${projs.length===0?'<div class="empty">尚無案場。到「案場」分頁新增，或到「設定」匯入資料。</div>':`<div class="scroll"><table>
    <thead><tr><th>案場</th><th class="num">簽約金</th><th class="num">保留款</th><th class="num">已請款</th><th class="num">已請進度</th><th class="num">未請領餘額</th><th class="num">累積支出</th><th class="num">預計剩餘利潤</th></tr></thead>
    <tbody>${projRows}<tr class="total"><td>合計</td><td class="num">${money(totContract)}</td><td class="num"></td><td class="num">${money(totIncome)}</td><td class="num"></td><td class="num"></td><td class="num">${money(totExpense)}</td><td class="num">${money(totProfit)}</td></tr></tbody></table></div>
    <p class="sub" style="margin-top:8px"><b>已請款＝案場「期初已請款」＋該案場的請款明細加總</b>（在「請款」頁登一筆，這裡會自動加上去）。保留款＝簽約金×保留比率；已請進度＝已請款÷簽約金；未請領餘額＝簽約金−保留款−已請款；預計剩餘利潤＝簽約金−累積支出。</p>`}</div>`;

  // 支出分類
  const byItem={};
  state.expenses.forEach(x=>{ const k=x.item||'（未分類）'; byItem[k]=(byItem[k]||0)+num(x.amount); });
  const itemRows=Object.entries(byItem).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num">${money(v)}</td></tr>`).join('');
  const itemCard=Object.keys(byItem).length?`<div class="card"><h2>支出分類（依項目名稱）</h2><div class="scroll"><table><thead><tr><th>項目</th><th class="num">加總</th></tr></thead><tbody>${itemRows}<tr class="total"><td>合計</td><td class="num">${money(totExpense)}</td></tr></tbody></table></div></div>`:'';

  // 各帳戶支出（依出帳帳號）
  const byAccExp={};
  state.expenses.forEach(x=>{ const a=x.account||'（未指定）'; byAccExp[a]=(byAccExp[a]||0)+num(x.amount); });
  const accExpRows=Object.entries(byAccExp).sort((a,b)=>b[1]-a[1]).map(([a,v])=>`<tr><td>${esc(a)}</td><td class="num" style="color:var(--danger)">${money(v)}</td></tr>`).join('');
  const accExpCard=Object.keys(byAccExp).length?`<div class="card"><h2>各帳戶支出（依出帳帳號）</h2><p class="sub">每筆支出記的「出帳帳號」加總，看各公司帳號實際付出多少。</p><div class="scroll"><table><thead><tr><th>出帳帳號</th><th class="num">支出</th></tr></thead><tbody>${accExpRows}<tr class="total"><td>合計</td><td class="num">${money(totExpense)}</td></tr></tbody></table></div></div>`:'';

const DOC_META={
  quote:{label:'報價單',prefix:'Q',arr:'quotes',party:'客戶'},
  invoice:{label:'請款單',prefix:'I',arr:'invoices',party:'客戶',settleLabel:'收款',link:'income'},
  purchase:{label:'採購單',prefix:'P',arr:'purchases',party:'廠商',settleLabel:'付款',link:'expense'}
};
function findDoc(id){ return (state.quotes||[]).concat(state.invoices||[],state.purchases||[]).find(d=>d.id===id); }
function docCalc(doc){
  const sub=(doc.lines||[]).reduce((s,l)=>s+num(l.qty)*num(l.price),0);
  const rate=num(doc.taxPct)/100;
  let tax=0, net=sub, total=sub;
  if(doc.taxMode==='exclusive'){ tax=Math.round(sub*rate); net=sub; total=sub+tax; }
  else if(doc.taxMode==='inclusive'){ net=Math.round(sub/(1+rate)); tax=sub-net; total=sub; }
  return {sub, net, tax, total};
}
function nextDocNo(type){
  const m=DOC_META[type], ymd=today().replace(/-/g,'');
  const n=(state[m.arr]||[]).filter(d=>(d.no||'').indexOf(m.prefix+ymd)===0).length+1;
  return m.prefix+ymd+'-'+String(n).padStart(2,'0');
}
function newDraft(type){ return {type,id:null,no:nextDocNo(type),date:today(),issuerId:(state.myCompanies[0]||{}).id||'',client:'',site:'',taxMode:'exclusive',taxPct:5,lines:[{item:'',unit:'式',qty:1,price:0}],note:'',validDays:30,expItem:'材料'}; }
function readDocDraftFromForm(){
  if(!docDraft) return;
  const g=id=>document.getElementById(id);
  if(g('d-date')) docDraft.date=g('d-date').value||docDraft.date;
  if(g('d-issuer')) docDraft.issuerId=g('d-issuer').value;
  if(g('d-client')) docDraft.client=g('d-client').value;
  if(g('d-site')) docDraft.site=g('d-site').value;
  if(g('d-taxmode')) docDraft.taxMode=g('d-taxmode').value;
  if(g('d-taxpct')) docDraft.taxPct=num(g('d-taxpct').value);
  if(g('d-note')) docDraft.note=g('d-note').value;
  if(g('d-valid')) docDraft.validDays=num(g('d-valid').value);
  if(g('d-expitem')) docDraft.expItem=g('d-expitem').value;
  (docDraft.lines||[]).forEach((l,i)=>{
    const gi=id=>document.getElementById(id+i);
    if(gi('dl-item')) l.item=gi('dl-item').value;
    if(gi('dl-unit')) l.unit=gi('dl-unit').value;
    if(gi('dl-qty')) l.qty=num(gi('dl-qty').value);
    if(gi('dl-price')) l.price=num(gi('dl-price').value);
  });
}
function toggleDocSettled(id){
  const doc=findDoc(id); if(!doc) return;
  const m=DOC_META[doc.type]; if(!m.link) return;
  const c=docCalc(doc);
  const issuer=state.myCompanies.find(x=>x.id===doc.issuerId)||{};
  const linkId=doc.linkId||doc.incomeId; // 相容舊欄位
  if(!doc.settled){
    doc.settled=true; doc.settledDate=today();
    if(m.link==='income'){
      const rec={id:uid(),date:today(),site:doc.site||'',amount:c.total,method:'',account:issuer.name||'',note:'請款單 '+doc.no,fromDoc:doc.id};
      state.incomes.push(rec); doc.linkId=rec.id;
    } else { // expense（採購單）
      const rec={id:uid(),date:today(),site:doc.site||'',item:doc.expItem||'材料',amount:c.total,account:issuer.name||'',method:'',note:'採購單 '+doc.no+(doc.client?'·'+doc.client:''),fromDoc:doc.id};
      state.expenses.push(rec); doc.linkId=rec.id;
    }
  } else {
    doc.settled=false;
    if(linkId){ state.incomes=state.incomes.filter(x=>x.id!==linkId); state.expenses=state.expenses.filter(x=>x.id!==linkId); }
    delete doc.linkId; delete doc.incomeId;
  }
  save();
}

  readDocDraftFromForm(); const d=docDraft; if(!d) return null; const arr=DOC_META[d.type].arr;
  if(!d.lines.some(l=>num(l.qty)*num(l.price)>0)){ alert('請至少填一筆有金額的明細'); return null; }
  if(d.id){ const i=state[arr].findIndex(x=>x.id===d.id); if(i>=0) state[arr][i]=Object.assign({},d); }

  return savedId;
}

  const taxLines=doc.taxMode==='none'?'':`<tr><td colspan="5" class="num">未稅小計</td><td class="num">${money(c.net)}</td></tr><tr><td colspan="5" class="num">營業稅（${doc.taxPct}%）</td><td class="num">${money(c.tax)}</td></tr>`;
  const totalLabel=doc.taxMode==='inclusive'?'總計（含稅）':doc.taxMode==='exclusive'?'總計（含稅）':'總計（免稅）';
  const inner=`<div class="pdoc">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #1E3A8A;padding-bottom:10px;margin-bottom:14px">
      <div><div style="font-size:22px;font-weight:800;color:#1E3A8A">${esc(issuer.name||'')}</div>
        ${issuer.taxId?`<div style="font-size:12px;color:#555">統一編號：${esc(issuer.taxId)}</div>`:''}
        ${issuer.addr?`<div style="font-size:12px;color:#555">${esc(issuer.addr)}</div>`:''}
        ${issuer.tel?`<div style="font-size:12px;color:#555">電話：${esc(issuer.tel)}</div>`:''}</div>
      <div style="text-align:right"><div style="font-size:26px;font-weight:800;letter-spacing:6px;color:#1E3A8A">${m.label}</div>
        <div style="font-size:12px;color:#555">單號：${esc(doc.no||'')}</div><div style="font-size:12px;color:#555">日期：${esc(doc.date||'')}</div></div>
    </div>
    <table style="margin-bottom:6px"><tbody><tr><th style="width:64px">${m.party}</th><td>${esc(doc.client||'')}</td><th style="width:64px">案場</th><td>${esc(doc.site||'')}</td></tr></tbody></table>
    <table><thead><tr><th style="width:36px">項次</th><th>品項</th><th style="width:54px">單位</th><th class="num">數量</th><th class="num">單價</th><th class="num">小計</th></tr></thead>
      <tbody>${rows}${taxLines}<tr class="total"><td colspan="5" class="num" style="font-weight:700">${totalLabel}</td><td class="num" style="font-weight:700">${money(c.total)}</td></tr></tbody></table>
    ${issuer.bank?`<div style="margin-top:12px;font-size:13px"><b>匯款帳號：</b>${esc(issuer.bank)}</div>`:''}
    ${doc.note?`<div style="margin-top:8px;font-size:13px;white-space:pre-wrap"><b>備註：</b>${esc(doc.note)}</div>`:''}
    ${doc.type==='quote'&&doc.validDays?`<div style="margin-top:8px;font-size:12px;color:#555">本報價有效期 ${doc.validDays} 天。</div>`:''}
    <div style="margin-top:36px;display:flex;gap:60px"><div style="border-top:1px solid #333;padding-top:6px;min-width:190px">${m.party}簽章</div><div style="border-top:1px solid #333;padding-top:6px;min-width:190px">${esc(issuer.name||'')}</div></div>
  </div>`;
  printHTMLDoc(m.label+' '+doc.no, inner);
}
function printHTMLDoc(title, inner){
  const old=document.getElementById('print-overlay'); if(old) old.remove();
  const ov=document.createElement('div'); ov.id='print-overlay';
  ov.innerHTML=`<div class="pbar"><button class="btn" id="po-print">列印 / 存 PDF</button><button class="act" id="po-close">關閉</button></div>${inner}`;
  document.body.appendChild(ov);
  document.getElementById('po-print').onclick=()=>window.print();
  document.getElementById('po-close').onclick=()=>ov.remove();
  ov.scrollTop=0;
}

// ================= render / bind =================
function render(){
  document.getElementById('nav').innerHTML=TABS.map(([k,t])=>`<button class="${tab===k?'on':''}" data-tab="${k}">${t}</button>`).join('');
  const v={dash:viewDash,proj:viewProj,exp:viewExp,inc:viewInc,quote:()=>viewDoc('quote'),invoice:()=>viewDoc('invoice'),purchase:()=>viewDoc('purchase'),co:viewCo,set:viewSet}[tab];
  document.getElementById('app').innerHTML=v();
  setBalance();
  bind();
}
function bind(){
  document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{ tab=b.dataset.tab; window.scrollTo(0,0); render(); });

  const on=(id,ev,fn)=>{ const el=document.getElementById(id); if(el) el[ev]=fn; };

  // 案場
  on('p-add','onclick',()=>{
    const name=document.getElementById('p-name').value.trim(); if(!name){ alert('請填案場名稱'); return; }
    state.projects.push({id:uid(),name,contract:num(document.getElementById('p-contract').value),untaxed:document.getElementById('p-untaxed').value==='1',openingBilled:num(document.getElementById('p-opening').value),retainPct:num(document.getElementById('p-retain').value)/100,note:document.getElementById('p-note').value.trim()});
    save();
  });
  document.querySelectorAll('[data-pdel]').forEach(b=>b.onclick=()=>{ const p=state.projects.find(x=>x.id===b.dataset.pdel); if(confirm(`刪除案場「${p?p.name:''}」？（不會刪它的支出/請款）`)){ state.projects=state.projects.filter(x=>x.id!==b.dataset.pdel); save(); } });
  document.querySelectorAll('[data-pedit]').forEach(b=>b.onclick=()=>{
    const p=state.projects.find(x=>x.id===b.dataset.pedit); if(!p) return;
    const name=prompt('案場名稱',p.name); if(name===null) return;
    const contract=prompt('簽約金（含稅）',p.contract); if(contract===null) return;
    const opening=prompt('期初已請款（不含下面「請款」頁登記的明細，明細會自動加上去）',projOpening(p)); if(opening===null) return;
    const retain=prompt('保留款比率 %（例 10）',num(p.retainPct)*100); if(retain===null) return;
    const note=prompt('備註',p.note||''); if(note===null) return;
    p.name=name.trim(); p.contract=num(contract); p.openingBilled=num(opening); delete p.billed; p.retainPct=num(retain)/100; p.note=note.trim(); save();
  });

  // 支出
  on('e-add','onclick',()=>{
    const amount=num(document.getElementById('e-amount').value);
    const site=document.getElementById('e-site').value.trim();
    if(!site||amount<=0){ alert('請填案場與金額'); return; }
    state.expenses.push({id:uid(),date:document.getElementById('e-date').value||today(),site,item:document.getElementById('e-item').value.trim(),amount,account:document.getElementById('e-account').value,method:document.getElementById('e-method').value.trim(),note:document.getElementById('e-note').value.trim()});
    save();
  });
  on('e-filter','onchange',e=>{ expFilter=e.target.value; render(); });
  on('e-item-filter','onchange',e=>{ expItemFilter=e.target.value; render(); });
  on('e-clearfilter','onclick',()=>{ expFilter=''; expItemFilter=''; render(); });
  on('e-rename','onclick',()=>{
    const names=itemNames().sort();
    const from=prompt('要整理的「項目名稱」（打完整）。目前有：\n'+names.join('、')); if(from===null) return;
    const f=from.trim(); const cnt=state.expenses.filter(x=>x.item===f).length;
    if(!cnt){ alert(`找不到項目「${f}」的支出。`); return; }
    const to=prompt(`把「${f}」（共 ${cnt} 筆）改成？`,f); if(to===null) return;
    state.expenses.forEach(x=>{ if(x.item===f) x.item=to.trim(); });
    if(expItemFilter===f) expItemFilter=to.trim();
    save(); alert(`已把 ${cnt} 筆「${f}」改成「${to.trim()}」。`);
  });
  document.querySelectorAll('[data-exdel]').forEach(b=>b.onclick=()=>{ if(confirm('刪除這筆支出？')){ state.expenses=state.expenses.filter(x=>x.id!==b.dataset.exdel); save(); } });
  document.querySelectorAll('[data-exedit]').forEach(b=>b.onclick=()=>{ expEditId=b.dataset.exedit; render(); });
  document.querySelectorAll('[data-exeditcancel]').forEach(b=>b.onclick=()=>{ expEditId=null; render(); });
  document.querySelectorAll('[data-exeditok]').forEach(b=>b.onclick=()=>{
    const x=state.expenses.find(e=>e.id===b.dataset.exeditok); if(!x) return;
    x.date=document.getElementById('ee-date').value||x.date;
    x.site=document.getElementById('ee-site').value.trim();
    x.item=document.getElementById('ee-item').value.trim();
    x.amount=num(document.getElementById('ee-amount').value);
    x.account=document.getElementById('ee-account').value;
    x.method=document.getElementById('ee-method').value.trim();
    x.note=document.getElementById('ee-note').value.trim();
    expEditId=null; save();
  });

  // 請款
  on('i-add','onclick',()=>{
    const amount=num(document.getElementById('i-amount').value);
    const site=document.getElementById('i-site').value.trim();
    if(!site||amount<=0){ alert('請填案場與金額'); return; }
    state.incomes.push({id:uid(),date:document.getElementById('i-date').value||today(),site,amount,method:document.getElementById('i-method').value.trim(),account:document.getElementById('i-account').value,note:document.getElementById('i-note').value.trim()});
    save();
  });
  on('i-filter','onchange',e=>{ incFilter=e.target.value; render(); });
  document.querySelectorAll('[data-indel]').forEach(b=>b.onclick=()=>{ if(confirm('刪除這筆請款？')){ state.incomes=state.incomes.filter(x=>x.id!==b.dataset.indel); save(); } });

  // 公司
  on('c-add','onclick',()=>{
    const name=document.getElementById('c-name').value.trim(); if(!name){ alert('請填公司名稱'); return; }
    state.companies.push({id:uid(),name,taxId:document.getElementById('c-tax').value.trim(),contact:document.getElementById('c-contact').value.trim(),addr:document.getElementById('c-addr').value.trim(),note:''});
    save();
  });
  document.querySelectorAll('[data-codel]').forEach(b=>b.onclick=()=>{ if(confirm('刪除這間公司？')){ state.companies=state.companies.filter(x=>x.id!==b.dataset.codel); save(); } });

  // 設定
  on('cloud-sync','onclick',()=>{ if(cloudUrl){ setStatus('同步中…'); loadCloud(); } });
  // 公司資料
  on('myco-save','onclick',()=>{ state.myCompanies.forEach((c,i)=>{ const g=id=>document.getElementById(id+i); if(g('mc-name')) c.name=g('mc-name').value.trim(); if(g('mc-tax')) c.taxId=g('mc-tax').value.trim(); if(g('mc-addr')) c.addr=g('mc-addr').value.trim(); if(g('mc-tel')) c.tel=g('mc-tel').value.trim(); if(g('mc-bank')) c.bank=g('mc-bank').value.trim(); }); save(); alert('公司資料已儲存'); });
  on('myco-add','onclick',()=>{ state.myCompanies.push({id:uid(),name:'新公司',taxId:'',addr:'',tel:'',bank:''}); save(); });
  document.querySelectorAll('[data-myco-del]').forEach(b=>b.onclick=()=>{ if(state.myCompanies.length<=1){ alert('至少保留一家公司'); return; } if(confirm('刪除這家公司？')){ state.myCompanies=state.myCompanies.filter(x=>x.id!==b.dataset.mycoDel); save(); } });
  // 報價單 / 請款單
  on('d-new','onclick',()=>{ docDraft=newDraft(tab); render(); });
  on('d-addline','onclick',()=>{ readDocDraftFromForm(); docDraft.lines.push({item:'',unit:'式',qty:1,price:0}); render(); });
  on('d-cancel','onclick',()=>{ docDraft=null; render(); });
  on('d-taxmode','onchange',()=>{ readDocDraftFromForm(); render(); });
  on('d-taxpct','onchange',()=>{ readDocDraftFromForm(); render(); });
  document.querySelectorAll('[data-dline-del]').forEach(b=>b.onclick=()=>{ readDocDraftFromForm(); docDraft.lines.splice(Number(b.dataset.dlineDel),1); if(!docDraft.lines.length) docDraft.lines.push({item:'',unit:'式',qty:1,price:0}); render(); });
  document.querySelectorAll('[id^="dl-qty"],[id^="dl-price"]').forEach(el=>el.onchange=()=>{ readDocDraftFromForm(); render(); });
  on('d-save','onclick',()=>{ saveDocDraft(); });
  on('d-saveprint','onclick',()=>{ const id=saveDocDraft(); if(id) printDoc(id); });
  document.querySelectorAll('[data-doc-edit]').forEach(b=>b.onclick=()=>{ const d=findDoc(b.dataset.docEdit); if(d){ docDraft=JSON.parse(JSON.stringify(d)); render(); } });
  document.querySelectorAll('[data-doc-copy]').forEach(b=>b.onclick=()=>{ const d=findDoc(b.dataset.docCopy); if(d){ docDraft=JSON.parse(JSON.stringify(d)); docDraft.id=null; docDraft.no=nextDocNo(docDraft.type); docDraft.date=today(); docDraft.settled=false; delete docDraft.incomeId; render(); } });
  document.querySelectorAll('[data-doc-del]').forEach(b=>b.onclick=()=>{ const d=findDoc(b.dataset.docDel); if(d&&confirm(`刪除 ${d.no}？`)){ const lk=d.linkId||d.incomeId; if(lk){ state.incomes=state.incomes.filter(x=>x.id!==lk); state.expenses=state.expenses.filter(x=>x.id!==lk); } state.quotes=(state.quotes||[]).filter(x=>x.id!==d.id); state.invoices=(state.invoices||[]).filter(x=>x.id!==d.id); state.purchases=(state.purchases||[]).filter(x=>x.id!==d.id); save(); } });
  document.querySelectorAll('[data-doc-print]').forEach(b=>b.onclick=()=>printDoc(b.dataset.docPrint));
  document.querySelectorAll('[data-doc-settle]').forEach(b=>b.onclick=()=>toggleDocSettled(b.dataset.docSettle));
  on('acc-add','onclick',()=>{ const v=document.getElementById('acc-name').value.trim(); if(v&&!state.accounts.includes(v)){ state.accounts.push(v); save(); } });
  document.querySelectorAll('[data-accdel]').forEach(b=>b.onclick=()=>{ state.accounts.splice(Number(b.dataset.accdel),1); save(); });
  on('exp-json','onclick',()=>downloadJSON());
  on('imp-file','onchange',e=>{ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=()=>doImport(r.result,false); r.readAsText(f); });
  on('imp-merge','onclick',()=>doImport(document.getElementById('imp-text').value,true));
  on('imp-replace','onclick',()=>doImport(document.getElementById('imp-text').value,false));
  on('wipe','onclick',()=>{ if(confirm('確定清空全部資料？無法復原。')){ state=blank(); save(); } });
}

function downloadJSON(){
  const blob=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='品佑帳本備份_'+today()+'.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function doImport(text,merge){
  let d; try{ d=JSON.parse(text); }catch(e){ alert('讀不到 JSON，請確認內容或檔案正確。'); return; }
  if(typeof d!=='object'||d===null){ alert('格式不對。'); return; }
  const cols=['projects','expenses','incomes','companies'];
  if(!merge){
    if(!confirm('取代匯入會清掉現有資料，改成匯入的內容。確定？')) return;
    state=Object.assign(blank(),{accounts:d.accounts&&d.accounts.length?d.accounts:blank().accounts,items:d.items||[]});
    cols.forEach(k=>{ state[k]=Array.isArray(d[k])?d[k].map(r=>Object.assign({id:uid()},r)):[]; });
  } else {
    const seen={}; cols.forEach(k=>{ seen[k]=new Set(state[k].map(r=>r.id)); });
    cols.forEach(k=>{ (Array.isArray(d[k])?d[k]:[]).forEach(r=>{ const rec=Object.assign({},r); if(!rec.id||seen[k].has(rec.id)) rec.id=uid(); state[k].push(rec); }); });
    (d.accounts||[]).forEach(a=>{ if(!state.accounts.includes(a)) state.accounts.push(a); });
  }
  save();
  alert(`匯入完成：案場 ${state.projects.length}、支出 ${state.expenses.length}、請款 ${state.incomes.length}、公司 ${state.companies.length}`);
}

window.addEventListener('pagehide',()=>{ if(cloudUrl&&localDirty){ try{ const p=JSON.stringify(packData()); if(navigator.sendBeacon) navigator.sendBeacon(cloudUrl,p); else fetch(cloudUrl,{method:'POST',body:p,keepalive:true}); }catch(e){} } });
window.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible'&&cloudUrl&&!saving) loadCloud(); });
