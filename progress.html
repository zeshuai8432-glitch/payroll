<!DOCTYPE html>
<html lang="zh-TW">
<head>

<style>
:root{
  --bg:#0f172a; --card:#1e293b; --card2:#243247; --line:#334155;
  --ink:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --accent2:#60a5fa;
  --ok:#34d399; --warn:#fbbf24; --bad:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:linear-gradient(160deg,#0f172a,#1e1b4b 130%);color:var(--ink);min-height:100vh;font-size:15px}
.top{display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(15,23,42,.85);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;flex-wrap:wrap}
.top h1{font-size:18px;letter-spacing:1px}
.top .ver{font-size:11px;color:var(--muted)}
.wrap{max-width:1180px;margin:0 auto;padding:16px}
.tabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-size:14px}
.tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.card h3{font-size:15px;margin-bottom:10px;color:var(--accent2)}
.btn{display:inline-block;padding:8px 14px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:14px;cursor:pointer;font-family:inherit}
.btn.sub{background:var(--card2);color:var(--ink);border:1px solid var(--line)}
.btn.warn{background:#b45309}
.btn.bad{background:#b91c1c}
.btn.sm{padding:4px 10px;font-size:12.5px;border-radius:7px}
input,select{background:#0f172a;border:1px solid var(--line);border-radius:8px;color:var(--ink);padding:7px 9px;font-size:14px;font-family:inherit}

th,td{padding:6px 8px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}
th{color:var(--muted);font-weight:600;font-size:12.5px;white-space:nowrap}

details.blk{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:var(--card)}
details.blk>summary{cursor:pointer;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;list-style:none}
details.blk>summary::-webkit-details-marker{display:none}
details.blk>summary::before{content:'▸';color:var(--muted)}
details.blk[open]>summary::before{content:'▾'}
details.blk .inner{padding:0 14px 12px;overflow-x:auto}
.chapter td{background:var(--card2);color:var(--accent2);font-size:12.5px;font-weight:600}
.rowline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px}

#modal .box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;max-width:760px;width:100%;max-height:85vh;overflow:auto}
.notice{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.35);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:10px}
/* ── 列印 ── */
#print-overlay{display:none}
.pbar{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;z-index:5}

.pdoc th,.pdoc td{border:1px solid #c7d4e8;padding:3px 5px;color:#111}

.pdoc td.num,.pdoc th.num{text-align:right;font-variant-numeric:tabular-nums}
.pdoc .bchap td{background:#f6f9fd;color:#3b5b8f;font-weight:600}
.pdoc .bhead td{background:#dbe7f6;color:#1e3a8a;font-weight:700}

.pdoc .sign{display:flex;gap:24px;margin-top:26px;break-inside:avoid;page-break-inside:avoid}
.pdoc .sign>div{flex:1;font-size:12px;text-align:center}

@media print{.no-print{display:none!important}}
#sigmodal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px}

<div class="top">

<script>
'use strict';
const APP_VERSION='vG2026.07.18j';
document.getElementById('ver').textContent=APP_VERSION;
const LS='pm_progress_v1';
const FS_KEY='AIzaSyAfEIRpVSpnHfIX0fqb37iUkf3mv_Od9S8';
const FS_URL='https://firestore.googleapis.com/v1/projects/payroll-d1abe/databases/(default)/documents/progress/main?key='+FS_KEY;
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,8);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const money=n=>'$'+Math.round(n||0).toLocaleString('en-US');
const moneyS=n=>{n=Math.round(n||0);return (n<0?'-$':'$')+Math.abs(n).toLocaleString('en-US');}; // 帶正負號（扣抵為負）
const num=v=>{const n=parseFloat(String(v??'').replace(/,/g,''));return isFinite(n)?n:0;};
const qfmt=n=>{n=+(+n||0).toFixed(2);return n.toLocaleString('en-US',{maximumFractionDigits:2});};
const pfmt=p=>{const v=+(p*100).toFixed(1);return (Number.isInteger(v)?v.toFixed(0):v.toFixed(1))+'%';};
const today=()=>new Date().toISOString().slice(0,10);

let state=load();
function load(){
  try{const d=JSON.parse(localStorage.getItem(LS)||'null');if(d&&Array.isArray(d.projects))return d;}catch(e){}
  return {projects:[],cur:null,tab:'items'};
}
function save(){ state.savedAt=Date.now(); localStorage.setItem(LS,JSON.stringify(state)); schedulePush(); }
const curProj=()=>state.projects.find(p=>p.id===state.cur)||null;

/* ═══════════ xlsx 解析（純瀏覽器，不用外部程式庫） ═══════════ */
async function unzip(buf){
  const dv=new DataView(buf),u8=new Uint8Array(buf);
  let e=-1;
  for(let i=buf.byteLength-22;i>=Math.max(0,buf.byteLength-22-65536);i--){ if(dv.getUint32(i,true)===0x06054b50){e=i;break;} }
  if(e<0)throw new Error('不是有效的 xlsx 檔');
  const count=dv.getUint16(e+10,true);let off=dv.getUint32(e+16,true);
  const td=new TextDecoder();const entries={};
  for(let i=0;i<count;i++){
    if(dv.getUint32(off,true)!==0x02014b50)throw new Error('xlsx 目錄損壞');
    const method=dv.getUint16(off+10,true),csize=dv.getUint32(off+20,true),
      nlen=dv.getUint16(off+28,true),elen=dv.getUint16(off+30,true),clen=dv.getUint16(off+32,true),
      lho=dv.getUint32(off+42,true);
    entries[td.decode(u8.subarray(off+46,off+46+nlen))]={method,csize,lho};
    off+=46+nlen+elen+clen;
  }
  return {
    async text(name){
      const en=entries[name];if(!en)return null;
      const lnlen=dv.getUint16(en.lho+26,true),lelen=dv.getUint16(en.lho+28,true);
      const start=en.lho+30+lnlen+lelen;
      const data=u8.slice(start,start+en.csize);
      if(en.method===0)return td.decode(data);
      if(en.method!==8)throw new Error('不支援的壓縮方式');
      return await new Response(new Blob([data]).stream().pipeThrough(new DecompressionStream('deflate-raw'))).text();
    },
    names:Object.keys(entries)
  };
}
const colIdx=ref=>{let n=0;for(const ch of ref){const c=ch.charCodeAt(0);if(c>=65&&c<=90)n=n*26+c-64;else break;}return n;};
function parseSheetXml(xml,sst){
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  const rows={};let maxR=0;
  for(const c of doc.getElementsByTagName('c')){
    const ref=c.getAttribute('r');if(!ref)continue;
    const col=colIdx(ref),r=parseInt(ref.replace(/^[A-Z]+/,''),10);
    const t=c.getAttribute('t');let v=null;
    if(t==='inlineStr'){ v=Array.from(c.getElementsByTagName('t')).map(x=>x.textContent).join(''); }
    else{
      const vEl=c.getElementsByTagName('v')[0];if(!vEl)continue;
      const raw=vEl.textContent;
      if(t==='s')v=sst[+raw]??'';
      else if(t==='str')v=raw;
      else if(t==='b')v=raw==='1';
      else v=parseFloat(raw);
    }
    if(v===null||v==='')continue;
    (rows[r]||(rows[r]={}))[col]=v;
    if(r>maxR)maxR=r;
  }
  return {rows,maxR};
}
async function readXlsx(buf){
  const z=await unzip(buf);
  const wbXml=await z.text('xl/workbook.xml');
  const relXml=await z.text('xl/_rels/workbook.xml.rels');
  if(!wbXml||!relXml)throw new Error('讀不到活頁簿結構');
  const rels={};
  for(const m of relXml.matchAll(/<Relationship[^>]*Id="([^"]+)"[^>]*Target="([^"]+)"/g)) rels[m[1]]=m[2];
  const sheets=[];
  for(const m of wbXml.matchAll(/<sheet[^>]*name="([^"]+)"[^>]*r:id="([^"]+)"/g)){
    let t=rels[m[2]]||'';if(t.startsWith('/'))t=t.slice(1);else if(!t.startsWith('xl/'))t='xl/'+t;
    sheets.push({name:m[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>'),target:t});
  }
  let sst=[];
  const sstXml=await z.text('xl/sharedStrings.xml');
  if(sstXml){
    const doc=new DOMParser().parseFromString(sstXml,'application/xml');
    sst=Array.from(doc.getElementsByTagName('si')).map(si=>Array.from(si.getElementsByTagName('t')).map(t=>t.textContent).join(''));
  }
  const out=[];
  for(const s of sheets){
    const xml=await z.text(s.target);if(!xml)continue;
    const parsed=parseSheetXml(xml,sst);
    out.push({name:s.name,rows:parsed.rows,maxR:parsed.maxR});
  }
  return out;
}

/* ═══════════ 合約結構分析 ═══════════ */
const KANJI=/^[一二三四五六七八九十]+$/;
const SUBHD=/^[（(][一二三四五六七八九十]+[)）]$/;
function detectCols(rows,maxR){
  // 找表頭列（含 單位＋數量），對照欄位；找不到就用預設 B~H
  for(let r=1;r<=Math.min(maxR,30);r++){
    const row=rows[r];if(!row)continue;
    const vals=Object.entries(row).map(([c,v])=>[+c,String(v)]);
    const find=kw=>{const hit=vals.find(([c,v])=>v.includes(kw));return hit?hit[0]:0;};
    if(find('單位')&&find('數量')){
      return {
        no:find('項目')||find('Item')||2,
        name:find('名')||find('規格')||3,
        unit:find('單位'),qty:find('數量'),
        price:find('單價'),amt:find('總價')||find('複價')||find('金額'),
        remark:find('備註')||find('Remark')||8,
        tag:Math.max(1,(find('項目')||2)-1)
      };
    }
  }
  return {tag:1,no:2,name:3,unit:4,qty:5,price:6,amt:7,remark:8};
}
function analyzeSheet(sheet){
  const {rows,maxR}=sheet;
  const C=detectCols(rows,maxR);
  const cell=(r,k)=>{const row=rows[r];return row?row[C[k]]:undefined;};
  const txt=(r,k)=>String(cell(r,k)??'').trim();
  const isNum=v=>typeof v==='number'&&isFinite(v);
  // ① 找區塊：名稱以「合計」結尾、單位為 間/層、數量為正數
  const blocks=[];const subtotals={};
  for(let r=1;r<=maxR;r++){
    const name=txt(r,'name');if(!name)continue;
    if(/小\s*計\s*$/.test(name)){
      const key=name.replace(/小\s*計\s*$/,'').trim();
      if(key&&isNum(cell(r,'amt')))subtotals[key]=cell(r,'amt');
      continue;
    }
    if(/合\s*計\s*$/.test(name)){
      const unit=txt(r,'unit'),qty=cell(r,'qty');
      if((unit==='間'||unit==='層')&&isNum(qty)&&qty>0){
        const key=name.replace(/合\s*計\s*$/,'').trim();
        blocks.push({key,unit,count:qty,row:r,amount:isNum(cell(r,'amt'))?cell(r,'amt'):0,headerRow:0,display:key});
      }
    }
  }
  blocks.sort((a,b)=>a.row-b.row);
  // ② 找每個區塊的標題列（合計列往前找同名獨立列，例：TYPE-SK 標準大床）
  for(const b of blocks){
    for(let r=b.row-1;r>=Math.max(1,b.row-400);r--){
      const name=txt(r,'name');
      if(name&&name.startsWith(b.key)&&!/[小合]\s*計/.test(name)&&!isNum(cell(r,'qty'))){
        b.headerRow=r;b.display=name;break;
      }
    }
  }
  // ③ 撈細項：每個區塊的細項在「該區塊合計列之後、下一區塊標題列之前」
  const warnings=[];const outBlocks=[];
  const grabItems=(r1,r2)=>{
    let chapter='';const items=[];
    for(let r=r1;r<=r2;r++){
      const name=txt(r,'name');if(!name)continue;
      const no=txt(r,'no');
      if(KANJI.test(no)){chapter=name;continue;}
      if(SUBHD.test(no)){continue;}
      if(/[小合]\s*計\s*$/.test(name)||/^總\s*價/.test(name))continue;
      const qty=cell(r,'qty');
      if(!isNum(qty))continue;
      const price=isNum(cell(r,'price'))?cell(r,'price'):0;
      let amt=isNum(cell(r,'amt'))?cell(r,'amt'):qty*price;
      items.push({id:uid(),no,tag:txt(r,'tag'),chapter,name,unit:txt(r,'unit'),qty,price,amount:amt,remark:txt(r,'remark')});
    }
    return items;
  };
  for(let i=0;i<blocks.length;i++){
    const b=blocks[i];
    const next=blocks[i+1];
    const end=next?(next.headerRow||next.row)-1:maxR;
    const items=grabItems(b.row+1,end);
    const sum=items.reduce((s,it)=>s+it.amount,0);
    const sub=subtotals[b.key];
    if(sub!==undefined&&Math.abs(sum-sub)>1)
      warnings.push(`「${b.display}」細項加總 ${money(sum)} 與合約小計 ${money(sub)} 不符，請匯入後檢查`);
    outBlocks.push({id:uid(),name:b.display,unit:b.unit,count:b.count,contractAmt:b.amount||sum*b.count,items});
  }
  // 沒抓到任何區塊 → 全部細項當一個區塊
  if(!outBlocks.length){
    const items=grabItems(1,maxR);
    if(items.length)outBlocks.push({id:uid(),name:'全部項目',unit:'式',count:1,contractAmt:items.reduce((s,i)=>s+i.amount,0),items});
  }
  // 專案名稱猜測：前幾列最長的文字
  let title='';
  for(let r=1;r<=5;r++){for(const k of['no','name']){const t=txt(r,k);if(t.length>title.length&&!t.includes('單位'))title=t;}}
  // 總價列
  let grand=0;
  for(let r=1;r<=Math.min(maxR,30);r++){ if(/^總\s*價/.test(txt(r,'name'))){const v=cell(r,'amt');if(isNum(v))grand=v;break;} }
  return {blocks:outBlocks,warnings,title,grand};
}

/* ═══════════ 計算 ═══════════ */
const itemTotalQty=(it,blk)=>it.qty*blk.count;
const itemValue=(it,blk)=>it.amount*blk.count;
function periodOf(p,idx){return p.periods[idx]||null;}
function progOf(period,itemId){return (period&&period.prog&&period.prog[itemId])||{p:0,q:0};}
const extrasOf=period=>(period&&period.extras)||[]; // 額外款項（訂金／預付款等）
const exVal=e=>(+((e&&e.amount)||0))*(e&&e.deduct?-1:1); // 加項為正、扣抵(預付款)為負
const extrasSum=period=>extrasOf(period).reduce((s,e)=>s+exVal(e),0);
function calc(proj,perIdx){
  const period=proj.periods[perIdx];
  const prev=perIdx>0?proj.periods[perIdx-1]:null;
  // 各大項：累計完成計價（本期）與前期，供輸入表顯示
  const blocks=proj.blocks.map(blk=>{
    let V=0,cum=0,pre=0;
    const items=blk.items.map(it=>{
      const v=itemValue(it,blk);
      const p=progOf(period,it.id).p, pp=progOf(prev,it.id).p;
      const cumAmt=Math.round(v*p), preAmt=Math.round(v*pp);
      V+=v;cum+=cumAmt;pre+=preAmt;
      return {it,v,p,pp,cumAmt,preAmt,thisAmt:cumAmt-preAmt};
    });
    return {blk,V,cum,pre,thisAmt:cum-pre,pct:V?cum/V:0,items};
  });
  const V=blocks.reduce((s,b)=>s+b.V,0);
  const itemCum=blocks.reduce((s,b)=>s+b.cum,0), itemPre=blocks.reduce((s,b)=>s+b.pre,0);
  // ── 現金制請款：累計完成計價 −（訂金＋前期各期實請）＝ 本次應請 ──
  const itemCumOf=idx=>{ if(idx<0)return 0; const per=proj.periods[idx]; let s=0; for(const blk of proj.blocks) for(const it of blk.items) s+=Math.round(itemValue(it,blk)*progOf(per,it.id).p); return s; };
  const sumDep=idx=>extrasOf(proj.periods[idx]).filter(e=>e.deduct&&!e.recordOnly&&!e.auto).reduce((s,e)=>s+(+e.amount||0),0); // 已收扣抵（減本次）
  const sumChg=idx=>extrasOf(proj.periods[idx]).filter(e=>!e.deduct&&!e.auto).reduce((s,e)=>s+(+e.amount||0),0); // 加項（追加）
  let runningBilled=0, billPre=0, billComputed=0, billActual=0; const priorBills=[];
  for(let k=0;k<=perIdx;k++){
    let depLE=0,chgLE=0; for(let j=0;j<=k;j++){ depLE+=sumDep(j); chgLE+=sumChg(j); }
    const applied=itemCumOf(k)+chgLE;      // 累計應收（計價＋加項）
    const received=depLE+runningBilled;    // 已收（訂金＋先前各期實請）
    const computed=applied-received;
    const tgt=proj.periods[k].roundTarget;
    const actual=(tgt!==undefined&&tgt!==null&&tgt!=='')?Math.round(num(tgt)):computed;
    if(k<perIdx) priorBills.push({label:`第 ${proj.periods[k].no} 期請款`,date:proj.periods[k].date||'',amount:actual});
    if(k===perIdx){ billPre=received; billComputed=computed; billActual=actual; }
    runningBilled+=actual;
  }
  const deposits=[]; for(let i=0;i<=perIdx;i++) for(const e of extrasOf(proj.periods[i])) if(e.deduct&&!e.recordOnly&&!e.auto) deposits.push({label:e.name||'訂金',date:e.date||'',amount:+e.amount||0});
  const receivedList=[...deposits,...priorBills];
  const noteList=[]; for(let i=0;i<=perIdx;i++) for(const e of extrasOf(proj.periods[i])) if(e.deduct&&e.recordOnly&&!e.auto) noteList.push({label:e.name||'訂金',date:e.date||'',amount:+e.amount||0}); // 已收但本次不扣，僅列紀錄
  const chargeList=[]; for(let i=0;i<=perIdx;i++) for(const e of extrasOf(proj.periods[i])) if(!e.deduct&&!e.auto) chargeList.push({label:e.name||'追加',date:e.date||'',amount:+e.amount||0,periodNo:proj.periods[i].no});
  const cumApplied=itemCum + chargeList.reduce((s,e)=>s+e.amount,0);
  const billRound=billActual-billComputed;
  return {blocks,V,itemCum,itemPre,cumApplied,receivedList,noteList,chargeList,billPre,billComputed,billRound,billActual,cum:billPre+billActual,period,prev,
          thisAmt:billActual,pre:billPre};
}

const openBlk=new Set();
function render(){
  const app=document.getElementById('app');

  sel.innerHTML=state.projects.map(p=>`<option value="${p.id}"${p.id===state.cur?' selected':''}>${esc(p.name)}</option>`).join('')||'<option value="">（尚無專案）</option>';
  const proj=curProj();
  if(!proj){
    app.innerHTML=`<div class="card" style="text-align:center;padding:44px 20px">
      <div style="font-size:38px;margin-bottom:10px">📐</div>
      <div style="font-size:16px;margin-bottom:6px">還沒有專案</div>
      <div class="muted" style="font-size:13px;margin-bottom:16px">匯入合約 Excel，程式會自動抓出所有細項；之後每期填進度，自動算出請款金額。</div>
      <button class="btn" id="btn-import2">＋ 匯入合約 Excel</button></div>`;

function viewItems(proj){
  const V=proj.blocks.reduce((s,b)=>s+b.items.reduce((x,i)=>x+itemValue(i,b),0),0);
  const nItems=proj.blocks.reduce((s,b)=>s+b.items.length,0);
  let h=`<div class="grid" style="margin-bottom:12px">
    <div class="stat"><div class="l">合約總額（未稅）</div><div class="v">${money(V)}</div></div>
    <div class="stat"><div class="l">區塊</div><div class="v">${proj.blocks.length}</div></div>
    <div class="stat"><div class="l">細項</div><div class="v">${nItems}</div></div>
  </div>
  <div class="rowline"><label class="muted" style="font-size:13px;cursor:pointer"><input type="checkbox" id="hide-zero"${proj.hideZero?' checked':''}> 隱藏 0 元項目（非我方施作範圍）</label></div>`;
  for(const b of proj.blocks){
    const bv=b.items.reduce((s,i)=>s+itemValue(i,b),0);
    const hid=proj.hideZero?b.items.filter(i=>i.amount===0).length:0;
    h+=`<details class="blk"${openBlk.has(b.id)?' open':''} data-blk="${b.id}"><summary>
      <b>${esc(b.name)}</b><span class="tag">${qfmt(b.count)} ${esc(b.unit)}</span>
      <span class="tag">每${esc(b.unit)} ${money(bv/(b.count||1))}</span>${hid?`<span class="tag">已隱藏 ${hid} 條 0 元</span>`:''}
      <span style="flex:1"></span><b>${money(bv)}</b>
      <button class="btn sub sm" data-editblk="${b.id}">編輯</button>
      <button class="btn bad sm" data-delblk="${b.id}">刪除</button></summary>
    <div class="inner"><table><tr><th>項次</th><th>名稱及規格</th><th>單位</th><th class="num">數量</th><th class="num">單價</th><th class="num">總價</th><th>備註</th><th></th></tr>`;
    let ch='';
    for(const it of b.items){
      if(proj.hideZero&&it.amount===0)continue;
      if(it.chapter!==ch){ch=it.chapter;if(ch)h+=`<tr class="chapter"><td colspan="8">${esc(ch)}</td></tr>`;}
      const zero=it.amount===0;
      h+=`<tr class="${zero?'zero':''}"><td>${esc(it.no)}</td><td>${esc(it.name)}${it.tag?`<span class="tag">${esc(it.tag)}</span>`:''}</td>
        <td>${esc(it.unit)}</td><td class="num">${qfmt(it.qty)}</td>
        <td class="num">${it.price?qfmt(it.price):''}</td><td class="num">${qfmt(it.amount)}</td>
        <td class="muted" style="font-size:12px">${esc(it.remark)}</td>
        <td><button class="btn sub sm" data-edititem="${b.id}::${it.id}">改</button> <button class="btn bad sm" data-delitem="${b.id}::${it.id}">刪</button></td></tr>`;
    }
    h+=`</table><div style="margin-top:8px"><button class="btn sub sm" data-additem="${b.id}">＋ 手動加細項</button></div></div></details>`;
  }
  h+=`<button class="btn sub" id="btn-addblk">＋ 手動加區塊</button>`;
  return h;
}

function viewProg(proj){
  if(!proj.periods.length){
    return `<div class="card" style="text-align:center;padding:34px">
      <div style="margin-bottom:12px">還沒有請款期別。建立第 1 期後，填各細項的完成量或百分比，程式會自動算請款金額。</div>
      <button class="btn" id="btn-addperiod">＋ 建立第 1 期</button></div>`;
  }
  const perIdx=Math.min(proj.curPeriod??proj.periods.length-1,proj.periods.length-1);
  const c=calc(proj,perIdx);
  const period=c.period;
  const editable=perIdx===proj.periods.length-1;
  let h=`<div class="rowline">
    <select id="period-sel">${proj.periods.map((p,i)=>`<option value="${i}"${i===perIdx?' selected':''}>第 ${p.no} 期（${esc(p.date)}）</option>`).join('')}</select>
    ${editable?`<input type="date" id="period-date" value="${esc(period.date)}">`:''}
    <button class="btn sub sm" id="btn-addperiod">＋ 新增一期</button>
    ${editable&&proj.periods.length?`<button class="btn bad sm" id="btn-delperiod">刪除本期</button>`:''}
    <span style="flex:1"></span>
    <label class="muted" style="font-size:13px;cursor:pointer"><input type="checkbox" id="hide-zero"${proj.hideZero?' checked':''}> 隱藏 0 元項目</label>
    <button class="btn" id="btn-print">🖨 列印請款單</button>
  </div>
  ${editable?'':'<div class="notice">這是舊期別，唯讀。要修改請切到最新一期。</div>'}
  <div class="grid" style="margin-bottom:12px">
    <div class="stat"><div class="l">累計完成計價</div><div class="v" data-c="g-applied">${money(c.cumApplied)}</div><div class="l">占合約 <span data-c="g-pct">${pfmt(c.V?c.cumApplied/c.V:0)}</span></div></div>
    <div class="stat"><div class="l">前期累計已收</div><div class="v" data-c="g-pre">${money(c.billPre)}</div></div>
    <div class="stat" style="border-color:#2563eb"><div class="l">本次實請金額</div><div class="v ok" data-c="g-this">${money(c.billActual)}</div>${c.billRound?`<div class="l">尾差 <span data-c="g-round">${moneyS(c.billRound)}</span></div>`:''}</div>
  </div>`;
  // ── 已收款明細（訂金＋前期各期）──
  h+=`<div class="card" style="margin-bottom:12px"><h3>已收款明細（前期請款）</h3>`;
  if(c.receivedList.length){
    h+=`<table style="margin-bottom:6px"><tr><th>日期</th><th>項目</th><th class="num">金額</th></tr>`;
    for(const r of c.receivedList) h+=`<tr><td>${esc(r.date||'')}</td><td>${esc(r.label)}</td><td class="num">${money(r.amount)}</td></tr>`;
    h+=`<tr class="chapter"><td>前期累計已收 小計（本次會扣）</td><td></td><td class="num"><b>${money(c.billPre)}</b></td></tr></table>`;
  }else{ h+=`<div class="muted" style="font-size:13px;margin-bottom:8px">目前尚無會扣抵的已收款。</div>`; }
  if(c.noteList.length){
    h+=`<div style="font-size:12.5px;font-weight:600;margin-top:6px">已收但本次不扣（僅紀錄）</div><table style="margin-bottom:6px"><tr><th>日期</th><th>項目</th><th class="num">金額</th></tr>`;
    for(const r of c.noteList) h+=`<tr><td>${esc(r.date||'')}</td><td>${esc(r.label)}</td><td class="num">${money(r.amount)}</td></tr>`;
    h+=`</table>`;
  }
  // ── 額外款項（訂金／加項）──
  const myExtras=extrasOf(period).filter(e=>!e.auto);
  h+=`<div style="margin-top:6px;font-size:13px;font-weight:600">本期登錄款項</div>
    <div class="muted" style="font-size:12px;margin-bottom:6px"><b>已收款（訂金／前期請款）</b>＝業主之前付過的，會列進「前期累計已收」給業主看，並自動從本次請款扣掉；<b>加項</b>＝額外追加工程，加到本次請款。</div>`;
  if(myExtras.length){
    h+=`<table style="margin-bottom:8px"><tr><th>名目</th><th class="num">日期</th><th>性質</th><th class="num">金額</th>${editable?'<th></th>':''}</tr>`;
    for(const e of myExtras){
      const kindTag=!e.deduct?'<span class="tag" style="background:#dbeafe;color:#1e3a8a">加項</span>':e.recordOnly?'<span class="tag" style="background:#fef3c7;color:#92400e">已收·僅紀錄</span>':'<span class="tag" style="background:#dcfce7;color:#166534">已收·扣抵</span>';
      h+=`<tr><td>${esc(e.name||'訂金')}</td><td class="num">${esc(e.date||period.date)}</td><td>${kindTag}</td><td class="num">${money(e.amount)}</td>${editable?`<td class="num"><button class="btn sub sm" data-editextra="${e.id}">改</button> <button class="btn bad sm" data-delextra="${e.id}">刪</button></td>`:''}</tr>`;
    }
    h+=`</table>`;
  }else{ h+=`<div class="muted" style="font-size:13px;margin-bottom:8px">本期尚無登錄款項。</div>`; }
  if(editable)h+=`<button class="btn sub sm" id="btn-addextra">＋ 新增訂金／加項</button> <button class="btn sub sm" id="btn-roundup">🎯 湊整本次到整數</button>`;
  // 本次請款計算
  h+=`<div style="margin-top:12px;padding-top:10px;border-top:1px dashed var(--line);font-size:14px">
    <div style="display:flex;justify-content:space-between"><span>累計完成計價</span><b>${money(c.cumApplied)}</b></div>
    ${c.billPre?`<div style="display:flex;justify-content:space-between;color:var(--muted)"><span>減 前期累計已收</span><span>−${money(c.billPre).slice(1)}</span></div>
    <div style="display:flex;justify-content:space-between"><span>本次應請（計算）</span><b>${money(c.billComputed)}</b></div>`:''}
    ${c.billRound?`<div style="display:flex;justify-content:space-between;color:var(--muted)"><span>尾差調整（湊整）</span><span>${moneyS(c.billRound)}</span></div>`:''}
    <div style="display:flex;justify-content:space-between;font-size:16px;margin-top:4px;color:var(--accent2)"><span><b>本次實請金額</b></span><b data-c="g-actual">${money(c.billActual)}</b></div>
  </div>`;
  h+=`</div>`;
  for(const cb of c.blocks){
    const b=cb.blk;
    h+=`<details class="blk"${openBlk.has(b.id)?' open':''} data-blk="${b.id}"><summary>
      <b>${esc(b.name)}</b><span class="tag">${qfmt(b.count)} ${esc(b.unit)}</span>
      <span style="flex:1"></span>
      <span class="muted" style="font-size:12.5px">本期 <b class="ok" data-c="bt-${b.id}">${money(cb.thisAmt)}</b>｜累計 <span data-c="bc-${b.id}">${money(cb.cum)}</span> / ${money(cb.V)}（<span data-c="bp-${b.id}">${pfmt(cb.V?cb.cum/cb.V:0)}</span>）</span></summary>
    <div class="inner">`;
    if(editable&&b.count>1){
      h+=`<div class="rowline" style="margin:4px 0 8px">
        <span class="muted" style="font-size:13px">整批填：完成</span>
        <input class="pin" data-bfill="${b.id}" inputmode="decimal" placeholder="0"> <span class="muted">/ ${qfmt(b.count)} ${esc(b.unit)}</span>
        <button class="btn sub sm" data-bapply="${b.id}">套用到整個區塊</button>
        <span class="muted" style="font-size:12px">（會把區塊內每條細項的完成％都設成 完成${esc(b.unit)}數 ÷ ${qfmt(b.count)}，之後仍可逐條微調）</span></div>`;
    }
    const hasR=b.count>1;const cols=hasR?9:9;
    h+=`<table><tr><th>項次</th><th>名稱及規格</th><th>單位</th><th class="num">數量</th><th class="num">單價</th><th class="num">前期%</th><th class="num">${hasR?`完成${esc(b.unit)}數`:'累計完成量'}</th><th class="num">累計%</th><th class="num">本期金額</th></tr>`;
    let ch='';
    for(const ci of cb.items){
      const it=ci.it;
      if(proj.hideZero&&ci.v===0)continue;
      if(it.chapter!==ch){ch=it.chapter;if(ch)h+=`<tr class="chapter"><td colspan="${cols}">${esc(ch)}</td></tr>`;}
      const zero=ci.v===0;
      const tq=itemTotalQty(it,b);
      const pr=progOf(period,it.id);
      const rVal=pr.p?+(pr.p*b.count).toFixed(2):'';
      h+=`<tr class="${zero?'zero':''}"><td>${esc(it.no)}</td><td>${esc(it.name)}</td><td>${esc(it.unit)}</td>
        <td class="num">${qfmt(it.qty)}</td><td class="num">${it.price?qfmt(it.price):''}</td>
        <td class="num muted">${pfmt(ci.pp)}</td>
        <td class="num">${hasR
          ?(editable&&!zero?`<input class="pin pct" data-r="${b.id}::${it.id}" inputmode="decimal" value="${rVal}" placeholder="0">`:(rVal||'—'))
          :(editable&&!zero?`<input class="pin" data-q="${b.id}::${it.id}" inputmode="decimal" value="${pr.p?qfmt(pr.q||tq*pr.p):''}" placeholder="0">`:qfmt(pr.q||tq*pr.p))}</td>
        <td class="num">${editable&&!zero?`<input class="pin pct" data-p="${b.id}::${it.id}" inputmode="decimal" value="${pr.p?+(pr.p*100).toFixed(1):''}" placeholder="0">`:pfmt(ci.p)}</td>
        <td class="num" data-c="ti-${it.id}">${ci.thisAmt?money(ci.thisAmt):'—'}</td></tr>`;
    }
    h+=`</table></div></details>`;
  }
  return h;
}

function openExtraModal(opts){
  const ex=opts.existing||{name:'訂金',amount:'',date:opts.defaultDate||today(),deduct:true};
  const old=document.getElementById('modal');if(old)old.remove();
  const m=document.createElement('div');m.id='modal';
  m.innerHTML=`<div class="box"><h3 style="margin-bottom:12px">${opts.existing?'編輯':'新增'}款項</h3>
    <div class="rowline">名目 <input id="ex-name" style="min-width:200px" value="${esc(ex.name||'')}" placeholder="訂金／預付款"></div>
    <div class="rowline">金額 <input id="ex-amount" inputmode="decimal" value="${ex.amount||''}" placeholder="0"></div>
    <div class="rowline">日期 <input id="ex-date" type="date" value="${esc(ex.date||opts.defaultDate||today())}"></div>
    <div style="margin:4px 0">性質：</div>
    <div class="rowline" style="flex-direction:column;align-items:flex-start;gap:4px;margin-bottom:6px">
      <label><input type="radio" name="exk" value="deduct" ${ex.deduct&&!ex.recordOnly?'checked':''}> <b>已收款－本次扣抵</b>（列進前期累計已收，並從本次請款扣掉）</label>
      <label><input type="radio" name="exk" value="record" ${ex.deduct&&ex.recordOnly?'checked':''}> <b>已收款－僅列紀錄</b>（給業主看，本次<b>不扣</b>、不影響金額）</label>
      <label><input type="radio" name="exk" value="add" ${!ex.deduct?'checked':''}> <b>加項</b>（額外追加工程，加到本次請款）</label>
    </div>
    <div class="muted" style="font-size:12px;margin:2px 0 12px">例：6/27 收的 60 萬預付款——這次談好要扣就選「本次扣抵」；先不扣、只讓業主看到有這筆就選「僅列紀錄」（之後要扣時改成「本次扣抵」即可）。</div>
    <div class="rowline"><button class="btn" id="ex-ok">儲存</button><button class="btn sub" id="ex-cancel">取消</button></div></div>`;
  document.body.appendChild(m);
  m.querySelector('#ex-cancel').onclick=()=>m.remove();
  m.querySelector('#ex-ok').onclick=()=>{
    const amount=num(m.querySelector('#ex-amount').value);
    if(!amount){alert('請輸入金額');return;}
    const kind=m.querySelector('input[name=exk]:checked').value;
    opts.onSave({
      name:m.querySelector('#ex-name').value.trim()||'訂金',
      amount, date:m.querySelector('#ex-date').value||opts.defaultDate||today(),
      deduct:kind!=='add', recordOnly:kind==='record',
    });
    m.remove();
  };
  setTimeout(()=>{const a=m.querySelector('#ex-amount');if(a)a.focus();},50);
}

/* ═══════════ 手寫簽名板（簽完自動裁白邊） ═══════════ */
function openSigPad(onSave){
  const old=document.getElementById('sigmodal');if(old)old.remove();
  const m=document.createElement('div');m.id='sigmodal';
  m.innerHTML=`<div class="sbox"><div class="stitle">請在框內簽名</div>
    <canvas width="1200" height="440"></canvas>
    <div class="srow"><button class="btn sub" id="sig-clear">清除重寫</button><span style="flex:1"></span>
    <button class="btn sub" id="sig-cancel">取消</button><button class="btn" id="sig-save">存檔</button></div></div>`;
  document.body.appendChild(m);
  const cv=m.querySelector('canvas'),ctx=cv.getContext('2d');
  const reset=()=>{ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);ctx.strokeStyle='#111';ctx.lineWidth=5;ctx.lineCap='round';ctx.lineJoin='round';};
  reset();
  let drawing=false,drew=false;
  const pos=ev=>{const r=cv.getBoundingClientRect();return [(ev.clientX-r.left)*cv.width/r.width,(ev.clientY-r.top)*cv.height/r.height];};
  cv.onpointerdown=ev=>{ev.preventDefault();drawing=true;drew=true;cv.setPointerCapture(ev.pointerId);const [x,y]=pos(ev);ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x+.1,y+.1);ctx.stroke();};
  cv.onpointermove=ev=>{if(!drawing)return;ev.preventDefault();const [x,y]=pos(ev);ctx.lineTo(x,y);ctx.stroke();};
  cv.onpointerup=cv.onpointercancel=()=>{drawing=false;};
  m.querySelector('#sig-clear').onclick=()=>{reset();drew=false;};
  m.querySelector('#sig-cancel').onclick=()=>m.remove();
  m.querySelector('#sig-save').onclick=()=>{
    if(!drew){alert('還沒簽名');return;}
    // 裁掉四周空白，只留墨跡範圍
    const img=ctx.getImageData(0,0,cv.width,cv.height),d=img.data;
    let minX=cv.width,minY=cv.height,maxX=-1,maxY=-1;
    for(let y=0;y<cv.height;y++)for(let x=0;x<cv.width;x++){
      const i=(y*cv.width+x)*4;
      if(d[i]<245||d[i+1]<245||d[i+2]<245){if(x<minX)minX=x;if(x>maxX)maxX=x;if(y<minY)minY=y;if(y>maxY)maxY=y;}
    }
    if(maxX<0){alert('還沒簽名');return;}
    const pad=10,x0=Math.max(0,minX-pad),y0=Math.max(0,minY-pad),
      w=Math.min(cv.width,maxX+pad)-x0,hgt=Math.min(cv.height,maxY+pad)-y0;
    const out=document.createElement('canvas');out.width=w;out.height=hgt;
    out.getContext('2d').drawImage(cv,x0,y0,w,hgt,0,0,w,hgt);
    m.remove();onSave(out.toDataURL('image/png'));
  };
}

/* ═══════════ 匯入流程 ═══════════ */
async function importXlsx(file){
  let sheets;
  try{ sheets=await readXlsx(await file.arrayBuffer()); }
  catch(e){ alert('讀取失敗：'+e.message);return; }
  if(!sheets.length){alert('這個檔案裡沒有工作表');return;}
  sheets.sort((a,b)=>b.maxR-a.maxR);
  const pick=async()=>{
    if(sheets.length===1)return sheets[0];
    const modal=document.createElement('div');modal.id='modal';
    modal.innerHTML=`<div class="box"><h3 style="margin-bottom:10px">選擇明細工作表</h3>
      <div class="muted" style="font-size:13px;margin-bottom:10px">通常是列數最多的那張（放細項的）。</div>
      ${sheets.map((s,i)=>`<button class="btn sub" style="display:block;width:100%;text-align:left;margin-bottom:6px" data-pick="${i}">${esc(s.name)}<span class="tag">${s.maxR} 列</span></button>`).join('')}
      <button class="btn bad sm" data-pick="-1">取消</button></div>`;
    document.body.appendChild(modal);
    return new Promise(res=>{modal.onclick=e=>{const b=e.target.closest('[data-pick]');if(!b)return;modal.remove();const i=+b.dataset.pick;res(i<0?null:sheets[i]);};});
  };
  const sheet=await pick();
  if(!sheet)return;
  const a=analyzeSheet(sheet);
  if(!a.blocks.length||!a.blocks.some(b=>b.items.length)){alert('沒抓到任何細項，可能格式不同。可以把 Excel 給我看調整解析規則。');return;}
  const sumV=a.blocks.reduce((s,b)=>s+b.items.reduce((x,i)=>x+i.amount*b.count,0),0);
  const modal=document.createElement('div');modal.id='modal';
  modal.innerHTML=`<div class="box"><h3 style="margin-bottom:10px">確認匯入內容</h3>
    <div style="margin-bottom:8px">工程名稱：<input id="imp-name" style="min-width:320px" value="${esc(a.title||file.name.replace(/\.xlsx$/i,''))}"></div>
    <table style="margin-bottom:10px"><tr><th>區塊</th><th class="num">數量</th><th class="num">細項數</th><th class="num">金額</th></tr>
    ${a.blocks.map(b=>`<tr><td>${esc(b.name)}</td><td class="num">${qfmt(b.count)} ${esc(b.unit)}</td><td class="num">${b.items.length}</td><td class="num">${money(b.items.reduce((s,i)=>s+i.amount*b.count,0))}</td></tr>`).join('')}
    <tr class="chapter"><td><b>合計（未稅）</b></td><td></td><td class="num">${a.blocks.reduce((s,b)=>s+b.items.length,0)}</td><td class="num"><b>${money(sumV)}</b></td></tr></table>
    ${a.grand?`<div class="${Math.abs(a.grand-sumV)<=2?'ok':'warn-t'}" style="font-size:13px;margin-bottom:8px">Excel 總價列：${money(a.grand)} ${Math.abs(a.grand-sumV)<=2?'✓ 與細項加總一致':'⚠ 與細項加總不一致，匯入後請檢查'}</div>`:''}
    ${a.warnings.map(w=>`<div class="notice">⚠ ${esc(w)}</div>`).join('')}
    <div class="rowline"><button class="btn" id="imp-ok">建立專案</button><button class="btn sub" id="imp-cancel">取消</button></div></div>`;
  document.body.appendChild(modal);
  modal.querySelector('#imp-cancel').onclick=()=>modal.remove();
  modal.querySelector('#imp-ok').onclick=()=>{
    const name=modal.querySelector('#imp-name').value.trim()||file.name;
    const proj={id:uid(),name,owner:'',vendor:'',taxMode:'excl',blocks:a.blocks,periods:[],curPeriod:0,createdAt:Date.now()};
    state.projects.push(proj);state.cur=proj.id;state.tab='items';
    modal.remove();save();render();
  };
}

/* ═══════════ 事件 ═══════════ */
function setProgInput(proj,blkId,itemId,kind,val){
  const perIdx=proj.periods.length-1;
  const period=proj.periods[perIdx];
  const b=proj.blocks.find(x=>x.id===blkId);const it=b.items.find(x=>x.id===itemId);
  const tq=itemTotalQty(it,b);
  let p,q;
  if(kind==='q'){ q=Math.max(0,Math.min(num(val),tq)); p=tq?q/tq:0; }
  else if(kind==='r'){ const n=Math.max(0,Math.min(num(val),b.count)); p=b.count?n/b.count:0; q=tq*p; }
  else{ p=Math.max(0,Math.min(num(val),100))/100; q=tq*p; }
  period.prog||(period.prog={});
  if(p>0)period.prog[itemId]={p,q:+q.toFixed(2)};else delete period.prog[itemId];
  save();
  // 更新畫面數字（不重畫，保留輸入焦點）
  const c=calc(proj,perIdx);
  const setc=(k,v)=>{document.querySelectorAll(`[data-c="${k}"]`).forEach(el=>el.textContent=v);};
  for(const cb of c.blocks){
    if(cb.blk.id!==blkId)continue;
    for(const ci of cb.items)if(ci.it.id===itemId)setc('ti-'+itemId,ci.thisAmt?money(ci.thisAmt):'—');
    setc('bt-'+blkId,money(cb.thisAmt));setc('bc-'+blkId,money(cb.cum));setc('bp-'+blkId,pfmt(cb.V?cb.cum/cb.V:0));
  }
  setc('g-applied',money(c.cumApplied));setc('g-pre',money(c.billPre));setc('g-this',money(c.billActual));
  setc('g-actual',money(c.billActual));setc('g-round',moneyS(c.billRound));setc('g-pct',pfmt(c.V?c.cumApplied/c.V:0));
  const qEl=document.querySelector(`[data-q="${blkId}::${itemId}"]`),pEl=document.querySelector(`[data-p="${blkId}::${itemId}"]`),rEl=document.querySelector(`[data-r="${blkId}::${itemId}"]`);
  if(kind!=='q'&&qEl)qEl.value=p?qfmt(q):'';
  if(kind!=='p'&&pEl)pEl.value=p?+(p*100).toFixed(1):'';
  if(kind!=='r'&&rEl)rEl.value=p?+(p*b.count).toFixed(2):'';
}

document.addEventListener('click',async e=>{
  const t=e.target.closest('[data-tab],[data-editblk],[data-delblk],[data-edititem],[data-delitem],[data-additem],[data-bapply],[data-editextra],[data-delextra],#btn-import,#btn-import2,#btn-addblk,#btn-addperiod,#btn-delperiod,#btn-addextra,#btn-roundup,#btn-print,#set-save,#backup-export,#backup-import-btn,#proj-del,#cloud-push,#cloud-pull');
  if(!t)return;
  const proj=curProj();
  if(t.dataset.tab){state.tab=t.dataset.tab;save();render();return;}
  if(t.id==='btn-import'||t.id==='btn-import2'){document.getElementById('xlsx-file').click();return;}
  if(!proj)return;
  if(t.dataset.editblk){
    const b=proj.blocks.find(x=>x.id===t.dataset.editblk);if(!b)return;
    const name=prompt('區塊名稱',b.name);if(name===null)return;
    const cnt=prompt(`合約數量（${b.unit}）`,b.count);if(cnt===null)return;
    b.name=name.trim()||b.name;b.count=Math.max(num(cnt),0.01);save();render();return;
  }
  if(t.dataset.delblk){
    const b=proj.blocks.find(x=>x.id===t.dataset.delblk);if(!b)return;
    if(!confirm(`刪除「${b.name}」整個區塊（${b.items.length} 條細項）？進度紀錄也會一併移除。`))return;
    for(const it of b.items)for(const p of proj.periods)if(p.prog)delete p.prog[it.id];
    proj.blocks=proj.blocks.filter(x=>x!==b);save();render();return;
  }
  if(t.dataset.edititem||t.dataset.delitem||t.dataset.additem){
    const [blkId,itemId]=(t.dataset.edititem||t.dataset.delitem||t.dataset.additem).split('::');
    const b=proj.blocks.find(x=>x.id===blkId);if(!b)return;
    if(t.dataset.additem){
      const name=prompt('細項名稱');if(!name)return;
      const unit=prompt('單位（㎡ / M / 個 / 式…）','式')||'式';
      const qty=num(prompt(`單${b.unit}數量`,'1'));
      const price=num(prompt('單價','0'));
      b.items.push({id:uid(),no:'增',tag:'',chapter:'',name:name.trim(),unit,qty:qty||1,price,amount:(qty||1)*price,remark:'手動新增'});
      save();render();return;
    }
    const it=b.items.find(x=>x.id===itemId);if(!it)return;
    if(t.dataset.delitem){
      if(!confirm(`刪除細項「${it.name}」？`))return;
      for(const p of proj.periods)if(p.prog)delete p.prog[it.id];
      b.items=b.items.filter(x=>x!==it);save();render();return;
    }
    const name=prompt('名稱',it.name);if(name===null)return;
    const qty=prompt(`單${b.unit}數量`,it.qty);if(qty===null)return;
    const price=prompt('單價',it.price);if(price===null)return;
    it.name=name.trim()||it.name;it.qty=num(qty);it.price=num(price);it.amount=it.qty*it.price;
    save();render();return;
  }
  if(t.id==='btn-addblk'){
    const name=prompt('區塊名稱（例：TYPE-SK 標準大床）');if(!name)return;
    const unit=prompt('單位（間 / 層 / 式）','間')||'間';
    const count=Math.max(num(prompt('合約數量','1')),0.01);
    proj.blocks.push({id:uid(),name:name.trim(),unit,count,items:[]});save();render();return;
  }
  if(t.dataset.bapply){
    const b=proj.blocks.find(x=>x.id===t.dataset.bapply);if(!b)return;
    const inp=document.querySelector(`[data-bfill="${b.id}"]`);
    const n=Math.max(0,Math.min(num(inp&&inp.value),b.count));
    if(!confirm(`把「${b.name}」全部細項的完成％設成 ${qfmt(n)} ÷ ${qfmt(b.count)} ＝ ${pfmt(n/b.count)}？（會覆蓋原本逐條填的數字）`))return;
    const period=proj.periods[proj.periods.length-1];period.prog||(period.prog={});
    const p=n/b.count;
    for(const it of b.items){
      if(it.amount===0)continue;
      if(p>0)period.prog[it.id]={p,q:+(itemTotalQty(it,b)*p).toFixed(2)};else delete period.prog[it.id];
    }
    save();render();return;
  }
  if(t.id==='btn-addperiod'){
    const last=proj.periods[proj.periods.length-1];
    const prog=last?JSON.parse(JSON.stringify(last.prog||{})):{};
    proj.periods.push({id:uid(),no:proj.periods.length+1,date:today(),prog});
    proj.curPeriod=proj.periods.length-1;state.tab='prog';save();render();return;
  }
  if(t.id==='btn-delperiod'){
    if(!confirm(`刪除第 ${proj.periods.length} 期？本期填的進度會遺失。`))return;
    proj.periods.pop();proj.curPeriod=Math.max(0,proj.periods.length-1);save();render();return;
  }
  if(t.id==='btn-addextra'){
    const period=proj.periods[proj.periods.length-1];if(!period)return;
    openExtraModal({defaultDate:period.date,onSave:d=>{ (period.extras||(period.extras=[])).push({id:uid(),...d}); save();render(); }});
    return;
  }
  if(t.id==='btn-roundup'){
    const idx=proj.periods.length-1;const period=proj.periods[idx];if(!period)return;
    const saved=period.roundTarget; period.roundTarget=undefined; // 先取未湊整的本次應請
    const base=calc(proj,idx).billComputed; period.roundTarget=saved;
    const def=Math.round(base/10000)*10000;
    const inp=prompt(`本次應請目前 $${Math.round(base).toLocaleString('en-US')}\n\n要湊成多少整數？（直接輸入談好的金額）\n差額會自動記成尾差，下一期累計自動補回、最終仍歸位到合約總額。\n（清空後按確定＝取消湊整）`,String(def));
    if(inp===null)return;
    if(inp.trim()==='') period.roundTarget=undefined; else period.roundTarget=Math.round(num(inp));
    save();render();return;
  }
  if(t.dataset.editextra||t.dataset.delextra){
    const period=proj.periods[proj.periods.length-1];if(!period)return;
    const exId=t.dataset.editextra||t.dataset.delextra;
    const ex=(period.extras||[]).find(x=>x.id===exId);if(!ex)return;
    if(t.dataset.delextra){ if(!confirm(`刪除「${ex.name||'訂金'}」${moneyS(exVal(ex))}？`))return; period.extras=period.extras.filter(x=>x!==ex);save();render();return; }
    openExtraModal({existing:ex,defaultDate:period.date,onSave:d=>{ Object.assign(ex,d); save();render(); }});
    return;
  }
  if(t.id==='btn-print'){printDoc(proj);return;}
  if(t.id==='set-save'){
    proj.name=document.getElementById('set-name').value.trim()||proj.name;
    proj.owner=document.getElementById('set-owner').value.trim();
    proj.vendor=document.getElementById('set-vendor').value.trim();
    save();render();alert('已儲存');return;
  }
  if(t.id==='backup-export'){
    const blob=new Blob([JSON.stringify(state,null,1)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`進度請款備份_${today()}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),3000);return;
  }
  if(t.id==='backup-import-btn'){document.getElementById('backup-import').click();return;}
  if(t.id==='cloud-push'){clearTimeout(pushTimer);doPush();return;}
  if(t.id==='cloud-pull'){
    if(!confirm('從雲端下載並覆蓋本機資料？'))return;
    try{
      const remote=await cloudPull();
      if(!remote){alert('雲端目前沒有資料。');return;}
      applyRemote(remote);setCloud('已同步（手動下載）');alert('已下載 ✓');
    }catch(err){alert(err&&err.locked?'雲端資料已加密，尚未解鎖。':'下載失敗：'+(err&&err.message||err));}
    return;
  }
  if(t.id==='proj-del'){
    if(!confirm(`刪除整個專案「${proj.name}」？所有細項與各期進度都會消失。`))return;
    if(!confirm('再確認一次：真的要刪除？'))return;
    state.projects=state.projects.filter(p=>p!==proj);
    state.cur=state.projects[0]?state.projects[0].id:null;save();render();return;
  }
});

});

/* ═══════════ 雲端端對端加密（與 payroll 同一套、同一組密碼、同鑰匙共用） ═══════════ */
const E2E_SALT='PMENC1|dz-gx-py|2026';
const LS_E2E_KEY='pm_e2e_key_v1', LS_E2E_ON='pm_e2e_on_v1';
let _encKey=null,_unlockP=null;
const _b64=u8=>{let s='';for(let i=0;i<u8.length;i+=0x8000)s+=String.fromCharCode.apply(null,u8.subarray(i,i+0x8000));return btoa(s);};
const _ub64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function _gzip(u8,mode){const st=new Blob([u8]).stream().pipeThrough(mode==='d'?new DecompressionStream('gzip'):new CompressionStream('gzip'));return new Uint8Array(await new Response(st).arrayBuffer());}
async function _deriveE2eKey(pass){
  const base=await crypto.subtle.importKey('raw',new TextEncoder().encode(pass),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode(E2E_SALT),iterations:200000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},true,['encrypt','decrypt']);
}
async function _loadE2eKey(){
  if(_encKey)return _encKey;
  try{const raw=localStorage.getItem(LS_E2E_KEY);if(raw)_encKey=await crypto.subtle.importKey('raw',_ub64(raw),'AES-GCM',true,['encrypt','decrypt']);}catch(e){}
  return _encKey;
}
async function _storeE2eKey(key){_encKey=key;try{localStorage.setItem(LS_E2E_KEY,_b64(new Uint8Array(await crypto.subtle.exportKey('raw',key))));}catch(e){}}
const e2eOn=()=>{try{return localStorage.getItem(LS_E2E_ON)==='1';}catch(e){return false;}};
const isEncBlob=s=>{if(typeof s!=='string')return false;const t=s.trim();if(t[0]!=='{'||t.indexOf('PMENC1')<0)return false;try{const o=JSON.parse(t);return !!o&&o.v==='PMENC1';}catch(e){return false;}};
async function e2eEncrypt(plain){
  if(!e2eOn()||typeof plain!=='string'||isEncBlob(plain))return plain;
  const key=await _loadE2eKey();if(!key)return plain;
  const iv=crypto.getRandomValues(new Uint8Array(12));
  let body=new TextEncoder().encode(plain),z=0;
  try{if(typeof CompressionStream!=='undefined'){body=await _gzip(body);z=1;}}catch(e){}
  const ct=new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM',iv},key,body));
  return JSON.stringify({v:'PMENC1',z,iv:_b64(iv),ct:_b64(ct)});
}
async function _tryE2eDecrypt(key,blob){
  const o=JSON.parse(blob);
  let pt=new Uint8Array(await crypto.subtle.decrypt({name:'AES-GCM',iv:_ub64(o.iv)},key,_ub64(o.ct)));
  if(o.z)pt=await _gzip(pt,'d');
  return new TextDecoder().decode(pt);
}
async function e2eDecrypt(str){
  if(!isEncBlob(str))return str;
  let key=await _loadE2eKey();
  if(key){try{return await _tryE2eDecrypt(key,str);}catch(e){_encKey=null;}}
  if(_unlockP){await _unlockP;return e2eDecrypt(str);}
  let done;_unlockP=new Promise(r=>done=r);
  try{
    while(true){
      const p=prompt('☁ 雲端資料已加密。\n請輸入與 payroll 共用的解鎖密碼：');
      if(p===null){const err=new Error('已加密，尚未解鎖');err.locked=true;throw err;}
      const k=await _deriveE2eKey(p);
      try{
        const out=await _tryE2eDecrypt(k,str);
        await _storeE2eKey(k);
        try{localStorage.setItem(LS_E2E_ON,'1');}catch(e){}
        return out;
      }catch(e){alert('密碼不對，請再試一次。');}
    }
  }finally{done();_unlockP=null;}
}

/* ═══════════ Firestore 雲端同步 ═══════════ */
let cloudStatus='連線中…',lastUpdateTime='',pushTimer=null,cloudLocked=false,pushing=false,pendingPush=false;
function setCloud(s){
  cloudStatus=s;
  const el=document.getElementById('cloud-status');
  if(el)el.textContent='☁ '+s;
}
async function fetchT(url,opt={},ms=15000){
  const c=new AbortController();const t=setTimeout(()=>c.abort(),ms);
  try{return await fetch(url,{...opt,signal:c.signal});}finally{clearTimeout(t);}
}
async function cloudPull(){
  const r=await fetchT(FS_URL);
  if(r.status===404)return null;
  if(!r.ok)throw new Error('HTTP '+r.status);
  const jd=await r.json();
  lastUpdateTime=jd.updateTime||'';
  const raw=jd.fields&&jd.fields.json&&jd.fields.json.stringValue||'';
  if(!raw)return null;
  const txt=await e2eDecrypt(raw); // 密文會要求解鎖；取消會丟 locked
  cloudLocked=false;
  const d=JSON.parse(txt);
  if(!d||!Array.isArray(d.projects))throw new Error('雲端資料格式不符');
  return d;
}
function applyRemote(remote){
  const keepTab=state.tab;
  state=remote;state.tab=keepTab;
  if(!state.projects.some(p=>p.id===state.cur))state.cur=state.projects[0]?state.projects[0].id:null;
  localStorage.setItem(LS,JSON.stringify(state)); // 直接落地，不觸發上傳
  render();
}
function schedulePush(){clearTimeout(pushTimer);pushTimer=setTimeout(doPush,1500);}
async function doPush(){
  if(pushing){pendingPush=true;return;}
  if(cloudLocked){setCloud('已加密未解鎖（改動只在本機）');return;}
  pushing=true;
  try{
    setCloud('上傳中…');
    const payload=await e2eEncrypt(JSON.stringify(state));
    if(payload.length>900000)setCloud('⚠ 資料量偏大，仍嘗試上傳…');
    const body=JSON.stringify({fields:{json:{stringValue:payload}}});
    const pre=lastUpdateTime?'&currentDocument.updateTime='+encodeURIComponent(lastUpdateTime):'';
    let r=await fetchT(FS_URL+pre,{method:'PATCH',headers:{'Content-Type':'application/json'},body},20000);
    if(r.status===400||r.status===409){
      // 版本衝突：先看雲端是不是更新
      const remote=await cloudPull().catch(()=>null);
      if(remote&&(remote.savedAt||0)>(state.savedAt||0)){
        if(confirm('雲端有比本機新的資料（可能在其他裝置改過）。\n\n按「確定」→ 改用雲端資料（這台剛才的修改會被蓋掉）\n按「取消」→ 用本機資料覆蓋雲端')){
          applyRemote(remote);setCloud('已同步（採用雲端）');return;
        }
      }
      const pre2=lastUpdateTime?'&currentDocument.updateTime='+encodeURIComponent(lastUpdateTime):'';
      r=await fetchT(FS_URL+pre2,{method:'PATCH',headers:{'Content-Type':'application/json'},body},20000);
    }
    if(!r.ok)throw new Error('HTTP '+r.status);
    const jd=await r.json();
    lastUpdateTime=jd.updateTime||lastUpdateTime;
    setCloud('已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    if(e&&e.locked){cloudLocked=true;setCloud('已加密未解鎖（改動只在本機）');}
    else{setCloud('上傳失敗，稍後重試');clearTimeout(pushTimer);pushTimer=setTimeout(doPush,30000);}
  }finally{
    pushing=false;
    if(pendingPush){pendingPush=false;schedulePush();}
  }
}
async function initCloud(){
  setCloud('連線中…');
  try{
    const remote=await cloudPull();
    if(remote&&(remote.savedAt||0)>(state.savedAt||0)){applyRemote(remote);setCloud('已同步（載入雲端）');}
    else if((state.savedAt||0)>((remote&&remote.savedAt)||0)&&state.projects.length){setCloud('已連線');schedulePush();}
    else setCloud('已同步');
  }catch(e){
    if(e&&e.locked){cloudLocked=true;setCloud('已加密未解鎖（點此輸入密碼）');}
    else setCloud('離線（僅本機）');
  }
}
document.getElementById('cloud-status').onclick=()=>{
  if(/加密|離線|失敗/.test(cloudStatus)){cloudLocked=false;initCloud();}
};

/* ── App 開頁鎖：沒密碼看不到（沿用雲端加密同一組密碼；只擋畫面，本機資料仍明文） ── */
const LS_APP_LOCK='pm_app_lock_v1', LS_LOCK_GRACE='pm_lock_grace_v1';
const LOCK_GRACE_MS=90000;
const appLockOn=()=>{ try{ return localStorage.getItem(LS_APP_LOCK)==='1'; }catch(e){ return false; } };
const lockKeyReady=()=>{ try{ return !!localStorage.getItem(LS_E2E_KEY); }catch(e){ return false; } };
const lockGraceValid=()=>{ try{ return Date.now()-(+localStorage.getItem(LS_LOCK_GRACE)||0)<LOCK_GRACE_MS; }catch(e){ return false; } };
async function _verifyLockPass(p){
  try{ const raw=localStorage.getItem(LS_E2E_KEY); if(!raw) return true;
    const k=await _deriveE2eKey(p);
    return _b64(new Uint8Array(await crypto.subtle.exportKey('raw',k)))===raw;
  }catch(e){ return false; }
}
function _showLockGate(onOk){
  if(document.getElementById('app-lock-gate')) return;
  const ov=document.createElement('div'); ov.id='app-lock-gate';
  ov.style.cssText='position:fixed;inset:0;z-index:2147483647;background:#0f172a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#e2e8f0;font-family:inherit;padding:20px';
  ov.innerHTML='<div style="font-size:44px">🔒</div><div style="font-size:16px">請輸入密碼解鎖</div>'+
    '<input id="app-lock-pass" type="password" autocomplete="off" style="font-size:16px;padding:11px 12px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#fff;width:min(300px,82vw);text-align:center">'+
    '<button id="app-lock-go" style="font-size:15px;padding:10px 22px;border:none;border-radius:9px;background:#3b82f6;color:#fff;cursor:pointer">解鎖</button>'+
    '<div id="app-lock-msg" style="font-size:13px;color:#f87171;min-height:18px"></div>';
  document.body.appendChild(ov);
  const inp=ov.querySelector('#app-lock-pass'), msg=ov.querySelector('#app-lock-msg');
  const go=async()=>{ if(await _verifyLockPass(inp.value)){ try{ localStorage.setItem(LS_LOCK_GRACE,String(Date.now())); }catch(e){} ov.remove(); if(onOk)onOk(); } else { msg.textContent='密碼不對'; inp.value=''; inp.focus(); } };
  ov.querySelector('#app-lock-go').onclick=go;
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
  setTimeout(()=>inp.focus(),60);
}
function appLockGate(onOk){ if(appLockOn()&&lockKeyReady()&&!lockGraceValid()) _showLockGate(onOk); else onOk(); }
function appLockToggle(){
  if(appLockOn()){ if(confirm('關閉開頁鎖？之後打開就不用輸入密碼。')){ try{ localStorage.removeItem(LS_APP_LOCK); }catch(e){} return true; } return false; }
  if(!lockKeyReady()){ alert('請先啟用雲端加密設好密碼，開頁鎖才有密碼可用。'); return false; }
  try{ localStorage.setItem(LS_APP_LOCK,'1'); localStorage.removeItem(LS_LOCK_GRACE); }catch(e){}
  alert('已開啟開頁鎖 ✓\\n之後打開這四個系統（payroll／簡化版／品佑帳本／進度請款）都要先輸入密碼。');
  return true;
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') appLockGate(function(){}); });

appLockGate(function(){ render(); initCloud(); });
</script>
