<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點工薪資管理系統</title>
<link rel="icon" type="image/jpeg" href="icon.jpg">
<link rel="apple-touch-icon" href="icon.jpg">
<style>
  :root {
    --bg: #f0f2f8;
    --surface: #ffffff;
    --ink: #1a1d2e;
    --muted: #7a7f9a;
    --line: #e2e6f0;
    --line2: #c8cedf;
    --accent: #4f46e5;
    --accent2: #e5466b;
    --warn-bg: #fff8e6;
    --warn-ink: #92600a;
    --danger: #d63f3f;
    --info: #0e7db0;
    --radius: 16px;
    --shadow-sm: 0 1px 4px rgba(79,70,229,.07), 0 4px 16px rgba(79,70,229,.06);
    --shadow-md: 0 4px 24px rgba(79,70,229,.13), 0 1px 4px rgba(0,0,0,.06);
    --grad-top: linear-gradient(135deg, #4f46e5 0%, #7c3aed 45%, #a855f7 100%);
    --grad-sidebar: linear-gradient(180deg, #f8f7ff 0%, #f0f2f8 100%);
    --metric-1: linear-gradient(135deg, #4f46e5, #7c3aed);
    --metric-2: linear-gradient(135deg, #0e7db0, #06b6d4);
    --metric-3: linear-gradient(135deg, #059669, #10b981);
    --metric-4: linear-gradient(135deg, #d97706, #f59e0b);
    --metric-5: linear-gradient(135deg, #e5466b, #f43f5e);
    --metric-6: linear-gradient(135deg, #7c3aed, #a855f7);
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    line-height: 1.6; }

  /* ── 頂部漸層列 ── */
  .top {
    background: var(--grad-top);
    color: #fff;
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 50;
    box-shadow: 0 2px 20px rgba(79,70,229,.35);
  }
  .top::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .top h1 {
    margin: 0;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: .3px;
    text-shadow: 0 1px 6px rgba(0,0,0,.18);
  }
  .top .burger { display: none; background: rgba(255,255,255,.2); border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 4px 8px; line-height: 1; border-radius: 8px; }
  .top .burger:hover { background: rgba(255,255,255,.3); }

  /* ── 側邊欄 ── */
  .layout { display: flex; min-height: calc(100vh - 58px); }
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--grad-sidebar);
    border-right: 1px solid var(--line);
    padding: 18px 0 14px;
    overflow-y: auto;
  }
  .nav-group { margin-bottom: 8px; }
  .nav-group-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--accent);
    padding: 10px 20px 5px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    opacity: .7;
  }
  .nav-item {
    display: block;
    width: 100%;
    text-align: left;
    padding: 9px 20px 9px 22px;
    font-size: 13.5px;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--ink);
    border-left: 3px solid transparent;
    transition: all .18s;
    border-radius: 0 10px 10px 0;
    margin-right: 10px;
  }
  .nav-item:hover { background: rgba(79,70,229,.07); color: var(--accent); }
  .nav-item.active {
    border-left-color: var(--accent);
    background: linear-gradient(90deg, rgba(79,70,229,.12), rgba(79,70,229,.04));
    color: var(--accent);
    font-weight: 700;
  }
  .main { flex: 1; min-width: 0; padding: 24px 28px 60px; max-width: 1080px; }
  .scrim { display: none; }
  @media (max-width: 760px) {
    .top .burger { display: block; }
    .sidebar { position: fixed; top: 58px; left: 0; bottom: 0; z-index: 60; transform: translateX(-100%); transition: transform .22s cubic-bezier(.4,0,.2,1); box-shadow: 4px 0 24px rgba(79,70,229,.18); }
    .sidebar.open { transform: translateX(0); }
    .scrim.show { display: block; position: fixed; inset: 58px 0 0 0; background: rgba(30,27,75,.35); z-index: 55; backdrop-filter: blur(2px); }
    .main { padding: 16px; }
  }

  /* ── 卡片 ── */
  .container { max-width: 1080px; margin: 0 auto; padding: 24px 28px 60px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: var(--shadow-md); }

  /* ── 表單 ── */
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11.5px; font-weight: 600; color: var(--muted); letter-spacing: .3px; }
  input, select {
    height: 38px;
    padding: 0 12px;
    border: 1.5px solid var(--line2);
    border-radius: 10px;
    font-size: 14px;
    background: #fff;
    font-family: inherit;
    color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }
  input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--accent); }

  /* ── 統計數字卡片（彩色漸層） ── */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .metric {
    background: var(--surface);
    border: none;
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: transform .18s, box-shadow .18s;
  }
  .metric:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .metric::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--metric-1);
  }
  .metric:nth-child(6n+2)::before { background: var(--metric-2); }
  .metric:nth-child(6n+3)::before { background: var(--metric-3); }
  .metric:nth-child(6n+4)::before { background: var(--metric-4); }
  .metric:nth-child(6n+5)::before { background: var(--metric-5); }
  .metric:nth-child(6n+6)::before { background: var(--metric-6); }
  .metric .l { font-size: 11.5px; font-weight: 600; color: var(--muted); letter-spacing: .3px; text-transform: uppercase; }
  .metric .v {
    font-size: 26px;
    font-weight: 800;
    margin-top: 6px;
    background: var(--metric-1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .metric:nth-child(6n+2) .v { background: var(--metric-2); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+3) .v { background: var(--metric-3); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+4) .v { background: var(--metric-4); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+5) .v { background: var(--metric-5); -webkit-background-clip: text; background-clip: text; }
  .metric:nth-child(6n+6) .v { background: var(--metric-6); -webkit-background-clip: text; background-clip: text; }

  /* ── 表格 ── */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 700;
    font-size: 11.5px;
    letter-spacing: .5px;
    text-transform: uppercase;
    padding: 10px 10px;
    border-bottom: 2px solid var(--line);
    white-space: nowrap;
    background: #fafbff;
  }
  td { padding: 10px 10px; border-bottom: 1px solid var(--line); transition: background .12s; }
  tr:hover td { background: rgba(79,70,229,.03); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* ── 按鈕 ── */
  .btn {
    height: 38px;
    background: var(--grad-top);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    box-shadow: 0 2px 12px rgba(79,70,229,.28);
    transition: opacity .15s, transform .12s, box-shadow .15s;
  }
  .btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 18px rgba(79,70,229,.38); }
  .btn:active { transform: translateY(0); }
  .act {
    cursor: pointer;
    background: none;
    border: none;
    font-size: 13px;
    padding: 3px 8px;
    color: var(--accent);
    font-family: inherit;
    border-radius: 6px;
    transition: background .12s;
  }
  .act:hover { background: rgba(79,70,229,.08); }
  .act.danger { color: var(--danger); }
  .act.danger:hover { background: rgba(214,63,63,.08); }
  .act.muted { color: var(--muted); cursor: default; }
  .act.muted:hover { background: none; }

  /* ── 標籤、訊息 ── */
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, #fff8e6, #fef3c7);
    color: var(--warn-ink);
    border: 1px solid #fde68a;
    margin-left: 6px;
  }
  .empty { color: var(--muted); font-size: 14px; padding: 36px 0; text-align: center; }
  .sub { font-size: 12px; color: var(--muted); margin: 0 0 14px; }
  details summary { cursor: pointer; font-size: 13px; color: var(--accent); font-weight: 600; }
  .moon { color: var(--info); }
  .scroll { overflow-x: auto; border-radius: 10px; }
  .inline { display: flex; gap: 6px; align-items: center; }
  .inline input { height: 32px; width: 100px; }

  /* ── 可收合卡片 ── */
  details.card { padding: 0; }
  details.card > summary {
    padding: 16px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: var(--radius);
    user-select: none;
    color: var(--ink);
  }
  details.card > summary::-webkit-details-marker { display: none; }
  details.card > summary::before {
    content: '▶';
    font-size: 10px;
    color: var(--accent);
    transition: transform .18s;
    flex-shrink: 0;
  }
  details.card[open] > summary::before { transform: rotate(90deg); }
  details.card[open] > summary { border-bottom: 1px solid var(--line); border-radius: var(--radius) var(--radius) 0 0; }
  details.card > summary:hover { background: rgba(79,70,229,.04); border-radius: var(--radius); }
  details.card[open] > summary:hover { border-radius: var(--radius) var(--radius) 0 0; }
  .card-body { padding: 16px 24px 20px; }

  /* ── 列印用浮層 ── */
  #print-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; overflow: auto; padding: 24px; }
  #print-overlay .pbar { position: sticky; top: 0; background: #fff; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--line2); display: flex; gap: 10px; justify-content: flex-end; }
  #print-overlay .pdoc { max-width: 800px; margin: 0 auto; color: #1f2421; }
  #print-overlay h1 { font-size: 18px; margin: 0 0 2px; }
  #print-overlay .meta { font-size: 12px; color: #555; margin-bottom: 16px; }
  #print-overlay table { width: 100%; border-collapse: collapse; font-size: 12px; }
  #print-overlay th, #print-overlay td { border: 1px solid #cfd2cd; padding: 6px 8px; }
  #print-overlay th { background: #eef1ee; text-align: left; font-size: 12px; text-transform: none; letter-spacing: 0; }
  #print-overlay td.num, #print-overlay th.num { text-align: right; font-variant-numeric: tabular-nums; }
  #print-overlay .total-row td { font-weight: 700; background: #f6f7f5; }
  #print-overlay .sign { margin-top: 32px; font-size: 13px; display: flex; gap: 48px; }
  #print-overlay .sign div { border-top: 1px solid #1f2421; padding-top: 6px; min-width: 160px; }
  #print-overlay .sub { font-size: 11px; color: #777; margin-top: 8px; }
  #print-overlay .sec { font-size: 13px; font-weight: 700; margin: 16px 0 6px; }
  #print-overlay h2.sec { font-size: 14px; margin: 18px 0 6px; padding-top: 10px; border-top: 1px solid #cfd2cd; }
  #print-overlay .paydoc h1 { color: #1f3a5f; border-bottom: 3px solid #dbeafe; padding-bottom: 8px; margin-bottom: 8px; }
  #print-overlay .paydoc .sec { padding: 7px 10px; border-radius: 8px; background: #eef6ff; color: #1e3a5f; border-left: 4px solid #60a5fa; }
  #print-overlay .paydoc .sec.add-sec { background: #eefaf4; color: #166534; border-left-color: #34d399; }
  #print-overlay .paydoc .sec.ded-sec { background: #fff1f2; color: #991b1b; border-left-color: #fb7185; }
  #print-overlay .paydoc .sec.summary-sec { background: #f8fafc; color: #334155; border-left-color: #94a3b8; }
  #print-overlay .paydoc th { background: #f1f5f9; color: #334155; }
  #print-overlay .paydoc tr.add-row td, #print-overlay .paydoc .add-amt { color: #047857; background: #f0fdf4; }
  #print-overlay .paydoc tr.ded-row td, #print-overlay .paydoc .ded-amt { color: #b91c1c; background: #fff1f2; }
  #print-overlay .paydoc .night-check { color: #0f766e; font-weight: 800; font-size: 14px; }
  #print-overlay .site-pill { display:inline-block; padding:2px 8px; border-radius:999px; font-weight:700; font-size:11px; border:1px solid transparent; }
  @media print {
    body > .top, body > .layout { display: none !important; }
    #print-overlay { position: static; padding: 0; }
    #print-overlay .pbar { display: none !important; }
    @page { size: A4; margin: 16mm; }
  }
</style>
</head>
<body>
<div class="top">
  <button class="burger" id="burger" aria-label="選單">☰</button>
  <h1>點工薪資管理系統</h1>
  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <span id="cloud-status" style="font-size:12px;opacity:.9">本機模式</span>
    <button id="cloud-refresh" style="background:rgba(255,255,255,.18);color:#fff;border:none;border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px">↻ 重新整理</button>
  </div>
</div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="scrim" id="scrim"></div>
  <main class="main" id="body"></main>
</div>

<script>
const LS = 'pm_payroll_v1';
const LS_PHOTOS = 'pm_billing_photos_v1';
const LS_SIGS = 'pm_billing_sigs_v1';
const LS_SIGS_LOCKED = 'pm_billing_sigs_locked_v1';
const LS_SIG_META = 'pm_billing_sig_meta_v1';
const LS_DIRTY = 'pm_cloud_dirty_v1';
// ↓↓↓ 把這裡換成你自己的 Google Apps Script 網址（/exec 結尾）。留空則只用本機儲存。
const CLOUD_URL = 'https://script.google.com/macros/s/AKfycbynPpe_rq76SrW5_sTNaXms4U65bRrb4oscpH0GMyIXsM4Gk2DUXpOlEimP0C-pCahOVw/exec';
let state = { employees:[], sites:[], attendance:[], adjustments:[], loans:[], parkLedger:[], parkOpening:0, billings:[], measurements:[], billingPhotoDeleted:{}, textMemory:{clients:[],companies:[]}, tab:'entry' };
let cloudStatus = CLOUD_URL ? '連線中…' : '本機模式';
let localDirty=false, lastCloudTs=0;
let entryDate='', entrySite='', entryEmp=''; // 登記出工：記住上次選的日期、案場、員工
let entryOpenDates={}, entryEditId=null; // 出工紀錄分組收合狀態與正在編輯的紀錄
let entryType='work'; // 'work' | '請假' | '休假'
let entryNight=false;
let payslipShowWorkDetails=false;
let formOpen={}, billingReqDraft=null, billingAddDraft=null, billingAddEditId=null;
let billingPhotos={}, billingSigs={}, billingSigsLocked={}, billingSigMeta={}, localSigPending={};

const round = n => Math.round(n);
const money = n => '$' + round(n).toLocaleString();
// 工數顯示：工數 = 工時÷8，用分數符號。例：9h → 1⅛ 工
const FRAC8={1:'⅛',2:'¼',3:'⅜',4:'½',5:'⅝',6:'¾',7:'⅞'};
function gongStr(hours){
  const h=Number(hours)||0;
  if(h===0) return '0 工';
  const whole=Math.floor(h/8);
  const rem=h-whole*8;
  let frac='';
  if(rem>0){
    if(Number.isInteger(rem)&&FRAC8[rem]) frac=FRAC8[rem];
    else frac=(rem/8).toString().replace(/^0/,'');
  }
  let s;
  if(whole>0&&frac) s=`${whole}${frac}`;
  else if(whole>0) s=`${whole}`;
  else s=frac||'0';
  return `${s} 工`;
}
function gongH(hours){ const h=Number(hours)||0; return `${gongStr(h)}<span style="color:var(--muted);font-size:11px">(${Math.round(h*10)/10}h)</span>`; }
const esc = s => String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const empName = id => { const e=state.employees.find(x=>x.id===id); return e?e.name:'（已移除）'; };
const siteName = id => { const s=state.sites.find(x=>x.id===id); return s?s.name:'（已移除）'; };
const recordLabel = r => r.type==='請假'?'請假':r.type==='休假'?'休假':siteName(r.siteId);
const billingAmount = b => {
  const qty=Number(b&&b.qty), unitPrice=Number(b&&b.unitPrice);
  if(b&&b.qty!==undefined&&b.unitPrice!==undefined&&!isNaN(qty)&&qty>0&&!isNaN(unitPrice)&&unitPrice>=0) return qty*unitPrice;
  return Number(b&&b.amount)||0;
};
const billingLineMeta = b => {
  if(!b||b.qty===undefined||b.unitPrice===undefined) return '';
  return `${esc(b.unit||'式')} × ${Number(b.qty)||0} × ${money(Number(b.unitPrice)||0)}`;
};
function readBillingLine(prefix){
  const unit=(document.getElementById(prefix+'-unit')||{}).value||'式';
  const qty=parseFloat((document.getElementById(prefix+'-qty')||{}).value);
  const unitPrice=parseFloat((document.getElementById(prefix+'-unit-price')||{}).value);
  return {unit:unit.trim()||'式', qty, unitPrice, amount:qty*unitPrice};
}
function bindBillingSubtotal(prefix){
  const qty=document.getElementById(prefix+'-qty'), unitPrice=document.getElementById(prefix+'-unit-price'), out=document.getElementById(prefix+'-subtotal');
  if(!qty||!unitPrice||!out) return;
  const calc=()=>{ const q=parseFloat(qty.value), p=parseFloat(unitPrice.value); out.textContent=(!isNaN(q)&&!isNaN(p))?money(q*p):'$0'; };
  qty.oninput=calc; unitPrice.oninput=calc; calc();
}
const uniqueTexts = arr => [...new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'zh-Hant'));
function rememberText(kind, value){
  const v=String(value||'').trim(); if(!v) return;
  state.textMemory=state.textMemory||{clients:[],companies:[]};
  state.textMemory[kind]=uniqueTexts([v,...(state.textMemory[kind]||[])]).slice(0,80);
}
const knownClients = () => uniqueTexts([...(state.textMemory&&state.textMemory.clients||[]), ...state.sites.map(s=>s.clientOwner||s.ownerName||''), ...state.billings.map(b=>b.client||'')]);
const dataListHtml = (id, arr) => `<datalist id="${id}">${(arr||[]).map(v=>`<option value="${esc(v)}"></option>`).join('')}</datalist>`;
const parentSiteName = value => String(value||'（未填案場）');
const siteDisplayLabel = value => parentSiteName(value);
const siteSelectOptions = selected => `<option value="">請選案場</option>`+state.sites.filter(s=>s.active!==false).map(s=>`<option value="${esc(s.name)}" ${selected===s.name?'selected':''}>${esc(s.name)}</option>`).join('');
const subSiteTag = () => '';
function foldBtn(key, label){
  const open=!!formOpen[key];
  return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${open?'8px':'0'}">
    <div style="font-size:14px;font-weight:600">${label}</div>
    <button data-toggle-form="${key}" style="font-size:12px;padding:0 14px;height:28px;background:rgba(100,116,139,.08);border:none;cursor:pointer;color:#64748b;font-weight:600">${open?'▲ 收合':'＋ 展開'}</button>
  </div>`;
}
function loadPhotos(){ try{ const raw=localStorage.getItem(LS_PHOTOS); if(raw) billingPhotos=JSON.parse(raw); }catch(e){} }
function savePhotos(){ try{ localStorage.setItem(LS_PHOTOS,JSON.stringify(billingPhotos)); }catch(e){} }
function saveSigMeta(){ try{ localStorage.setItem(LS_SIG_META,JSON.stringify(billingSigMeta)); }catch(e){} }
function mergeCloudPhotos(cloudPhotos){
  Object.entries(cloudPhotos||{}).forEach(([id,urls])=>{
    const existing=billingPhotos[id]||[];
    const deleted=new Set((state.billingPhotoDeleted&&state.billingPhotoDeleted[id])||[]);
    billingPhotos[id]=[...new Set([...existing,...(urls||[])])].filter(url=>!deleted.has(url));
    if(!billingPhotos[id].length) delete billingPhotos[id];
  });
  savePhotos();
}
function rememberDeletedPhoto(id,url){
  if(!url) return;

function mergeBillingSigs(inSigs={}, inLocked={}, inMeta={}){
  Object.keys(inSigs||{}).forEach(id=>{
    if(localSigPending[id] && billingSigs[id]) return;
    if(!inMeta[id] && billingSigs[id]) return;
    const incomingTs=Number((inMeta[id]||{}).updatedAt)||0;
    const localTs=Number((billingSigMeta[id]||{}).updatedAt)||0;
    if(!billingSigs[id] || incomingTs>localTs){
      billingSigs[id]=inSigs[id];
      billingSigsLocked[id]=!!inLocked[id];
      billingSigMeta[id]=inMeta[id]||{updatedAt:incomingTs||0};
    }
  });
  Object.keys(inLocked||{}).forEach(id=>{
    if(!billingSigsLocked[id] && (!billingSigMeta[id] || !inMeta[id] || Number((inMeta[id]||{}).updatedAt)>=Number((billingSigMeta[id]||{}).updatedAt||0))) billingSigsLocked[id]=!!inLocked[id];
  });
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
}
function applyCloudSigsBeforePush(cloudSigs={}, cloudLocked={}, cloudMeta={}){
  Object.keys(billingSigs).forEach(id=>{
    if(localSigPending[id]) return;
    if(cloudSigs[id]){
      billingSigs[id]=cloudSigs[id];
      billingSigsLocked[id]=!!cloudLocked[id];
      billingSigMeta[id]=cloudMeta[id]||{updatedAt:Number((cloudMeta[id]||{}).updatedAt)||0};
    } else {
      delete billingSigs[id];
      delete billingSigsLocked[id];
      delete billingSigMeta[id];
    }
  });
  Object.keys(cloudSigs||{}).forEach(id=>{
    if(localSigPending[id]) return;
    billingSigs[id]=cloudSigs[id];
    billingSigsLocked[id]=!!cloudLocked[id];
    billingSigMeta[id]=cloudMeta[id]||{updatedAt:Number((cloudMeta[id]||{}).updatedAt)||0};
  });
  try{ localStorage.setItem(LS_SIGS,JSON.stringify(billingSigs)); }catch(e){}
  try{ localStorage.setItem(LS_SIGS_LOCKED,JSON.stringify(billingSigsLocked)); }catch(e){}
  saveSigMeta();
}

const fileToDataURL = file => new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=()=>resolve(r.result); r.onerror=reject; r.readAsDataURL(file); });
const loadImage = src => new Promise((resolve,reject)=>{ const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=src; });
async function compressImageP(file,maxW=1000,quality=0.72,maxBytes=850000){
  if(!file || !file.type || !file.type.startsWith('image/')) throw new Error('請選圖片檔');
  const src=await fileToDataURL(file);
  const img=await loadImage(src);
  let w0=img.naturalWidth||img.width, h0=img.naturalHeight||img.height;
  if(!w0||!h0) throw new Error('照片讀取失敗');
  let wLimit=maxW, q=quality, out='';
  for(let tries=0; tries<8; tries++){
    const scale=Math.min(1,wLimit/w0);
    const w=Math.max(1,Math.round(w0*scale)), h=Math.max(1,Math.round(h0*scale));
    const c=document.createElement('canvas'); c.width=w; c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);
    out=c.toDataURL('image/jpeg',q);
    if(Math.ceil(out.length*0.75)<=maxBytes) return out;
    if(q>0.48) q-=0.08; else wLimit=Math.round(wLimit*0.82);
  }
  return out;
}
async function uploadBillingPhoto(file){
  if(!CLOUD_URL) return fileToDataURL(file);
  const dataUrl=await compressImageP(file,1000,0.72,850000);
  const res=await fetch(CLOUD_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action:'uploadPhoto',data:dataUrl,name:file.name||'photo.jpg'})
  });
  let j=null;
  try{ j=await res.json(); }catch(e){}
  if(!res.ok || !j || !j.ok || !j.url) throw new Error((j&&j.error)||('照片上傳失敗 HTTP '+res.status));
  return j.url;
}
function photoDisplayUrl(url){
  const raw=String(url||'');
  const m=raw.match(/[?&]id=([^&]+)/) || raw.match(/\/d\/([^/=]+)/);
  if(m && (raw.includes('drive.google.com') || raw.includes('googleusercontent.com'))){
    return `https://drive.google.com/thumbnail?id=${encodeURIComponent(m[1])}&sz=w1000`;
  }
  return raw;
}

function applyData(d){
  if(!d) return;
  state.employees=d.employees||[]; state.sites=d.sites||[]; state.attendance=d.attendance||[]; state.adjustments=d.adjustments||[]; state.loans=d.loans||[]; state.parkLedger=d.parkLedger||[]; state.parkOpening=Number(d.parkOpening)||0; state.billings=d.billings||[]; state.measurements=d.measurements||[]; state.billingPhotoDeleted=d.billingPhotoDeleted||{}; state.textMemory=d.textMemory||{clients:[],companies:[]};
  state.employees.forEach(e=>{ if(e.active===undefined) e.active=true; });
  mergeBillingSigs(d.billingSigs||{}, d.billingSigsLocked||{}, d.billingSigMeta||{});
  if(d.billingPhotos) mergeCloudPhotos(d.billingPhotos);
}
function packData(){
  Object.keys(billingSigs).forEach(id=>{ billingSigMeta[id]=billingSigMeta[id]||{updatedAt:0}; });
  const photosSync={};
  Object.entries(billingPhotos).forEach(([id,urls])=>{
    const driveUrls=(urls||[]).filter(u=>typeof u==='string'&&u.startsWith('http'));
    if(driveUrls.length) photosSync[id]=driveUrls;
  });
  return {employees:state.employees,sites:state.sites,attendance:state.attendance,adjustments:state.adjustments,loans:state.loans,parkLedger:state.parkLedger,parkOpening:state.parkOpening,billings:state.billings,measurements:state.measurements,billingPhotoDeleted:state.billingPhotoDeleted||{},textMemory:state.textMemory,billingPhotos:photosSync,billingSigs,billingSigsLocked,billingSigMeta,savedAt:Date.now()};
}

// 先讀本機快取（讓畫面秒開），再從雲端拉最新
function loadLocal(){
  try { localDirty=localStorage.getItem(LS_DIRTY)==='1'; } catch(e){}
  try { const raw=localStorage.getItem(LS); if(raw) applyData(JSON.parse(raw)); } catch(e){}
}
async function loadCloud(){
  if(!CLOUD_URL){ setCloud('本機模式'); render(); return; }
  setCloud('讀取雲端中…');
  try {
    const res=await fetch(CLOUD_URL, {method:'GET'});
    const j=await res.json();
    if(j&&j.ok&&j.data){
      const cloudData=JSON.parse(j.data);
      const localRaw=localStorage.getItem(LS);
      const localTs=localRaw?Number((JSON.parse(localRaw)||{}).savedAt)||0:0;
      const cloudTs=Number(cloudData.savedAt)||0;
      lastCloudTs=cloudTs;
      mergeBillingSigs(cloudData.billingSigs||{}, cloudData.billingSigsLocked||{}, cloudData.billingSigMeta||{});
      if(cloudData.billingPhotos) mergeCloudPhotos(cloudData.billingPhotos);
      if(!localDirty || cloudTs>=localTs){
        const keepSigs={...billingSigs}, keepLocked={...billingSigsLocked}, keepMeta={...billingSigMeta};
        applyData(cloudData);
        Object.assign(billingSigs, keepSigs);
        Object.assign(billingSigsLocked, keepLocked);
        Object.assign(billingSigMeta, keepMeta);
        try{localStorage.setItem(LS,j.data); localStorage.removeItem(LS_DIRTY); localDirty=false;}catch(e){}
        setCloud('已同步');
      } else {
        setCloud('本機有未上傳資料，未自動覆蓋雲端');
      }
    }
    else { setCloud('雲端尚無資料'); }
  } catch(e){ setCloud('雲端讀取失敗（顯示本機資料）'); }
  render();
}

let saveTimer=null, saving=false, pendingSave=false;
let raiseEmpId=null;
function saveData(){
  // 本機立即存（不怕當掉）
  localDirty=true;
  try{ localStorage.setItem(LS_DIRTY,'1'); localStorage.setItem(LS, JSON.stringify(packData())); }catch(e){}
  if(!CLOUD_URL){ setCloud('已存本機'); return; }
  // 雲端防抖動：1秒內多次變更只送一次
  if(saveTimer) clearTimeout(saveTimer);
  setCloud('儲存中…');
  saveTimer=setTimeout(pushCloud, 800);
}
async function pushCloud(){
  if(!CLOUD_URL) return;
  if(saving){ pendingSave=true; return; }
  if(!localDirty && Object.keys(localSigPending).length===0){ setCloud('已同步'); return; }
  saving=true;
  try {
    try{
      const gr=await fetch(CLOUD_URL,{method:'GET'});
      const gj=await gr.json();
      if(gj&&gj.ok&&gj.data){
        const cd=JSON.parse(gj.data);
        const cloudTs=Number(cd.savedAt)||0;
        const localRaw=localStorage.getItem(LS);
        const localTs=localRaw?Number((JSON.parse(localRaw)||{}).savedAt)||0:0;
        if(cloudTs>lastCloudTs && cloudTs>localTs){
          lastCloudTs=cloudTs;
          setCloud('雲端已有較新資料，請先重新整理');
          saving=false;
          return;
        }
        applyCloudSigsBeforePush(cd.billingSigs||{}, cd.billingSigsLocked||{}, cd.billingSigMeta||{});
        if(cd.billingPhotos) mergeCloudPhotos(cd.billingPhotos);
      }
    }catch(e){}
    const payload=JSON.stringify(packData());
    try{ localStorage.setItem(LS,payload); }catch(e){}
    const pr=await fetch(CLOUD_URL, {method:'POST', body: payload});
    const pj=await pr.json();
    if(pj&&pj.ok){
      localSigPending={}; localDirty=false;
      try{ localStorage.removeItem(LS_DIRTY); }catch(e){}
      try{ lastCloudTs=Number((JSON.parse(payload)||{}).savedAt)||Date.now(); }catch(e){}
      setCloud('已同步');
    } else {
      setCloud('推送失敗：'+String((pj&&pj.error)||'未知錯誤').slice(0,60));
    }
  } catch(e){ setCloud('雲端儲存失敗（已存本機）'); }
  saving=false;
  if(pendingSave){ pendingSave=false; pushCloud(); }
}
function flushCloudOnExit(){
  if(!CLOUD_URL) return;
  if(!localDirty && Object.keys(localSigPending).length===0) return;
  if(saveTimer){ clearTimeout(saveTimer); saveTimer=null; }
  const payload=JSON.stringify(packData());
  try{ localStorage.setItem(LS_DIRTY,'1'); localStorage.setItem(LS, payload); }catch(e){}
  try{
    if(navigator.sendBeacon){
      const blob=new Blob([payload],{type:'text/plain;charset=UTF-8'});
      if(navigator.sendBeacon(CLOUD_URL, blob)) return;
    }
  }catch(e){}
  try{ fetch(CLOUD_URL,{method:'POST',body:payload,keepalive:true}); }catch(e){}
}
function setCloud(s){ cloudStatus=s; const el=document.getElementById('cloud-status'); if(el) el.textContent=s; }

function computeRecords(records){
  const byKey={};
  records.forEach(r=>{ const k=r.empId+'|'+r.date; (byKey[k]=byKey[k]||[]).push(r); });
  const out={};
  Object.values(byKey).forEach(group=>{
    const attended=group.filter(r=>(Number(r.hours)||0)>0);
    const totalAllowance=group.filter(r=>r.night).length*400;
    group.forEach(r=>{
      const daily=Number(r.dailyRate)||0, hourly=daily/8, h=Number(r.hours)||0;
      const ot=Number(r.overtime)||0;
      const baseWage=hourly*h;
      const overtimePay=hourly*1.33*ot;
      const wage=baseWage+overtimePay;
      const allow=(attended.length>0&&h>0)?totalAllowance/attended.length:0;
      out[r.id]={wage,baseWage,overtimePay,allow,total:wage+allow};
    });
  });
  return out;
}

// 計薪週期以每月 11 號起算：一個週期 = 某月11號 ～ 次月10號
// 「本月週期」：找出包含今天的那個週期
function cycleContaining(d){
  const day=d.getDate();
  let startY=d.getFullYear(), startM=d.getMonth();
  if(day>11){
    // 12號之後，屬於本月11號起算的新週期
  } else {
    // 今天在 1~11 號，仍屬於上個月11號起算的週期
    startM-=1; if(startM<0){ startM=11; startY-=1; }
  }
  const from=new Date(startY,startM,11);
  const to=new Date(startY,startM+1,10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(from),to:fmt(to)};
}
function defaultPayRange(){ return cycleContaining(new Date()); }
function prevPayRange(){
  const cur=cycleContaining(new Date());
  const f=new Date(cur.from+'T00:00:00');
  const pf=new Date(f.getFullYear(),f.getMonth()-1,11);
  const pt=new Date(f.getFullYear(),f.getMonth(),10);
  const fmt=x=>`${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
  return {from:fmt(pf),to:fmt(pt)};
}
// 預設調整項類型
const ADD_TYPES=['獎金','全勤獎金','其他加給'];
const DED_TYPES=['借支扣還','勞保自負額','健保自負額','工具遺失賠償','其他扣款'];

// 建立某計薪區間的完整發薪資料（基本工資 + 系統加項 + 手動加扣項 = 實發）
function buildPayroll(from,to){
  const inRange=d=> (!from||d>=from) && (!to||d<=to);
  const comp=computeRecords(state.attendance);
  const byEmp={};
  state.attendance.filter(r=>inRange(r.date)).forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const e=byEmp[r.empId]=byEmp[r.empId]||{empId:r.empId,hours:0,wage:0,overtimeHours:0,overtimePay:0,allow:0,gross:0,days:new Set(),adds:[],deds:[],systemAdds:[]};
    const h=Number(r.hours)||0, ot=Number(r.overtime)||0;
    e.hours+=h; e.overtimeHours+=ot; e.wage+=Number(c.baseWage)||0; e.overtimePay+=Number(c.overtimePay)||0; e.allow+=c.allow; e.gross+=Number(c.baseWage)||0;
    if((Number(r.hours)||0)>0) e.days.add(r.date);
  });
  // 套用區間內的調整項
  state.adjustments.filter(a=>inRange(a.date)).forEach(a=>{
    const e=byEmp[a.empId]=byEmp[a.empId]||{empId:a.empId,hours:0,wage:0,overtimeHours:0,overtimePay:0,allow:0,gross:0,days:new Set(),adds:[],deds:[],systemAdds:[]};
    (a.kind==='add'?e.adds:e.deds).push(a);
  });
  Object.values(byEmp).forEach(e=>{
    const travelDays=e.allow>0?e.allow/400:0;
    e.systemAdds=[];
    if(e.allow>0) e.systemAdds.push({label:'出差外宿津貼',note:`共 ${travelDays.toLocaleString()} 天 × $400`,amount:e.allow});
    if(e.overtimePay>0) e.systemAdds.push({label:'加班費',note:`共 ${e.overtimeHours.toLocaleString()} 小時 × 時薪 × 1.33`,amount:e.overtimePay});
    e.manualAddTotal=e.adds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.systemAddTotal=e.systemAdds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.addTotal=e.manualAddTotal+e.systemAddTotal;
    e.dedTotal=e.deds.reduce((s,a)=>s+(Number(a.amount)||0),0);
    e.net=e.gross+e.addTotal-e.dedTotal;
  });
  return byEmp;
}

  state.attendance.forEach(r=>{ const c=comp[r.id]; if(!c)return;
    const s=bySite[r.siteId]=bySite[r.siteId]||{hours:0,wage:0,allow:0,total:0,emp:{},opening:0,manual:0};
    s.hours+=Number(r.hours)||0; s.wage+=c.wage; s.allow+=c.allow; s.total+=c.total;
    s.emp[r.empId]=(s.emp[r.empId]||0)+c.total;
  });
  Object.values(bySite).forEach(s=>{ s.grandTotal=s.total+(s.opening||0)+(s.manual||0); });

    </div>
  </details>`;
}

      const files=[...inp.files]; if(!files.length) return;
      const arr=(billingPhotos[id]||[]).slice();
      let ok=0, fail=0;
      setCloud(`上傳照片中 (0/${files.length})`);
      for(let i=0;i<files.length;i++){
        try{
          setCloud(`上傳照片中 (${i+1}/${files.length})`);

          ok++;
        }catch(e){
          fail++;

        }

      billingPhotos[id]=arr;
      savePhotos();
      if(ok>0) saveData();

      const existing=state.attendance.find(r=>r.empId===empId&&r.date===date&&(r.type==='請假'||r.type==='休假'));

  });
  document.querySelectorAll('[data-opening]').forEach(inp=>inp.onchange=()=>{
    const s=state.sites.find(x=>x.id===inp.dataset.opening); if(!s) return;
    const v=parseFloat(inp.value);
    if(isNaN(v)||v<=0) delete s.opening; else s.opening=v;
    saveData(); render();
  });
  document.querySelectorAll('[data-rensite]').forEach(b=>b.onclick=()=>{
    const s=state.sites.find(x=>x.id===b.dataset.rensite); if(!s)return;
    const cell=b.closest('td');
    cell.innerHTML=`<span class="inline"><input value="${esc(s.name)}" id="rens-in" style="width:160px"><button class="act" id="rens-ok">✓</button><button class="act muted" id="rens-cancel" style="cursor:pointer">✕</button></span>`;
    const inp=cell.querySelector('#rens-in'); inp.focus();
    cell.querySelector('#rens-ok').onclick=()=>{ const v=inp.value.trim(); if(v){ s.name=v; saveData(); } render(); };
    cell.querySelector('#rens-cancel').onclick=()=>render();
  });

  const la=document.getElementById('loan-add');
  if(la) la.onclick=()=>{
    const date=document.getElementById('loan-date').value;
    const empId=document.getElementById('loan-emp').value;
    const amount=parseFloat(document.getElementById('loan-amount').value);
    const note=document.getElementById('loan-note').value.trim();
    if(!date||!empId||isNaN(amount)||amount<=0) return;
    const payRange=(state.payFrom&&state.payTo)?{from:state.payFrom,to:state.payTo}:defaultPayRange();
    const payroll=buildPayroll(payRange.from,payRange.to);
    const currentPay=payroll[empId]?Number(payroll[empId].net)||0:0;
    if(amount>currentPay&&!confirm(`借支金額 ${money(amount)} 已超過此員工當期目前實發薪資 ${money(currentPay)}。\n\n計薪期間：${payRange.from} ～ ${payRange.to}\n\n是否仍要新增這筆借支？`)) return;
    state.loans.push({id:uid(),date,empId,amount,note});
    saveData(); render();
  };
  document.querySelectorAll('[data-delloan]').forEach(b=>b.onclick=()=>{
    if(!confirm('刪除這筆借支？已扣除的紀錄不會跟著刪除。')) return;
    state.loans=state.loans.filter(l=>l.id!==b.dataset.delloan); saveData(); render();
  });
  document.querySelectorAll('[data-repay]').forEach(b=>b.onclick=()=>{
    const loan=state.loans.find(l=>l.id===b.dataset.repay); if(!loan) return;
    const bal=loanBalance(loan);
    const inp=document.querySelector(`[data-loanpay="${loan.id}"]`);
    const amt=Math.min(parseFloat(inp&&inp.value), bal);
    if(isNaN(amt)||amt<=0){ alert('請輸入本期要扣回的金額'); return; }
    state.adjustments.push({id:uid(),date:state.payTo||new Date().toISOString().slice(0,10),empId:loan.empId,kind:'ded',label:'借支扣還',amount:amt,note:(loan.note?loan.note+' ':'')+'借支扣還',loanId:loan.id});
    saveData(); render();
  });

  // 品佑收支明細
  const pOpen=document.getElementById('park-opening'); if(pOpen) pOpen.onchange=()=>{ const v=parseFloat(pOpen.value); state.parkOpening=isNaN(v)?0:v; saveData(); render(); };
  const pAdd=document.getElementById('park-add');
  if(pAdd) pAdd.onclick=()=>{
    const date=document.getElementById('park-date').value;
    const kind=document.getElementById('park-kind').value;
    const amount=parseFloat(document.getElementById('park-amount').value);
    const note=document.getElementById('park-note').value.trim();
    if(!date||isNaN(amount)||amount<=0){ alert('請填日期與金額'); return; }
    state.parkLedger.push({id:uid(),date,kind,amount,note});
    saveData(); render();
  };
  document.querySelectorAll('[data-delpark]').forEach(b=>b.onclick=()=>{
    if(!confirm('確定刪除這筆收支？')) return;
    state.parkLedger=state.parkLedger.filter(t=>t.id!==b.dataset.delpark); saveData(); render();
  });
  document.querySelectorAll('[data-parkedit]').forEach(b=>b.onclick=()=>{ parkEditId=b.dataset.parkedit; render(); });
  document.querySelectorAll('[data-parkeditcancel]').forEach(b=>b.onclick=()=>{ parkEditId=null; render(); });
  document.querySelectorAll('[data-parkeditok]').forEach(b=>b.onclick=()=>{
    const t=state.parkLedger.find(x=>x.id===b.dataset.parkeditok); if(!t) return;
    const amount=parseFloat(document.getElementById('pe-amount').value);
    if(isNaN(amount)||amount<=0){ alert('金額請填正數'); return; }
    t.date=document.getElementById('pe-date').value;
    t.kind=document.getElementById('pe-kind').value;
    t.amount=amount;
    t.note=document.getElementById('pe-note').value.trim();
    parkEditId=null; saveData(); render();
  });
  const pf2=document.getElementById('park-from'); if(pf2) pf2.onchange=()=>{ parkFrom=pf2.value; render(); };
  const pt2=document.getElementById('park-to'); if(pt2) pt2.onchange=()=>{ parkTo=pt2.value; render(); };
  const pclr=document.getElementById('park-clear'); if(pclr) pclr.onclick=()=>{ parkFrom=''; parkTo=''; render(); };
}

function printHTML(title, inner){
  const old=document.getElementById('print-overlay'); if(old) old.remove();
  const ov=document.createElement('div');
  ov.id='print-overlay';
  ov.innerHTML=`
    <div class="pbar">
      <button class="btn" id="po-print">列印 / 存成 PDF</button>
      <button class="act" id="po-close" style="border:1px solid var(--line2);border-radius:8px;padding:0 14px">關閉</button>

    <div class="pdoc">${inner}</div>`;
  document.body.appendChild(ov);
  document.getElementById('po-print').onclick=()=>window.print();
  document.getElementById('po-close').onclick=()=>ov.remove();
  ov.scrollTop=0;
}

// ---- 借支 ----
function loanRepaid(loanId){
  return state.adjustments.filter(a=>a.loanId===loanId && a.kind==='ded').reduce((s,a)=>s+(Number(a.amount)||0),0);
}
function loanBalance(loan){ return Math.max(0, (Number(loan.amount)||0) - loanRepaid(loan.id)); }
function effectiveDaily(emp, date){
  if(emp.rateHistory&&emp.rateHistory.length){
    const hit=emp.rateHistory.filter(h=>h.date<=date).sort((a,b)=>b.date.localeCompare(a.date));
    if(hit.length) return Number(hit[0].daily)||0;
  }
  return Number(emp.daily)||0;
}
function loanDeductedInRange(loanId,from,to){
  const inRange=d=>(!from||d>=from)&&(!to||d<=to);
  return state.adjustments.some(a=>a.loanId===loanId && a.kind==='ded' && inRange(a.date));
}

function openFullscreenSign(onSaved){
  const old=document.getElementById('sig-overlay'); if(old) old.remove();
  const ov=document.createElement('div');
  ov.id='sig-overlay';
  ov.style.cssText='position:fixed;inset:0;background:#fff;z-index:10000;display:flex;flex-direction:column;padding:14px';
  ov.innerHTML=`<div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:10px"><button class="act" id="sig-clear">清除</button><button class="btn" id="sig-save">儲存簽名</button><button class="act" id="sig-close">取消</button></div><canvas id="sig-canvas" style="flex:1;border:1px solid var(--line2);border-radius:12px;touch-action:none"></canvas>`;
  document.body.appendChild(ov);
  const cv=document.getElementById('sig-canvas'), ctx=cv.getContext('2d');
  const resize=()=>{ const r=cv.getBoundingClientRect(); cv.width=Math.max(1,Math.floor(r.width)); cv.height=Math.max(1,Math.floor(r.height)); ctx.lineWidth=3; ctx.lineCap='round'; ctx.strokeStyle='#111'; };
  resize();
  let drawing=false,last=null;
  const pos=e=>{ const p=e.touches?e.touches[0]:e, r=cv.getBoundingClientRect(); return {x:p.clientX-r.left,y:p.clientY-r.top}; };
  const down=e=>{ drawing=true; last=pos(e); e.preventDefault(); };
  const move=e=>{ if(!drawing) return; const p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; e.preventDefault(); };
  const up=()=>{ drawing=false; };
  cv.addEventListener('mousedown',down); cv.addEventListener('mousemove',move); window.addEventListener('mouseup',up);
  cv.addEventListener('touchstart',down,{passive:false}); cv.addEventListener('touchmove',move,{passive:false}); cv.addEventListener('touchend',up);
  document.getElementById('sig-clear').onclick=()=>ctx.clearRect(0,0,cv.width,cv.height);
  document.getElementById('sig-close').onclick=()=>ov.remove();
  document.getElementById('sig-save').onclick=()=>{ onSaved(cv.toDataURL('image/png')); ov.remove(); };
}

  </details>
  <details class="card">
    <summary><span style="flex:1">收支清單</span><button class="btn" onclick="event.preventDefault();exportParkPDF()" ${state.parkLedger.length===0?'disabled style="opacity:.5"':''} style="height:30px;font-size:12px">匯出 PDF</button></summary>
    <div class="card-body">
      <div class="row" style="margin-bottom:10px">
        <div class="field"><label>起</label><input type="date" id="park-from" value="${parkFrom}"></div>
        <div class="field"><label>訖</label><input type="date" id="park-to" value="${parkTo}"></div>
        <button class="act" id="park-clear" style="height:36px;border:1px solid var(--line2);border-radius:8px;padding:0 12px">清除日期</button>
        ${(parkFrom||parkTo)?`<div class="sub" style="margin:0;align-self:center">區間內　收入 ${money(rangeIn)}・支出 ${money(rangeOut)}・淨額 ${money(rangeIn-rangeOut)}</div>`:''}
      </div>
      ${txRows===''?'<div class="empty">尚無收支紀錄。</div>':`<div class="scroll"><table>
        <thead><tr><th>日期</th><th>說明</th><th class="num">收入</th><th class="num">支出</th><th></th></tr></thead>
        <tbody>${txRows}</tbody></table></div>`}
    </div>
  </details>`;
}

function exportParkPDF(){
  const inRange=d=> (!parkFrom||d>=parkFrom) && (!parkTo||d<=parkTo);
  const txs=state.parkLedger.filter(t=>inRange(t.date)).sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
  if(txs.length===0) return;
  const range=(parkFrom||parkTo)?`${parkFrom||'起始'} ～ ${parkTo||'迄今'}`:'全部期間';
  let tin=0,tout=0;
  const rows=txs.map(t=>{ tin+=t.kind==='in'?(Number(t.amount)||0):0; tout+=t.kind==='out'?(Number(t.amount)||0):0;
    return `<tr><td>${esc(t.date)}</td><td>${esc(t.note||'')}</td>
      <td class="num">${t.kind==='in'?money(t.amount):'-'}</td><td class="num">${t.kind==='out'?money(t.amount):'-'}</td></tr>`;
  }).join('');
  const inner=`<h1>品佑收支明細</h1>
    <div class="meta">期間：${range}　|　期初餘額：${money(state.parkOpening||0)}　|　目前餘額：${money(parkBalance())}　|　列印日：${new Date().toISOString().slice(0,10)}</div>
    <table><thead><tr><th>日期</th><th>說明</th><th class="num">收入</th><th class="num">支出</th></tr></thead>
    <tbody>${rows}
      <tr class="total-row"><td colspan="2">區間合計</td><td class="num">${money(tin)}</td><td class="num">${money(tout)}</td></tr>
      <tr class="total-row"><td colspan="2">區間淨額（收−支）</td><td class="num" colspan="2">${money(tin-tout)}</td></tr>
    </tbody></table>
    <p class="sub">金額四捨五入至整數。</p>`;
  printHTML('品佑收支明細', inner);
}

function openSidebar(){ document.getElementById('sidebar').classList.add('open'); document.getElementById('scrim').classList.add('show'); }
function closeSidebar(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('scrim').classList.remove('show'); }
document.getElementById('burger').onclick=()=>{
  const sb=document.getElementById('sidebar');
  if(sb.classList.contains('open')) closeSidebar(); else openSidebar();
};
document.getElementById('scrim').onclick=closeSidebar;
document.getElementById('cloud-refresh').onclick=()=>loadCloud();
window.addEventListener('beforeunload', ()=>flushCloudOnExit());
window.addEventListener('pagehide', ()=>flushCloudOnExit());
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState==='hidden') flushCloudOnExit();
});

loadLocal(); loadPhotos(); loadSigs(); render(); loadCloud();
</script>
</body>
</html>
