  const p = productions[idx];
  const body = `
    <div class="form-group"><label>日期</label><input type="date" id="ep-date" value="${p.date}"></div>
    <div class="form-group"><label>材料名稱</label><input type="text" id="ep-name" value="${p.name}"></div>
    <div class="form-group"><label>規格</label><input type="text" id="ep-spec" value="${p.spec}"></div>
    <div class="form-group"><label>厚度</label><input type="text" id="ep-thick" value="${p.thick}"></div>
    <div class="form-group"><label>數量</label><input type="number" id="ep-qty" value="${p.qty}" min="1"></div>`;
  showEditModal('編輯入庫紀錄', body, ()=>{
    productions[idx].date = document.getElementById('ep-date').value;
    productions[idx].name = document.getElementById('ep-name').value.trim();
    productions[idx].spec = document.getElementById('ep-spec').value.trim();
    productions[idx].thick = document.getElementById('ep-thick').value.trim();
    productions[idx].qty = parseInt(document.getElementById('ep-qty').value)||0;
    hideEditModal(); renderAll(); autoSave(); showToast('✅ 入庫紀錄已更新');
  });
}

function deleteProduction(idx) {
  if (!confirm('確定刪除此入庫紀錄？')) return;
  productions.splice(idx,1);
  renderAll(); autoSave(); showToast('🗑️ 已刪除');
}

// ── Shipment Edit/Delete ──
function editShipment(idx) {
  const s = shipments[idx];
  const body = `
    <div class="form-group"><label>日期</label><input type="date" id="es-date" value="${s.date}"></div>
    <div class="form-group"><label>工地名稱</label><input type="text" id="es-site" value="${s.site}"></div>
    <div class="form-group"><label>材料名稱</label><input type="text" id="es-name" value="${s.name}"></div>
    <div class="form-group"><label>規格</label><input type="text" id="es-spec" value="${s.spec}"></div>
    <div class="form-group"><label>厚度</label><input type="text" id="es-thick" value="${s.thick}"></div>
    <div class="form-group"><label>數量</label><input type="number" id="es-qty" value="${s.qty}" min="1"></div>`;
  showEditModal('編輯出貨紀錄', body, ()=>{
    const oldQty = Number(s.qty);
    const newQty = parseInt(document.getElementById('es-qty').value)||0;
    // 若是庫存出，且數量有變，調整庫存
    if (s.type==='stock' && newQty!==oldQty) {
      const inv = findInventory(s.name, s.spec, s.thick);
      if (inv) {
        const diff = newQty - oldQty; // 多出的部分要再扣
        if (diff > 0 && inv.qty < diff) {
          showToast('❌ 庫存不足，無法增加出貨量（剩'+inv.qty+'）'); return;
        }
        inv.qty -= diff;
      }
    }
    shipments[idx].date = document.getElementById('es-date').value;
    shipments[idx].site = document.getElementById('es-site').value.trim();
    shipments[idx].name = document.getElementById('es-name').value.trim();
    shipments[idx].spec = document.getElementById('es-spec').value.trim();
    shipments[idx].thick = document.getElementById('es-thick').value.trim();
    shipments[idx].qty = newQty;
    hideEditModal(); renderAll(); autoSave(); showToast('✅ 出貨紀錄已更新');
  });
}

function deleteShipment(idx) {
  const s = shipments[idx];
  if (!confirm('確定刪除此出貨紀錄？')) return;
  // 若是庫存出，刪除時把數量加回庫存
  if (s.type==='stock') {
    const inv = findInventory(s.name, s.spec, s.thick);
    if (inv) { inv.qty += Number(s.qty); inv.lastUpdate = today; }
  }
  shipments.splice(idx,1);
  renderAll(); autoSave(); showToast('🗑️ 已刪除，庫存已還原');
}

// ── Demand ──
function getProjects() {
  const set = new Set();
  demands.forEach(d=>{ if(d.project) set.add(d.project); });
  return Array.from(set).sort();
}

function refreshProjectSelects() {
  const projects = getProjects();
  // Update ship-site select
  const shipSel = document.getElementById('ship-site');
  const shipVal = shipSel ? shipSel.value : '';
  if (shipSel) {
    shipSel.innerHTML = '<option value="">-- 請選擇案件 --</option>';
    projects.forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; shipSel.appendChild(o); });
    if (shipVal) shipSel.value = shipVal;
  }
  // Update dem-project select
  const demSel = document.getElementById('dem-project');
  const demVal = demSel ? demSel.value : '';
  if (demSel) {
    demSel.innerHTML = '<option value="">-- 選擇現有案件或新增 --</option>';
    projects.forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; demSel.appendChild(o); });
    const newOpt = document.createElement('option');
    newOpt.value='__new__'; newOpt.textContent='＋ 新增案件...';
    demSel.appendChild(newOpt);
    // 還原使用者原本的選擇（包含 __new__）
    if (demVal) {
      let exists = false;
      for (const opt of demSel.options) { if (opt.value===demVal) { exists=true; break; } }
      if (exists) demSel.value = demVal;
    }
  }
}

function onSelectProject() {
  const val = document.getElementById('dem-project').value;
  document.getElementById('dem-new-project-group').style.display = val==='__new__' ? 'block' : 'none';
}

function onSelectCategory() {
  const val = document.getElementById('dem-category').value;
  document.getElementById('dem-new-category-group').style.display = val==='__new__' ? 'block' : 'none';
}

function getCategoryName() {
  const sel = document.getElementById('dem-category').value;
  if (sel === '__new__') {
    const ni = document.getElementById('dem-new-category');
    return ni ? ni.value.trim() : '';
  }
  return sel || '隔間';
}

function refreshCategorySelect() {
  const cats = new Set(['隔間','天花板']);
  demands.forEach(d=>{ if(d.category) cats.add(d.category); });
  const sel = document.getElementById('dem-category');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = '';
  Array.from(cats).forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; sel.appendChild(o); });
  const newOpt = document.createElement('option');
  newOpt.value='__new__'; newOpt.textContent='＋ 新增分類...';
  sel.appendChild(newOpt);
  if (prev) { for(const o of sel.options){ if(o.value===prev){ sel.value=prev; break; } } }
}

function refreshFloorList() {
  const dl = document.getElementById('dem-floor-list');
  if (!dl) return;
  const floors = new Set();
  const curProject = getProjectName();
  demands.forEach(d=>{ if(d.floor && (!curProject || d.project===curProject)) floors.add(d.floor); });
  if (floors.size===0) demands.forEach(d=>{ if(d.floor) floors.add(d.floor); });
  dl.innerHTML = Array.from(floors).map(f=>'<option value="'+f+'">').join('');
}

function getProjectName() {
  const selEl = document.getElementById('dem-project');
  const sel = selEl ? selEl.value : '';
  if (sel === '__new__') {
    const ni = document.getElementById('dem-new-project');
    return ni ? ni.value.trim() : '';
  }
  return sel;
}

function addDemand() {
  const project = getProjectName();
  const category = getCategoryName();
  const floor = document.getElementById('dem-floor').value.trim();
  const date = document.getElementById('dem-date').value;
  const name = document.getElementById('dem-name').value.trim();
  const spec = document.getElementById('dem-spec').value.trim();
  const thick = document.getElementById('dem-thick').value.trim();
  const unit = document.getElementById('dem-unit').value.trim();
  const qty = parseInt(document.getElementById('dem-qty').value);
  const note = document.getElementById('dem-note').value.trim();
  if (!project) { showToast('⚠️ 請選擇或輸入案件名稱'); return; }
  if (!floor) { showToast('⚠️ 請填寫樓層'); return; }
  if (!category) { showToast('⚠️ 請選擇或輸入分類'); return; }
  if (!date) { showToast('⚠️ 請填寫日期'); return; }
  if (!name) { showToast('⚠️ 請填寫材料名稱'); return; }
  if (!spec) { showToast('⚠️ 請填寫規格'); return; }
  if (!qty||qty<=0) { showToast('⚠️ 請填寫數量'); return; }
  demands.push({project,floor,category,date,name,spec,thick,unit,qty,note});
  activeProject = project;
  activeFloor = floor;
  ['dem-name','dem-spec','dem-thick','dem-unit','dem-qty','dem-note'].forEach(id=>document.getElementById(id).value='');
  saveLocal();
  refreshCategorySelect();
  const catSel = document.getElementById('dem-category');
  if (catSel) { for(const o of catSel.options){ if(o.value===category){ catSel.value=category; break; } } }
  document.getElementById('dem-new-category').value='';
  document.getElementById('dem-new-category-group').style.display='none';
  renderDemands();
  refreshProjectSelects();
  const sel = document.getElementById('dem-project');
  if (sel) {
    let exists = false;
    for (const opt of sel.options) { if (opt.value===project) { exists=true; break; } }
    if (exists) sel.value = project;
    document.getElementById('dem-new-project').value='';
    document.getElementById('dem-new-project-group').style.display='none';
  }
  autoSave();
  showToast('✅ 需求已新增');
}

function getShippedQty(project, name, spec, thick) {
  const norm = v => String(v==null?'':v).trim();
  return shipments
    .filter(s=>norm(s.site)===norm(project) && norm(s.name)===norm(name) && norm(s.spec)===norm(spec) && norm(s.thick)===norm(thick))
    .reduce((a,b)=>a+Number(b.qty), 0);
}

function getAllocatedQty(project, floor, name, spec, thick) {
  const n = v => String(v==null?'':v).trim();
  return allocations
    .filter(a=>n(a.project)===n(project) && n(a.floor)===n(floor) && n(a.name)===n(name) && n(a.spec)===n(spec) && n(a.thick)===n(thick))
    .reduce((x,b)=>x+Number(b.qty), 0);
}

function getTotalDemandForMaterial(project, floor, category, name, spec, thick) {
  const n = v => String(v==null?'':v).trim();
  return demands
    .filter(d=>n(d.project)===n(project) && n(d.floor)===n(floor) && n(d.category)===n(category) && n(d.name)===n(name) && n(d.spec)===n(spec) && n(d.thick)===n(thick))
    .reduce((x,b)=>x+Number(b.qty), 0);
}

function buildDemandRow(d) {
  const unit = esc(d.unit||'');
  // 同材料（同案場+樓層+分類+材料規格厚度）合併計算缺口，避免追加需求重複算
  const totalDemand = getTotalDemandForMaterial(d.project, d.floor, d.category, d.name, d.spec, d.thick);
  const totalAlloc = getAllocatedQty(d.project, d.floor, d.name, d.spec, d.thick);
  const remaining = totalDemand - totalAlloc;
  const over = totalAlloc - totalDemand;
  let statusColor, statusText;
  if (over > 0) { statusColor='badge-red'; statusText='⚠️ 超出 '+over+unit; }
  else if (remaining===0) { statusColor='badge-green'; statusText='已完成'; }
  else if (totalAlloc>0) { statusColor='badge-amber'; statusText='部分分配'; }
  else { statusColor='badge-red'; statusText='未分配'; }
  let diffHTML;
  if (over > 0) diffHTML = '超出：<strong style="color:#dc2626">+'+over+unit+'</strong>';
  else diffHTML = '差額：<strong style="color:'+(remaining>0?'#dc2626':'#166534')+'">'+(remaining>0?'-'+remaining:0)+unit+'</strong>';
  // 提示：若同材料有多筆需求，標明缺口是合併計算
  const multiNote = (totalDemand !== Number(d.qty)) ? '<span style="font-size:11px;color:#9ca3af">（此材料總需求 '+totalDemand+unit+'，缺口合併計算）</span>' : '';
  return `<div class="list-item">
    <div style="flex:1">
      <div class="list-main">${esc(d.name)}</div>
      <div class="list-sub">${esc(d.spec)}${d.thick?'・'+esc(d.thick):''}${d.note?'・'+esc(d.note):''}</div>
      <div style="margin-top:4px;font-size:12px;color:#374151">
        本筆需求：<strong>${d.qty}${unit}</strong>　此材料已分配：<strong style="color:#185FA5">${totalAlloc}${unit}</strong>
        ${diffHTML}
      </div>
      <div>${multiNote}</div>
      <span class="badge ${statusColor}" style="margin-top:4px">${statusText}</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px;margin-left:8px">
      <div class="list-date">${esc(d.date)}</div>
      <button class="btn-sm" onclick="copyDemand(${d._idx})">複製</button>
      <button class="btn-sm" onclick="editDemand(${d._idx})">編輯</button>
      <button class="btn-danger-sm" onclick="deleteDemand(${d._idx})">刪除</button>
    </div>
  </div>`;
}

function selectProjectTab(project) {
  activeProject = project;
  activeFloor = null;
  renderDemands();
}

function selectFloorTab(floor) {
  activeFloor = floor;
  renderDemands();
}

function getProjectFloors(project) {
  const floors = [];
  demands.filter(d=>d.project===project).forEach(d=>{ const f=d.floor||'（未分樓層）'; if(!floors.includes(f)) floors.push(f); });
  return floors;
}

function renderDemands() {
  const tabsEl = document.getElementById('demand-tabs');
  const floorTabsEl = document.getElementById('demand-floor-tabs');
  const el = document.getElementById('demand-list');
  if (!el) return;
  if (!demands.length) {
    if (tabsEl) tabsEl.innerHTML = '';
    if (floorTabsEl) floorTabsEl.innerHTML = '';
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>尚無需求紀錄</div>';
    return;
  }
  // 取得所有案場（排除已封存）
  const projects = [];
  demands.forEach(d=>{ if(!projects.includes(d.project) && !archivedProjects.includes(d.project)) projects.push(d.project); });
  if (!projects.length) {
    if (tabsEl) tabsEl.innerHTML = '';
    if (floorTabsEl) floorTabsEl.innerHTML = '';
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>目前沒有進行中的案場</div>';
    return;
  }
  if (!activeProject || !projects.includes(activeProject)) { activeProject = projects[0]; activeFloor = null; }
  // 第一層：案場頁籤
  if (tabsEl) {
    tabsEl.innerHTML = projects.map(p=>
      `<button class="dtab ${p===activeProject?'active':''}" onclick="selectProjectTab('${p.replace(/'/g,"\\'")}')">🏢 ${esc(p)}</button>`
    ).join('');
  }
  // 第二層：樓層頁籤
  const floors = getProjectFloors(activeProject);
  if (!activeFloor || !floors.includes(activeFloor)) activeFloor = floors[0];
  if (floorTabsEl) {
    floorTabsEl.innerHTML = floors.map(f=>
      `<button class="dtab ${f===activeFloor?'active':''}" style="${f===activeFloor?'':'background:#fff;border-color:#cbd5e1'}" onclick="selectFloorTab('${f.replace(/'/g,"\\'")}')">${esc(f)}</button>`
    ).join('');
  }
  // 顯示目前案場+樓層的需求，依分類分組
  const items = demands.map((d,i)=>({...d,_idx:i})).filter(d=>d.project===activeProject && (d.floor||'（未分樓層）')===activeFloor);
  const catMap = {};
  items.forEach(d=>{ const c=d.category||'未分類'; if(!catMap[c]) catMap[c]=[]; catMap[c].push(d); });
  const totalNeeded = items.reduce((a,b)=>a+b.qty,0);
  const totalAlloc = items.reduce((a,b)=>a+getAllocatedQty(b.project,b.floor,b.name,b.spec,b.thick),0);
  let html = `<div class="site-group" style="margin-bottom:12px">
    <div class="site-group-header">
      <div class="site-group-title">🏢 ${esc(activeProject)}　${esc(activeFloor)}</div>
      <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end">
        <span class="site-group-total">需${totalNeeded} 配${totalAlloc}</span>
        <button onclick="copyFloor('${activeProject.replace(/'/g,"\\'")}','${activeFloor.replace(/'/g,"\\'")}')" style="background:rgba(255,255,255,0.25);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">複製此樓層</button>
        <button onclick="exportProjectPDF('${activeProject.replace(/'/g,"\\'")}')" style="background:rgba(255,255,255,0.25);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">匯出整個案場</button>
        <button onclick="archiveProject('${activeProject.replace(/'/g,"\\'")}')" style="background:rgba(255,255,255,0.25);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">📦 封存</button>
      </div>
    </div>
    <div class="site-group-body">`;
  Object.keys(catMap).forEach(cat=>{
    const catItems = catMap[cat];
    const catNeeded = catItems.reduce((a,b)=>a+b.qty,0);
    html += `<div class="cat-header">${esc(cat)}　<span style="font-weight:400;color:#6b7280;font-size:12px">需求 ${catNeeded}</span></div>`;
    html += catItems.map(d=>buildDemandRow(d)).join('');
  });
  html += `</div></div>`;
  el.innerHTML = html;
}

function copyFloor(project, floor) {
  const realFloor = floor==='（未分樓層）' ? '' : floor;
  const items = demands.filter(d=>d.project===project && (d.floor||'')===realFloor);
  if (!items.length) { showToast('⚠️ 此樓層無需求'); return; }
  const newFloor = prompt('請輸入新樓層名稱（會複製「'+project+' '+floor+'」的所有需求）：', '');
  if (!newFloor) return;
  const trimmed = newFloor.trim();
  if (!trimmed) { showToast('⚠️ 樓層不可空白'); return; }
  items.forEach(d=>{
    demands.push({ project:d.project, floor:trimmed, category:d.category||'隔間', date:today, name:d.name, spec:d.spec, thick:d.thick, unit:d.unit, qty:d.qty, note:d.note });
  });
  activeProject = project;
  activeFloor = trimmed;
  renderAll(); autoSave();
  showToast('✅ 已複製到 '+trimmed+'（'+items.length+'筆）');
}

function copyProject(project) {
  const items = demands.filter(d=>d.project===project);
  if (!items.length) { showToast('⚠️ 此案場無需求'); return; }
  const newName = prompt('請輸入新案場名稱（會複製「'+project+'」的所有需求）：', project + ' 複製');
  if (!newName) return;
  const trimmed = newName.trim();
  if (!trimmed) { showToast('⚠️ 名稱不可空白'); return; }
  // 檢查是否已存在
  const exists = demands.some(d=>d.project===trimmed);
  if (exists) {
    if (!confirm('案場「'+trimmed+'」已存在，仍要把需求加進去嗎？')) return;
  }
  // 複製每一筆需求（日期改成今天，不帶出貨紀錄）
  items.forEach(d=>{
    demands.push({
      project: trimmed,
      category: d.category||'隔間',
      date: today,
      name: d.name,
      spec: d.spec,
      thick: d.thick,
      unit: d.unit,
      qty: d.qty,
      note: d.note
    });
  });
  activeProject = trimmed;
  renderAll(); autoSave();
  showToast('✅ 已複製到「'+trimmed+'」（'+items.length+'筆）');
}

function exportProjectPDF(project) {
  const items = demands.filter(d=>d.project===project);
  if (!items.length) { showToast('⚠️ 此案場無需求'); return; }
  let html = '<h1>需求單 - ' + project + '</h1><div class="meta">匯出日期：' + today + '</div>';
  const floorMap = {};
  items.forEach(function(d){ const f=d.floor||'（未分樓層）'; if(!floorMap[f]) floorMap[f]=[]; floorMap[f].push(d); });
  Object.keys(floorMap).forEach(function(floor){
    html += '<h2 style="background:#185FA5;color:#fff;padding:6px 10px;border-radius:6px">🏢 '+floor+'</h2>';
    const catMap = {};
    floorMap[floor].forEach(function(d){ const c=d.category||'未分類'; if(!catMap[c]) catMap[c]=[]; catMap[c].push(d); });
    Object.keys(catMap).forEach(function(cat){
      const rows = catMap[cat].map(function(d){
        const allocated = getAllocatedQty(d.project,d.floor,d.name,d.spec,d.thick);
        const remaining = d.qty - allocated;
        const unit = d.unit||'';
        return '<tr><td>'+d.name+'</td><td>'+d.spec+'</td><td>'+(d.thick||'')+'</td><td>'+d.qty+unit+'</td><td>'+allocated+unit+'</td><td style="color:'+(remaining>0?'#dc2626':'#166534')+';font-weight:600">'+(remaining>0?'-'+remaining:'完成')+'</td><td>'+(d.note||'')+'</td></tr>';
      }).join('');
      html += '<h3 style="margin:8px 0 4px">📐 '+cat+'</h3><table><thead><tr><th>材料</th><th>規格</th><th>厚度</th><th>需求</th><th>已分配</th><th>差額</th><th>備註</th></tr></thead><tbody>'+rows+'</tbody></table>';
    });
  });
  printHTML('需求單 ' + project, html);
}

function copyDemand(idx) {
  const d = demands[idx];
  // 把材料資料帶到新增表單，案件名稱保留讓使用者改樓層
  refreshCategorySelect();
  const catSel = document.getElementById('dem-category');
  if (catSel && d.category) {
    let found=false;
    for(const o of catSel.options){ if(o.value===d.category){found=true;break;} }
    if(found) catSel.value = d.category;
    onSelectCategory();
  }
  document.getElementById('dem-name').value = d.name;
  document.getElementById('dem-spec').value = d.spec;
  document.getElementById('dem-thick').value = d.thick||'';
  document.getElementById('dem-unit').value = d.unit||'';
  document.getElementById('dem-qty').value = d.qty;
  document.getElementById('dem-note').value = d.note||'';
  document.getElementById('dem-floor').value = d.floor||'';
  // 案件名稱預設選同一個（方便改成新樓層時用新增）
  const sel = document.getElementById('dem-project');
  if (sel) {
    let found = false;
    for (const opt of sel.options) { if (opt.value===d.project) { found=true; break; } }
    if (found) sel.value = d.project;
    onSelectProject();
  }
  // 捲動到表單頂端
  window.scrollTo({top:0, behavior:'smooth'});
  showToast('📋 已複製，可修改後新增');
}

function editDemand(idx) {
  const d = demands[idx];
  const body = `
    <div class="form-group"><label>案件名稱</label><input type="text" id="ed-project" value="${d.project}"></div>
    <div class="form-group"><label>樓層</label><input type="text" id="ed-floor" value="${d.floor||''}" placeholder="例：12F"></div>
    <div class="form-group"><label>分類</label><input type="text" id="ed-category" value="${d.category||'隔間'}"></div>
    <div class="form-group"><label>日期</label><input type="date" id="ed-date" value="${d.date}"></div>
    <div class="form-group"><label>材料名稱</label><input type="text" id="ed-name" value="${d.name}"></div>
    <div class="form-group"><label>規格</label><input type="text" id="ed-spec" value="${d.spec}"></div>
    <div class="form-group"><label>厚度</label><input type="text" id="ed-thick" value="${d.thick||''}"></div>
    <div class="form-group"><label>單位</label><input type="text" id="ed-unit" value="${d.unit||''}"></div>
    <div class="form-group"><label>需求數量</label><input type="number" id="ed-qty" value="${d.qty}" min="1"></div>
    <div class="form-group"><label>備註</label><input type="text" id="ed-note" value="${d.note||''}"></div>`;
  showEditModal('編輯需求', body, ()=>{
    demands[idx].project = document.getElementById('ed-project').value.trim();
    demands[idx].floor = document.getElementById('ed-floor').value.trim();
    demands[idx].category = document.getElementById('ed-category').value.trim()||'隔間';
    demands[idx].date = document.getElementById('ed-date').value;
    demands[idx].name = document.getElementById('ed-name').value.trim();
    demands[idx].spec = document.getElementById('ed-spec').value.trim();
    demands[idx].thick = document.getElementById('ed-thick').value.trim();
    demands[idx].unit = document.getElementById('ed-unit').value.trim();
    demands[idx].qty = parseInt(document.getElementById('ed-qty').value)||0;
    demands[idx].note = document.getElementById('ed-note').value.trim();
    hideEditModal(); renderAll(); autoSave(); showToast('✅ 需求已更新');
  });
}

function archiveProject(project) {
  if (!confirm('確定封存「'+project+'」？\n\n封存後會從頁籤收起來（資料保留），需要時可在「封存管理」還原。')) return;
  if (!archivedProjects.includes(project)) archivedProjects.push(project);
  activeProject = null; activeFloor = null;
  allocActiveProject = null; allocActiveFloor = null;
  renderAll(); autoSave(); showToast('📦 已封存「'+project+'」');
}

function unarchiveProject(project) {
  archivedProjects = archivedProjects.filter(p=>p!==project);
  renderAll(); autoSave(); showToast('✅ 已還原「'+project+'」');
  showArchiveManager();
}

function deleteProjectPermanently(project) {
  if (!confirm('⚠️ 永久刪除「'+project+'」？\n\n這會刪掉該案場的所有需求、出貨、分配紀錄，無法復原！')) return;
  if (!confirm('再次確認：真的要永久刪除「'+project+'」的全部資料嗎？')) return;
  const n = v => String(v==null?'':v).trim();
  demands = demands.filter(d=>n(d.project)!==n(project));
  shipments = shipments.filter(s=>n(s.site)!==n(project));
  allocations = allocations.filter(a=>n(a.project)!==n(project));
  archivedProjects = archivedProjects.filter(p=>p!==project);
  renderAll(); autoSave(); showToast('🗑️ 已永久刪除「'+project+'」');
  showArchiveManager();
}

function showArchiveManager() {
  let body = '';
  if (!archivedProjects.length) {
    body = '<div style="color:#6b7280;font-size:14px;padding:10px 0">目前沒有封存的案場。<br><br>在需求單某案場標題列點「📦 封存」即可把完工案場收起來。</div>';
  } else {
    body = '<div style="font-size:13px;color:#6b7280;margin-bottom:10px">已封存的案場（已從主畫面隱藏）：</div>';
    body += archivedProjects.map(p=>`
      <div class="list-item">
        <div style="flex:1"><div class="list-main">🏢 ${esc(p)}</div></div>
        <div style="display:flex;gap:6px">
          <button class="btn-sm" onclick="unarchiveProject('${p.replace(/'/g,"\\'")}')">還原</button>
          <button class="btn-danger-sm" onclick="deleteProjectPermanently('${p.replace(/'/g,"\\'")}')">永久刪除</button>
        </div>
      </div>`).join('');
  }
  document.getElementById('edit-modal-title').textContent = '📦 封存管理';
  document.getElementById('edit-modal-body').innerHTML = body;
  document.getElementById('edit-save-btn').style.display = 'none';
  document.getElementById('edit-modal').classList.add('show');
}

function mergeDemandProjects() {
  const projects = [];
  demands.forEach(d=>{ if(!projects.includes(d.project) && !archivedProjects.includes(d.project)) projects.push(d.project); });
  if (!projects.length) { showToast('⚠️ 尚無案場'); return; }
  const options = projects.map(p=>({ value:p, label:'🏢 '+p }));
  showPicker('選擇要合併的案場（需求單）', options, function(chosen){
    let html = '<h1>需求單（合併）</h1><div class="meta">匯出日期：'+today+'</div>';
    chosen.forEach(function(project){
      html += '<h1 style="margin-top:16px;border-top:2px solid #185FA5;padding-top:10px">🏢 '+project+'</h1>';
      const items = demands.filter(d=>d.project===project);
      const floorMap = {};
      items.forEach(function(d){ const f=d.floor||'（未分樓層）'; if(!floorMap[f]) floorMap[f]=[]; floorMap[f].push(d); });
      Object.keys(floorMap).forEach(function(floor){
        html += '<h2 style="background:#185FA5;color:#fff;padding:6px 10px;border-radius:6px">'+floor+'</h2>';
        const catMap = {};
        floorMap[floor].forEach(function(d){ const c=d.category||'未分類'; if(!catMap[c]) catMap[c]=[]; catMap[c].push(d); });
        Object.keys(catMap).forEach(function(cat){
          const rows = catMap[cat].map(function(d){
            const allocated = getAllocatedQty(d.project,d.floor,d.name,d.spec,d.thick);
            const remaining = d.qty - allocated;
            const unit = d.unit||'';
            return '<tr><td>'+d.name+'</td><td>'+d.spec+'</td><td>'+(d.thick||'')+'</td><td>'+d.qty+unit+'</td><td>'+allocated+unit+'</td><td style="color:'+(remaining>0?'#dc2626':'#166534')+';font-weight:600">'+(remaining>0?'-'+remaining:'完成')+'</td></tr>';
          }).join('');
          html += '<h3 style="margin:8px 0 4px">📐 '+cat+'</h3><table><thead><tr><th>材料</th><th>規格</th><th>厚度</th><th>需求</th><th>已分配</th><th>差額</th></tr></thead><tbody>'+rows+'</tbody></table>';
        });
      });
    });
    printHTML('需求單合併', html);
  });
}

function deleteDemand(idx) {
  if (!confirm('確定刪除此需求？')) return;
  demands.splice(idx,1);
  renderAll(); autoSave(); showToast('🗑️ 已刪除');
}

// ── Allocation（置料區分配）──
const allocNorm = v => String(v==null?'':v).trim();

// 取得某案場置料區某材料的剩餘量 = 出貨到該案場的量 − 已分配的量
function getStockYardQty(project, name, spec, thick) {
  const shipped = getShippedQty(project, name, spec, thick);
  const allocated = allocations
    .filter(a=>allocNorm(a.project)===allocNorm(project) && allocNorm(a.name)===allocNorm(name) && allocNorm(a.spec)===allocNorm(spec) && allocNorm(a.thick)===allocNorm(thick))
    .reduce((a,b)=>a+Number(b.qty),0);
  return shipped - allocated;
}

// 取得某案場置料區所有材料（有運到的）
function getStockYardMaterials(project) {
  const map = {};
  shipments.filter(s=>allocNorm(s.site)===allocNorm(project)).forEach(s=>{
    const key = s.name+'|'+s.spec+'|'+s.thick;
    if (!map[key]) map[key] = { name:s.name, spec:s.spec, thick:s.thick, unit:'' };
  });
  // 補單位（從需求單抓）
  Object.values(map).forEach(m=>{
    const d = demands.find(d=>allocNorm(d.project)===allocNorm(project) && allocNorm(d.name)===allocNorm(m.name) && allocNorm(d.spec)===allocNorm(m.spec) && allocNorm(d.thick)===allocNorm(m.thick));
    if (d && d.unit) m.unit = d.unit;
    m.remain = getStockYardQty(project, m.name, m.spec, m.thick);
  });
  return Object.values(map);
}

function getAllocProjects() {
  const set = [];
  shipments.forEach(s=>{ if(!set.includes(s.site) && !archivedProjects.includes(s.site)) set.push(s.site); });
  return set;
}

function selectAllocTab(project) {
  allocActiveProject = project;
  allocActiveFloor = null;
  renderAllocation();
}

function selectAllocFloorTab(floor) {
  allocActiveFloor = floor;
  renderAllocation();
}

function getAllocFloors(project) {
  // 樓層來源：此案場需求單裡有的樓層
  const floors = [];
  demands.filter(d=>allocNorm(d.project)===allocNorm(project)).forEach(d=>{ const f=d.floor||'（未分樓層）'; if(!floors.includes(f)) floors.push(f); });
  return floors;
}

function renderAllocation() {
  const tabsEl = document.getElementById('alloc-tabs');
  const floorTabsEl = document.getElementById('alloc-floor-tabs');
  const projects = getAllocProjects();
  if (!projects.length) {
    if (tabsEl) tabsEl.innerHTML='';
    if (floorTabsEl) floorTabsEl.innerHTML='';
    document.getElementById('alloc-stock-list').innerHTML='<div class="empty"><div class="empty-icon">📦</div>尚無出貨到置料區的材料</div>';
    document.getElementById('alloc-list').innerHTML='';
    document.getElementById('alloc-mat-select').innerHTML='<option value="">-- 尚無材料 --</option>';
    const fl = document.getElementById('alloc-current-floor'); if (fl) fl.textContent='分配到：尚無資料';
    return;
  }
  if (!allocActiveProject || !projects.includes(allocActiveProject)) { allocActiveProject = projects[0]; allocActiveFloor = null; }
  // 第一層：案場頁籤
  if (tabsEl) {
    tabsEl.innerHTML = projects.map(p=>
      `<button class="dtab ${p===allocActiveProject?'active':''}" onclick="selectAllocTab('${p.replace(/'/g,"\\'")}')">🏢 ${esc(p)}</button>`
    ).join('');
  }
  // 第二層：樓層頁籤
  const floors = getAllocFloors(allocActiveProject);
  if (!allocActiveFloor || !floors.includes(allocActiveFloor)) allocActiveFloor = floors[0] || null;
  if (floorTabsEl) {
    floorTabsEl.innerHTML = floors.map(f=>
      `<button class="dtab ${f===allocActiveFloor?'active':''}" style="${f===allocActiveFloor?'':'background:#fff;border-color:#cbd5e1'}" onclick="selectAllocFloorTab('${f.replace(/'/g,"\\'")}')">${esc(f)}</button>`
    ).join('');
  }
  const fl = document.getElementById('alloc-current-floor');
  if (fl) fl.textContent = '分配到：' + allocActiveProject + '　' + (allocActiveFloor||'（請先在需求單建立樓層）');
  // 置料區現況（整個案場共用置料區）
  const mats = getStockYardMaterials(allocActiveProject);
  const stockEl = document.getElementById('alloc-stock-list');
  if (!mats.length) {
    stockEl.innerHTML='<div class="empty"><div class="empty-icon">📦</div>此案場置料區無材料</div>';
  } else {
    stockEl.innerHTML = mats.map(m=>{
      const color = m.remain>0?'#166534':(m.remain<0?'#dc2626':'#6b7280');
      return `<div class="list-item">
        <div style="flex:1">
          <div class="list-main">${esc(m.name)}</div>
          <div class="list-sub">${esc(m.spec)}${m.thick?'・'+esc(m.thick):''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:700;color:${color}">${m.remain}${esc(m.unit)}</div>
          <div style="font-size:11px;color:#9ca3af">置料區剩餘</div>
        </div>
      </div>`;
    }).join('');
  }
  // 材料下拉
  const matSel = document.getElementById('alloc-mat-select');
  const prevMat = matSel.value;
  matSel.innerHTML = '<option value="">-- 請選擇材料 --</option>';
  mats.forEach((m,idx)=>{
    const o = document.createElement('option');
    o.value = idx;
    o.textContent = m.name+'　'+m.spec+'　'+m.thick+'　（剩 '+m.remain+m.unit+'）';
    matSel.appendChild(o);
  });
  if (prevMat) matSel.value = prevMat;
  // 分配紀錄
  renderAllocList();
  updateAllocGap();
}

function getAllocCurrentMat() {
  const sel = document.getElementById('alloc-mat-select');
  if (!sel.value && sel.value!==0) return null;
  const mats = getStockYardMaterials(allocActiveProject);
  return mats[parseInt(sel.value)] || null;
}

function onSelectAllocMat() { updateAllocGap(); }

function updateAllocGap() {
  const box = document.getElementById('alloc-gap-box');
  if (!box) return;
  const mat = getAllocCurrentMat();
  const category = document.getElementById('alloc-category').value;
  const floor = allocActiveFloor;
  if (!mat || !floor) { box.style.display='none'; return; }
  // 此樓層+分類+材料的需求
  const matched = demands.filter(d=>allocNorm(d.project)===allocNorm(allocActiveProject) && allocNorm(d.floor||'（未分樓層）')===allocNorm(floor) && allocNorm(d.category)===allocNorm(category) && allocNorm(d.name)===allocNorm(mat.name) && allocNorm(d.spec)===allocNorm(mat.spec) && allocNorm(d.thick)===allocNorm(mat.thick));
  const unit = mat.unit||'';
  if (!matched.length) {
    box.style.display='block';
    box.style.background='#f1efe8'; box.style.color='#5f5e5a';
    box.innerHTML='ℹ️ '+esc(floor)+' '+esc(category)+' 沒有「'+esc(mat.name)+'」的需求紀錄';
    return;
  }
  const unit = esc(mat.unit||'');
  const totalDemand = matched.reduce((a,b)=>a+Number(b.qty),0);
  const alreadyAlloc = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && allocNorm(a.floor)===allocNorm(floor) && allocNorm(a.category)===allocNorm(category) && allocNorm(a.name)===allocNorm(mat.name) && allocNorm(a.spec)===allocNorm(mat.spec) && allocNorm(a.thick)===allocNorm(mat.thick)).reduce((a,b)=>a+Number(b.qty),0);
  const inputQty = parseInt(document.getElementById('alloc-qty').value)||0;
  const after = alreadyAlloc + inputQty;
  const remaining = totalDemand - after;
  box.style.display='block';
  let line = esc(floor)+' '+esc(category)+'　需求 <strong>'+totalDemand+unit+'</strong>　已配 <strong>'+alreadyAlloc+unit+'</strong>';
  if (inputQty>0) line += '　本次 <strong>'+inputQty+unit+'</strong>';
  if (remaining>0) { box.style.background='#fef3c7'; box.style.color='#92400e'; box.innerHTML=line+'<br>📦 還缺 <strong>'+remaining+unit+'</strong>'; }
  else if (remaining===0) { box.style.background='#dcfce7'; box.style.color='#166534'; box.innerHTML=line+'<br>✅ 剛好滿足'; }
  else { box.style.background='#fee2e2'; box.style.color='#991b1b'; box.innerHTML=line+'<br>⚠️ 將超出 <strong>'+Math.abs(remaining)+unit+'</strong>'; }
}

function addAllocation() {
  const mat = getAllocCurrentMat();
  const category = document.getElementById('alloc-category').value;
  const floor = allocActiveFloor;
  const qty = parseInt(document.getElementById('alloc-qty').value);
  if (!mat) { showToast('⚠️ 請選擇材料'); return; }
  if (!floor) { showToast('⚠️ 請先在上方選樓層（需先在需求單建立此案場的樓層）'); return; }
  if (!qty||qty<=0) { showToast('⚠️ 請填寫數量'); return; }
  if (qty > mat.remain) {
    if (!confirm('⚠️ 置料區只剩 '+mat.remain+(mat.unit||'')+'\n要分配 '+qty+(mat.unit||'')+' 會超出置料區存量。\n\n確定繼續嗎？')) return;
  }
  allocations.push({
    project: allocActiveProject,
    floor, category,
    name: mat.name, spec: mat.spec, thick: mat.thick, unit: mat.unit||'',
    qty, date: document.getElementById('alloc-date').value || today
  });
  document.getElementById('alloc-qty').value='';
  renderAll(); autoSave(); showToast('✅ 已分配到 '+floor+' '+category);
}

function renderAllocList() {
  const el = document.getElementById('alloc-list');
  if (!el) return;
  const items = allocations.map((a,i)=>({...a,_idx:i})).filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && allocNorm(a.floor)===allocNorm(allocActiveFloor));
  if (!items.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>此樓層尚無分配紀錄</div>'; return; }
  // 依日期分組（新到舊）
  const dateMap = {};
  items.forEach(a=>{ const d=a.date||'（無日期）'; if(!dateMap[d]) dateMap[d]=[]; dateMap[d].push(a); });
  const dates = Object.keys(dateMap).sort((a,b)=>b.localeCompare(a));
  el.innerHTML = dates.map(date=>{
    const rows = dateMap[date].map(a=>`
      <div class="list-item">
        <div style="flex:1">
          <div class="list-main"><span style="display:inline-block;background:#e6f1fb;color:#185FA5;font-size:11px;padding:1px 6px;border-radius:4px;margin-right:5px">${esc(a.category)}</span>${esc(a.name)}</div>
          <div class="list-sub">${esc(a.spec)}${a.thick?'・'+esc(a.thick):''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:8px">
          <div class="list-qty">${a.qty}${esc(a.unit||'')}</div>
          <div style="display:flex;gap:4px">
            <button class="btn-sm" onclick="editAllocation(${a._idx})">編輯</button>
            <button class="btn-danger-sm" onclick="deleteAllocation(${a._idx})">刪除</button>
          </div>
        </div>
      </div>`).join('');
    const dtotal = dateMap[date].reduce((x,y)=>x+Number(y.qty),0);
    return `<div class="site-group" style="margin-bottom:12px">
      <div class="site-group-header">
        <div class="site-group-title">📅 ${esc(date)}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="site-group-total">合計 ${dtotal}</span>
          <button onclick="exportAllocDatePDF('${date}')" style="background:rgba(255,255,255,0.25);border:none;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer">匯出PDF</button>
        </div>
      </div>
      <div class="site-group-body">${rows}</div>
    </div>`;
  }).join('');
}

function exportAllocPDF() {
  if (!allocActiveProject) { showToast('⚠️ 請先選案場'); return; }
  const items = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject));
  if (!items.length) { showToast('⚠️ 此案場尚無分配紀錄'); return; }
  let html = '';
  if (company.name) html += '<div class="company">'+company.name+'</div>';
  html += '<h1>材料搬運單</h1>';
  html += '<div class="meta">案場：'+allocActiveProject+'　日期：'+today+'</div>';
  // 依樓層 > 分類
  const floorMap = {};
  items.forEach(function(a){ const f=a.floor||'（未分樓層）'; if(!floorMap[f]) floorMap[f]=[]; floorMap[f].push(a); });
  Object.keys(floorMap).forEach(function(floor){
    html += '<h2 style="background:#185FA5;color:#fff;padding:6px 10px;border-radius:6px">🏢 '+floor+'</h2>';
    const catMap = {};
    floorMap[floor].forEach(function(a){ const c=a.category||'未分類'; if(!catMap[c]) catMap[c]=[]; catMap[c].push(a); });
    Object.keys(catMap).forEach(function(cat){
      const rows = catMap[cat].map(function(a){
        return '<tr><td>'+a.name+'</td><td>'+a.spec+'</td><td>'+(a.thick||'')+'</td><td>'+a.qty+(a.unit||'')+'</td></tr>';
      }).join('');
      html += '<h3 style="margin:8px 0 4px">📐 '+cat+'</h3>';
      html += '<table><thead><tr><th>材料名稱</th><th>規格</th><th>厚度</th><th>搬運數量</th></tr></thead><tbody>'+rows+'</tbody></table>';
    });
  });
  printHTML('搬運單 '+allocActiveProject, html);
}

function getSettlementData(project) {
  // 依「材料+規格+厚度」彙總實際分配量
  const items = allocations.filter(a=>allocNorm(a.project)===allocNorm(project));
  const map = {};
  items.forEach(a=>{
    const key = a.name+'|'+a.spec+'|'+a.thick;
    if (!map[key]) map[key] = { name:a.name, spec:a.spec, thick:a.thick, unit:a.unit||'', total:0, byCat:{} };
    map[key].total += Number(a.qty);
    const c = a.category||'未分類';
    map[key].byCat[c] = (map[key].byCat[c]||0) + Number(a.qty);
  });
  return Object.values(map);
}

function showSettlement() {
  if (!allocActiveProject) { showToast('⚠️ 請先選案場'); return; }
  const data = getSettlementData(allocActiveProject);
  if (!data.length) { showToast('⚠️ 此案場尚無分配紀錄'); return; }
  let body = '<div style="font-size:13px;color:#6b7280;margin-bottom:10px">案場：'+allocActiveProject+'（依實際分配統計，各骨架分開計算）</div>';
  body += data.map(m=>{
    const catLine = Object.keys(m.byCat).map(c=>esc(c)+' '+m.byCat[c]+esc(m.unit)).join('、');
    return `<div class="list-item">
      <div style="flex:1">
        <div class="list-main">${esc(m.name)}　${esc(m.spec)}${m.thick?'・'+esc(m.thick):''}</div>
        <div style="font-size:11px;color:#9ca3af;margin-top:2px">${catLine}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:17px;font-weight:700;color:#185FA5">${m.total}${esc(m.unit)}</div>
      </div>
    </div>`;
  }).join('');
  body += '<button class="btn-primary" onclick="exportSettlementPDF()" style="margin-top:12px">📄 匯出結算單 PDF</button>';
  document.getElementById('edit-modal-title').textContent = '📊 ' + allocActiveProject + ' 用料結算';
  document.getElementById('edit-modal-body').innerHTML = body;
  document.getElementById('edit-save-btn').style.display = 'none';
  document.getElementById('edit-modal').classList.add('show');
}

function exportSettlementPDF() {
  const project = allocActiveProject;
  const data = getSettlementData(project);
  if (!data.length) { showToast('⚠️ 無資料'); return; }
  let html = '';
  if (company.name) html += '<div class="company">'+company.name+'</div>';
  html += '<h1>用料結算單</h1>';
  html += '<div class="meta">案場：'+project+'　結算日期：'+today+'</div>';
  const rows = data.map(function(m){
    const catLine = Object.keys(m.byCat).map(function(c){return c+' '+m.byCat[c]+m.unit;}).join('、');
    return '<tr><td>'+m.name+'</td><td>'+m.spec+'</td><td>'+(m.thick||'')+'</td><td>'+catLine+'</td><td style="font-weight:700">'+m.total+m.unit+'</td></tr>';
  }).join('');
  html += '<table><thead><tr><th>材料名稱</th><th>規格</th><th>厚度</th><th>分類明細</th><th>總用量</th></tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('edit-modal').classList.remove('show');
  document.getElementById('edit-save-btn').style.display = '';
  printHTML('用料結算 '+project, html);
}

function exportAllocDatePDF(date) {
  const items = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && allocNorm(a.floor)===allocNorm(allocActiveFloor) && (a.date||'（無日期）')===date);
  if (!items.length) { showToast('⚠️ 無資料'); return; }
  let html = '';
  if (company.name) html += '<div class="company">'+company.name+'</div>';
  html += '<h1>材料搬運單</h1>';
  html += '<div class="meta">案場：'+allocActiveProject+'　樓層：'+allocActiveFloor+'　日期：'+date+'</div>';
  const catMap = {};
  items.forEach(function(a){ const c=a.category||'未分類'; if(!catMap[c]) catMap[c]=[]; catMap[c].push(a); });
  Object.keys(catMap).forEach(function(cat){
    const rows = catMap[cat].map(function(a){
      return '<tr><td>'+a.name+'</td><td>'+a.spec+'</td><td>'+(a.thick||'')+'</td><td>'+a.qty+(a.unit||'')+'</td></tr>';
    }).join('');
    html += '<h2>📐 '+cat+'</h2><table><thead><tr><th>材料</th><th>規格</th><th>厚度</th><th>搬運數量</th></tr></thead><tbody>'+rows+'</tbody></table>';
  });
  printHTML('搬運單 '+allocActiveProject+' '+date, html);
}

function buildAllocHTML(items, headerMeta) {
  let html = '';
  if (company.name) html += '<div class="company">'+company.name+'</div>';
  html += '<h1>材料搬運單（合併）</h1>';
  html += '<div class="meta">'+headerMeta+'</div>';
  const dateMap = {};
  items.forEach(function(a){ const d=a.date||'（無日期）'; if(!dateMap[d]) dateMap[d]=[]; dateMap[d].push(a); });
  Object.keys(dateMap).sort((a,b)=>b.localeCompare(a)).forEach(function(date){
    html += '<h1 style="margin-top:14px;border-top:2px solid #185FA5;padding-top:8px">📅 '+date+'</h1>';
    const floorMap = {};
    dateMap[date].forEach(function(a){ const f=a.floor||'（未分樓層）'; if(!floorMap[f]) floorMap[f]=[]; floorMap[f].push(a); });
    Object.keys(floorMap).forEach(function(floor){
      html += '<h2 style="background:#185FA5;color:#fff;padding:6px 10px;border-radius:6px">🏢 '+floor+'</h2>';
      const catMap = {};
      floorMap[floor].forEach(function(a){ const c=a.category||'未分類'; if(!catMap[c]) catMap[c]=[]; catMap[c].push(a); });
      Object.keys(catMap).forEach(function(cat){
        const rows = catMap[cat].map(function(a){
          return '<tr><td>'+a.name+'</td><td>'+a.spec+'</td><td>'+(a.thick||'')+'</td><td>'+a.qty+(a.unit||'')+'</td></tr>';
        }).join('');
        html += '<h3 style="margin:8px 0 4px">📐 '+cat+'</h3><table><thead><tr><th>材料</th><th>規格</th><th>厚度</th><th>搬運數量</th></tr></thead><tbody>'+rows+'</tbody></table>';
      });
    });
  });
  return html;
}

function mergeAllocByDate() {
  if (!allocActiveProject) { showToast('⚠️ 請先選案場'); return; }
  const dates = Array.from(new Set(allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject)).map(a=>a.date||'（無日期）'))).sort((a,b)=>b.localeCompare(a));
  if (!dates.length) { showToast('⚠️ 此案場尚無分配紀錄'); return; }
  const options = dates.map(d=>{
    const cnt = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && (a.date||'（無日期）')===d).length;
    return { value:d, label:'📅 '+d+'（'+cnt+'筆）' };
  });
  showPicker('選擇日期（出該日全樓層）', options, function(chosenDates){
    const items = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && chosenDates.includes(a.date||'（無日期）'));
    if (!items.length) { showToast('⚠️ 無資料'); return; }
    printHTML('搬運單合併 '+allocActiveProject, buildAllocHTML(items, '案場：'+allocActiveProject+'　日期：'+chosenDates.sort().join('、')+'（全樓層）'));
  });
}

function mergeAllocByFloor() {
  if (!allocActiveProject) { showToast('⚠️ 請先選案場'); return; }
  const floors = [];
  allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject)).forEach(a=>{ const f=a.floor||'（未分樓層）'; if(!floors.includes(f)) floors.push(f); });
  if (!floors.length) { showToast('⚠️ 此案場尚無分配紀錄'); return; }
  const options = floors.map(f=>{
    const cnt = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && (a.floor||'（未分樓層）')===f).length;
    return { value:f, label:'🏢 '+f+'（'+cnt+'筆）' };
  });
  showPicker('選擇樓層（出該樓層全部日期）', options, function(chosenFloors){
    const items = allocations.filter(a=>allocNorm(a.project)===allocNorm(allocActiveProject) && chosenFloors.includes(a.floor||'（未分樓層）'));
    if (!items.length) { showToast('⚠️ 無資料'); return; }
    printHTML('搬運單合併 '+allocActiveProject, buildAllocHTML(items, '案場：'+allocActiveProject+'　樓層：'+chosenFloors.join('、')+'（全部日期）'));
  });
}

function editAllocation(idx) {
  const a = allocations[idx];
  const body = `
    <div class="form-group"><label>樓層</label><input type="text" id="ea-floor" value="${a.floor||''}"></div>
    <div class="form-group"><label>分類</label><input type="text" id="ea-category" value="${a.category||'隔間'}"></div>
    <div class="form-group"><label>材料名稱</label><input type="text" id="ea-name" value="${a.name}"></div>
    <div class="form-group"><label>規格</label><input type="text" id="ea-spec" value="${a.spec}"></div>
    <div class="form-group"><label>厚度</label><input type="text" id="ea-thick" value="${a.thick||''}"></div>
    <div class="form-group"><label>數量</label><input type="number" id="ea-qty" value="${a.qty}" min="1"></div>
    <div class="form-group"><label>日期</label><input type="date" id="ea-date" value="${a.date||today}"></div>`;
  showEditModal('編輯分配紀錄', body, ()=>{
    allocations[idx].floor = document.getElementById('ea-floor').value.trim();
    allocations[idx].category = document.getElementById('ea-category').value.trim()||'隔間';
    allocations[idx].name = document.getElementById('ea-name').value.trim();
    allocations[idx].spec = document.getElementById('ea-spec').value.trim();
    allocations[idx].thick = document.getElementById('ea-thick').value.trim();
    allocations[idx].qty = parseInt(document.getElementById('ea-qty').value)||0;
    allocations[idx].date = document.getElementById('ea-date').value;
    hideEditModal(); renderAll(); autoSave(); showToast('✅ 分配紀錄已更新');
  });
}

function deleteAllocation(idx) {
  if (!confirm('確定刪除此分配紀錄？分配的量會回到置料區。')) return;
  allocations.splice(idx,1);
  renderAll(); autoSave(); showToast('🗑️ 已刪除，已退回置料區');
}

// ── Init ──
loadFromSheets();

// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
